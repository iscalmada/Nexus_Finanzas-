const lsCFP=(k,d)=>{try{const v=localStorage.getItem('nexus_'+k);return v==null?d:JSON.parse(v);}catch(e){return d;}};
const lsCFC=(k,d)=>{try{const v=localStorage.getItem('nexus_crm_'+k);return v==null?d:JSON.parse(v);}catch(e){return d;}};
const setLS=(k,v)=>{try{localStorage.setItem('nexus_'+k,JSON.stringify(v));}catch(e){}};
const hashPin=p=>p.split('').reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0)|0,0).toString(36);
const money=(n)=>"$"+(Number(n)||0).toLocaleString("es-MX",{minimumFractionDigits:0,maximumFractionDigits:0});
const comResultProd=(p)=>(p.comisionDirecta!=null&&p.comisionDirecta!=="")?Number(p.comisionDirecta):((Number(p.montoNegocio)||0)*(Number(p.indiceComision)||0)/100);
const mesActual=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");};
const ingresoProdMes=(p,mes)=>{const com=comResultProd(p),metas=p.metas||{};if(p.recurrente){let u=0;for(const k in metas){if(k<=mes)u+=Number(metas[k])||0;}return u*com;}return (Number(metas[mes])||0)*com;};

function Tablero(){
  const mes=mesActual();
  const productos=lsCFC('productos',[]);
  const comisionMes=productos.reduce((a,p)=>a+ingresoProdMes(p,mes),0);
  const opos=lsCFC('oportunidades',[]);
  const opAb=opos.filter(o=>o.etapa!=="Oportunidad Concretada"&&o.etapa!=="Oportunidad Rechazada").length;
  const contactos=lsCFC('contactos',[]).length;
  const cuentas=lsCFP('cuentas',[]).length;
  const movsMes=lsCFP('movs',[]).filter(m=>(m.fecha||"").slice(0,7)===mes).length;
  const card={background:"#10101e",border:"1px solid #1e293b",borderRadius:14,padding:"14px 16px"};
  const lbl={fontSize:10,color:"#64748b",letterSpacing:1,textTransform:"uppercase",marginBottom:4};
  return <div style={{display:"flex",flexDirection:"column",gap:10}}>
    <div style={{...card,borderColor:GOLD+"44"}}>
      <div style={lbl}>Comisión proyectada · este mes (CFC)</div>
      <div style={{fontSize:30,fontWeight:800,fontFamily:"'Cinzel',serif",color:GOLD}}>{money(comisionMes)}</div>
      <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{opAb} oportunidad{opAb===1?"":"es"} abierta{opAb===1?"":"s"} · {contactos} contactos</div>
    </div>
    <div style={{...card,borderColor:GOLD+"22"}}>
      <div style={lbl}>Saldo en cuentas (CFP)</div>
      {(()=>{const r=lsCFP('resumen',{});return <div style={{fontSize:25,fontWeight:800,fontFamily:"'Cinzel',serif",color:"#e2e8f0"}}>{r.saldo!=null?money(r.saldo):"—"}</div>;})()}
      <div style={{fontSize:11,color:"#94a3b8",marginTop:2}}>{cuentas} cuenta{cuentas===1?"":"s"} · {movsMes} movimiento{movsMes===1?"":"s"} este mes</div>
    </div>
  </div>;
}

/* ── Alta/cambio de PIN: 2 pasos (crear + confirmar), guarda hasheado ── */
function PinSetter({onDone,onCancel}){
  const[step,setStep]=useState(1);
  const[v,setV]=useState("");
  const[first,setFirst]=useState("");
  const[err,setErr]=useState("");
  const press=(d)=>{ if(v.length>=6)return; setV(v+d); setErr(""); };
  const del=()=>setV(v.slice(0,-1));
  const ok=()=>{
    if(v.length<4){ setErr("El PIN debe tener al menos 4 dígitos"); return; }
    if(step===1){ setFirst(v); setV(""); setStep(2); }
    else { if(v===first){ onDone(v); } else { setErr("Los PINs no coinciden, vuelve a empezar"); setV(""); setFirst(""); setStep(1); } }
  };
  const dots=Array.from({length:Math.max(4,v.length)});
  const key={fontSize:22,fontWeight:600,padding:"15px 0",background:"#10101e",border:"1px solid #1e293b",borderRadius:12,color:"#e2e8f0",cursor:"pointer"};
  return <div style={{position:"fixed",inset:0,background:"rgba(8,8,15,0.96)",zIndex:9999,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"0 28px"}}>
    <div style={{maxWidth:360,width:"100%"}}>
      <div style={{fontSize:13,letterSpacing:4,color:GOLD,fontFamily:"'Cinzel',serif",textAlign:"center"}}>{step===1?"DEFINE TU PIN":"CONFÍRMALO"}</div>
      <div style={{fontSize:11,color:"#64748b",textAlign:"center",marginTop:4,marginBottom:22}}>{step===1?"De 4 a 6 dígitos":"Vuelve a teclear el PIN"}</div>
      <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:22,height:16}}>
        {dots.map((_,i)=><div key={i} style={{width:12,height:12,borderRadius:"50%",background:i<v.length?GOLD:"#1e293b"}}/>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        {[1,2,3,4,5,6,7,8,9].map(d=><button key={d} style={key} onClick={()=>press(String(d))}>{d}</button>)}
        <button style={{...key,fontSize:14,color:"#64748b"}} onClick={del}>borrar</button>
        <button style={key} onClick={()=>press("0")}>0</button>
        <button style={{...key,color:v.length>=4?"#08080f":"#475569",background:v.length>=4?GOLD:"#10101e",fontWeight:800,fontSize:15}} onClick={ok}>OK</button>
      </div>
      <div style={{fontSize:11,color:"#f87171",height:16,marginTop:14,textAlign:"center"}}>{err}</div>
      <div style={{textAlign:"center",marginTop:6}}>
        <button onClick={onCancel} style={{background:"transparent",border:"none",color:"#64748b",fontSize:13,cursor:"pointer",padding:8}}>Cancelar</button>
      </div>
    </div>
  </div>;
}

function Lock({onOk}){
  const pinApp=String(lsCFP('pinApp',''));
  const[v,setV]=useState("");const[err,setErr]=useState(false);
  const press=(d)=>{
    if(v.length>=8)return;
    const n=v+d; setV(n); setErr(false);
    if(hashPin(n)===pinApp){ onOk(); return; }
    if(n.length>=8){ setErr(true); setTimeout(()=>{setV("");setErr(false);},700); }
  };
  const del=()=>setV(v.slice(0,-1));
  const dots=Array.from({length:Math.max(4,v.length)});
  const key={fontSize:24,fontWeight:600,padding:"18px 0",background:"#10101e",border:"1px solid #1e293b",borderRadius:14,color:"#e2e8f0",cursor:"pointer"};
  return <div style={{height:"100%",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"0 28px",maxWidth:420,margin:"0 auto"}}>
    <img src={ISOTIPO} width="78" height="78" alt="Nexus Partners" style={{display:"block",marginBottom:14}}/>
    <div style={{fontSize:13,letterSpacing:6,color:"#64748b",fontFamily:"'Cinzel',serif"}}>NEXUS</div>
    <div style={{fontSize:34,fontWeight:700,letterSpacing:3,color:GOLD,fontFamily:"'Cinzel',serif",marginBottom:2}}>FLOW</div>
    <div style={{fontSize:10,color:"#475569",letterSpacing:2,marginBottom:26}}>by Nexus Partners</div>
    <div style={{display:"flex",gap:12,marginBottom:26,height:16}}>
      {dots.map((_,i)=><div key={i} style={{width:12,height:12,borderRadius:"50%",background:i<v.length?(err?"#f87171":GOLD):"#1e293b"}}/>)}
    </div>
    <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,width:"100%"}}>
      {[1,2,3,4,5,6,7,8,9].map(d=><button key={d} style={key} onClick={()=>press(String(d))}>{d}</button>)}
      <div/>
      <button style={key} onClick={()=>press("0")}>0</button>
      <button style={{...key,fontSize:16,color:"#64748b"}} onClick={del}>borrar</button>
    </div>
    <div style={{fontSize:11,color:"#f87171",height:16,marginTop:14}}>{err?"PIN incorrecto":""}</div>
  </div>;
}

function Home({ir}){
  const[nombre,setNombre]=useState(()=>String(lsCFP('nombreUsuario','')));
  const[editName,setEditName]=useState(false);
  const[tmpName,setTmpName]=useState("");
  const[pinOn,setPinOn]=useState(()=>!!lsCFP('pinActivo',false)&&!!String(lsCFP('pinApp','')));
  const[setter,setSetter]=useState(false);
  const guardarNombre=()=>{ const n=tmpName.trim(); setNombre(n); setLS('nombreUsuario',n); setEditName(false); };
  const abrirEdit=()=>{ setTmpName(nombre); setEditName(true); };
  const activarPin=(pin)=>{ setLS('pinApp',hashPin(pin)); setLS('pinActivo',true); setPinOn(true); setSetter(false); };
  const desactivarPin=()=>{ if(window.confirm("¿Desactivar el PIN de acceso? Podrás volver a activarlo cuando quieras, sin perder ningún dato.")){ setLS('pinActivo',false); setLS('pinApp',''); setPinOn(false); } };
  const card={background:"#10101e",border:"1px solid #1e293b",borderRadius:14,padding:"14px 16px"};
  const lbl={fontSize:10,color:"#64748b",letterSpacing:1,textTransform:"uppercase"};
  return <div>
    {/* Encabezado con isotipo */}
    <div style={{textAlign:"center",paddingTop:6,marginBottom:14}}>
      <img src={ISOTIPO} width="84" height="84" alt="Nexus Partners" style={{display:"block",margin:"0 auto 8px"}}/>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:26,fontWeight:700,letterSpacing:5,color:GOLD}}>NEXUS FLOW</div>
      <div style={{fontSize:9,color:"#475569",letterSpacing:2,marginTop:2}}>by Nexus Partners</div>
    </div>

    {/* Bienvenida + nombre configurable */}
    <div style={{...card,marginBottom:10}}>
      <div style={lbl}>Bienvenida</div>
      {!editName?(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
          <div style={{fontSize:16,color:"#cbd5e1"}}>
            Bienvenido{nombre?<span>, <span style={{color:"#e2e8f0",fontWeight:700}}>{nombre}</span></span>:null}
          </div>
          <button onClick={abrirEdit} style={{background:"transparent",border:"1px solid #1e293b",borderRadius:9,color:GOLD,fontSize:12,padding:"5px 10px",cursor:"pointer"}}>{nombre?"Editar":"Poner nombre"}</button>
        </div>
      ):(
        <div style={{marginTop:8}}>
          <input value={tmpName} onChange={e=>setTmpName(e.target.value)} placeholder="Tu nombre" autoFocus
            style={{width:"100%",background:"#0b0b16",border:"1px solid #1e293b",borderRadius:9,padding:"9px 11px",color:"#e2e8f0",fontSize:14,outline:"none"}}/>
          <div style={{display:"flex",gap:8,marginTop:8}}>
            <button onClick={guardarNombre} style={{flex:1,background:GOLD,border:"none",borderRadius:9,color:"#08080f",fontWeight:800,fontSize:13,padding:"9px 0",cursor:"pointer"}}>Guardar</button>
            <button onClick={()=>setEditName(false)} style={{flex:1,background:"transparent",border:"1px solid #1e293b",borderRadius:9,color:"#94a3b8",fontSize:13,padding:"9px 0",cursor:"pointer"}}>Cancelar</button>
          </div>
        </div>
      )}
    </div>

    <Tablero/>

    {/* Accesos */}
    <div style={{display:"flex",gap:10,marginTop:14}}>
      <button onClick={()=>ir("cfp")} style={{flex:1,padding:"14px 0",background:"#10101e",border:"1px solid "+GOLD+"55",borderRadius:14,color:GOLD,fontWeight:700,fontSize:14,cursor:"pointer"}}>Entrar a CFP</button>
      <button onClick={()=>ir("cfc")} style={{flex:1,padding:"14px 0",background:"#10101e",border:"1px solid #2dd4bf55",borderRadius:14,color:"#2dd4bf",fontWeight:700,fontSize:14,cursor:"pointer"}}>Entrar a CFC</button>
    </div>

    {/* Control de PIN */}
    <div style={{...card,marginTop:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div>
          <div style={lbl}>PIN de acceso</div>
          <div style={{fontSize:13,color:pinOn?"#22c55e":"#94a3b8",marginTop:3,fontWeight:600}}>{pinOn?"Activado":"Desactivado"}</div>
        </div>
        <button onClick={()=>pinOn?desactivarPin():setSetter(true)}
          style={{width:54,height:30,borderRadius:16,border:"none",cursor:"pointer",position:"relative",background:pinOn?GOLD:"#1e293b",transition:"background .2s"}}>
          <span style={{position:"absolute",top:3,left:pinOn?27:3,width:24,height:24,borderRadius:"50%",background:"#fff",transition:"left .2s"}}/>
        </button>
      </div>
      {pinOn&&<button onClick={()=>setSetter(true)} style={{marginTop:10,background:"transparent",border:"1px solid #1e293b",borderRadius:9,color:GOLD,fontSize:12,padding:"7px 0",width:"100%",cursor:"pointer"}}>Cambiar PIN</button>}
      <div style={{fontSize:10,color:"#475569",marginTop:8}}>El PIN protege la entrada a Nexus Flow. Es el mismo del CFP.</div>
    </div>

    <div style={{fontSize:10,color:"#334155",textAlign:"center",marginTop:18,marginBottom:4}}>Control Financiero Personal · Control de Flujo Comercial</div>

    {setter&&<PinSetter onDone={activarPin} onCancel={()=>setSetter(false)}/>}
  </div>;
}

function App(){
  const pinActivo=lsCFP('pinActivo',false);
  const pinApp=String(lsCFP('pinApp',''));
  const[abierto,setAbierto]=useState(()=>!(pinActivo&&pinApp));
  const[vista,setVista]=useState("home");
  const[cargado,setCargado]=useState({cfp:false,cfc:false});
  useEffect(()=>{const el=document.getElementById('loading');if(el){el.classList.add('fade-out');setTimeout(()=>{el.parentNode&&el.parentNode.removeChild(el);},380);}},[]);
  const ir=(v)=>{ setVista(v); if(v==="cfp"||v==="cfc"){ setCargado(c=>({...c,[v]:true})); try{localStorage.setItem('nexus_flow_ultima',v);}catch(e){} } };
  if(!abierto) return <Lock onOk={()=>setAbierto(true)}/>;
  const barBtn=(v,lab)=>{const on=vista===v;return <button onClick={()=>ir(v)} style={{flex:1,padding:"9px 0",fontSize:12,fontWeight:on?800:500,background:on?GOLD:"transparent",color:on?"#08080f":"#94a3b8",border:"none",borderRadius:9,cursor:"pointer"}}>{lab}</button>;};
  return <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
    <div style={{flexShrink:0,display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:"#0b0b16",borderBottom:"1px solid #1e293b"}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,color:GOLD,letterSpacing:2,paddingLeft:4,paddingRight:4}}>FLOW</div>
      <div style={{flex:1,display:"flex",gap:4,background:"#10101e",borderRadius:11,padding:4}}>
        {barBtn("home","Inicio")}{barBtn("cfp","CFP")}{barBtn("cfc","CFC")}
      </div>
    </div>
    <div style={{flex:1,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,overflowY:"auto",padding:"18px 16px",display:vista==="home"?"block":"none"}}>
        <Home ir={ir}/>
      </div>
      <div style={{position:"absolute",inset:0,display:vista==="cfp"?"block":"none"}}>{cargado.cfp&&<iframe src="cfp.html" title="CFP"/>}</div>
      <div style={{position:"absolute",inset:0,display:vista==="cfc"?"block":"none"}}>{cargado.cfc&&<iframe src="cfc.html" title="CFC"/>}</div>
    </div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
