<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#080810"/>
  <title>Nexus CFP</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#080810;color:#e2e8f0;font-family:'DM Sans',sans-serif;overscroll-behavior:none;}
    #root{min-height:100vh;}
    #loading{position:fixed;inset:0;background:#080810;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
    #loading .logo{font-size:13px;font-weight:800;letter-spacing:3px;color:#C9A84C;text-transform:uppercase;margin-bottom:8px;}
    #loading .sub{font-size:9px;color:#475569;letter-spacing:2px;}
    #loading .spinner{width:28px;height:28px;border:2px solid #1e293b;border-top:2px solid #C9A84C;border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:16px;}
    @keyframes spin{to{transform:rotate(360deg);}}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.6);}
    select option{background:#13131f;}
    ::-webkit-scrollbar{width:0;height:0;}
    input,select,button{font-family:'DM Sans',sans-serif;}
  </style>

const fmt      = n=>new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",minimumFractionDigits:2}).format(n||0);
const fmtShort = n=>{const v=Math.abs(n||0);if(v>=1000000)return`$${(v/1e6).toFixed(1)}M`;if(v>=1000)return`$${(v/1000).toFixed(1)}k`;return fmt(n);};
const fmtDate  = d=>{if(!d)return"";const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;};

};
const addD     = (d,n)=>{const dt=new Date(d+"T12:00:00");dt.setDate(dt.getDate()+n);return dt.toISOString().split("T")[0];};
const addM_    = (d,n)=>{const dt=new Date(d+"T12:00:00");dt.setMonth(dt.getMonth()+n);return dt.toISOString().split("T")[0];};
const addY_    = (d,n)=>{const dt=new Date(d+"T12:00:00");dt.setFullYear(dt.getFullYear()+n);return dt.toISOString().split("T")[0];};
const mesKey   = (sm,sy)=>`_${sm+1}_${sy}`;

function estatusParaTipo(tipoOp){
  if(tipoOp==="Ingreso")      return ESTATUS_LIST.filter(e=>e!=="PAGADO");
  if(tipoOp==="Egreso")       return ESTATUS_LIST.filter(e=>e!=="INGRESADO");
  if(tipoOp==="Pago Tarjeta") return ESTATUS_LIST.filter(e=>e!=="INGRESADO"&&e!=="PENDIENTE"&&e!=="PROYECTADO");
  return ESTATUS_LIST;
}

function generarFechas(rec){
  const fechas=[];let cur=rec.fechaInicio;
  for(let i=0;i<500;i++){
    if(rec.finTipo==="fecha"&&cur>rec.finFecha)break;
    if(rec.recurrencia==="Diaria"){fechas.push(cur);cur=addD(cur,1);}
    else if(rec.recurrencia==="Semanal"){
      const dow=rec.diasSemana.length?rec.diasSemana:[new Date(cur+"T12:00:00").getDay()];
      let d=cur;for(let w=0;w<7;w++){if(dow.includes(new Date(d+"T12:00:00").getDay()))fechas.push(d);d=addD(d,1);}
      cur=addD(cur,7);
    }
    else if(rec.recurrencia==="Quincenal"){fechas.push(cur);cur=addD(cur,15);}
    else if(rec.recurrencia==="Mensual")  {fechas.push(cur);cur=addM_(cur,1);}
    else if(rec.recurrencia==="Bimestral"){fechas.push(cur);cur=addM_(cur,2);}
    else if(rec.recurrencia==="Anual")    {fechas.push(cur);cur=addY_(cur,1);}
    if(fechas.length>=(rec.finTipo==="repeticiones"?rec.finReps:500))break;
  }
  return fechas.slice(0,rec.finTipo==="repeticiones"?rec.finReps:undefined);
}

// ─── SALDOS ──────────────────────────────────────────────────
function calcConsolidado(movs,pI,pE,cuentasRef,incluirProy){
  // incluirProy: si true, PROYECTADO opera igual que PROGRAMADO en el consolidado
  const sorted=[...movs].filter(r=>r.fecha).sort((a,b)=>a.fecha!==b.fecha?a.fecha.localeCompare(b.fecha):a.orden-b.orden);
  let s=(cuentasRef||[]).filter(c=>c.esReferencia).reduce((acc,c)=>acc+(c.saldoInicial||0),0);
  return sorted.map(r=>{
    const real=["INGRESADO","PAGADO"].includes(r.estatus);
    const prog=r.estatus==="PROGRAMADO";
    const proy=r.estatus==="PROYECTADO"&&(incluirProy!==false); // por default incluye proyectado
    let cuenta=false;
    if(real&&!(r.tipoOp==="Egreso"&&r.usaTarjeta)&&r.tipoOp!=="Traspaso")cuenta=true;
    if(prog||proy){
      if(r.tipoOp==="Ingreso"&&r.prioridad<=(pI||3))cuenta=true;
      // Para egresos: pE 1-4 filtra por prioridad, pE=5 incluye todos
      if(r.tipoOp==="Egreso"&&!r.usaTarjeta&&((pE||5)>=5||r.prioridad<=(pE||5)))cuenta=true;
      if(r.tipoOp==="Pago Tarjeta")cuenta=true;
    }
    if(cuenta){
      if(r.tipoOp==="Ingreso") s+=r.monto||0;
      else if(r.tipoOp==="Egreso"&&!r.usaTarjeta) s-=r.monto||0;
      else if(r.tipoOp==="Pago Tarjeta") s-=r.monto||0;
    }
    return{...r,saldoConsolidado:s,enProyeccion:cuenta,esProy:proy&&!prog};
  });
}
function calcCuentaSaldos(cuentas,movs){
  const s={};cuentas.forEach(c=>{s[c.id]=c.saldoInicial||0;});
  [...movs].filter(r=>r.fecha).sort((a,b)=>a.fecha!==b.fecha?a.fecha.localeCompare(b.fecha):a.orden-b.orden).forEach(r=>{
    if(!["INGRESADO","PAGADO"].includes(r.estatus))return;
    if(r.tipoOp==="Ingreso"&&r.cuentaId&&!r.usaTarjeta)s[r.cuentaId]=(s[r.cuentaId]||0)+(r.monto||0);
    if(r.tipoOp==="Egreso" &&r.cuentaId&&!r.usaTarjeta)s[r.cuentaId]=(s[r.cuentaId]||0)-(r.monto||0);
    if(r.tipoOp==="Traspaso"||r.tipoOp==="Transferencia"){if(r.cuentaId)s[r.cuentaId]=(s[r.cuentaId]||0)-(r.monto||0);if(r.cuentaDestinoId)s[r.cuentaDestinoId]=(s[r.cuentaDestinoId]||0)+(r.monto||0);}
    if(r.tipoOp==="Pago Tarjeta"&&r.cuentaId)s[r.cuentaId]=(s[r.cuentaId]||0)-(r.monto||0);
  });
  return s;
}
function calcTarjetaSaldos(tarjetas,movs){
  const s={};tarjetas.forEach(t=>{s[t.id]=t.saldoDeudorInicial||0;});
  [...movs].filter(r=>r.fecha).sort((a,b)=>a.fecha!==b.fecha?a.fecha.localeCompare(b.fecha):a.orden-b.orden).forEach(r=>{
    if(!["INGRESADO","PAGADO"].includes(r.estatus))return;
    if(r.tipoOp==="Egreso"&&r.usaTarjeta&&r.tarjetaId)s[r.tarjetaId]=(s[r.tarjetaId]||0)+(r.monto||0);
    if(r.tipoOp==="Pago Tarjeta"&&r.tarjetaId)s[r.tarjetaId]=(s[r.tarjetaId]||0)-(r.monto||0);
  });
  return s;
}
function calcSaldoCuentaAntesDe(cuentaId,movId,movs,cuentas){
  let s=cuentas.find(c=>c.id===cuentaId)?.saldoInicial||0;
  [...movs].filter(r=>r.fecha&&r.id!==movId).sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach(r=>{
    if(!["INGRESADO","PAGADO"].includes(r.estatus))return;
    if(r.tipoOp==="Ingreso"&&r.cuentaId===cuentaId&&!r.usaTarjeta)s+=(r.monto||0);
    if(r.tipoOp==="Egreso" &&r.cuentaId===cuentaId&&!r.usaTarjeta)s-=(r.monto||0);
    if(r.tipoOp==="Traspaso"||r.tipoOp==="Transferencia"){if(r.cuentaId===cuentaId)s-=(r.monto||0);if(r.cuentaDestinoId===cuentaId)s+=(r.monto||0);}
    if(r.tipoOp==="Pago Tarjeta"&&r.cuentaId===cuentaId)s-=(r.monto||0);
  });
  return s;
}

// Saldo proyectado al cierre de un mes (para saldo inicial de Proyección Presupuestal)
function calcSaldoProyFin(movs,cuentas,pI,pE,sm,sy){
  const withS=calcConsolidado(movs,pI,pE,cuentas);
  const endDate=`${sy}-${String(sm+1).padStart(2,"0")}-31`;
  const relevant=withS.filter(r=>r.fecha&&r.fecha<=endDate&&r.enProyeccion);
  if(!relevant.length){
    const saldos=calcCuentaSaldos(cuentas,movs);
    return cuentas.filter(c=>!c.esReferencia).reduce((s,c)=>s+(saldos[c.id]||0),0);
  }
  return relevant[relevant.length-1].saldoConsolidado;
}

// ─── DRAG ────────────────────────────────────────────────────
function useDrag(setMovs){
  const dR=useRef(null),oR=useRef(null),snR=useRef(null);
  const[aId,setAId]=useState(null),[oViz,setOViz]=useState(null);
  const start=(id,sn)=>{dR.current=id;snR.current=sn;setAId(id);};
  const enter=id=>{oR.current=id;setOViz(id);};
  const commit=useCallback(()=>{
    const dragId=dR.current, overId=oR.current, snap=snR.current;
    if(dragId&&overId&&dragId!==overId&&snap){
      const fi=snap.findIndex(r=>r.id===dragId);
      const ti=snap.findIndex(r=>r.id===overId);
      if(fi!==-1&&ti!==-1){
        // Reordenar el array snap moviendo el elemento arrastrado a la posición destino
        const arr=[...snap];
        const targetFecha = arr[ti].fecha; // fecha del elemento destino
        const [moved]=arr.splice(fi,1);
        arr.splice(ti,0,moved);
        // Reasignar órdenes secuenciales; si el destino tiene fecha distinta, adoptarla
        const ordenMap={};
        const fechaMap={};
        arr.forEach((r,i)=>{
          ordenMap[r.id]=i+1;
          // Solo actualizar fecha del elemento arrastrado si la fecha destino es distinta
          if(r.id===dragId && targetFecha && targetFecha!==r.fecha){
            fechaMap[r.id]=targetFecha;
          }
        });
        setMovs(p=>p.map(r=>{
          const updates={};
          if(ordenMap[r.id]!==undefined) updates.orden=ordenMap[r.id];
          if(fechaMap[r.id]) updates.fecha=fechaMap[r.id];
          return Object.keys(updates).length?{...r,...updates}:r;
        }));
      }
    }
    dR.current=null;oR.current=null;snR.current=null;setAId(null);setOViz(null);
  },[setMovs]);
  const tm=useCallback(e=>{
    if(!dR.current)return;e.preventDefault();
    const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY)?.closest("[data-movid]");
    if(el){const oid=parseInt(el.dataset.movid);if(oid&&oid!==dR.current){oR.current=oid;setOViz(oid);}}
  },[]);
  return{aId,oViz,start,enter,commit,tm};
}
function useCatDrag(setCats){
  const dR=useRef(null),oR=useRef(null);
  const[aId,setAId]=useState(null),[oViz,setOViz]=useState(null);
  const start=id=>{dR.current=id;setAId(id);};
  const enter=id=>{oR.current=id;setOViz(id);};
  const commit=useCallback(()=>{
    if(dR.current&&oR.current&&dR.current!==oR.current){
      setCats(p=>{const arr=[...p];const fi=arr.findIndex(c=>c.id===dR.current);const ti=arr.findIndex(c=>c.id===oR.current);if(fi!==-1&&ti!==-1){const[el]=arr.splice(fi,1);arr.splice(ti,0,el);}return arr;});
    }
    dR.current=null;oR.current=null;setAId(null);setOViz(null);
  },[setCats]);
  return{aId,oViz,start,enter,commit};
}

// ─── PERIODS ─────────────────────────────────────────────────
function usePeriod(){
  const now=new Date();
  const[mode,setMode]=useState("mes");
  const[sm,setSm]=useState(now.getMonth());
  const[sy,setSy]=useState(now.getFullYear());
  const[fr,setFr]=useState(todayStr());
  const[to,setTo]=useState(todayStr());
  const inP=useCallback(d=>{
    if(!d)return false;
    if(mode==="mes"){const[y,m]=d.split("-").map(Number);return y===sy&&m-1===sm;}
    if(mode==="anio")return d.startsWith(String(sy));
    return d>=fr&&d<=to;
  },[mode,sm,sy,fr,to]);
  const label=()=>mode==="mes"?`${MESES_FULL[sm]} ${sy}`:mode==="anio"?`Año ${sy}`:`${fmtDate(fr)}–${fmtDate(to)}`;
  const prev=()=>{if(mode==="mes"){setSm(m=>{if(m===0){setSy(y=>y-1);return 11;}return m-1;});}if(mode==="anio")setSy(y=>y-1);};
  const next=()=>{if(mode==="mes"){setSm(m=>{if(m===11){setSy(y=>y+1);return 0;}return m+1;});}if(mode==="anio")setSy(y=>y+1);};
  return{mode,setMode,sm,sy,setSm,setSy,fr,setFr,to,setTo,inP,label,prev,next};
}
function usePeriodMes(){
  const now=new Date();
  const[sm,setSm]=useState(now.getMonth());
  const[sy,setSy]=useState(now.getFullYear());
  const inP=useCallback(d=>{if(!d)return false;const[y,m]=d.split("-").map(Number);return y===sy&&m-1===sm;},[sm,sy]);
  const label=()=>`${MESES_FULL[sm]} ${sy}`;
  const prev=()=>setSm(m=>{if(m===0){setSy(y=>y-1);return 11;}return m-1;});
  const next=()=>setSm(m=>{if(m===11){setSy(y=>y+1);return 0;}return m+1;});
  return{sm,sy,inP,label,prev,next};
}

// ─── BUDGET BAR ───────────────────────────────────────────────
function BudgetBar({gasto,presupuesto,color="#C9A84C",esIngreso=false}){
  if(!presupuesto)return null;
  const pct=gasto/presupuesto;
  const over=gasto>presupuesto;
  const c=over?(esIngreso?"#22c55e":"#f87171"):(pct>0.8?(esIngreso?"#22c55e":"#fbbf24"):color);
  let etiqueta;
  if(esIngreso){
    if(over) etiqueta=<span style={{color:"#22c55e",fontWeight:700}}>✓ Meta alcanzada</span>;
    else etiqueta=<span style={{color:"#fbbf24"}}>Falta para meta {fmt(presupuesto-gasto)}</span>;
  } else {
    if(over) etiqueta=<span style={{color:"#f87171"}}>Exceso {fmt(gasto-presupuesto)}</span>;
    else etiqueta=<span style={{color:"#22c55e"}}>Disponible {fmt(presupuesto-gasto)}</span>;
  }
  return(
    <div>
      <div style={{height:5,borderRadius:3,background:"#1e293b",overflow:"hidden",marginTop:5}}>
        <div style={{height:"100%",borderRadius:3,background:c,width:`${Math.min(pct/1.2,1)*100}%`,transition:"width 0.4s"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#475569",marginTop:2}}>
        <span style={{color:c,fontWeight:700}}>{Math.round(pct*100)}%</span>
        {etiqueta}
      </div>
    </div>
  );
}

                  {[["deudores","🟢 Deudor"],["ingresosExt","⭐ Ing. Ext."],["oportunidades","🚀 Oportunidad"]].map(([t,l])=>(
                    <button key={t} style={{...S.prioB2(formMov.vinculoTipo===t,"#C9A84C"),flex:1,padding:"7px 4px",fontSize:9}}
                      onClick={()=>{set("vinculoTipo",formMov.vinculoTipo===t?null:t);set("vinculoId",null);}}>
                      {l}
                    </button>
                  ))}
                </div>
                {/* Paso 2: mostrar lista según tipo elegido */}
                {formMov.vinculoTipo==="deudores"&&(
                  <select style={S.sel} value={formMov.vinculoId||""} onChange={e=>set("vinculoId",parseInt(e.target.value)||null)}>
                    <option value="">— Seleccionar deudor —</option>
                    {deudores.map(x=><option key={x.id} value={x.id}>{x.nombre||x.concepto}</option>)}
                  </select>
                )}
                {formMov.vinculoTipo==="ingresosExt"&&(
                  <select style={S.sel} value={formMov.vinculoId||""} onChange={e=>set("vinculoId",parseInt(e.target.value)||null)}>
                    <option value="">— Seleccionar Ing. Ext. —</option>
                    {ingresosExt.map(x=><option key={x.id} value={x.id}>{x.concepto}</option>)}
                  </select>
                )}
                {formMov.vinculoTipo==="oportunidades"&&(
                  <select style={S.sel} value={formMov.vinculoId||""} onChange={e=>set("vinculoId",parseInt(e.target.value)||null)}>
                    <option value="">— Seleccionar Oportunidad —</option>
                    {oportunidades.filter(o=>getEtapa(o.etapaId,etapasAvance).pctAvance>0).map(x=>{
                      const et=getEtapa(x.etapaId,etapasAvance);
                      return(<option key={x.id} value={x.id}>{x.concepto+(x.empresa?" | "+x.empresa:"")+(x.contacto?" | "+x.contacto:"")+" ["+et.nombre+"]"}</option>);
                    })}
                  </select>
                )}
              </>)}
              <div style={{fontSize:9,color:"#475569",marginTop:3}}>
                {formMov.tipoOp==="Egreso"?"Vincula este pago a un acreedor para registrar el abono.":"Vincula este ingreso a un deudor o ingreso extraordinario para registrar el cobro."}
              </div>
              {(()=>{
                if(!formMov.vinculoTipo||!formMov.vinculoId||!movs) return null;
                const rv=formMov.vinculoTipo==="acreedores"?acreedores.find(x=>x.id===formMov.vinculoId):
                          formMov.vinculoTipo==="deudores"?deudores.find(x=>x.id===formMov.vinculoId):
                          formMov.vinculoTipo==="ingresosExt"?ingresosExt.find(x=>x.id===formMov.vinculoId):null;
                if(!rv||!saldoPendienteFn||!saldoIngExtFn) return null;
                const movsCalc=editMovId?movs.filter(m=>m.id!==editMovId):movs;
                const mm=parseFloat(formMov.monto)||0;
                if(mm<=0) return null;

                if(formMov.vinculoTipo==="acreedores"&&formMov.tipoAbono){
                  // interes_convencional: sin validación de monto
                  if(formMov.tipoAbono==="interes_convencional") return null;
                  const vinc=(rv.movIdsVinculados||[]);
                  const ejec=movsCalc.filter(m=>vinc.includes(m.id)&&["PAGADO","INGRESADO"].includes(m.estatus));
                  const abonadoCap=ejec.filter(m=>m.tipoAbono==="capital"||(!m.tipoAbono&&m.tipoAbono!=="interes_acumulado"&&m.tipoAbono!=="interes_convencional"&&m.tipoAbono!=="interes")).reduce((s,m)=>s+m.monto,0);
                  const abonadoIntAcum=ejec.filter(m=>m.tipoAbono==="interes_acumulado"||m.tipoAbono==="interes").reduce((s,m)=>s+m.monto,0);
                  if(formMov.tipoAbono==="capital"){
                    const pendCap=Math.max(0,(rv.montoCapital||rv.montoActual||0)-abonadoCap);
                    if(mm>pendCap+0.01) return(
                      <div style={{...S.errBox,marginTop:6}}><span>⛔</span>
                        <span>El monto ({fmt(mm)}) excede el capital pendiente ({fmt(pendCap)}). Ajusta el monto.</span>
                      </div>
                    );
                  } else if(formMov.tipoAbono==="interes_acumulado"){
                    const pendIntAcum=Math.max(0,(rv.montoInteres||0)-abonadoIntAcum);
                    if((rv.montoInteres||0)>0&&mm>pendIntAcum+0.01) return(
                      <div style={{...S.errBox,marginTop:6}}><span>⛔</span>
                        <span>El monto ({fmt(mm)}) excede el interés acumulado pendiente ({fmt(pendIntAcum)}). Ajusta el monto.</span>
                      </div>
                    );
                  }
                  return null;
                }
                // Oportunidades
                if(formMov.vinculoTipo==="oportunidades"){
                  const movsOpoCalc=movsCalc.filter(m=>(rv.movIdsVinculados||[]).includes(m.id)&&["PAGADO","INGRESADO"].includes(m.estatus));
                  const yaIngOpo=movsOpoCalc.reduce((s,m)=>s+m.monto,0);
                  const pendOpo=Math.max(0,(rv.montoEstimado||0)-yaIngOpo);
                  const etOpo=getEtapa(rv.etapaId,etapasAvance);
                  const esConcretada=rv.etapaId==="ea5";
                  return(
                    <div style={{marginTop:5}}>
                      {!esConcretada&&<div style={{...S.infoBx("#fbbf24"),marginBottom:4}}><span>⚠</span><span>Esta oportunidad no esta Concretada ({etOpo.nombre}). Al guardar como INGRESADO se te pedira concretarla.</span></div>}
                      <div style={{display:"flex",gap:6}}>
                        <div style={{flex:1,background:"rgba(201,168,76,0.08)",border:"1px solid #C9A84C33",borderRadius:7,padding:"5px 8px",textAlign:"center"}}>
                          <div style={{fontSize:7,color:"#C9A84C",fontWeight:700}}>Estimado total</div>
                          <div style={{fontSize:11,fontWeight:800,color:"#C9A84C"}}>{fmt(rv.montoEstimado||0)}</div>
                        </div>
                        <div style={{flex:1,background:"rgba(34,197,94,0.08)",border:"1px solid #22c55e33",borderRadius:7,padding:"5px 8px",textAlign:"center"}}>
                          <div style={{fontSize:7,color:"#22c55e",fontWeight:700}}>Ya ingresado</div>
                          <div style={{fontSize:11,fontWeight:800,color:"#22c55e"}}>{fmt(yaIngOpo)}</div>
                        </div>
                        <div style={{flex:1,background:mm>pendOpo?"rgba(248,113,113,0.08)":"rgba(251,191,36,0.08)",border:"1px solid "+(mm>pendOpo?"#f8717133":"#fbbf2433"),borderRadius:7,padding:"5px 8px",textAlign:"center"}}>
                          <div style={{fontSize:7,color:mm>pendOpo?"#f87171":"#fbbf24",fontWeight:700}}>Pendiente</div>
                          <div style={{fontSize:11,fontWeight:800,color:mm>pendOpo?"#f87171":"#fbbf24"}}>{fmt(pendOpo)}</div>
                        </div>
                      </div>
                      {mm>pendOpo+0.01&&<div style={{...S.errBox,marginTop:5}}><span>⛔</span><span>El monto ({fmt(mm)}) excede el pendiente ({fmt(pendOpo)}). Ajusta el monto.</span></div>}
                    </div>
                  );
                }
                // Deudores / ingresosExt
                const sd=formMov.vinculoTipo==="ingresosExt"?saldoIngExtFn(rv,movsCalc).pendiente:saldoPendienteFn(rv,movsCalc);
                if(mm<=sd) return null;
                return(
                  <div style={{...S.errBox,marginTop:6}}><span>⛔</span>
                    <span>El monto ({fmt(mm)}) excede el saldo pendiente ({fmt(sd)}). Ajusta el monto o vincula a otro registro.</span>
                  </div>
                );
              })()}
              {/* Selector de tipo de abono al vincular a acreedor */}
              {formMov.tipoOp==="Egreso"&&formMov.vinculoTipo==="acreedores"&&formMov.vinculoId&&(
                <div style={{marginTop:9}}>
                  <label style={S.fl}>¿Este pago es a…?</label>
                  {(()=>{
                    const rv=acreedores.find(x=>x.id===formMov.vinculoId);
                    const tieneIntAcum=(rv?.montoInteres||0)>0;
                    const movsCalc2=editMovId?movs.filter(m=>m.id!==editMovId):movs;
                    const vinc2=(rv?.movIdsVinculados||[]);
                    const ejec2=movsCalc2.filter(m=>vinc2.includes(m.id)&&["PAGADO","INGRESADO"].includes(m.estatus));
                    const pendCap=rv?Math.max(0,(rv.montoCapital||rv.montoActual||0)-ejec2.filter(m=>m.tipoAbono==="capital"||(!m.tipoAbono&&m.tipoAbono!=="interes_acumulado"&&m.tipoAbono!=="interes_convencional"&&m.tipoAbono!=="interes")).reduce((s,m)=>s+m.monto,0)):0;
                    const pendIntAcum=rv?Math.max(0,(rv.montoInteres||0)-ejec2.filter(m=>m.tipoAbono==="interes_acumulado"||m.tipoAbono==="interes").reduce((s,m)=>s+m.monto,0)):0;
                    return(<>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:5}}>
                        <button style={{...S.prioB2(formMov.tipoAbono==="capital","#22c55e"),flex:1,minWidth:80,padding:"8px 4px",fontSize:9}}
                          onClick={()=>set("tipoAbono","capital")}>💰 Capital</button>
                        {tieneIntAcum&&<button style={{...S.prioB2(formMov.tipoAbono==="interes_acumulado","#f87171"),flex:1,minWidth:80,padding:"8px 4px",fontSize:9}}
                          onClick={()=>set("tipoAbono","interes_acumulado")}>📌 Int. Acumulado</button>}
                        <button style={{...S.prioB2(formMov.tipoAbono==="interes_convencional","#fbbf24"),flex:1,minWidth:80,padding:"8px 4px",fontSize:9}}
                          onClick={()=>set("tipoAbono","interes_convencional")}>💸 Int. Convencional</button>
                      </div>
                      {/* Descripción del tipo seleccionado */}
                      {formMov.tipoAbono==="capital"&&(
                        <div style={{...S.infoBx("#22c55e"),marginBottom:5}}><span>💰</span>
                          <span>Reduce el capital pendiente. Saldo disponible: <strong>{fmt(pendCap)}</strong></span>
                        </div>
                      )}
                      {formMov.tipoAbono==="interes_acumulado"&&(
                        <div style={{...S.infoBx("#f87171"),marginBottom:5}}><span>📌</span>
                          <span>Reduce interés ya capitalizado. Saldo disponible: <strong>{fmt(pendIntAcum)}</strong></span>
                        </div>
                      )}
                      {formMov.tipoAbono==="interes_convencional"&&(
                        <div style={{...S.infoBx("#fbbf24"),marginBottom:5}}><span>💸</span>
                          <span>Pago de interés periódico. No reduce el saldo de la deuda. Sin límite de monto.</span>
                        </div>
                      )}
                      {/* Mini-resumen de saldos si hay desglose */}
                      {tieneIntAcum&&(
                        <div style={{display:"flex",gap:5,marginTop:4}}>
                          <div style={{flex:1,background:"rgba(34,197,94,0.08)",border:"1px solid #22c55e33",borderRadius:7,padding:"5px 7px",textAlign:"center"}}>
                            <div style={{fontSize:7,color:"#22c55e",fontWeight:700,marginBottom:1}}>Capital pend.</div>
                            <div style={{fontSize:11,fontWeight:800,color:"#22c55e"}}>{fmt(pendCap)}</div>
                          </div>
                          <div style={{flex:1,background:"rgba(248,113,113,0.08)",border:"1px solid #f8717133",borderRadius:7,padding:"5px 7px",textAlign:"center"}}>
                            <div style={{fontSize:7,color:"#f87171",fontWeight:700,marginBottom:1}}>Int. Acum. pend.</div>
                            <div style={{fontSize:11,fontWeight:800,color:"#f87171"}}>{fmt(pendIntAcum)}</div>
                          </div>
                        </div>
                      )}
                      {!formMov.tipoAbono&&<div style={{fontSize:9,color:"#fbbf24",marginTop:3}}>⚠ Selecciona el tipo para registrar correctamente</div>}
                    </>);
                  })()}
                </div>
              )}
            </div>
          )}
          {!editMovId&&(
            <div style={{border:"1px solid #1e293b",borderRadius:11,padding:13,marginBottom:11}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:recForm.activo?11:0}}>
                <span style={{fontSize:11,fontWeight:700,color:recForm.activo?"#C9A84C":"#475569"}}>↻ Repetitivo</span>
                <button style={{...S.prioB2(recForm.activo),width:42,flex:"none",padding:"4px 0",fontSize:10}} onClick={()=>setRecForm(f=>({...f,activo:!f.activo}))}>{recForm.activo?"ON":"OFF"}</button>
              </div>
              {recForm.activo&&(<>
                <div style={S.fg}><label style={S.fl}>Recurrencia</label>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>{REC_OPTS.map(r=><button key={r} style={{...S.prioB2(recForm.recurrencia===r),flex:"none",padding:"5px 9px",fontSize:9}} onClick={()=>setRecForm(f=>({...f,recurrencia:r}))}>{r}</button>)}</div>
                </div>
                {recForm.recurrencia==="Semanal"&&(
                  <div style={S.fg}><label style={S.fl}>Días</label>
                    <div style={{display:"flex",gap:3}}>{DIAS_SEM.map((d,i)=><button key={i} style={{...S.prioB2(recForm.diasSemana.includes(i)),flex:1,padding:"4px 0",fontSize:8}} onClick={()=>setRecForm(f=>({...f,diasSemana:f.diasSemana.includes(i)?f.diasSemana.filter(x=>x!==i):[...f.diasSemana,i]}))}>{d}</button>)}</div>
                  </div>
                )}
                <div style={{...S.r2,marginBottom:9}}><div><label style={S.fl}>Fecha inicio</label><input style={S.inp} type="date" value={recForm.fechaInicio} onChange={e=>setRecForm(f=>({...f,fechaInicio:e.target.value}))}/></div></div>
                <div style={S.fg}><label style={S.fl}>Termina por</label>
                  <div style={{display:"flex",gap:7,marginBottom:7}}>
                    <button style={{...S.prioB2(recForm.finTipo==="repeticiones"),flex:1,padding:"6px 0",fontSize:10}} onClick={()=>setRecForm(f=>({...f,finTipo:"repeticiones"}))}>Nº veces</button>
                    <button style={{...S.prioB2(recForm.finTipo==="fecha"),flex:1,padding:"6px 0",fontSize:10}} onClick={()=>setRecForm(f=>({...f,finTipo:"fecha"}))}>Fecha límite</button>
                  </div>
                  {recForm.finTipo==="repeticiones"&&<input style={S.inp} type="number" min="1" max="60" value={recForm.finReps} onChange={e=>setRecForm(f=>({...f,finReps:parseInt(e.target.value)||1}))}/>}
                  {recForm.finTipo==="fecha"&&<input style={S.inp} type="date" value={recForm.finFecha} onChange={e=>setRecForm(f=>({...f,finFecha:e.target.value}))}/>}
                </div>
                <div style={{fontSize:9,color:"#475569"}}>Se generarán {recForm.finTipo==="repeticiones"?recForm.finReps:"varios"} movimientos.</div>
              </>)}
            </div>
          )}
        </>)}
        {saveError&&<div style={S.errBox}><span>⛔</span><span>{saveError}</span></div>}
        <button style={S.saveB} onClick={onSave}>{recForm.activo?"GENERAR SERIE":"GUARDAR"}</button>
        <button style={S.cancB} onClick={onClose}>Cancelar</button>
      </div>
    </div>
  );
});

// ─── MODAL PRESUPUESTO ────────────────────────────────────────
function ModalPresupuesto({data,presupuestos,setPresupuestos,sm,sy,onClose}){
  const{catId,subId,nombre,getPres}=data;
  const id=subId||catId;
  const currentVal=getPres(id);
  const[val,setVal]=useState(currentVal?String(currentVal):"");
  const[proyMode,setProyMode]=useState(false);
  // Mes de inicio — por defecto el mes del período activo
  const[startSm,setStartSm]=useState(sm);
  const[startSy,setStartSy]=useState(sy);
  const[endSm,setEndSm]=useState(sm===11?0:sm+1);
  const[endSy,setEndSy]=useState(sm===11?sy+1:sy);
  const prevStartM=()=>{if(startSm===0){setStartSm(11);setStartSy(y=>y-1);}else setStartSm(m=>m-1);};
  const nextStartM=()=>{if(startSm===11){setStartSm(0);setStartSy(y=>y+1);}else setStartSm(m=>m+1);};

  const guardar=(smFin,syFin,smIni,syIni)=>{
    const monto=parseFloat(val)||0;
    setPresupuestos(p=>{
      const n={...p};
      let cm=smIni,cy=syIni;
      while(cy<syFin||(cy===syFin&&cm<=smFin)){
        const k=presKey(id,cm,cy);
        if(monto>0) n[k]=monto; else delete n[k];
        cm++; if(cm>11){cm=0;cy++;}
      }
      return n;
    });
    onClose();
  };

  const prevEndM=()=>{
    if(endSm===0){setEndSm(11);setEndSy(y=>y-1);}else setEndSm(m=>m-1);
  };
  const nextEndM=()=>{
    if(endSm===11){setEndSm(0);setEndSy(y=>y+1);}else setEndSm(m=>m+1);
  };

  return(
    <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={S.mBox}>
        <div style={S.mTit}>🎯 PRESUPUESTO</div>
        <div style={{fontSize:11,color:"#94a3b8",marginBottom:13}}>{nombre} — {MESES_FULL[sm]} {sy}</div>
        <div style={S.fg}><label style={S.fl}>Monto $</label>
          <input style={S.inp} type="number" value={val} onChange={e=>setVal(e.target.value)} placeholder="0.00" autoFocus/>
        </div>
        {/* Opción de proyectar varios meses */}
        {/* Mes de inicio */}
        <div style={{marginBottom:11}}>
          <label style={S.fl}>Mes de inicio</label>
          <div style={S.perBar}>
            <button style={S.perBtn} onClick={prevStartM}>‹</button>
            <span style={S.perLbl}>{MESES_FULL[startSm]} {startSy}</span>
            <button style={S.perBtn} onClick={nextStartM}>›</button>
          </div>
        </div>
        <div style={{border:"1px solid #1e293b",borderRadius:11,padding:13,marginBottom:11}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:proyMode?11:0}}>
            <span style={{fontSize:11,fontWeight:700,color:proyMode?"#C9A84C":"#475569"}}>↻ Proyectar varios meses</span>
            <button style={{...S.prioB2(proyMode),width:42,flex:"none",padding:"4px 0",fontSize:10}} onClick={()=>setProyMode(v=>!v)}>{proyMode?"ON":"OFF"}</button>
          </div>
          {proyMode&&(
            <div>
              <div style={{fontSize:10,color:"#475569",marginBottom:9}}>Desde <strong>{MESES_FULL[startSm]} {startSy}</strong> hasta:</div>
              <div style={S.perBar}>
                <button style={S.perBtn} onClick={prevEndM}>‹</button>
                <span style={S.perLbl}>{MESES_FULL[endSm]} {endSy}</span>
                <button style={S.perBtn} onClick={nextEndM}>›</button>
              </div>
              <div style={{fontSize:9,color:"#475569",marginTop:4}}>
                Se aplicará a {(()=>{let c=0,cm=startSm,cy=startSy;while(cy<endSy||(cy===endSy&&cm<=endSm)){c++;cm++;if(cm>11){cm=0;cy++;}}return c;})() } meses
              </div>
            </div>
          )}
        </div>
        <button style={S.saveB} onClick={()=>proyMode?guardar(endSm,endSy,startSm,startSy):guardar(startSm,startSy,startSm,startSy)}>
          {proyMode?"GUARDAR Y PROYECTAR":"GUARDAR"}
        </button>
        {presupuestos[presKey(id,startSm,startSy)]>0&&(
          <button style={{...S.cancB,color:"#f87171",borderColor:"#f8717144"}} onClick={()=>{
            setPresupuestos(p=>{const n={...p};delete n[presKey(id,startSm,startSy)];return n;});
            onClose();
          }}>Quitar presupuesto de {MESES_FULL[startSm]}</button>
        )}
        <button style={S.cancB} onClick={onClose}>Cancelar</button>
      </div>
    </div>
  );
}

// ─── PROY SWIPE CARD (componente para evitar IIFE en JSX) ────
function ProySwipeCard({mes,total,idx,setIdx,semColor,fmt,fmtShort}){

            <div key={l} style={{background:`${c}11`,border:`1px solid ${c}33`,borderRadius:9,padding:"8px 6px",textAlign:"center"}}>
              <div style={{fontSize:8,color:c,marginBottom:3,fontWeight:700}}>{l}</div>
              <div style={{fontSize:11,fontWeight:800,color:c}}>{fmtShort(v)}</div>
            </div>

        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:`${sc}11`,border:`1px solid ${sc}33`,borderRadius:9,padding:"9px 13px"}}>
          <span style={{fontSize:10,color:"#94a3b8",fontWeight:700}}>Saldo Final Acumulado</span>
          <span style={{fontSize:16,fontWeight:800,color:mes.saldoFin>=0?sc:"#f87171"}}>{fmt(mes.saldoFin)}</span>
        </div>
      </div>
      {/* Detalle categorías */}
      {(mes.detalleIng.length>0||mes.detalleEg.length>0)&&(
        <div style={{background:"#0d0d1a",border:"1px solid #1e293b",borderRadius:11,padding:"12px 14px",marginBottom:9}}>

      </div>

  );
}

  const withSaldos=useMemo(()=>calcConsolidado(movs,prioI,prioE,cuentas,incluirProy),[movs,prioI,prioE,cuentas,incluirProy]);
  const cuentaSaldos=useMemo(()=>calcCuentaSaldos(cuentas,movs),[cuentas,movs]);
  const tarjetaSaldos=useMemo(()=>calcTarjetaSaldos(tarjetas,movs),[tarjetas,movs]);

  // ── Todos los subcatIds de un set de catIds ──
  const subIdsOf=useCallback((catIds,cats)=>{
    if(!catIds)return null;

  },[]);

  // ── filtered con filtro categoría ──
  const filtered=useMemo(()=>{
    const retSet=new Set(retrasados.map(r=>r.id));

    const hasCatEg=filterCatEg!==null&&filterCatEg.size>0;

    // subIng/subEg ya no se usan — el filtro checa cat y subcat directamente

    // Pendientes sin fecha viven en movs directamente (no en withSaldos que requiere fecha)
    const pendientes = filterEst==="PENDIENTE"

        const hasFiltCuenta=filterCuentas.size>0;
        const hasFiltTarjeta=filterTarjetasFiltro.size>0;
        // Sin ningún filtro activo — mostrar todo
        if(!hasFiltCuenta&&!hasFiltTarjeta) return true;

        const esMovTarjeta=r.usaTarjeta&&r.tarjetaId; // Egreso cargado a TC
        const esPagoTC=r.tipoOp==="Pago Tarjeta"&&r.tarjetaId; // Pago a TC
        const esTraspaso=r.tipoOp==="Traspaso"||r.tipoOp==="Transferencia"; // Traspaso entre cuentas propias
        const esCuentaDebito=!esMovTarjeta&&!esPagoTC&&!esTraspaso; // Movimiento de cuenta débito

        // Solo filtro de tarjeta activo
        if(hasFiltTarjeta&&!hasFiltCuenta){
          if(esMovTarjeta) return filterTarjetasFiltro.has(r.tarjetaId);
          if(esPagoTC)     return filterTarjetasFiltro.has(r.tarjetaId);
          return false;
        }

        // Solo filtro de cuenta activo
        if(hasFiltCuenta&&!hasFiltTarjeta){
          if(esTraspaso)   return r.cuentaId?filterCuentas.has(r.cuentaId)||filterCuentas.has(r.cuentaDestinoId):false;
          if(esCuentaDebito) return r.cuentaId?filterCuentas.has(r.cuentaId):false;
          if(esPagoTC)     return r.cuentaId?filterCuentas.has(r.cuentaId):false;
          return false;
        }

        // Ambos filtros activos
        if(esMovTarjeta)   return filterTarjetasFiltro.has(r.tarjetaId);
        if(esPagoTC)       return filterTarjetasFiltro.has(r.tarjetaId)||(r.cuentaId?filterCuentas.has(r.cuentaId):false);
        if(esTraspaso)     return r.cuentaId?filterCuentas.has(r.cuentaId)||filterCuentas.has(r.cuentaDestinoId):false;
        if(esCuentaDebito) return r.cuentaId?filterCuentas.has(r.cuentaId):false;
        return false;
      })
      .filter(r=>{
        // Filtro por categoría
        const hasCatIngActivo=filterCatIng!==null&&filterCatIng.size>0;
        const hasCatEgActivo=filterCatEg!==null&&filterCatEg.size>0;
        if(!hasCatIngActivo&&!hasCatEgActivo) return true;
        if(r.tipoOp==="Traspaso"||r.tipoOp==="Transferencia"||r.tipoOp==="Pago Tarjeta") return false;
        if(r.tipoOp==="Ingreso"){
          if(!hasCatIngActivo) return false;
          if(filterCatIng.has(r.cat)) return true;
          if(r.subcat&&filterCatIng.has(r.subcat)) return true;
          return false;
        }
        if(r.tipoOp==="Egreso"){
          if(!hasCatEgActivo) return false;
          if(filterCatEg.has(r.cat)) return true;
          if(r.subcat&&filterCatEg.has(r.subcat)) return true;
          return false;
        }
        return true;
      })
      .filter(r=>{
        // Filtro por probabilidad (Ingresos) y prioridad (Egresos)
        const hasIngFilt=filterProbIng.size>0;
        const hasEgFilt=filterPrioEg.size>0;
        if(!hasIngFilt&&!hasEgFilt) return true;
        // Si hay filtro activo en algún lado, Traspasos y PagoTC se ocultan
        if(r.tipoOp==="Traspaso"||r.tipoOp==="Transferencia"||r.tipoOp==="Pago Tarjeta") return false;
        if(r.tipoOp==="Ingreso"){
          if(!hasIngFilt) return false; // hay filtro de Eg pero no de Ing → ocultar ingresos

          return filterProbIng.has(pI);

        if(r.tipoOp==="Egreso"){
          if(!hasEgFilt) return false; // hay filtro de Ing pero no de Eg → ocultar egresos
          const pE2=parseInt(r.prioridad)||3;
          return filterPrioEg.has(pE2);
        }
        return true;
      });
  },[withSaldos,filterRetrasados,retrasados,period.inP,filterTipo,filterEst,search,filterCatIng,filterCatEg,catIng,catEg,subIdsOf,filterCuentas,filterTarjetasFiltro,filterProbIng,filterPrioEg,movs]);

  // Totales filtrados — respeta todos los filtros activos, divide Reales y Proyectados

    return{ingReal,egReal,ingProy,egProy};

  // Resultados de búsqueda global en cartera
  const globalSearchResults=useMemo(()=>{

  const hasGlobalResults=globalSearchResults.acreedores.length>0||globalSearchResults.deudores.length>0||globalSearchResults.ingresosExt.length>0;

              // Interés acumulado: validar contra montoInteres del acreedor

                setSaveError(`El monto de interés acumulado (${fmt(data.monto)}) excede el pendiente (${fmt(desglose.pendIntAcum)}). Ajusta el monto.`);

  const saldoPendiente = useCallback((registro,movs)=>{
    const vinc=(registro.movIdsVinculados||[]);
    const ejecutados=movs.filter(m=>vinc.includes(m.id)&&["PAGADO","INGRESADO"].includes(m.estatus));
    // Solo capital e interés acumulado reducen el saldo ("interes_convencional" no)
    const abonadoCapital=ejecutados.filter(m=>m.tipoAbono==="capital"||(!m.tipoAbono&&m.tipoAbono!=="interes_acumulado"&&m.tipoAbono!=="interes_convencional")).reduce((s,m)=>s+m.monto,0);

      const pendIntAcum=Math.max(0,(registro.montoInteres||0)-abonadoIntAcum);

                if(opoTab==="activas")     return e.pctAvance>0&&e.pctAvance<100;
                if(opoTab==="concretadas") return o.etapaId==="ea5";

                const sol=solucionesNexus.find(s=>s.id===opo.solucionNexus);

                          {opo.recurrencia&&opo.recurrencia!=="Única"&&<span style={{fontSize:8,color:"#a78bfa",background:"rgba(167,139,250,0.1)",padding:"2px 6px",borderRadius:5}}>↻ {opo.recurrencia}</span>}
                        </div>
                        {(opo.empresa||opo.contacto)&&(
                          <div style={{fontSize:13,fontWeight:800,color:"#e2e8f0",marginBottom:1}}>

                      </div>
                      <div style={{textAlign:"right",flexShrink:0}}>
                        <div style={{fontSize:9,color:"#64748b"}}>Estimado</div>
                        <div style={{fontSize:15,fontWeight:800,color:"#C9A84C"}}>{fmt(opo.montoEstimado||0)}</div>
                      </div>

                    {/* Barra de progreso por etapa */}

                    </div>
                  </div>

                    <label style={S.fl}>Condición de la deuda</label>

                      <button style={{...S.prioB2(formCartera.condicionPago==="con_interes","#f87171"),flex:1,padding:"8px 0",fontSize:10}}

                {isIngExt&&(
                  <div style={{...S.infoBx("#475569")}}><span>ℹ</span><span>El estado (Pendiente/Programado/Recuperado) se actualiza automáticamente al vincular movimientos de ingreso.</span></div>
                )}
                <div style={S.fg}><label style={S.fl}>Condiciones actuales</label>
                  <textarea style={{...S.inp,minHeight:60,resize:"vertical",lineHeight:1.5}} value={formCartera.condiciones||""} onChange={e=>set("condiciones",e.target.value)} placeholder="Acuerdos, tasas, plazos…"/>
                </div>
                <button style={S.saveB} onClick={saveCartera}>GUARDAR</button>
                <button style={S.cancB} onClick={()=>setShowCarteraForm(false)}>Cancelar</button>
              </div>
            </div>
          );
        })()}

        {/* ── MODAL ABONO ── */}
        {showAbonoForm&&(()=>{
          // Detectar si el acreedor objetivo tiene condición con_interes
          const regObj=abonoTarget?.tipo==="acreedores"?acreedores.find(x=>x.id===abonoTarget?.id):null;
          const conInteres=regObj?.condicionPago==="con_interes";
          return(
            <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setShowAbonoForm(false);}}>

                <div style={S.mTit}>+ REGISTRAR ABONO</div>

                  <div style={S.fg}>
                    <label style={S.fl}>Tipo de abono</label>

                      <button style={{...S.prioB2(formAbono.tipoAbono==="capital","#22c55e"),flex:1,padding:"9px 0",fontSize:11}}
                        onClick={()=>setFormAbono(f=>({...f,tipoAbono:"capital"}))}>💰 Capital</button>
                      <button style={{...S.prioB2(formAbono.tipoAbono==="interes","#f87171"),flex:1,padding:"9px 0",fontSize:11}}

                <div style={S.fg}><label style={S.fl}>Concepto (opcional)</label><input style={S.inp} value={formAbono.concepto||""} onChange={e=>setFormAbono(f=>({...f,concepto:e.target.value}))} placeholder="Referencia del pago…"/></div>
                <button style={S.saveB} onClick={()=>{
                  if(conInteres&&!formAbono.tipoAbono) return;
                  saveAbono();
                }}>GUARDAR ABONO</button>
                <button style={S.cancB} onClick={()=>setShowAbonoForm(false)}>Cancelar</button>
              </div>
            </div>
          );
        })()}

        {/* ── CUENTAS ── */}
        {view==="cuentas"&&(
          <div style={S.sec}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:13}}><button style={{...S.acBtn("#475569"),fontSize:11}} onClick={()=>setView("menu")}>← Menú</button><span style={{...S.sTit,margin:0}}>CUENTAS & TARJETAS</span></div>
            <div style={S.sTit}>CUENTAS DÉBITO</div>
            {cuentas.map(c=>(
              <div key={c.id} style={{...S.cCard(c.color),opacity:c.esReferencia?0.7:1}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div><div style={{display:"flex",alignItems:"center",gap:7,marginBottom:2}}><div style={{width:8,height:8,borderRadius:4,background:c.color}}/><span style={{fontSize:12,fontWeight:700}}>{c.nombre}</span>{c.esReferencia&&<span style={{fontSize:8,color:"#C9A84C",background:"rgba(201,168,76,0.1)",padding:"1px 5px",borderRadius:4}}>REF</span>}</div><div style={{fontSize:9,color:"#475569"}}>Inicial: {fmt(c.saldoInicial)}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:17,fontWeight:800,color:cuentaSaldos[c.id]>=0?c.color:"#f87171"}}>{fmt(cuentaSaldos[c.id])}</div>
                  <div style={{display:"flex",gap:5,marginTop:4,justifyContent:"flex-end"}}><button style={S.acBtn("#C9A84C")} onClick={()=>openEditCuenta(c)}>✏</button><button style={S.acBtn("#f87171")} onClick={()=>setConfirmDel({type:"cuenta",id:c.id})}>✕</button></div></div>
              </div></div>
            ))}
            <div style={{...S.sTit,marginTop:9}}>TARJETAS DE CRÉDITO</div>
            {tarjetas.map(t=>{const sd=tarjetaSaldos[t.id]||0;return(
              <div key={t.id} style={S.cCard(t.color)}><div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div><div style={{display:"flex",alignItems:"center",gap:7,marginBottom:2}}><div style={{width:8,height:8,borderRadius:4,background:t.color}}/><span style={{fontSize:12,fontWeight:700}}>{t.nombre}</span></div>
                  <div style={{fontSize:9,color:"#475569"}}>{t.banco} · Corte:{t.fechaCorte} · Pago:{t.fechaLimPago}</div>

                <div style={{textAlign:"right"}}><div style={{fontSize:9,color:"#64748b"}}>Saldo deudor</div><div style={{fontSize:16,fontWeight:800,color:sd>0?"#f87171":"#22c55e"}}>{fmt(sd)}</div>
                  <div style={{display:"flex",gap:5,marginTop:4,justifyContent:"flex-end"}}><button style={S.acBtn("#C9A84C")} onClick={()=>openEditTC(t)}>✏</button><button style={S.acBtn("#f87171")} onClick={()=>setConfirmDel({type:"tc",id:t.id})}>✕</button></div></div>
              </div></div>
            );})}
            <button style={{...S.saveB,background:"linear-gradient(135deg,#60a5fa,#3b82f6)",marginTop:7}} onClick={openNewTC}>+ Nueva Tarjeta de Crédito</button>
          </div>
        )}

        {/* ── CATÁLOGOS ── */}
        {view==="catalogos"&&(

                            ))}
                          </div>
                        </div>}
                      </div>
                      :(<><span style={{fontSize:12,fontWeight:700,color:catMode==="ing"?"#22c55e":"#f87171",cursor:"pointer"}} onClick={()=>{setEditingCatId(cat.id);setEditingCatName(cat.nombre);}}>☰ {cat.nombre}</span>{catMode==="eg"&&cat.subs&&cat.subs.length===0&&cat.prio&&(<span style={{fontSize:8,padding:"2px 7px",borderRadius:5,fontWeight:700,background:(PRIO_EG_COLOR[cat.prio]||"#64748b")+"22",color:PRIO_EG_COLOR[cat.prio]||"#64748b",marginLeft:5}}>{PRIO_EG_LBL[cat.prio]}</span>)}</>)
                    }
                  </div>
                  {editingCatId!==cat.id&&<div style={{display:"flex",gap:5}}><button style={S.smBtn("#C9A84C")} onClick={()=>setAddingSubTo(cat.id===addingSubTo?null:cat.id)}>+ Sub</button><button style={S.smBtn("#f87171")} onClick={()=>delCat(cat.id)}>✕</button></div>}
                </div>
                {cat.subs.map(sub=>(
                  <div key={sub.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0 4px 11px",borderLeft:"2px solid #1e293b",marginBottom:2}}>
                    {editingSubId===sub.id
                      ?<div style={{flex:1}}>
                        <div style={{display:"flex",gap:5,marginBottom:catMode==="eg"?4:0}}>
                          <input style={{...S.inp,flex:1,padding:"3px 7px",fontSize:11}} value={editingSubName} onChange={e=>setEditingSubName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEditSub(cat.id,sub.id);if(e.key==="Escape")setEditingSubId(null);}} autoFocus/>
                          <button style={S.smBtn("#22c55e")} onClick={()=>saveEditSub(cat.id,sub.id)}>✓</button>
                          <button style={S.smBtn("#475569")} onClick={()=>setEditingSubId(null)}>✕</button>
                        </div>
                        {catMode==="eg"&&<div style={{display:"flex",gap:3}}>
                          {[[1,"Esen","#22c55e"],[2,"Imp","#60a5fa"],[3,"Disc","#fbbf24"],[4,"Extr","#f87171"]].map(([v,l,c])=>(
                            <button key={v} style={{...S.prioB2((sub.prio||3)===v,c),flex:1,padding:"3px 2px",fontSize:7}}
                              onClick={()=>setCats_(p=>p.map(x=>x.id===cat.id?{...x,subs:x.subs.map(s=>s.id===sub.id?{...s,prio:v}:s)}:x))}>{l}</button>
                          ))}
                        </div>}
                      </div>
                      :<>
                        <span style={{fontSize:11,color:"#94a3b8",cursor:"pointer",flex:1}} onClick={()=>{setEditingSubId(sub.id);setEditingSubName(sub.nombre);}}>{sub.nombre}</span>

                        <button style={S.smBtn("#f87171")} onClick={()=>delSub(cat.id,sub.id)}>✕</button>
                      </>
                    }
                  </div>
                ))}
                {addingSubTo===cat.id&&<div style={{display:"flex",gap:5,marginTop:7}}><input style={{...S.inp,flex:1,padding:"6px 9px",fontSize:11}} value={newSubName} onChange={e=>setNewSubName(e.target.value)} placeholder="Nombre subcategoría" onKeyDown={e=>{if(e.key==="Enter")addSub(cat.id);}}/><button style={S.smBtn("#22c55e")} onClick={()=>addSub(cat.id)}>✓</button></div>}
              </div>
            ))}
            <div style={{display:"flex",gap:7,marginTop:7}}>
              <input style={{...S.inp,flex:1,padding:"8px 11px",fontSize:11}} value={newCatName} onChange={e=>setNewCatName(e.target.value)} placeholder="Nueva categoría…" onKeyDown={e=>{if(e.key==="Enter")addCat();}}/>
              <button style={{...S.saveB,width:"auto",padding:"8px 14px",marginTop:0,fontSize:11}} onClick={addCat}>+ Agregar</button>
            </div>
          </div>
        )}

        {/* ── CONFIGURACIÓN ── */}
        {view==="configuracion"&&(
          <div style={S.sec}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:13}}><button style={{...S.acBtn("#475569"),fontSize:11}} onClick={()=>setView("menu")}>← Menú</button><span style={{...S.sTit,margin:0}}>CONFIGURACIÓN</span></div>

                <input style={{...S.inp,marginTop:4}} type="number"
                  value={gastoFamiliarEsencial||""} onChange={e=>setGastoFamiliarEsencial(parseFloat(e.target.value)||0)}
                  placeholder="0.00"/>
                <div style={{fontSize:9,color:"#475569",marginTop:3}}>Estimación mensual de gastos esenciales fijos</div>
              </div>
              <div style={{marginBottom:11}}>
                <div style={S.lbl}>Factor multiplicador</div>
                <input style={{...S.inp,marginTop:4}} type="number" step="0.5" min="1" max="24"
                  value={factorFEF||""} onChange={e=>setFactorFEF(parseFloat(e.target.value)||2.5)}
                  placeholder="2.5"/>
                <div style={{fontSize:9,color:"#475569",marginTop:3}}>Número de meses objetivo de cobertura (default 2.5)</div>
              </div>
              {gastoFamiliarEsencial>0&&(
                <div style={{background:"rgba(201,168,76,0.1)",border:"1px solid #C9A84C33",borderRadius:9,padding:"9px 12px"}}>
                  <div style={{fontSize:9,color:"#C9A84C",fontWeight:700,marginBottom:3}}>Meta calculada</div>
                  <div style={{fontSize:16,fontWeight:800,color:"#C9A84C"}}>{fmt(gastoFamiliarEsencial*(factorFEF||2.5))}</div>
                  <div style={{fontSize:9,color:"#475569",marginTop:2}}>{fmt(gastoFamiliarEsencial)} × {factorFEF||2.5} meses</div>
                </div>
              )}
            </div>
            <div style={S.sTit}>DATOS</div>
            <div style={{...S.card(),cursor:"pointer"}} onClick={()=>{setShowReset(true);setResetPhase(1);setResetInput("");}}>

              <span>✓</span>
              <span>Guardado automático activo — tus datos se guardan en este dispositivo.</span>
            </div>
            <div style={{background:"rgba(251,191,36,0.08)",border:"1px solid #fbbf2444",borderRadius:11,padding:"11px 13px",marginBottom:9}}>
              <div style={{fontSize:11,fontWeight:800,color:"#fbbf24",marginBottom:4}}>⚠ Respaldo recomendado</div>
              <div style={{fontSize:10,color:"#94a3b8",lineHeight:1.6}}>
                Los datos viven en este navegador y dispositivo. Si cambias de navegador, limpias el caché o reinstalaas la app, se perderán. <strong style={{color:"#fbbf24"}}>Exporta el JSON regularmente</strong> y guárdalo en Google Drive.

              <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{...S.menuIco,background:"rgba(201,168,76,0.12)"}}><span>💾</span></div><div><div style={{fontSize:12,fontWeight:700,color:"#C9A84C"}}>Exportar datos (JSON)</div><div style={{fontSize:10,color:"#475569"}}>Descarga un respaldo de todos tus datos</div></div></div>
            </div>
            <div style={{...S.card()}} onClick={()=>{setShowJsonModal(true);setJsonImportError("");}}>
              <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><div style={{...S.menuIco,background:"rgba(96,165,250,0.12)"}}><span>📂</span></div><div><div style={{fontSize:12,fontWeight:700,color:"#60a5fa"}}>Importar datos (JSON)</div><div style={{fontSize:10,color:"#475569"}}>Restaura un respaldo previo</div></div></div>

          </div>

                        <option value="1">Esencial</option><option value="2">Importante</option>
                        <option value="3">Discrecional</option><option value="4">Extraordinario</option>
                      </select>
                    </div>
                  )}
                  <button style={S.saveB} onClick={applyMultiEdit}>APLICAR</button>
                  <button style={S.cancB} onClick={()=>setShowMultiEdit(false)}>Cancelar</button>
                </>);
              })()}
            </div>
          </div>
        )}

        {confirmDel&&(
          <div style={S.delCon}>
            <div style={S.delBox}>
              <div style={{fontSize:13,fontWeight:700,color:"#f87171",marginBottom:7}}>{confirmDel.type==="multi"?`¿Eliminar ${selected.size} movimientos?`:"¿Eliminar registro?"}</div>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:18}}>Esta acción no se puede deshacer.</div>
              <button style={{...S.saveB,background:"linear-gradient(135deg,#f87171,#b91c1c)"}} onClick={()=>{
                if(confirmDel.type==="multi"){setMovs(p=>p.filter(r=>!selected.has(r.id)));setSelected(new Set());setMultiMode(false);}
                else if(confirmDel.type==="mov"){doDelete(confirmDel.id);setViewMov(null);setShowMov(false);}
                else if(confirmDel.type==="cuenta")setCuentas(p=>p.filter(c=>c.id!==confirmDel.id));
                else if(confirmDel.type==="tc")setTarjetas(p=>p.filter(t=>t.id!==confirmDel.id));
                setConfirmDel(null);
              }}>Sí, eliminar</button>
              <button style={S.cancB} onClick={()=>{setConfirmDel(null);setViewMov(null);setShowMov(false);}}>Cancelar</button>
            </div>
          </div>
        )}

        {serieConfirm&&(
          <div style={S.delCon}>
            <div style={{...S.delBox,border:"1px solid #a78bfa44"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#a78bfa",marginBottom:7}}>↻ Movimiento en serie</div>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:18}}>{serieConfirm.action==="edit"?"¿Editar solo este o toda la serie?":"¿Eliminar solo este o toda la serie?"}</div>
              <button style={{...S.saveB,background:"linear-gradient(135deg,#a78bfa,#7c3aed)",marginBottom:7}} onClick={()=>applySerieConfirm("one")}>Solo este</button>
              <button style={{...S.saveB,background:"linear-gradient(135deg,#f87171,#b91c1c)"}} onClick={()=>applySerieConfirm("all")}>Toda la serie</button>
              <button style={S.cancB} onClick={()=>setSerieConfirm(null)}>Cancelar</button>
            </div>
          </div>
        )}

        {showReset&&(
          <div style={S.delCon}>
            <div style={S.delBox}>
              {resetPhase===1&&<><div style={{fontSize:13,fontWeight:700,color:"#f87171",marginBottom:7}}>⚠ Eliminar movimientos</div><div style={{fontSize:11,color:"#94a3b8",marginBottom:14}}>Cuentas y tarjetas se conservan.</div><button style={{...S.saveB,background:"linear-gradient(135deg,#f87171,#b91c1c)"}} onClick={()=>setResetPhase(2)}>Continuar</button><button style={S.cancB} onClick={()=>{setShowReset(false);setResetPhase(0);}}>Cancelar</button></>}
              {resetPhase===2&&<><div style={{fontSize:13,fontWeight:700,color:"#f87171",marginBottom:7}}>⛔ Confirmación final</div><div style={{fontSize:11,color:"#94a3b8",marginBottom:11}}>Escribe <span style={{color:"#f87171",fontWeight:700}}>CONFIRMAR</span></div><input style={{...S.inp,marginBottom:11,borderColor:"#f8717144"}} value={resetInput} onChange={e=>setResetInput(e.target.value)} placeholder="CONFIRMAR"/><button style={{...S.saveB,background:resetInput==="CONFIRMAR"?"linear-gradient(135deg,#f87171,#b91c1c)":"#1e293b",color:resetInput==="CONFIRMAR"?"#fff":"#475569"}} onClick={()=>{if(resetInput==="CONFIRMAR"){setMovs([]);setShowReset(false);setResetPhase(0);setResetInput("");}}}>Borrar todo</button><button style={S.cancB} onClick={()=>{setShowReset(false);setResetPhase(0);setResetInput("");}}>Cancelar</button></>}
            </div>
          </div>
        )}

        {showExportModal&&(
          <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setShowExportModal(false);}}>
            <div style={S.mBox}>
              <div style={S.mTit}>📥 EXPORTAR A EXCEL</div>
              <div style={S.fg}><label style={S.fl}>Período</label>
                <div style={{display:"flex",gap:7,marginBottom:9}}>
                  <button style={{...S.prioB2(exportPeriod.mode==="mes"),flex:1,padding:"8px 0",fontSize:11}} onClick={()=>setExportPeriod(p=>({...p,mode:"mes"}))}>Mensual</button>
                  <button style={{...S.prioB2(exportPeriod.mode==="anio"),flex:1,padding:"8px 0",fontSize:11}} onClick={()=>setExportPeriod(p=>({...p,mode:"anio"}))}>Anual</button>
                </div>
                {exportPeriod.mode==="mes"&&<div style={S.perBar}><button style={S.perBtn} onClick={()=>setExportPeriod(p=>{const sm=p.sm===0?11:p.sm-1;const sy=p.sm===0?p.sy-1:p.sy;return{...p,sm,sy};})}>‹</button><span style={S.perLbl}>{MESES_FULL[exportPeriod.sm]} {exportPeriod.sy}</span><button style={S.perBtn} onClick={()=>setExportPeriod(p=>{const sm=p.sm===11?0:p.sm+1;const sy=p.sm===11?p.sy+1:p.sy;return{...p,sm,sy};})}>›</button></div>}
                {exportPeriod.mode==="anio"&&<div style={S.perBar}><button style={S.perBtn} onClick={()=>setExportPeriod(p=>({...p,sy:p.sy-1}))}>‹</button><span style={S.perLbl}>{exportPeriod.sy}</span><button style={S.perBtn} onClick={()=>setExportPeriod(p=>({...p,sy:p.sy+1}))}>›</button></div>}
              </div>
              <button style={S.saveB} onClick={()=>exportExcel(exportPeriod.sm,exportPeriod.sy,exportPeriod.mode)}>📥 DESCARGAR EXCEL</button>
              <button style={S.cancB} onClick={()=>setShowExportModal(false)}>Cancelar</button>
            </div>
          </div>
        )}


        {showJsonModal&&(
          <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setShowJsonModal(false);}}>
            <div style={S.mBox}>
              <div style={S.mTit}>📂 IMPORTAR DATOS</div>
              <div style={{...S.infoBx("#fbbf24"),marginBottom:13}}><span>⚠</span><span>Esto reemplazará TODOS los datos actuales. Asegúrate de exportar primero si tienes información importante.</span></div>
              <div style={{background:"#13131f",border:"2px dashed #1e293b",borderRadius:11,padding:"22px 14px",textAlign:"center",marginBottom:11}}>
                <div style={{fontSize:22,marginBottom:7}}>📄</div>
                <div style={{fontSize:11,color:"#94a3b8",marginBottom:11}}>Selecciona el archivo JSON exportado desde Nexus CFP</div>
                <label style={{...S.saveB,display:"inline-block",cursor:"pointer",textAlign:"center",marginTop:0}}>
                  SELECCIONAR ARCHIVO
                  <input type="file" accept=".json" style={{display:"none"}} onChange={importJSON}/>
                </label>
              </div>
              {jsonImportError&&<div style={S.errBox}><span>⛔</span><span>{jsonImportError}</span></div>}
              <button style={S.cancB} onClick={()=>setShowJsonModal(false)}>Cancelar</button>
            </div>
          </div>
        )}


        {viewMov&&(()=>{
          const row=viewMov;
          const cats=row.tipoOp==="Ingreso"?catIng:catEg;
          const catNom=cats.find(c=>c.id===row.cat)?.nombre||"";
          const subNom=cats.find(c=>c.id===row.cat)?.subs?.find(s=>s.id===row.subcat)?.nombre||"";
          const cNom2=cuentas.find(c=>c.id===row.cuentaId)?.nombre||"";
          const cDest2=cuentas.find(c=>c.id===row.cuentaDestinoId)?.nombre||"";
          const tcNom2=tarjetas.find(t=>t.id===row.tarjetaId)?.nombre||"";
          const prioColor=row.prioridad===1?"#22c55e":row.prioridad===2?"#fbbf24":"#94a3b8";
          return(
            <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setViewMov(null);}}>
              <div style={S.mBox}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <div style={S.mTit}>👁 DETALLE</div>
                  <button style={{background:"none",border:"none",color:"#475569",fontSize:18,cursor:"pointer"}} onClick={()=>setViewMov(null)}>✕</button>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:13}}>
                  <div style={{flex:1,marginRight:10}}>
                    <div style={{fontSize:15,fontWeight:800,color:"#e2e8f0",lineHeight:1.3,marginBottom:5}}>{row.concepto}</div>
                    <span style={S.badge(row.estatus)}>{row.estatus}</span>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:9,color:"#64748b",marginBottom:2}}>{row.tipoOp}</div>
                    <div style={{fontSize:22,fontWeight:800,color:OP_COLORS[row.tipoOp]||"#94a3b8"}}>{row.tipoOp==="Ingreso"?"+":row.tipoOp==="Egreso"?"−":""}{fmt(row.monto)}</div>
                  </div>
                </div>
                <div style={{background:"#13131f",borderRadius:11,padding:"11px 13px",marginBottom:11}}>
                  {[
                    ["Fecha", row.fecha?fmtDate(row.fecha):"Sin fecha"],
                    ["Categoría", [catNom,subNom].filter(Boolean).join(" › ")||"—"],
                    row.tipoOp!=="Traspaso"&&row.tipoOp!=="Pago Tarjeta"?["Prioridad/Prob.", PRIO_LBL[row.prioridad]||"—"]:null,
                    cNom2?["Cuenta", cDest2?`${cNom2} → ${cDest2}`:cNom2]:null,
                    tcNom2?["Tarjeta", tcNom2]:null,
                    row.obs?["Observaciones", row.obs]:null,
                    row.serieId?["Serie", "Movimiento repetitivo"]:null,
                  ].filter(Boolean).map(([lbl,val])=>(
                    <div key={lbl} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"5px 0",borderBottom:"1px solid #1e293b"}}>
                      <span style={{fontSize:10,color:"#64748b",flexShrink:0,marginRight:10}}>{lbl}</span>
                      <span style={{fontSize:11,color:"#e2e8f0",fontWeight:600,textAlign:"right",wordBreak:"break-word",maxWidth:"60%"}}>{val}</span>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",gap:8,marginTop:4}}>
                  <button style={{...S.saveB,flex:1,marginTop:0,background:"rgba(201,168,76,0.15)",color:"#C9A84C",border:"1px solid #C9A84C44"}} onClick={()=>{setViewMov(null);openEditMov(row);}}>✏ Editar</button>
                  <button style={{...S.saveB,flex:1,marginTop:0,background:"rgba(96,165,250,0.15)",color:"#60a5fa",border:"1px solid #60a5fa44"}} onClick={()=>copyMov(row)}>⧉ Copiar</button>
                </div>
                <button style={S.cancB} onClick={()=>setViewMov(null)}>Cerrar</button>
              </div>
            </div>
          );
        })()}

        {multiMode&&selected.size>0&&(
          <div style={S.multiBar}>
            <span style={{fontSize:10,color:"#C9A84C",fontWeight:700,flex:1}}>{selected.size} selec.</span>
            <button style={S.acBtn("#C9A84C")} onClick={()=>setShowMultiEdit(true)}>✏ Editar</button>
            <button style={S.acBtn("#f87171")} onClick={()=>setConfirmDel({type:"multi"})}>✕ Eliminar</button>
            <button style={S.acBtn("#475569")} onClick={()=>{setMultiMode(false);setSelected(new Set());}}>Salir</button>
          </div>
        )}

        {view==="movimientos"&&!multiMode&&<button style={S.fab} onClick={openNewMov}>+</button>}
        {view==="cuentas"&&<button style={S.fab} onClick={openNewCuenta}>+</button>}

        <nav style={S.nav}>
          {[{id:"dashboard",icon:"◈",label:"Resumen"},{id:"movimientos",icon:"≡",label:"Movimientos"},{id:"menu",icon:"···",label:"Menú"}].map(n=>(
            <button key={n.id} style={S.navB(view===n.id||(inMenuViews.includes(view)&&n.id==="menu"))} onClick={()=>setView(n.id)}>
              <span style={{fontSize:16}}>{n.icon}</span>{n.label}
            </button>
          ))}
        </nav>
      </div>
    </>
  );
}


ReactDOM.render(React.createElement(App), document.getElementById('root'));

  </script>
  <script>
    // Capturar errores de Babel/React y mostrarlos
    window.addEventListener('error', function(e) {
      var l = document.getElementById('loading');
      if(l) {
        var msg = e.message || 'Error desconocido';
        var src = e.filename ? e.filename.split('/').pop() : '';
        l.innerHTML = '<div style="color:#f87171;padding:20px;font-size:11px;font-family:monospace;max-width:400px;text-align:left">' +
          '<div style="font-size:14px;font-weight:800;color:#C9A84C;margin-bottom:10px">Error de carga</div>' +
          '<div style="color:#f87171;margin-bottom:6px">' + msg + '</div>' +
          (src?'<div style="color:#475569;margin-bottom:10px">Archivo: '+src+'</div>':'') +
          '<div style="color:#64748b;font-size:10px">Verifica conexión a internet y recarga la página.<br>Si el error persiste, abre en Chrome con WiFi activo.</div>' +
          '<button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;background:#C9A84C;color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:700">Reintentar</button>' +
          '</div>';
      }
    });
    // Ocultar loading cuando React haya renderizado
    window.addEventListener('load', function() {
      setTimeout(function(){
        var l = document.getElementById('loading');
        if(l) l.style.display='none';
      }, 4000);
    });
  </script>
</body>
</html>
