<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#08080f;color:#e2e8f0;font-family:'DM Sans',sans-serif;overflow:hidden;}
  #root{height:100%;}
  iframe{border:none;width:100%;height:100%;display:block;background:#08080f;}
  input{font-family:'DM Sans',sans-serif;}
  #loading{position:fixed;inset:0;background:#08080f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;transition:opacity .35s ease;}
  #loading.fade-out{opacity:0;}
  #loading .t{font-size:28px;font-weight:700;letter-spacing:6px;color:#C9A84C;font-family:'Cinzel',Georgia,serif;margin-top:16px;}
  #loading .b{font-size:9px;color:#C9A84C88;letter-spacing:3px;margin-top:3px;font-family:'Cinzel',Georgia,serif;text-transform:uppercase;}
  #loading .dots{display:flex;gap:6px;margin-top:22px;}
  #loading .dots span{width:6px;height:6px;border-radius:50%;background:#C9A84C;animation:dp 1.2s ease-in-out infinite;}
  #loading .dots span:nth-child(2){animation-delay:.2s;}
  #loading .dots span:nth-child(3){animation-delay:.4s;}
  @keyframes dp{0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1.2);}}
</style>

function huellaRegistrar(){var uid=new Uint8Array(16);crypto.getRandomValues(uid);return navigator.credentials.create({publicKey:{challenge:crypto.getRandomValues(new Uint8Array(32)),rp:{name:"Nexus Partners",id:location.hostname},user:{id:uid,name:"nexus",displayName:"Nexus"},pubKeyCredParams:[{type:"public-key",alg:-7},{type:"public-key",alg:-257}],authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required"},timeout:60000,attestation:"none"}}).then(function(cred){return _b64u.e(cred.rawId);});}
function huellaVerificar(id){if(!id)return Promise.resolve(false);return navigator.credentials.get({publicKey:{challenge:crypto.getRandomValues(new Uint8Array(32)),allowCredentials:[{type:"public-key",id:_b64u.d(id),transports:["internal"]}],userVerification:"required",timeout:60000}}).then(function(){return true;}).catch(function(){return false;});}
const money=(n)=>"$"+(Number(n)||0).toLocaleString("es-MX",{minimumFractionDigits:0,maximumFractionDigits:0});
const comResultProd=(p)=>(p.comisionDirecta!=null&&p.comisionDirecta!=="")?Number(p.comisionDirecta):((Number(p.montoNegocio)||0)*(Number(p.indiceComision)||0)/100);
const mesActual=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");};
const ingresoProdMes=(p,mes)=>{const com=comResultProd(p),metas=p.metas||{};if(p.recurrente){let u=0;for(const k in metas){if(k<=mes)u+=Number(metas[k])||0;}return u*com;}return (Number(metas[mes])||0)*com;};

function Tablero({onBackup}){
  const mes=mesActual();
  let ingresoNexus=0, porMov=0, porMeta=0, opAb=0;

    const metaBySol={};
    productos.forEach(p=>{if(!p)return;const sid=p.solucionId||"_";metaBySol[sid]=(metaBySol[sid]||0)+ingresoProdMes(p,mes);});
    const oposLink=arr(lsCFC('oportunidades',[])).concat(arr(lsCFP('oportunidades',[])));
    const opById={}; oposLink.forEach(o=>{if(o&&o.id!=null&&opById[o.id]==null)opById[o.id]=o;});
    const ETAPAS_NEXUS=["Propuesta Presentada","Oportunidad Aceptada","Oportunidad Concretada"];
    const movs=arr(lsCFP('movs',[]));
    const vincBySol={};
    movs.forEach(m=>{

      const sid=o.solucionId||"_"; vincBySol[sid]=(vincBySol[sid]||0)+(Number(m.monto)||0);
    });
    const solSet={}; Object.keys(metaBySol).forEach(s=>solSet[s]=1); Object.keys(vincBySol).forEach(s=>solSet[s]=1);
    Object.keys(solSet).forEach(s=>{const m=metaBySol[s]||0,v=vincBySol[s]||0;const mx=Math.max(m,v);ingresoNexus+=mx;if(v>=m)porMov+=mx;else porMeta+=mx;});

        <div style={card}><div style={lbl}>Ingreso Extra Proyectado</div><div style={val("#22c55e")}>{M(r.ingresoExtra)}</div></div>

/* ── Alta/cambio de PIN: 2 pasos (crear + confirmar), guarda hasheado ── */
function PinSetter({onDone,onCancel}){
  const[step,setStep]=useState(1);
  const[v,setV]=useState("");
  const[first,setFirst]=useState("");
  const[err,setErr]=useState("");
  const press=(d)=>{ if(v.length>=6)return; setV(v+d); setErr(""); };
  const del=()=>setV(v.slice(0,-1));
  const ok=()=>{
    if(v.length<4){ setErr("El PIN debe tener al menos 4 dígitos"); return; }
    if(step===1){ setFirst(v); setV(""); setStep(2); }
    else { if(v===first){ onDone(v); } else { setErr("Los PINs no coinciden, vuelve a empezar"); setV(""); setFirst(""); setStep(1); } }
  };
  const dots=Array.from({length:Math.max(4,v.length)});
  const key={fontSize:22,fontWeight:600,padding:"15px 0",background:"#10101e",border:"1px solid #1e293b",borderRadius:12,color:"#e2e8f0",cursor:"pointer"};
  return <div style={{position:"fixed",inset:0,background:"rgba(8,8,15,0.96)",zIndex:9999,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"0 28px"}}>
    <div style={{maxWidth:360,width:"100%"}}>
      <div style={{fontSize:13,letterSpacing:4,color:GOLD,fontFamily:"'Cinzel',serif",textAlign:"center"}}>{step===1?"DEFINE TU PIN":"CONFÍRMALO"}</div>
      <div style={{fontSize:11,color:"#64748b",textAlign:"center",marginTop:4,marginBottom:22}}>{step===1?"De 4 a 6 dígitos":"Vuelve a teclear el PIN"}</div>
      <div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:22,height:16}}>
        {dots.map((_,i)=><div key={i} style={{width:12,height:12,borderRadius:"50%",background:i<v.length?GOLD:"#1e293b"}}/>)}
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10}}>
        {[1,2,3,4,5,6,7,8,9].map(d=><button key={d} style={key} onClick={()=>press(String(d))}>{d}</button>)}
        <button style={{...key,fontSize:14,color:"#64748b"}} onClick={del}>borrar</button>
        <button style={key} onClick={()=>press("0")}>0</button>
        <button style={{...key,color:v.length>=4?"#08080f":"#475569",background:v.length>=4?GOLD:"#10101e",fontWeight:800,fontSize:15}} onClick={ok}>OK</button>
      </div>
      <div style={{fontSize:11,color:"#f87171",height:16,marginTop:14,textAlign:"center"}}>{err}</div>
      <div style={{textAlign:"center",marginTop:6}}>
        <button onClick={onCancel} style={{background:"transparent",border:"none",color:"#64748b",fontSize:13,cursor:"pointer",padding:8}}>Cancelar</button>
      </div>
    </div>
  </div>;
}

function Lock({onOk}){
  const pinApp=String(lsCFP('pinApp',''));
  const[v,setV]=useState("");const[err,setErr]=useState(false);
  const huellaId=String(lsCFP('huellaCred',''));
  useEffect(()=>{if(huellaSoporta()&&huellaId){huellaVerificar(huellaId).then(ok=>{if(ok)onOk();});}},[]);
  const press=(d)=>{
    if(v.length>=8)return;
    const n=v+d; setV(n); setErr(false);
    if(hashPin(n)===pinApp){ onOk(); return; }
    if(n.length>=8){ setErr(true); setTimeout(()=>{setV("");setErr(false);},700); }
  };
  const del=()=>setV(v.slice(0,-1));
  const dots=Array.from({length:Math.max(4,v.length)});

  </div>;
}

    </div>

    <div style={{textAlign:"center",fontSize:15,color:"#cbd5e1",marginBottom:16}}>
      Bienvenido{nombre?<span>, <span style={{color:"#e2e8f0",fontWeight:700}}>{nombre}</span></span>:null}
    </div>

    <Tablero onBackup={onBackup}/>

    <div style={{display:"flex",gap:10,marginTop:16}}>
      <button onClick={()=>ir("cfp")} style={{flex:1,padding:"14px 0",background:"#10101e",border:"1px solid "+GOLD+"55",borderRadius:14,color:GOLD,fontWeight:700,fontSize:14,cursor:"pointer"}}>Entrar a CFP</button>
      <button onClick={()=>ir("cfc")} style={{flex:1,padding:"14px 0",background:"#10101e",border:"1px solid #2dd4bf55",borderRadius:14,color:"#2dd4bf",fontWeight:700,fontSize:14,cursor:"pointer"}}>Entrar a CFC</button>
      <button onClick={()=>ir("agenda")} style={{flex:1,padding:"14px 0",background:"#10101e",border:"1px solid #a78bfa55",borderRadius:14,color:"#a78bfa",fontWeight:700,fontSize:14,cursor:"pointer"}}>Agenda Personal</button>
    </div>

    <div style={{textAlign:"center",marginTop:20,marginBottom:6}}>
      <button onClick={()=>setCfg(true)} style={{background:"transparent",border:"none",color:"#475569",fontSize:12,letterSpacing:1,cursor:"pointer",padding:"6px 12px"}}>⚙ Configuración</button>
    </div>
    <div style={{fontSize:10,color:"#334155",textAlign:"center",marginBottom:4}}>Control Financiero Personal · Control de Flujo Comercial</div>
  </div>;
}

const BK_EXCL=["nexus_pinApp","nexus_pinActivo","nexus_pinTimeout","nexus_huellaCred","nexus_autobackup","nexus_crm_autobackup","nexus_lastFileBackup","nexus_crm_lastFileBackup","nexus_flow_lastBackup","nexus_flow_ultima"];
function recolectarKeys(){const out={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.indexOf("nexus_")===0&&BK_EXCL.indexOf(k)<0){out[k]=localStorage.getItem(k);}}return out;}
function contarPorApp(keys){let cfp=0,cfc=0;Object.keys(keys||{}).forEach(k=>{if(k.indexOf("nexus_crm_")===0)cfc++;else cfp++;});return {cfp:cfp,cfc:cfc};}
function BackupModal({onClose}){
  const fileRef=React.useRef(null);
  const last=(()=>{try{return localStorage.getItem("nexus_flow_lastBackup");}catch(e){return null;}})();
  const fmt=(iso)=>{try{return new Date(iso).toLocaleString();}catch(e){return iso;}};
  const exportar=()=>{
    const keys=recolectarKeys();const cc=contarPorApp(keys);
    const payload={app:"Nexus Flow",tipo:"respaldo-combinado",version:1,fecha:new Date().toISOString(),keys:keys};
    const blob=new Blob([JSON.stringify(payload)],{type:"application/json"});const url=URL.createObjectURL(blob);
    const d=new Date();const pad=(n)=>String(n).padStart(2,"0");
    const nombre="NexusFlow_Respaldo_"+d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+"_"+pad(d.getHours())+"-"+pad(d.getMinutes())+".json";
    const a=document.createElement("a");a.href=url;a.download=nombre;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    try{localStorage.setItem("nexus_flow_lastBackup",new Date().toISOString());}catch(e){}
    alert("Respaldo combinado generado:\n• "+cc.cfp+" claves de CFP\n• "+cc.cfc+" claves de CFC\n\nGuárdalo en Google Drive o un lugar seguro.");
    onClose();
  };
  const onFile=(e)=>{
    const file=e.target.files&&e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=()=>{
      try{
        const p=JSON.parse(r.result);const keys=p&&p.keys?p.keys:null;
        if(!keys||typeof keys!=="object"){alert("El archivo no parece un respaldo combinado de Nexus Flow.");e.target.value="";return;}
        const cc=contarPorApp(keys);
        if(window.confirm("Esto REEMPLAZARÁ los datos actuales de CFP y CFC por los del respaldo:\n\n• "+cc.cfp+" claves de CFP (Personal)\n• "+cc.cfc+" claves de CFC (Comercial)\n\nRespaldo del "+(p.fecha?fmt(p.fecha):"—")+".\n\n¿Continuar?")){
          Object.keys(keys).forEach(k=>{try{localStorage.setItem(k,keys[k]);}catch(err){}});
          try{localStorage.setItem("nexus_flow_lastBackup",new Date().toISOString());}catch(err){}
          alert("Respaldo restaurado. La app se recargará para aplicar los datos.");location.reload();
        }
      }catch(err){alert("No se pudo leer el archivo: "+err.message);}
      e.target.value="";
    };
    r.readAsText(file);
  };
  const card={background:"#10101e",border:"1px solid #1e293b",borderRadius:12,padding:"13px 14px",cursor:"pointer"};
  return <div style={{position:"fixed",inset:0,background:"rgba(8,8,15,0.96)",zIndex:9999,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",padding:"0 22px"}}>
    <div style={{maxWidth:380,width:"100%"}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:15,letterSpacing:3,color:GOLD,textAlign:"center",marginBottom:4}}>RESPALDO</div>
      <div style={{fontSize:11,color:"#64748b",textAlign:"center",marginBottom:18}}>CFP + CFC en un solo archivo</div>
      <div style={{background:"#0b0b16",border:"1px solid #1e293b",borderRadius:12,padding:"11px 13px",marginBottom:13,fontSize:11,lineHeight:1.7}}>
        <span style={{color:"#94a3b8"}}>Último respaldo: </span><strong style={{color:last?"#e2e8f0":"#f87171"}}>{last?fmt(last):"nunca"}</strong>
        {!last&&<div style={{color:"#fbbf24",marginTop:6,lineHeight:1.5}}>⚠ Aún no has generado un respaldo. Hazlo y guárdalo en Drive para no perder tu información si limpias el caché o cambias de dispositivo.</div>}
      </div>
      <div onClick={exportar} style={{...card,borderColor:GOLD+"55",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:11}}><span style={{fontSize:18}}>💾</span><div><div style={{fontSize:13,fontWeight:700,color:GOLD}}>Generar respaldo combinado</div><div style={{fontSize:10,color:"#64748b"}}>Descarga un archivo con todo CFP y CFC</div></div></div>
      </div>
      <div onClick={()=>fileRef.current&&fileRef.current.click()} style={{...card,borderColor:"#60a5fa55",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:11}}><span style={{fontSize:18}}>📂</span><div><div style={{fontSize:13,fontWeight:700,color:"#60a5fa"}}>Restaurar respaldo</div><div style={{fontSize:10,color:"#64748b"}}>Carga un archivo y reemplaza los datos</div></div></div>
      </div>
      <input ref={fileRef} type="file" accept="application/json,.json" style={{display:"none"}} onChange={onFile}/>
      <div style={{fontSize:10,color:"#475569",lineHeight:1.6,marginTop:4}}>El archivo cae en Descargas con nombre fechado (NexusFlow_Respaldo_…). Súbelo a Google Drive como respaldo seguro.</div>
      <div style={{textAlign:"center",marginTop:14}}><button onClick={onClose} style={{background:"transparent",border:"none",color:"#64748b",fontSize:14,cursor:"pointer",padding:8}}>Cerrar</button></div>
    </div>
  </div>;
}
function App(){
  const pinActivo=lsCFP('pinActivo',false);
  const pinApp=String(lsCFP('pinApp',''));
  const[abierto,setAbierto]=useState(()=>!(pinActivo&&pinApp));
  const[vista,setVista]=useState("home");
  const[showBackup,setShowBackup]=useState(false);
  const[cargado,setCargado]=useState({cfp:false,cfc:false,agenda:false});
  useEffect(()=>{const el=document.getElementById('loading');if(el){el.classList.add('fade-out');setTimeout(()=>{el.parentNode&&el.parentNode.removeChild(el);},380);}},[]);
  useEffect(()=>{let hid=null;const onHide=()=>{hid=Date.now();};const onShow=()=>{if(hid==null)return;const mins=Number(lsCFP('pinTimeout',5));const pa=lsCFP('pinActivo',false),pk=String(lsCFP('pinApp',''));if(pa&&pk&&mins>=0&&(Date.now()-hid)/60000>=mins)setAbierto(false);hid=null;};const vis=()=>{document.hidden?onHide():onShow();};document.addEventListener('visibilitychange',vis);window.addEventListener('focus',onShow);window.addEventListener('blur',onHide);return()=>{document.removeEventListener('visibilitychange',vis);window.removeEventListener('focus',onShow);window.removeEventListener('blur',onHide);};},[]);
  useEffect(()=>{
    // Aviso al presionar botón Atrás de Android
    window.history.pushState(null,'',window.location.href);
    const onPop=()=>{
      window.history.pushState(null,'',window.location.href);
      if(window.confirm('¿Salir de Nexus Flow?\n\nVerifica haber guardado cualquier registro en proceso antes de salir.')){
        window.history.back();window.history.back();
      }
    };
    window.addEventListener('popstate',onPop);
    // beforeunload para cierres directos (desktop / recarga)
    const onBefore=(e)=>{e.preventDefault();e.returnValue='';};
    window.addEventListener('beforeunload',onBefore);
    return()=>{window.removeEventListener('popstate',onPop);window.removeEventListener('beforeunload',onBefore);};
  },[]);
  const ir=(v)=>{ setVista(v); if(v==="cfp"||v==="cfc"||v==="agenda"){ setCargado(c=>({...c,[v]:true})); try{localStorage.setItem('nexus_flow_ultima',v);}catch(e){} } };
  if(!abierto) return <Lock onOk={()=>setAbierto(true)}/>;
  const barBtn=(v,lab)=>{const on=vista===v;return <button onClick={()=>ir(v)} style={{flex:1,padding:"7px 2px",fontSize:11,fontWeight:on?800:500,background:on?GOLD:"transparent",color:on?"#08080f":"#94a3b8",border:"none",borderRadius:9,cursor:"pointer",lineHeight:1.3}}>{lab}</button>;};
  return <div style={{height:"100%",display:"flex",flexDirection:"column"}}>
    <div style={{flexShrink:0,display:"flex",alignItems:"center",gap:8,padding:"8px 10px",background:"#0b0b16",borderBottom:"1px solid #1e293b"}}>
      <div style={{fontFamily:"'Cinzel',serif",fontSize:13,fontWeight:700,color:GOLD,letterSpacing:2,paddingLeft:4,paddingRight:4}}>FLOW</div>
      <div style={{flex:1,display:"flex",gap:4,background:"#10101e",borderRadius:11,padding:4}}>
        {barBtn("home","Inicio")}{barBtn("cfp","CFP")}{barBtn("cfc","CFC")}{barBtn("agenda",<>Agenda<br/>Personal</>)}
      </div>
    </div>
    <div style={{flex:1,position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,overflowY:"auto",padding:"18px 16px",display:vista==="home"?"block":"none"}}>
        <Home ir={ir} onBackup={()=>setShowBackup(true)}/>
      </div>
      <div style={{position:"absolute",inset:0,display:vista==="cfp"?"block":"none"}}>{cargado.cfp&&<iframe src="cfp.html" title="CFP"/>}</div>
      <div style={{position:"absolute",inset:0,display:vista==="cfc"?"block":"none"}}>{cargado.cfc&&<iframe src="cfc.html" title="CFC"/>}</div>
      <div style={{position:"absolute",inset:0,display:vista==="agenda"?"block":"none"}}>{cargado.agenda&&<iframe src="APersonal.html" title="Agenda Personal"/>}</div>
    </div>
    {showBackup&&<BackupModal onClose={()=>setShowBackup(false)}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
