// ─── HELPERS ─────────────────────────────────────────────────
const fmt      = n=>new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",minimumFractionDigits:2}).format(n||0);
const fmtShort = n=>{const v=Math.abs(n||0);if(v>=1000000)return`$${(v/1e6).toFixed(1)}M`;if(v>=1000)return`$${(v/1000).toFixed(1)}k`;return fmt(n);};
const fmtDate  = d=>{if(!d)return"";const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;};
const todayStr = ()=>{
  const d=new Date();
  const y=d.getFullYear();
  const m=String(d.getMonth()+1).padStart(2,"0");
  const day=String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
};
const addD     = (d,n)=>{const dt=new Date(d+"T12:00:00");dt.setDate(dt.getDate()+n);return dt.toISOString().split("T")[0];};
const addM_    = (d,n)=>{const dt=new Date(d+"T12:00:00");dt.setMonth(dt.getMonth()+n);return dt.toISOString().split("T")[0];};
const addY_    = (d,n)=>{const dt=new Date(d+"T12:00:00");dt.setFullYear(dt.getFullYear()+n);return dt.toISOString().split("T")[0];};
const mesKey   = (sm,sy)=>`_${sm+1}_${sy}`;
const presKey  = (id,sm,sy)=>`${id}${mesKey(sm,sy)}`;

function estatusParaTipo(tipoOp){
  if(tipoOp==="Ingreso")      return ESTATUS_LIST.filter(e=>e!=="PAGADO");
  if(tipoOp==="Egreso")       return ESTATUS_LIST.filter(e=>e!=="INGRESADO");
  if(tipoOp==="Pago Tarjeta") return ESTATUS_LIST.filter(e=>e!=="INGRESADO"&&e!=="PENDIENTE");
  return ESTATUS_LIST;
}

function generarFechas(rec){
  const fechas=[];let cur=rec.fechaInicio;
  for(let i=0;i<500;i++){
    if(rec.finTipo==="fecha"&&cur>rec.finFecha)break;
    if(rec.recurrencia==="Diaria"){fechas.push(cur);cur=addD(cur,1);}
    else if(rec.recurrencia==="Semanal"){
      const dow=rec.diasSemana.length?rec.diasSemana:[new Date(cur+"T12:00:00").getDay()];
      let d=cur;for(let w=0;w<7;w++){if(dow.includes(new Date(d+"T12:00:00").getDay()))fechas.push(d);d=addD(d,1);}
      cur=addD(cur,7);
    }
    else if(rec.recurrencia==="Quincenal"){fechas.push(cur);cur=addD(cur,15);}
    else if(rec.recurrencia==="Mensual")  {fechas.push(cur);cur=addM_(cur,1);}
    else if(rec.recurrencia==="Bimestral"){fechas.push(cur);cur=addM_(cur,2);}
    else if(rec.recurrencia==="Anual")    {fechas.push(cur);cur=addY_(cur,1);}
    if(fechas.length>=(rec.finTipo==="repeticiones"?rec.finReps:500))break;
  }
  return fechas.slice(0,rec.finTipo==="repeticiones"?rec.finReps:undefined);
}

// ─── SALDOS ──────────────────────────────────────────────────
function calcConsolidado(movs,pI,pE,cuentasRef){
  const sorted=[...movs].filter(r=>r.fecha).sort((a,b)=>a.fecha!==b.fecha?a.fecha.localeCompare(b.fecha):a.orden-b.orden);
  // Sumar saldoInicial de cuentas de referencia como arranque del consolidado
  let s=(cuentasRef||[]).filter(c=>c.esReferencia).reduce((acc,c)=>acc+(c.saldoInicial||0),0);
  return sorted.map(r=>{
    const real=["INGRESADO","PAGADO"].includes(r.estatus);
    const prog=r.estatus==="PROGRAMADO";
    let cuenta=false;
    if(real)cuenta=true;
    if(prog){if(r.tipoOp==="Ingreso"&&r.prioridad<=(pI||3))cuenta=true;if(r.tipoOp==="Egreso"&&r.prioridad<=(pE||3))cuenta=true;}
    if(cuenta){if(r.tipoOp==="Ingreso")s+=r.monto||0;else if(r.tipoOp==="Egreso")s-=r.monto||0;}
    return{...r,saldoConsolidado:s,enProyeccion:cuenta};
  });
}
function calcCuentaSaldos(cuentas,movs){
  const s={};cuentas.forEach(c=>{s[c.id]=c.saldoInicial||0;});
  [...movs].filter(r=>r.fecha).sort((a,b)=>a.fecha!==b.fecha?a.fecha.localeCompare(b.fecha):a.orden-b.orden).forEach(r=>{
    if(!["INGRESADO","PAGADO"].includes(r.estatus))return;
    if(r.tipoOp==="Ingreso"&&r.cuentaId&&!r.usaTarjeta)s[r.cuentaId]=(s[r.cuentaId]||0)+(r.monto||0);
    if(r.tipoOp==="Egreso" &&r.cuentaId&&!r.usaTarjeta)s[r.cuentaId]=(s[r.cuentaId]||0)-(r.monto||0);
    if(r.tipoOp==="Transferencia"){if(r.cuentaId)s[r.cuentaId]=(s[r.cuentaId]||0)-(r.monto||0);if(r.cuentaDestinoId)s[r.cuentaDestinoId]=(s[r.cuentaDestinoId]||0)+(r.monto||0);}
    if(r.tipoOp==="Pago Tarjeta"&&r.cuentaId)s[r.cuentaId]=(s[r.cuentaId]||0)-(r.monto||0);
  });
  return s;
}
function calcTarjetaSaldos(tarjetas,movs){
  const s={};tarjetas.forEach(t=>{s[t.id]=t.saldoDeudorInicial||0;});
  [...movs].filter(r=>r.fecha).sort((a,b)=>a.fecha!==b.fecha?a.fecha.localeCompare(b.fecha):a.orden-b.orden).forEach(r=>{
    if(!["INGRESADO","PAGADO"].includes(r.estatus))return;
    if(r.tipoOp==="Egreso"&&r.usaTarjeta&&r.tarjetaId)s[r.tarjetaId]=(s[r.tarjetaId]||0)+(r.monto||0);
    if(r.tipoOp==="Pago Tarjeta"&&r.tarjetaId)s[r.tarjetaId]=(s[r.tarjetaId]||0)-(r.monto||0);
  });
  return s;
}
function calcSaldoCuentaAntesDe(cuentaId,movId,movs,cuentas){
  let s=cuentas.find(c=>c.id===cuentaId)?.saldoInicial||0;
  [...movs].filter(r=>r.fecha&&r.id!==movId).sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach(r=>{
    if(!["INGRESADO","PAGADO"].includes(r.estatus))return;
    if(r.tipoOp==="Ingreso"&&r.cuentaId===cuentaId&&!r.usaTarjeta)s+=(r.monto||0);
    if(r.tipoOp==="Egreso" &&r.cuentaId===cuentaId&&!r.usaTarjeta)s-=(r.monto||0);
    if(r.tipoOp==="Transferencia"){if(r.cuentaId===cuentaId)s-=(r.monto||0);if(r.cuentaDestinoId===cuentaId)s+=(r.monto||0);}
    if(r.tipoOp==="Pago Tarjeta"&&r.cuentaId===cuentaId)s-=(r.monto||0);
  });
  return s;
}

// Saldo proyectado al cierre de un mes (para saldo inicial de Proyección Presupuestal)
function calcSaldoProyFin(movs,cuentas,pI,pE,sm,sy){
  const withS=calcConsolidado(movs,pI,pE,cuentas);
  const endDate=`${sy}-${String(sm+1).padStart(2,"0")}-31`;
  const relevant=withS.filter(r=>r.fecha&&r.fecha<=endDate&&r.enProyeccion);
  if(!relevant.length){
    return Object.values(calcCuentaSaldos(cuentas,movs)).reduce((s,v)=>s+v,0);
  }
  return relevant[relevant.length-1].saldoConsolidado;
}

// ─── DRAG ────────────────────────────────────────────────────
function useDrag(setMovs){
  const dR=useRef(null),oR=useRef(null),snR=useRef(null);
  const[aId,setAId]=useState(null),[oViz,setOViz]=useState(null);
  const start=(id,sn)=>{dR.current=id;snR.current=sn;setAId(id);};
  const enter=id=>{oR.current=id;setOViz(id);};
  const commit=useCallback(()=>{
    const dragId=dR.current, overId=oR.current, snap=snR.current;
    if(dragId&&overId&&dragId!==overId&&snap){
      const fi=snap.findIndex(r=>r.id===dragId);
      const ti=snap.findIndex(r=>r.id===overId);
      if(fi!==-1&&ti!==-1){
        // Reordenar el array snap moviendo el elemento arrastrado a la posición destino
        const arr=[...snap];
        const targetFecha = arr[ti].fecha; // fecha del elemento destino
        const [moved]=arr.splice(fi,1);
        arr.splice(ti,0,moved);
        // Reasignar órdenes secuenciales; si el destino tiene fecha distinta, adoptarla
        const ordenMap={};
        const fechaMap={};
        arr.forEach((r,i)=>{
          ordenMap[r.id]=i+1;
          // Solo actualizar fecha del elemento arrastrado si la fecha destino es distinta
          if(r.id===dragId && targetFecha && targetFecha!==r.fecha){
            fechaMap[r.id]=targetFecha;
          }
        });
        setMovs(p=>p.map(r=>{
          const updates={};
          if(ordenMap[r.id]!==undefined) updates.orden=ordenMap[r.id];
          if(fechaMap[r.id]) updates.fecha=fechaMap[r.id];
          return Object.keys(updates).length?{...r,...updates}:r;
        }));
      }
    }
    dR.current=null;oR.current=null;snR.current=null;setAId(null);setOViz(null);
  },[setMovs]);
  const tm=useCallback(e=>{
    if(!dR.current)return;e.preventDefault();
    const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY)?.closest("[data-movid]");
    if(el){const oid=parseInt(el.dataset.movid);if(oid&&oid!==dR.current){oR.current=oid;setOViz(oid);}}
  },[]);
  return{aId,oViz,start,enter,commit,tm};
}
function useCatDrag(setCats){
  const dR=useRef(null),oR=useRef(null);
  const[aId,setAId]=useState(null),[oViz,setOViz]=useState(null);
  const start=id=>{dR.current=id;setAId(id);};
  const enter=id=>{oR.current=id;setOViz(id);};
  const commit=useCallback(()=>{
    if(dR.current&&oR.current&&dR.current!==oR.current){
      setCats(p=>{const arr=[...p];const fi=arr.findIndex(c=>c.id===dR.current);const ti=arr.findIndex(c=>c.id===oR.current);if(fi!==-1&&ti!==-1){const[el]=arr.splice(fi,1);arr.splice(ti,0,el);}return arr;});
    }
    dR.current=null;oR.current=null;setAId(null);setOViz(null);
  },[setCats]);
  return{aId,oViz,start,enter,commit};
}

// ─── PERIODS ─────────────────────────────────────────────────
function usePeriod(){
  const now=new Date();
  const[mode,setMode]=useState("mes");
  const[sm,setSm]=useState(now.getMonth());
  const[sy,setSy]=useState(now.getFullYear());
  const[fr,setFr]=useState(todayStr());
  const[to,setTo]=useState(todayStr());
  const inP=useCallback(d=>{
    if(!d)return false;
    if(mode==="mes"){const[y,m]=d.split("-").map(Number);return y===sy&&m-1===sm;}
    if(mode==="anio")return d.startsWith(String(sy));
    return d>=fr&&d<=to;
  },[mode,sm,sy,fr,to]);
  const label=()=>mode==="mes"?`${MESES_FULL[sm]} ${sy}`:mode==="anio"?`Año ${sy}`:`${fmtDate(fr)}–${fmtDate(to)}`;
  const prev=()=>{if(mode==="mes"){setSm(m=>{if(m===0){setSy(y=>y-1);return 11;}return m-1;});}if(mode==="anio")setSy(y=>y-1);};
  const next=()=>{if(mode==="mes"){setSm(m=>{if(m===11){setSy(y=>y+1);return 0;}return m+1;});}if(mode==="anio")setSy(y=>y+1);};
  return{mode,setMode,sm,sy,setSm,setSy,fr,setFr,to,setTo,inP,label,prev,next};
}
function usePeriodMes(){
  const now=new Date();
  const[sm,setSm]=useState(now.getMonth());
  const[sy,setSy]=useState(now.getFullYear());
  const inP=useCallback(d=>{if(!d)return false;const[y,m]=d.split("-").map(Number);return y===sy&&m-1===sm;},[sm,sy]);
  const label=()=>`${MESES_FULL[sm]} ${sy}`;
  const prev=()=>setSm(m=>{if(m===0){setSy(y=>y-1);return 11;}return m-1;});
  const next=()=>setSm(m=>{if(m===11){setSy(y=>y+1);return 0;}return m+1;});
  return{sm,sy,inP,label,prev,next};
}

// ─── BUDGET BAR ───────────────────────────────────────────────
function BudgetBar({gasto,presupuesto,color="#C9A84C",esIngreso=false}){
  if(!presupuesto)return null;
  const pct=gasto/presupuesto;
  const over=gasto>presupuesto;
  const c=over?(esIngreso?"#22c55e":"#f87171"):(pct>0.8?(esIngreso?"#22c55e":"#fbbf24"):color);
  let etiqueta;
  if(esIngreso){
    if(over) etiqueta=<span style={{color:"#22c55e",fontWeight:700}}>✓ Meta alcanzada</span>;
    else etiqueta=<span style={{color:"#fbbf24"}}>Falta para meta {fmt(presupuesto-gasto)}</span>;
  } else {
    if(over) etiqueta=<span style={{color:"#f87171"}}>Exceso {fmt(gasto-presupuesto)}</span>;
    else etiqueta=<span style={{color:"#22c55e"}}>Disponible {fmt(presupuesto-gasto)}</span>;
  }
  return(
    <div>
      <div style={{height:5,borderRadius:3,background:"#1e293b",overflow:"hidden",marginTop:5}}>
        <div style={{height:"100%",borderRadius:3,background:c,width:`${Math.min(pct/1.2,1)*100}%`,transition:"width 0.4s"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#475569",marginTop:2}}>
        <span style={{color:c,fontWeight:700}}>{Math.round(pct*100)}%</span>
        {etiqueta}
      </div>
    </div>
  );
}

// ─── MODAL MOV ───────────────────────────────────────────────
const ModalMov=memo(function ModalMov({
  formMov,setFormMov,editMovId,isEditReal,recForm,setRecForm,
  cuentas,cuentaSaldos,tarjetas,tarjetaSaldos,catIng,catEg,
  acreedores,deudores,ingresosExt,
  onSave,onClose,saveError,fieldErrors
}){
  const isT  = formMov.tipoOp==="Transferencia";
  const isPT = formMov.tipoOp==="Pago Tarjeta";
  const isProg= ["PENDIENTE","PROGRAMADO"].includes(formMov.estatus);
  const isPend= formMov.estatus==="PENDIENTE";
  const ptNecesitaCuenta = isPT&&formMov.estatus==="PAGADO";
  const cats   = formMov.tipoOp==="Ingreso"?catIng:catEg;
  const subcats= cats.find(c=>c.id===formMov.cat)?.subs||[];
  const set    = useCallback((k,v)=>setFormMov(f=>({...f,[k]:v})),[setFormMov]);
  const estatusOpts = estatusParaTipo(formMov.tipoOp);

  // Refs para scroll a campos con error
  const cuentaRef=useRef(null);
  const fechaRef=useRef(null);
  const tarjetaRef=useRef(null);

  useEffect(()=>{
    if(fieldErrors?.cuentaId&&cuentaRef.current) cuentaRef.current.scrollIntoView({behavior:"smooth",block:"center"});
    else if(fieldErrors?.tarjetaId&&tarjetaRef.current) tarjetaRef.current.scrollIntoView({behavior:"smooth",block:"center"});
    else if(fieldErrors?.fecha&&fechaRef.current) fechaRef.current.scrollIntoView({behavior:"smooth",block:"center"});
  },[fieldErrors]);

  const handleEstatus = useCallback((val)=>{
    const esProg2=["PENDIENTE","PROGRAMADO"].includes(val);
    setFormMov(f=>({...f,estatus:val,...(esProg2?{cuentaId:null,cuentaDestinoId:null,tarjetaId:null,usaTarjeta:false}:{})}));
  },[setFormMov]);

  return(
    <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={S.mBox}>
        <div style={S.mTit}>{editMovId?"✏ EDITAR":"+ NUEVO MOVIMIENTO"}</div>

        {!editMovId&&(
          <div style={S.fg}>
            <label style={S.fl}>Tipo</label>
            <div style={S.opRow}>
              {TIPO_OP.map(op=>(
                <button key={op} style={S.opB(formMov.tipoOp===op,OP_COLORS[op])}
                  onClick={()=>setFormMov(f=>{
                    const newEst=estatusParaTipo(op).includes(f.estatus)?f.estatus:estatusParaTipo(op)[0];
                    return{...f,tipoOp:op,estatus:newEst,cuentaId:null,cuentaDestinoId:null,tarjetaId:null,usaTarjeta:false};
                  })}>
                  {op==="Ingreso"?"↑":op==="Egreso"?"↓":op==="Transferencia"?"⇄":"💳"} {op}
                </button>
              ))}
            </div>
          </div>
        )}
        {editMovId&&<div style={{...S.infoBx("#60a5fa"),marginBottom:11}}><span>✏</span><span>Tipo: <strong>{formMov.tipoOp}</strong> — para cambiar el monto, elimina y crea de nuevo.</span></div>}

        {/* TRANSFERENCIA */}
        {isT&&(<>
          <div style={S.infoBx("#a78bfa")}><span>⇄</span><span>Mueve saldo entre cuentas.</span></div>
          <div style={S.fg}><label style={S.fl}>Concepto</label><input style={S.inp} value={formMov.concepto} onChange={e=>set("concepto",e.target.value)} placeholder="Traspaso…"/></div>
          <div style={{...S.r2,marginBottom:11}}>
            <div ref={fechaRef}><label style={S.fl}>Fecha</label><input style={fieldErrors?.fecha?S.inpErr:S.inp} type="date" value={formMov.fecha||""} onChange={e=>set("fecha",e.target.value)}/></div>
            <div><label style={S.fl}>Monto $</label>{isEditReal?<input style={S.inpDis} value={fmt(formMov.monto)} readOnly/>:<input style={S.inp} type="number" value={formMov.monto} onChange={e=>set("monto",e.target.value)}/>}</div>
          </div>
          <div style={S.fg} ref={cuentaRef}><label style={S.fl}>Cuenta Origen</label>
            <select style={fieldErrors?.cuentaId?S.selErr:S.sel} value={formMov.cuentaId||""} onChange={e=>set("cuentaId",parseInt(e.target.value)||null)}>
              <option value="">— Seleccionar —</option>{cuentas.filter(c=>!c.esReferencia).map(c=><option key={c.id} value={c.id}>{c.nombre} ({fmt(cuentaSaldos[c.id])})</option>)}
            </select>
          </div>
          <div style={S.fg}><label style={S.fl}>Cuenta Destino</label>
            <select style={S.sel} value={formMov.cuentaDestinoId||""} onChange={e=>set("cuentaDestinoId",parseInt(e.target.value)||null)}>
              <option value="">— Seleccionar —</option>{cuentas.filter(c=>c.id!==formMov.cuentaId).map(c=><option key={c.id} value={c.id}>{c.nombre} ({fmt(cuentaSaldos[c.id])})</option>)}
            </select>
          </div>
          <div style={S.fg}><label style={S.fl}>Observaciones</label><textarea style={{...S.inp,minHeight:60,resize:"vertical",lineHeight:1.5}} value={formMov.obs} onChange={e=>set("obs",e.target.value)}/></div>
        </>)}

        {/* PAGO TARJETA */}
        {isPT&&(<>
          <div style={S.infoBx("#60a5fa")}><span>💳</span><span>Reduce saldo deudor de la tarjeta.</span></div>
          <div style={S.fg}><label style={S.fl}>Concepto</label><input style={S.inp} value={formMov.concepto} onChange={e=>set("concepto",e.target.value)} placeholder="Pago TC…"/></div>
          <div style={{...S.r2,marginBottom:11}}>
            <div ref={fechaRef}><label style={S.fl}>Fecha</label><input style={fieldErrors?.fecha?S.inpErr:S.inp} type="date" value={formMov.fecha||""} onChange={e=>set("fecha",e.target.value)}/></div>
            <div><label style={S.fl}>Monto $</label>{isEditReal?<input style={S.inpDis} value={fmt(formMov.monto)} readOnly/>:<input style={S.inp} type="number" value={formMov.monto} onChange={e=>set("monto",e.target.value)}/>}</div>
          </div>
          <div style={S.fg}><label style={S.fl}>Estatus</label>
            <select style={S.sel} value={formMov.estatus} onChange={e=>handleEstatus(e.target.value)}>{estatusOpts.map(e=><option key={e} value={e}>{e}</option>)}</select>
          </div>
          {ptNecesitaCuenta&&(<>
            <div style={S.fg} ref={tarjetaRef}><label style={S.fl}>Tarjeta a pagar</label>
              <select style={fieldErrors?.tarjetaId?S.selErr:S.sel} value={formMov.tarjetaId||""} onChange={e=>set("tarjetaId",parseInt(e.target.value)||null)}>
                <option value="">— Seleccionar —</option>{tarjetas.map(t=><option key={t.id} value={t.id}>{t.nombre} · {fmt(tarjetaSaldos[t.id])}</option>)}
              </select>
            </div>
            <div style={S.fg} ref={cuentaRef}><label style={S.fl}>Cuenta débito origen</label>
              <select style={fieldErrors?.cuentaId?S.selErr:S.sel} value={formMov.cuentaId||""} onChange={e=>set("cuentaId",parseInt(e.target.value)||null)}>
                <option value="">— Seleccionar —</option>{cuentas.filter(c=>!c.esReferencia).map(c=><option key={c.id} value={c.id}>{c.nombre} · {fmt(cuentaSaldos[c.id])}</option>)}
              </select>
            </div>
          </>)}
          {!ptNecesitaCuenta&&<div style={S.infoBx("#a78bfa")}><span>⚡</span><span>Tarjeta y cuenta se asignan al confirmar como PAGADO.</span></div>}
          <div style={S.fg}><label style={S.fl}>Observaciones</label><textarea style={{...S.inp,minHeight:60,resize:"vertical",lineHeight:1.5}} value={formMov.obs} onChange={e=>set("obs",e.target.value)}/></div>
        </>)}

        {/* INGRESO / EGRESO */}
        {!isT&&!isPT&&(<>
          <div style={S.fg}><label style={S.fl}>Estatus</label>
            <select style={S.sel} value={formMov.estatus} onChange={e=>handleEstatus(e.target.value)}>{estatusOpts.map(e=><option key={e} value={e}>{e}</option>)}</select>
          </div>
          {isPend&&<div style={S.infoBx("#fbbf24")}><span>📋</span><span>PENDIENTE: sin fecha. Compromiso sin programar. Cambia a PROGRAMADO para asignar fecha.</span></div>}
          {!isPend&&(
            <div style={S.fg} ref={fechaRef}><label style={S.fl}>Fecha</label>
              <input style={fieldErrors?.fecha?S.inpErr:S.inp} type="date" value={formMov.fecha||""} onChange={e=>set("fecha",e.target.value)}/>
              {fieldErrors?.fecha&&<div style={{fontSize:9,color:"#f87171",marginTop:2}}>⚠ Se requiere fecha</div>}
            </div>
          )}
          <div style={S.fg}><label style={S.fl}>Monto $</label>
            {isEditReal?<><input style={S.inpDis} value={fmt(formMov.monto)} readOnly/><div style={{fontSize:9,color:"#fbbf24",marginTop:3}}>⚠ Para cambiar el monto, elimina y crea de nuevo.</div></>
             :<input style={S.inp} type="number" value={formMov.monto} onChange={e=>set("monto",e.target.value)} placeholder="0.00"/>}
          </div>
          <div style={S.fg}><label style={S.fl}>Concepto</label><input style={S.inp} value={formMov.concepto} onChange={e=>set("concepto",e.target.value)} placeholder="Descripción…"/></div>
          <div style={{...S.r2,marginBottom:11}}>
            <div><label style={S.fl}>Categoría</label>
              <select style={S.sel} value={formMov.cat} onChange={e=>setFormMov(f=>({...f,cat:e.target.value,subcat:""}))}>
                <option value="">— —</option>{cats.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
              </select>
            </div>
            <div><label style={S.fl}>Subcategoría</label>
              <select style={S.sel} value={formMov.subcat} onChange={e=>set("subcat",e.target.value)}>
                <option value="">— —</option>{subcats.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}
              </select>
            </div>
          </div>
          {!isProg&&(<>
            {formMov.tipoOp==="Egreso"&&(
              <div style={S.fg} ref={cuentaRef}>
                <label style={S.fl}>Cargo a</label>
                <div style={{display:"flex",gap:7,marginBottom:9}}>
                  <button style={S.prioB2(!formMov.usaTarjeta,"#60a5fa")} onClick={()=>setFormMov(f=>({...f,usaTarjeta:false,tarjetaId:null}))}>🏦 Cuenta Débito</button>
                  <button style={S.prioB2(formMov.usaTarjeta,"#f472b6")} onClick={()=>setFormMov(f=>({...f,usaTarjeta:true,cuentaId:null}))}>💳 Tarjeta TC</button>
                </div>
                {!formMov.usaTarjeta&&<select style={fieldErrors?.cuentaId?S.selErr:S.sel} value={formMov.cuentaId||""} onChange={e=>set("cuentaId",parseInt(e.target.value)||null)}><option value="">— Seleccionar —</option>{cuentas.filter(c=>!c.esReferencia).map(c=><option key={c.id} value={c.id}>{c.nombre} · {fmt(cuentaSaldos[c.id])}</option>)}</select>}
                {formMov.usaTarjeta&&<select style={fieldErrors?.tarjetaId?S.selErr:S.sel} value={formMov.tarjetaId||""} onChange={e=>set("tarjetaId",parseInt(e.target.value)||null)}><option value="">— Seleccionar —</option>{tarjetas.map(t=><option key={t.id} value={t.id}>{t.nombre} · Disp:{fmt((t.limite||0)-tarjetaSaldos[t.id])}</option>)}</select>}
                {(fieldErrors?.cuentaId||fieldErrors?.tarjetaId)&&<div style={{fontSize:9,color:"#f87171",marginTop:3}}>⚠ Selecciona cuenta o tarjeta</div>}
              </div>
            )}
            {formMov.tipoOp==="Ingreso"&&(
              <div style={S.fg} ref={cuentaRef}><label style={S.fl}>Depositar en</label>
                <select style={fieldErrors?.cuentaId?S.selErr:S.sel} value={formMov.cuentaId||""} onChange={e=>set("cuentaId",parseInt(e.target.value)||null)}>
                  <option value="">— Seleccionar —</option>{cuentas.filter(c=>!c.esReferencia).map(c=><option key={c.id} value={c.id}>{c.nombre} · {fmt(cuentaSaldos[c.id])}</option>)}
                </select>
                {fieldErrors?.cuentaId&&<div style={{fontSize:9,color:"#f87171",marginTop:3}}>⚠ Selecciona cuenta de depósito</div>}
              </div>
            )}
          </>)}
          {isProg&&<div style={S.infoBx("#a78bfa")}><span>⚡</span><span>Programado — cuenta se asigna al confirmar como ejecutado.</span></div>}
          <div style={S.fg}>
            <label style={S.fl}>{formMov.tipoOp==="Ingreso"?"Probabilidad":"Prioridad"}</label>
            <div style={S.prioR}>{[[1,"Alta"],[2,"Media"],[3,"Baja"]].map(([v,l])=><button key={v} style={S.prioB2(formMov.prioridad===v)} onClick={()=>set("prioridad",v)}>{l}</button>)}</div>
          </div>
          <div style={S.fg}><label style={S.fl}>Observaciones</label><textarea style={{...S.inp,minHeight:60,resize:"vertical",lineHeight:1.5}} value={formMov.obs} onChange={e=>set("obs",e.target.value)}/></div>
          {/* Vinculación a Cartera — filtrada por tipo de movimiento */}
          {(formMov.tipoOp==="Egreso"||formMov.tipoOp==="Ingreso")&&(
            <div style={S.fg}>
              <label style={S.fl}>Vincular a Cartera (opcional)</label>
              <select style={S.sel} value={formMov.vinculoTipo?`${formMov.vinculoTipo}:${formMov.vinculoId}`:""}
                onChange={e=>{
                  if(!e.target.value){set("vinculoTipo",null);set("vinculoId",null);}
                  else{const[t,i]=e.target.value.split(":");set("vinculoTipo",t);set("vinculoId",parseInt(i));}
                }}>
                <option value="">— Sin vincular —</option>
                {formMov.tipoOp==="Egreso"&&acreedores.length>0&&(
                  <optgroup label="Acreedores">{acreedores.map(x=><option key={x.id} value={`acreedores:${x.id}`}>{x.nombre||x.concepto}</option>)}</optgroup>
                )}
                {formMov.tipoOp==="Ingreso"&&deudores.length>0&&(
                  <optgroup label="Deudores">{deudores.map(x=><option key={x.id} value={`deudores:${x.id}`}>{x.nombre||x.concepto}</option>)}
                  </optgroup>
                )}
                {formMov.tipoOp==="Ingreso"&&ingresosExt.length>0&&(
                  <optgroup label="Ing. Extraordinarios">{ingresosExt.map(x=><option key={x.id} value={`ingresosExt:${x.id}`}>{x.concepto}</option>)}</optgroup>

              </div>

                      <button style={{...S.prioB2(formMov.tipoAbono==="interes","#f87171"),flex:1,padding:"8px 0",fontSize:10}}

                <button style={{...S.prioB2(recForm.activo),width:42,flex:"none",padding:"4px 0",fontSize:10}} onClick={()=>setRecForm(f=>({...f,activo:!f.activo}))}>{recForm.activo?"ON":"OFF"}</button>
              </div>
              {recForm.activo&&(<>
                <div style={S.fg}><label style={S.fl}>Recurrencia</label>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>{REC_OPTS.map(r=><button key={r} style={{...S.prioB2(recForm.recurrencia===r),flex:"none",padding:"5px 9px",fontSize:9}} onClick={()=>setRecForm(f=>({...f,recurrencia:r}))}>{r}</button>)}</div>
                </div>
                {recForm.recurrencia==="Semanal"&&(
                  <div style={S.fg}><label style={S.fl}>Días</label>
                    <div style={{display:"flex",gap:3}}>{DIAS_SEM.map((d,i)=><button key={i} style={{...S.prioB2(recForm.diasSemana.includes(i)),flex:1,padding:"4px 0",fontSize:8}} onClick={()=>setRecForm(f=>({...f,diasSemana:f.diasSemana.includes(i)?f.diasSemana.filter(x=>x!==i):[...f.diasSemana,i]}))}>{d}</button>)}</div>
                  </div>
                )}
                <div style={{...S.r2,marginBottom:9}}><div><label style={S.fl}>Fecha inicio</label><input style={S.inp} type="date" value={recForm.fechaInicio} onChange={e=>setRecForm(f=>({...f,fechaInicio:e.target.value}))}/></div></div>
                <div style={S.fg}><label style={S.fl}>Termina por</label>
                  <div style={{display:"flex",gap:7,marginBottom:7}}>
                    <button style={{...S.prioB2(recForm.finTipo==="repeticiones"),flex:1,padding:"6px 0",fontSize:10}} onClick={()=>setRecForm(f=>({...f,finTipo:"repeticiones"}))}>Nº veces</button>
                    <button style={{...S.prioB2(recForm.finTipo==="fecha"),flex:1,padding:"6px 0",fontSize:10}} onClick={()=>setRecForm(f=>({...f,finTipo:"fecha"}))}>Fecha límite</button>
                  </div>
                  {recForm.finTipo==="repeticiones"&&<input style={S.inp} type="number" min="1" max="60" value={recForm.finReps} onChange={e=>setRecForm(f=>({...f,finReps:parseInt(e.target.value)||1}))}/>}
                  {recForm.finTipo==="fecha"&&<input style={S.inp} type="date" value={recForm.finFecha} onChange={e=>setRecForm(f=>({...f,finFecha:e.target.value}))}/>}
                </div>
                <div style={{fontSize:9,color:"#475569"}}>Se generarán {recForm.finTipo==="repeticiones"?recForm.finReps:"varios"} movimientos.</div>
              </>)}
            </div>
          )}
        </>)}
        {saveError&&<div style={S.errBox}><span>⛔</span><span>{saveError}</span></div>}
        <button style={S.saveB} onClick={onSave}>{recForm.activo?"GENERAR SERIE":"GUARDAR"}</button>
        <button style={S.cancB} onClick={onClose}>Cancelar</button>
      </div>
    </div>
  );
});

// ─── MODAL PRESUPUESTO ────────────────────────────────────────
function ModalPresupuesto({data,presupuestos,setPresupuestos,sm,sy,onClose}){
  const{catId,subId,nombre,getPres}=data;
  const id=subId||catId;
  const currentVal=getPres(id);
  const[val,setVal]=useState(currentVal?String(currentVal):"");
  const[proyMode,setProyMode]=useState(false);
  // Mes de inicio — por defecto el mes del período activo
  const[startSm,setStartSm]=useState(sm);
  const[startSy,setStartSy]=useState(sy);
  const[endSm,setEndSm]=useState(sm===11?0:sm+1);
  const[endSy,setEndSy]=useState(sm===11?sy+1:sy);
  const prevStartM=()=>{if(startSm===0){setStartSm(11);setStartSy(y=>y-1);}else setStartSm(m=>m-1);};
  const nextStartM=()=>{if(startSm===11){setStartSm(0);setStartSy(y=>y+1);}else setStartSm(m=>m+1);};

  const guardar=(smFin,syFin,smIni,syIni)=>{
    const monto=parseFloat(val)||0;
    setPresupuestos(p=>{
      const n={...p};
      let cm=smIni,cy=syIni;
      while(cy<syFin||(cy===syFin&&cm<=smFin)){
        const k=presKey(id,cm,cy);
        if(monto>0) n[k]=monto; else delete n[k];
        cm++; if(cm>11){cm=0;cy++;}
      }
      return n;
    });
    onClose();
  };

  const prevEndM=()=>{
    if(endSm===0){setEndSm(11);setEndSy(y=>y-1);}else setEndSm(m=>m-1);
  };
  const nextEndM=()=>{
    if(endSm===11){setEndSm(0);setEndSy(y=>y+1);}else setEndSm(m=>m+1);
  };

  return(
    <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={S.mBox}>
        <div style={S.mTit}>🎯 PRESUPUESTO</div>
        <div style={{fontSize:11,color:"#94a3b8",marginBottom:13}}>{nombre} — {MESES_FULL[sm]} {sy}</div>
        <div style={S.fg}><label style={S.fl}>Monto $</label>
          <input style={S.inp} type="number" value={val} onChange={e=>setVal(e.target.value)} placeholder="0.00" autoFocus/>
        </div>
        {/* Opción de proyectar varios meses */}
        {/* Mes de inicio */}
        <div style={{marginBottom:11}}>
          <label style={S.fl}>Mes de inicio</label>
          <div style={S.perBar}>
            <button style={S.perBtn} onClick={prevStartM}>‹</button>
            <span style={S.perLbl}>{MESES_FULL[startSm]} {startSy}</span>
            <button style={S.perBtn} onClick={nextStartM}>›</button>
          </div>
        </div>
        <div style={{border:"1px solid #1e293b",borderRadius:11,padding:13,marginBottom:11}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:proyMode?11:0}}>
            <span style={{fontSize:11,fontWeight:700,color:proyMode?"#C9A84C":"#475569"}}>↻ Proyectar varios meses</span>
            <button style={{...S.prioB2(proyMode),width:42,flex:"none",padding:"4px 0",fontSize:10}} onClick={()=>setProyMode(v=>!v)}>{proyMode?"ON":"OFF"}</button>
          </div>
          {proyMode&&(
            <div>
              <div style={{fontSize:10,color:"#475569",marginBottom:9}}>Desde <strong>{MESES_FULL[startSm]} {startSy}</strong> hasta:</div>
              <div style={S.perBar}>
                <button style={S.perBtn} onClick={prevEndM}>‹</button>
                <span style={S.perLbl}>{MESES_FULL[endSm]} {endSy}</span>
                <button style={S.perBtn} onClick={nextEndM}>›</button>
              </div>
              <div style={{fontSize:9,color:"#475569",marginTop:4}}>
                Se aplicará a {(()=>{let c=0,cm=startSm,cy=startSy;while(cy<endSy||(cy===endSy&&cm<=endSm)){c++;cm++;if(cm>11){cm=0;cy++;}}return c;})() } meses
              </div>
            </div>
          )}
        </div>
        <button style={S.saveB} onClick={()=>proyMode?guardar(endSm,endSy,startSm,startSy):guardar(startSm,startSy,startSm,startSy)}>
          {proyMode?"GUARDAR Y PROYECTAR":"GUARDAR"}
        </button>
        {presupuestos[presKey(id,startSm,startSy)]>0&&(
          <button style={{...S.cancB,color:"#f87171",borderColor:"#f8717144"}} onClick={()=>{
            setPresupuestos(p=>{const n={...p};delete n[presKey(id,startSm,startSy)];return n;});
            onClose();
          }}>Quitar presupuesto de {MESES_FULL[startSm]}</button>
        )}
        <button style={S.cancB} onClick={onClose}>Cancelar</button>
      </div>
    </div>
  );
}

  },[withSaldos,period.inP,retrasados]);

  const stats=useMemo(()=>{
    const real=withSaldos.filter(r=>["INGRESADO","PAGADO"].includes(r.estatus));
    const retSet=new Set(retrasados.map(r=>r.id));
    const progAll=withSaldos.filter(r=>r.estatus==="PROGRAMADO"&&r.enProyeccion);
    const progPer=withSaldos.filter(r=>r.enProyeccion&&r.estatus==="PROGRAMADO"&&(period.inP(r.fecha)||retSet.has(r.id)));
    const saldoReal=cuentas.filter(c=>!c.esReferencia).reduce((s,c)=>s+(cuentaSaldos[c.id]||0),0);
    const ig=x=>x.filter(r=>r.tipoOp==="Ingreso").reduce((s,r)=>s+r.monto,0);
    const eg=x=>x.filter(r=>r.tipoOp==="Egreso").reduce((s,r)=>s+r.monto,0);
    return{totalIngresos:real.filter(r=>r.tipoOp==="Ingreso").reduce((s,r)=>s+r.monto,0),totalEgresos:real.filter(r=>r.tipoOp==="Egreso").reduce((s,r)=>s+r.monto,0),saldoReal,ingEspPer:ig(progPer),egEspPer:eg(progPer),saldoProy_per:saldoReal+ig(progPer)-eg(progPer),saldoProy_total:saldoReal+ig(progAll)-eg(progAll),ingEspTotal:ig(progAll),egEspTotal:eg(progAll)};
  },[withSaldos,cuentaSaldos,retrasados,period.inP]);

  // Estadísticas
  const statData=useMemo(()=>{
    const isMov=r=>["INGRESADO","PAGADO"].includes(r.estatus)&&r.fecha&&statPeriod.inP(r.fecha);
    const egMovs=movs.filter(r=>isMov(r)&&r.tipoOp==="Egreso");
    const ingMovs=movs.filter(r=>isMov(r)&&r.tipoOp==="Ingreso");
    const build=(movArr,catArr)=>{
      const byC={};
      movArr.forEach(r=>{
        const cat=catArr.find(c=>c.id===r.cat);const catNom=cat?.nombre||"Sin categoría";
        if(!byC[r.cat])byC[r.cat]={id:r.cat,nombre:catNom,total:0,subs:{}};
        byC[r.cat].total+=r.monto;
        const sub=cat?.subs?.find(s=>s.id===r.subcat);const subNom=sub?.nombre||"Sin subcategoría";
        if(!byC[r.cat].subs[r.subcat])byC[r.cat].subs[r.subcat]={id:r.subcat,nombre:subNom,total:0};
        byC[r.cat].subs[r.subcat].total+=r.monto;
      });
      return Object.values(byC).sort((a,b)=>b.total-a.total);
    };
    const egArr=build(egMovs,catEg);const ingArr=build(ingMovs,catIng);
    return{egArr,ingArr,totalEg:egArr.reduce((s,c)=>s+c.total,0),totalIng:ingArr.reduce((s,c)=>s+c.total,0)};
  },[movs,catEg,catIng,statPeriod.inP]);

    const saldoInicial=calcSaldoProyFin(movs,cuentas,prioI,prioE,curSm,curSy);
    const meses=[];
    let saldoAcum=saldoInicial;
    for(let i=0;i<proyMeses;i++){
      let sm2=curSm+1+i;let sy2=curSy;
      while(sm2>11){sm2-=12;sy2++;}
      // Sumar todos los presupuestos de ingresos
      const totalIng=catIng.reduce((s,c)=>{
        if(c.subs.length>0)return s+c.subs.reduce((ss,sub)=>ss+(presupuestos[presKey(sub.id,sm2,sy2)]||0),0);
        return s+(presupuestos[presKey(c.id,sm2,sy2)]||0);
      },0);
      // Sumar todos los presupuestos de egresos
      const totalEg=catEg.reduce((s,c)=>{
        if(c.subs.length>0)return s+c.subs.reduce((ss,sub)=>ss+(presupuestos[presKey(sub.id,sm2,sy2)]||0),0);
        return s+(presupuestos[presKey(c.id,sm2,sy2)]||0);
      },0);
      const resultado=totalIng-totalEg;
      const saldoFin=saldoAcum+resultado;
      // Semáforo
      const semaforo=saldoFin<0?"rojo":(saldoFin<saldoAcum*0.2||resultado<0)?"amarillo":"verde";
      // Detalle por categoría
      const detalleIng=catIng.map(c=>{
        const subs=c.subs.map(s=>({...s,pres:presupuestos[presKey(s.id,sm2,sy2)]||0})).filter(s=>s.pres>0);
        const catPres=c.subs.length>0?subs.reduce((s,x)=>s+x.pres,0):(presupuestos[presKey(c.id,sm2,sy2)]||0);
        return{...c,pres:catPres,subs};
      }).filter(c=>c.pres>0);
      const detalleEg=catEg.map(c=>{
        const subs=c.subs.map(s=>({...s,pres:presupuestos[presKey(s.id,sm2,sy2)]||0})).filter(s=>s.pres>0);
        const catPres=c.subs.length>0?subs.reduce((s,x)=>s+x.pres,0):(presupuestos[presKey(c.id,sm2,sy2)]||0);
        return{...c,pres:catPres,subs};
      }).filter(c=>c.pres>0);
      meses.push({sm:sm2,sy:sy2,label:`${MESES_FULL[sm2]} ${sy2}`,labelCorto:`${MESES[sm2]} ${sy2}`,saldoInicial:saldoAcum,totalIng,totalEg,resultado,saldoFin,semaforo,detalleIng,detalleEg});
      saldoAcum=saldoFin;

    if(data.estatus==="PROGRAMADO"&&!data.fecha)errs.fecha=true;

    if(esEfectivo&&data.tipoOp==="Pago Tarjeta"&&!data.tarjetaId)errs.tarjetaId=true;

    if(Object.keys(errs).length>0){setFieldErrors(errs);setSaveError("Completa los campos marcados en rojo.");return;}

    // Validar saldo suficiente
    if(esEfectivo&&!isEditReal){

      if(data.tipoOp==="Transferencia"&&data.cuentaId)cuentaADebitar=data.cuentaId;
      if(data.tipoOp==="Pago Tarjeta"&&data.cuentaId)cuentaADebitar=data.cuentaId;

        if(data.acreedores){setAcreedores(data.acreedores);saveLS('acreedores',data.acreedores);}

        setShowJsonModal(false);
        setView("dashboard");

  const addSub=catId=>{if(!newSubName.trim())return;setCats_(p=>p.map(c=>c.id===catId?{...c,subs:[...c.subs,{id:"s"+Date.now(),nombre:newSubName.trim()}]}:c));setNewSubName("");setAddingSubTo(null);};

  const saveEditCat=catId=>{if(!editingCatName.trim())return;setCats_(p=>p.map(c=>c.id===catId?{...c,nombre:editingCatName.trim()}:c));setEditingCatId(null);setEditingCatName("");};
  const saveEditSub=(catId,subId)=>{if(!editingSubName.trim())return;setCats_(p=>p.map(c=>c.id===catId?{...c,subs:c.subs.map(s=>s.id===subId?{...s,nombre:editingSubName.trim()}:s)}:c));setEditingSubId(null);setEditingSubName("");};

  // Helpers filtro categoría
  const hasCatFilterActive=(filterCatIng!==null&&filterCatIng.size>0)||(filterCatEg!==null&&filterCatEg.size>0);
  const showIngCatFilter=filterTipo==="TODOS"||filterTipo==="Ingreso";
  const showEgCatFilter=filterTipo==="TODOS"||filterTipo==="Egreso";

  const PrioILabel=prioI===3?"Todas":PRIO_LBL[prioI];
  const PrioELabel=prioE===3?"Todas":PRIO_LBL[prioE];
  const inMenuViews=["estadisticas","presupuestos","proyeccion","cuentas","catalogos","configuracion","cartera"];

  // Semáforo color
  const semColor=s=>s==="verde"?"#22c55e":s==="amarillo"?"#fbbf24":"#f87171";
  const semBg=s=>s==="verde"?S.semVerde:s==="amarillo"?S.semAmarillo:S.semRojo;

  // ── RENDER ───────────────────────────────────────────────────

          <div style={{textAlign:"right"}}><div style={{color:"#C9A84C",fontWeight:800,fontSize:12}}>{fmt(stats.saldoReal)}</div><div style={{fontSize:8,color:"#334155"}}>saldo real</div></div>

        {/* ── DASHBOARD ── */}
        {view==="dashboard"&&(

              </div>

            {primerNegativo&&(
              <div style={S.alertRojo}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}><span>🔴</span><span style={{fontSize:11,fontWeight:800,color:"#f87171"}}>Saldo negativo en {period.label()}</span></div>
                <div style={{fontSize:10,color:"#f87171",opacity:.8}}>Primer rojo el <strong>{fmtDate(primerNegativo.fecha)}</strong> → {fmt(primerNegativo.saldoConsolidado)}</div>
              </div>
            )}
            <div style={S.card("rgba(201,168,76,0.25)")}><div style={S.lbl}>Saldo Real</div><div style={S.bigA()}>{fmt(stats.saldoReal)}</div><div style={{fontSize:10,color:"#475569",marginTop:2}}>Suma de cuentas débito</div></div>
            <div style={S.g2}>
              <div style={S.card()}><div style={S.lbl}>Ingresos Reales</div><div style={{fontSize:16,fontWeight:800,color:"#22c55e"}}>{fmt(stats.totalIngresos)}</div></div>
              <div style={S.card()}><div style={S.lbl}>Egresos Reales</div><div style={{fontSize:16,fontWeight:800,color:"#f87171"}}>{fmt(stats.totalEgresos)}</div></div>
            </div>
            <div style={S.card("rgba(167,139,250,0.2)")}>
              <div style={S.lbl}>Proyectado — {period.label()}</div>
              <div style={S.bigA("#a78bfa")}>{fmt(stats.saldoProy_per)}</div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:10}}><span style={{color:"#64748b"}}>+ Ingresos proy.</span><span style={{color:"#22c55e",fontWeight:700}}>{fmt(stats.ingEspPer)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:2,fontSize:10}}><span style={{color:"#64748b"}}>− Egresos proy.</span><span style={{color:"#f87171",fontWeight:700}}>{fmt(stats.egEspPer)}</span></div>
              <div style={S.divider}/>

              <div style={{display:"flex",justifyContent:"space-between",marginTop:2,fontSize:10}}><span style={{color:"#64748b"}}>− Total eg. proy.</span><span style={{color:"#f87171",fontWeight:700}}>{fmt(stats.egEspTotal)}</span></div>
              <div style={{fontSize:9,color:"#475569",marginTop:7}}>Prob.ing: <span style={{color:"#22c55e",fontWeight:700}}>{PrioILabel}</span> · Prior.eg: <span style={{color:"#f87171",fontWeight:700}}>{PrioELabel}</span></div>

              </div>

            <input style={S.srch} value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Buscar concepto, notas o monto…"/>
            <div style={S.chips}>{["TODOS",...TIPO_OP].map(t=><button key={t} style={S.chip(filterTipo===t)} onClick={()=>setFilterTipo(t)}>{t}</button>)}</div>
            <div style={S.chips}>{["TODOS",...ESTATUS_LIST].map(e=><button key={e} style={S.chip(filterEst===e)} onClick={()=>setFilterEst(e)}>{e}</button>)}</div>

                  <div style={{fontSize:8,color:"#475569",marginBottom:1}}>↑ ING REALES</div>

                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:8,color:"#475569",marginBottom:1}}>↓ EG REALES</div>

              {movs.filter(r=>r.estatus==="PENDIENTE").length>0&&filterEst!=="PENDIENTE"&&(
                <div style={{borderTop:"1px solid #1e293b22",paddingTop:5,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontSize:9,color:"#fbbf24"}}>
                    📋 {movs.filter(r=>r.estatus==="PENDIENTE").length} pendiente{movs.filter(r=>r.estatus==="PENDIENTE").length>1?"s":""} sin programar
                  </span>
                  <button style={{fontSize:9,padding:"3px 8px",borderRadius:7,border:"1px solid #fbbf2444",background:"#fbbf2411",color:"#fbbf24",cursor:"pointer",fontWeight:700}}
                    onClick={()=>{setFilterEst("PENDIENTE");setFilterRetrasados(false);setFilterTipo("TODOS");setSearch("");}}>Ver →</button>
                </div>
              )}
            </div>

            <div style={{fontSize:9,color:"#334155",marginBottom:9,display:"flex",gap:5}}>
              {multiMode?<span style={{color:"#C9A84C"}}>{selected.size} selec.</span>:<span>☰ arrastra para reordenar</span>}
              <span style={{marginLeft:"auto"}}>{filtered.length} movimientos</span>

              const isNeg=row.saldoConsolidado<0&&row.enProyeccion;
              const cNom=cuentas.find(c=>c.id===row.cuentaId)?.nombre;
              const cDest=cuentas.find(c=>c.id===row.cuentaDestinoId)?.nombre;
              const tcNom=tarjetas.find(t=>t.id===row.tarjetaId)?.nombre;
              const esProg=["PENDIENTE","PROGRAMADO"].includes(row.estatus);
              const prioColor=row.prioridad===1?"#22c55e":row.prioridad===2?"#fbbf24":"#94a3b8";

                      <span style={{fontSize:12,fontWeight:600,flex:1,marginRight:7,lineHeight:1.3}}>
                        {isRet&&<span style={{fontSize:9,color:"#fbbf24",marginRight:3}} title="Movimiento retrasado: fecha vencida sin ejecutar">⚠</span>}

                    <div style={{display:"flex",gap:4,alignItems:"center",flexWrap:"wrap",marginBottom:2}}>
                      <span style={{fontSize:10,color:isRet?"#fbbf24":"#475569"}}>{row.fecha?fmtDate(row.fecha):"Sin fecha"}</span>
                      {catNom&&<><span style={{color:"#1e293b"}}>·</span><span style={{fontSize:8,color:"#64748b"}}>{catNom}</span></>}
                      {esProg&&<><span style={{color:"#1e293b"}}>·</span><span style={{fontSize:8,fontWeight:700,color:prioColor}}>{row.tipoOp==="Ingreso"?"Prob":"Prior"} {PRIO_LBL[row.prioridad]}</span></>}
                      {tcNom&&<span style={{fontSize:8,color:"#f472b6",background:"#f472b611",padding:"1px 5px",borderRadius:4}}>💳 {tcNom}</span>}
                      {cNom&&!tcNom&&<span style={{fontSize:8,color:"#475569",background:"#1a1a2e",padding:"1px 5px",borderRadius:4}}>{cNom}{cDest?` → ${cDest}`:""}</span>}

                        <button style={S.acBtn("#f87171")} onClick={()=>setConfirmDel({type:"mov",id:row.id})}>✕</button>

            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:11}}>

            <div style={S.perBar}>
              <button style={S.perBtn} onClick={statPeriod.prev}>‹</button>

                              <span style={{fontSize:12,fontWeight:700}}>{cat.nombre}</span>

                            const n=new Set(prev);n.has(sub.id)?n.delete(sub.id):n.add(sub.id);return n;
                          })}>
                          <div style={{width:11,height:11,borderRadius:2,border:`2px solid ${selS?"#22c55e":"#334155"}`,background:selS?"#22c55e":"transparent",flexShrink:0}}/>
                          <span style={{fontSize:10,color:"#94a3b8"}}>{sub.nombre}</span>
                        </div>
                      );})}
                    </div>
                    </div>
                  );
                })}
              </>)}
              {showEgCatFilter&&(<>
                <div style={{fontSize:10,color:"#f87171",fontWeight:700,letterSpacing:1.2,textTransform:"uppercase",marginBottom:7,marginTop:showIngCatFilter?14:0}}>↓ Egresos</div>
                <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                  <button style={S.smBtn(filterCatEg===null?"#f87171":"#475569")} onClick={()=>setFilterCatEg(null)}>Todas</button>
                  <button style={S.smBtn(filterCatEg?.size===0?"#f87171":"#475569")} onClick={()=>setFilterCatEg(new Set())}>Ninguna</button>
                </div>
                {catEg.map(cat=>{
                  const sel=filterCatEg===null||filterCatEg.has(cat.id);
                  return(
                    <div key={cat.id} style={{marginBottom:5}}>
                      <div style={{background:sel?"rgba(248,113,113,0.06)":"#13131f",border:`1px solid ${sel?"#f8717133":"#1e293b"}`,borderRadius:9,overflow:"hidden"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",cursor:"pointer"}}
                        onClick={()=>setFilterCatEg(prev=>{
                          if(prev===null){const n=new Set(catEg.map(c=>c.id));n.delete(cat.id);return n;}
                          const n=new Set(prev);n.has(cat.id)?n.delete(cat.id):n.add(cat.id);return n;
                        })}>
                        <div style={{width:14,height:14,borderRadius:3,border:`2px solid ${sel?"#f87171":"#334155"}`,background:sel?"#f87171":"transparent",flexShrink:0}}/>
                        <span style={{fontSize:12,fontWeight:600}}>{cat.nombre}</span>
                      </div>
                      {cat.subs&&cat.subs.map(sub=>{const selS=filterCatEg===null||filterCatEg.has(sub.id);return(
                        <div key={sub.id} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 10px 5px 30px",cursor:"pointer",borderTop:"1px solid #1e293b22"}}
                          onClick={()=>setFilterCatEg(prev=>{
                            if(prev===null){const n=new Set([...catEg.map(c=>c.id),...catEg.flatMap(c=>c.subs.map(s=>s.id))]);n.delete(sub.id);return n;}
                            const n=new Set(prev);n.has(sub.id)?n.delete(sub.id):n.add(sub.id);return n;
                          })}>
                          <div style={{width:11,height:11,borderRadius:2,border:`2px solid ${selS?"#f87171":"#334155"}`,background:selS?"#f87171":"transparent",flexShrink:0}}/>
                          <span style={{fontSize:10,color:"#94a3b8"}}>{sub.nombre}</span>
                        </div>
                      );})}
                    </div>
                    </div>
                  );
                })}
              </>)}
              <button style={{...S.saveB,marginTop:13}} onClick={()=>setShowCatFilter(false)}>Aplicar filtros</button>
              <button style={S.cancB} onClick={()=>{setFilterCatIng(null);setFilterCatEg(null);setShowCatFilter(false);}}>Limpiar todos</button>
            </div>
          </div>
        )}

        {showMultiEdit&&(
          <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setShowMultiEdit(false);}}>
            <div style={S.mBox}>
              <div style={S.mTit}>✏ EDICIÓN MÚLTIPLE — {selected.size} mov.</div>
              <div style={{fontSize:10,color:"#475569",marginBottom:14}}>Deja vacío lo que no quieras cambiar.</div>
              <div style={S.fg}><label style={S.fl}>Estatus</label><select style={S.sel} value={multiForm.estatus} onChange={e=>setMultiForm(f=>({...f,estatus:e.target.value}))}><option value="">— Sin cambio —</option>{ESTATUS_LIST.map(e=><option key={e} value={e}>{e}</option>)}</select></div>
              <div style={S.fg}><label style={S.fl}>Prioridad</label><select style={S.sel} value={multiForm.prioridad} onChange={e=>setMultiForm(f=>({...f,prioridad:e.target.value}))}><option value="">— Sin cambio —</option><option value="1">Alta</option><option value="2">Media</option><option value="3">Baja</option></select></div>
              <div style={S.fg}><label style={S.fl}>Fecha</label><input style={S.inp} type="date" value={multiForm.fecha} onChange={e=>setMultiForm(f=>({...f,fecha:e.target.value}))}/></div>
              <button style={S.saveB} onClick={applyMultiEdit}>APLICAR</button>
              <button style={S.cancB} onClick={()=>setShowMultiEdit(false)}>Cancelar</button>
            </div>
          </div>
        )}

        {confirmDel&&(
          <div style={S.delCon}>
            <div style={S.delBox}>
              <div style={{fontSize:13,fontWeight:700,color:"#f87171",marginBottom:7}}>{confirmDel.type==="multi"?`¿Eliminar ${selected.size} movimientos?`:"¿Eliminar registro?"}</div>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:18}}>Esta acción no se puede deshacer.</div>
              <button style={{...S.saveB,background:"linear-gradient(135deg,#f87171,#b91c1c)"}} onClick={()=>{
                if(confirmDel.type==="multi"){setMovs(p=>p.filter(r=>!selected.has(r.id)));setSelected(new Set());setMultiMode(false);}
                else if(confirmDel.type==="mov"){doDelete(confirmDel.id);setViewMov(null);setShowMov(false);}
                else if(confirmDel.type==="cuenta")setCuentas(p=>p.filter(c=>c.id!==confirmDel.id));
                else if(confirmDel.type==="tc")setTarjetas(p=>p.filter(t=>t.id!==confirmDel.id));
                setConfirmDel(null);
              }}>Sí, eliminar</button>
              <button style={S.cancB} onClick={()=>{setConfirmDel(null);setViewMov(null);setShowMov(false);}}>Cancelar</button>
            </div>
          </div>
        )}

        {serieConfirm&&(
          <div style={S.delCon}>
            <div style={{...S.delBox,border:"1px solid #a78bfa44"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#a78bfa",marginBottom:7}}>↻ Movimiento en serie</div>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:18}}>{serieConfirm.action==="edit"?"¿Editar solo este o toda la serie?":"¿Eliminar solo este o toda la serie?"}</div>
              <button style={{...S.saveB,background:"linear-gradient(135deg,#a78bfa,#7c3aed)",marginBottom:7}} onClick={()=>applySerieConfirm("one")}>Solo este</button>
              <button style={{...S.saveB,background:"linear-gradient(135deg,#f87171,#b91c1c)"}} onClick={()=>applySerieConfirm("all")}>Toda la serie</button>
              <button style={S.cancB} onClick={()=>setSerieConfirm(null)}>Cancelar</button>
            </div>
          </div>
        )}

        {showReset&&(
          <div style={S.delCon}>
            <div style={S.delBox}>
              {resetPhase===1&&<><div style={{fontSize:13,fontWeight:700,color:"#f87171",marginBottom:7}}>⚠ Eliminar movimientos</div><div style={{fontSize:11,color:"#94a3b8",marginBottom:14}}>Cuentas y tarjetas se conservan.</div><button style={{...S.saveB,background:"linear-gradient(135deg,#f87171,#b91c1c)"}} onClick={()=>setResetPhase(2)}>Continuar</button><button style={S.cancB} onClick={()=>{setShowReset(false);setResetPhase(0);}}>Cancelar</button></>}
              {resetPhase===2&&<><div style={{fontSize:13,fontWeight:700,color:"#f87171",marginBottom:7}}>⛔ Confirmación final</div><div style={{fontSize:11,color:"#94a3b8",marginBottom:11}}>Escribe <span style={{color:"#f87171",fontWeight:700}}>CONFIRMAR</span></div><input style={{...S.inp,marginBottom:11,borderColor:"#f8717144"}} value={resetInput} onChange={e=>setResetInput(e.target.value)} placeholder="CONFIRMAR"/><button style={{...S.saveB,background:resetInput==="CONFIRMAR"?"linear-gradient(135deg,#f87171,#b91c1c)":"#1e293b",color:resetInput==="CONFIRMAR"?"#fff":"#475569"}} onClick={()=>{if(resetInput==="CONFIRMAR"){setMovs([]);setShowReset(false);setResetPhase(0);setResetInput("");}}}>Borrar todo</button><button style={S.cancB} onClick={()=>{setShowReset(false);setResetPhase(0);setResetInput("");}}>Cancelar</button></>}
            </div>
          </div>
        )}

        {showExportModal&&(
          <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setShowExportModal(false);}}>
            <div style={S.mBox}>
              <div style={S.mTit}>📥 EXPORTAR A EXCEL</div>
              <div style={S.fg}><label style={S.fl}>Período</label>
                <div style={{display:"flex",gap:7,marginBottom:9}}>
                  <button style={{...S.prioB2(exportPeriod.mode==="mes"),flex:1,padding:"8px 0",fontSize:11}} onClick={()=>setExportPeriod(p=>({...p,mode:"mes"}))}>Mensual</button>
                  <button style={{...S.prioB2(exportPeriod.mode==="anio"),flex:1,padding:"8px 0",fontSize:11}} onClick={()=>setExportPeriod(p=>({...p,mode:"anio"}))}>Anual</button>
                </div>
                {exportPeriod.mode==="mes"&&<div style={S.perBar}><button style={S.perBtn} onClick={()=>setExportPeriod(p=>{const sm=p.sm===0?11:p.sm-1;const sy=p.sm===0?p.sy-1:p.sy;return{...p,sm,sy};})}>‹</button><span style={S.perLbl}>{MESES_FULL[exportPeriod.sm]} {exportPeriod.sy}</span><button style={S.perBtn} onClick={()=>setExportPeriod(p=>{const sm=p.sm===11?0:p.sm+1;const sy=p.sm===11?p.sy+1:p.sy;return{...p,sm,sy};})}>›</button></div>}
                {exportPeriod.mode==="anio"&&<div style={S.perBar}><button style={S.perBtn} onClick={()=>setExportPeriod(p=>({...p,sy:p.sy-1}))}>‹</button><span style={S.perLbl}>{exportPeriod.sy}</span><button style={S.perBtn} onClick={()=>setExportPeriod(p=>({...p,sy:p.sy+1}))}>›</button></div>}
              </div>
              <button style={S.saveB} onClick={()=>exportExcel(exportPeriod.sm,exportPeriod.sy,exportPeriod.mode)}>📥 DESCARGAR EXCEL</button>
              <button style={S.cancB} onClick={()=>setShowExportModal(false)}>Cancelar</button>
            </div>
          </div>
        )}


        {showJsonModal&&(
          <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setShowJsonModal(false);}}>
            <div style={S.mBox}>
              <div style={S.mTit}>📂 IMPORTAR DATOS</div>
              <div style={{...S.infoBx("#fbbf24"),marginBottom:13}}><span>⚠</span><span>Esto reemplazará TODOS los datos actuales. Asegúrate de exportar primero si tienes información importante.</span></div>
              <div style={{background:"#13131f",border:"2px dashed #1e293b",borderRadius:11,padding:"22px 14px",textAlign:"center",marginBottom:11}}>
                <div style={{fontSize:22,marginBottom:7}}>📄</div>
                <div style={{fontSize:11,color:"#94a3b8",marginBottom:11}}>Selecciona el archivo JSON exportado desde Nexus Finanzas</div>
                <label style={{...S.saveB,display:"inline-block",cursor:"pointer",textAlign:"center",marginTop:0}}>
                  SELECCIONAR ARCHIVO
                  <input type="file" accept=".json" style={{display:"none"}} onChange={importJSON}/>
                </label>
              </div>
              {jsonImportError&&<div style={S.errBox}><span>⛔</span><span>{jsonImportError}</span></div>}
              <button style={S.cancB} onClick={()=>setShowJsonModal(false)}>Cancelar</button>
            </div>
          </div>
        )}


        {viewMov&&(()=>{
          const row=viewMov;
          const cats=row.tipoOp==="Ingreso"?catIng:catEg;
          const catNom=cats.find(c=>c.id===row.cat)?.nombre||"";
          const subNom=cats.find(c=>c.id===row.cat)?.subs?.find(s=>s.id===row.subcat)?.nombre||"";
          const cNom2=cuentas.find(c=>c.id===row.cuentaId)?.nombre||"";
          const cDest2=cuentas.find(c=>c.id===row.cuentaDestinoId)?.nombre||"";
          const tcNom2=tarjetas.find(t=>t.id===row.tarjetaId)?.nombre||"";
          const prioColor=row.prioridad===1?"#22c55e":row.prioridad===2?"#fbbf24":"#94a3b8";
          return(
            <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setViewMov(null);}}>
              <div style={S.mBox}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <div style={S.mTit}>👁 DETALLE</div>
                  <button style={{background:"none",border:"none",color:"#475569",fontSize:18,cursor:"pointer"}} onClick={()=>setViewMov(null)}>✕</button>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:13}}>
                  <div style={{flex:1,marginRight:10}}>
                    <div style={{fontSize:15,fontWeight:800,color:"#e2e8f0",lineHeight:1.3,marginBottom:5}}>{row.concepto}</div>
                    <span style={S.badge(row.estatus)}>{row.estatus}</span>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:9,color:"#64748b",marginBottom:2}}>{row.tipoOp}</div>
                    <div style={{fontSize:22,fontWeight:800,color:OP_COLORS[row.tipoOp]||"#94a3b8"}}>{row.tipoOp==="Ingreso"?"+":row.tipoOp==="Egreso"?"−":""}{fmt(row.monto)}</div>
                  </div>
                </div>
                <div style={{background:"#13131f",borderRadius:11,padding:"11px 13px",marginBottom:11}}>
                  {[
                    ["Fecha", row.fecha?fmtDate(row.fecha):"Sin fecha"],
                    ["Categoría", [catNom,subNom].filter(Boolean).join(" › ")||"—"],
                    row.tipoOp!=="Transferencia"&&row.tipoOp!=="Pago Tarjeta"?["Prioridad/Prob.", PRIO_LBL[row.prioridad]||"—"]:null,
                    cNom2?["Cuenta", cDest2?`${cNom2} → ${cDest2}`:cNom2]:null,
                    tcNom2?["Tarjeta", tcNom2]:null,
                    row.obs?["Observaciones", row.obs]:null,
                    row.serieId?["Serie", "Movimiento repetitivo"]:null,
                  ].filter(Boolean).map(([lbl,val])=>(
                    <div key={lbl} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"5px 0",borderBottom:"1px solid #1e293b"}}>
                      <span style={{fontSize:10,color:"#64748b",flexShrink:0,marginRight:10}}>{lbl}</span>
                      <span style={{fontSize:11,color:"#e2e8f0",fontWeight:600,textAlign:"right",wordBreak:"break-word",maxWidth:"60%"}}>{val}</span>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",gap:8,marginTop:4}}>
                  <button style={{...S.saveB,flex:1,marginTop:0,background:"rgba(201,168,76,0.15)",color:"#C9A84C",border:"1px solid #C9A84C44"}} onClick={()=>{setViewMov(null);openEditMov(row);}}>✏ Editar</button>
                  <button style={{...S.saveB,flex:1,marginTop:0,background:"rgba(96,165,250,0.15)",color:"#60a5fa",border:"1px solid #60a5fa44"}} onClick={()=>copyMov(row)}>⧉ Copiar</button>
                </div>
                <button style={S.cancB} onClick={()=>setViewMov(null)}>Cerrar</button>
              </div>
            </div>
          );
        })()}

        {multiMode&&selected.size>0&&(
          <div style={S.multiBar}>
            <span style={{fontSize:10,color:"#C9A84C",fontWeight:700,flex:1}}>{selected.size} selec.</span>
            <button style={S.acBtn("#C9A84C")} onClick={()=>setShowMultiEdit(true)}>✏ Editar</button>
            <button style={S.acBtn("#f87171")} onClick={()=>setConfirmDel({type:"multi"})}>✕ Eliminar</button>
            <button style={S.acBtn("#475569")} onClick={()=>{setMultiMode(false);setSelected(new Set());}}>Salir</button>
          </div>
        )}

        {view==="movimientos"&&!multiMode&&<button style={S.fab} onClick={openNewMov}>+</button>}
        {view==="cuentas"&&<button style={S.fab} onClick={openNewCuenta}>+</button>}

        <nav style={S.nav}>
          {[{id:"dashboard",icon:"◈",label:"Resumen"},{id:"movimientos",icon:"≡",label:"Movimientos"},{id:"menu",icon:"···",label:"Menú"}].map(n=>(
            <button key={n.id} style={S.navB(view===n.id||(inMenuViews.includes(view)&&n.id==="menu"))} onClick={()=>setView(n.id)}>
              <span style={{fontSize:16}}>{n.icon}</span>{n.label}
            </button>
          ))}
        </nav>
      </div>
    </>
  );
}


ReactDOM.render(React.createElement(App), document.getElementById('root'));

  </script>
  <script>
    // Ocultar loading cuando React haya renderizado
    window.addEventListener('load', function() {
      setTimeout(function(){
        var l = document.getElementById('loading');
        if(l) l.style.display='none';
      }, 800);
    });
  </script>
</body>
</html>
