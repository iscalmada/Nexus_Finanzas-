// ─── HELPERS ─────────────────────────────────────────────────
const fmt      = n=>new Intl.NumberFormat("es-MX",{style:"currency",currency:"MXN",minimumFractionDigits:2}).format(n||0);
const fmtShort = n=>{const v=Math.abs(n||0);if(v>=1000000)return`$${(v/1e6).toFixed(1)}M`;if(v>=1000)return`$${(v/1000).toFixed(1)}k`;return fmt(n);};
const fmtDate  = d=>{if(!d)return"";const[y,m,day]=d.split("-");return`${day}/${m}/${y}`;};
const todayStr = ()=>new Date().toISOString().split("T")[0];
const addD     = (d,n)=>{const dt=new Date(d+"T12:00:00");dt.setDate(dt.getDate()+n);return dt.toISOString().split("T")[0];};
const addM_    = (d,n)=>{const dt=new Date(d+"T12:00:00");dt.setMonth(dt.getMonth()+n);return dt.toISOString().split("T")[0];};
const addY_    = (d,n)=>{const dt=new Date(d+"T12:00:00");dt.setFullYear(dt.getFullYear()+n);return dt.toISOString().split("T")[0];};
const mesKey   = (sm,sy)=>`_${sm+1}_${sy}`;
const presKey  = (id,sm,sy)=>`${id}${mesKey(sm,sy)}`;

function estatusParaTipo(tipoOp){
  if(tipoOp==="Ingreso")      return ESTATUS_LIST.filter(e=>e!=="PAGADO");
  if(tipoOp==="Egreso")       return ESTATUS_LIST.filter(e=>e!=="INGRESADO");
  if(tipoOp==="Pago Tarjeta") return ESTATUS_LIST.filter(e=>e!=="INGRESADO");
  return ESTATUS_LIST;
}

function generarFechas(rec){
  const fechas=[];let cur=rec.fechaInicio;
  for(let i=0;i<500;i++){
    if(rec.finTipo==="fecha"&&cur>rec.finFecha)break;
    if(rec.recurrencia==="Diaria"){fechas.push(cur);cur=addD(cur,1);}
    else if(rec.recurrencia==="Semanal"){
      const dow=rec.diasSemana.length?rec.diasSemana:[new Date(cur+"T12:00:00").getDay()];
      let d=cur;for(let w=0;w<7;w++){if(dow.includes(new Date(d+"T12:00:00").getDay()))fechas.push(d);d=addD(d,1);}
      cur=addD(cur,7);
    }
    else if(rec.recurrencia==="Quincenal"){fechas.push(cur);cur=addD(cur,15);}
    else if(rec.recurrencia==="Mensual")  {fechas.push(cur);cur=addM_(cur,1);}
    else if(rec.recurrencia==="Anual")    {fechas.push(cur);cur=addY_(cur,1);}
    if(fechas.length>=(rec.finTipo==="repeticiones"?rec.finReps:500))break;
  }
  return fechas.slice(0,rec.finTipo==="repeticiones"?rec.finReps:undefined);
}

// ─── SALDOS ──────────────────────────────────────────────────
function calcConsolidado(movs,pI,pE){
  const sorted=[...movs].filter(r=>r.fecha).sort((a,b)=>a.fecha!==b.fecha?a.fecha.localeCompare(b.fecha):a.orden-b.orden);
  let s=0;
  return sorted.map(r=>{
    const real=["INGRESADO","PAGADO"].includes(r.estatus);
    const prog=r.estatus==="PROGRAMADO";
    let cuenta=false;
    if(real)cuenta=true;
    if(prog){if(r.tipoOp==="Ingreso"&&r.prioridad<=(pI||3))cuenta=true;if(r.tipoOp==="Egreso"&&r.prioridad<=(pE||3))cuenta=true;}
    if(cuenta){if(r.tipoOp==="Ingreso")s+=r.monto||0;else if(r.tipoOp==="Egreso")s-=r.monto||0;}
    return{...r,saldoConsolidado:s,enProyeccion:cuenta};
  });
}
function calcCuentaSaldos(cuentas,movs){
  const s={};cuentas.forEach(c=>{s[c.id]=c.saldoInicial||0;});
  [...movs].filter(r=>r.fecha).sort((a,b)=>a.fecha!==b.fecha?a.fecha.localeCompare(b.fecha):a.orden-b.orden).forEach(r=>{
    if(!["INGRESADO","PAGADO"].includes(r.estatus))return;
    if(r.tipoOp==="Ingreso"&&r.cuentaId&&!r.usaTarjeta)s[r.cuentaId]=(s[r.cuentaId]||0)+(r.monto||0);
    if(r.tipoOp==="Egreso" &&r.cuentaId&&!r.usaTarjeta)s[r.cuentaId]=(s[r.cuentaId]||0)-(r.monto||0);
    if(r.tipoOp==="Transferencia"){if(r.cuentaId)s[r.cuentaId]=(s[r.cuentaId]||0)-(r.monto||0);if(r.cuentaDestinoId)s[r.cuentaDestinoId]=(s[r.cuentaDestinoId]||0)+(r.monto||0);}
    if(r.tipoOp==="Pago Tarjeta"&&r.cuentaId)s[r.cuentaId]=(s[r.cuentaId]||0)-(r.monto||0);
  });
  return s;
}
function calcTarjetaSaldos(tarjetas,movs){
  const s={};tarjetas.forEach(t=>{s[t.id]=t.saldoDeudorInicial||0;});
  [...movs].filter(r=>r.fecha).sort((a,b)=>a.fecha!==b.fecha?a.fecha.localeCompare(b.fecha):a.orden-b.orden).forEach(r=>{
    if(!["INGRESADO","PAGADO"].includes(r.estatus))return;
    if(r.tipoOp==="Egreso"&&r.usaTarjeta&&r.tarjetaId)s[r.tarjetaId]=(s[r.tarjetaId]||0)+(r.monto||0);
    if(r.tipoOp==="Pago Tarjeta"&&r.tarjetaId)s[r.tarjetaId]=(s[r.tarjetaId]||0)-(r.monto||0);
  });
  return s;
}
function calcSaldoCuentaAntesDe(cuentaId,movId,movs,cuentas){
  let s=cuentas.find(c=>c.id===cuentaId)?.saldoInicial||0;
  [...movs].filter(r=>r.fecha&&r.id!==movId).sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach(r=>{
    if(!["INGRESADO","PAGADO"].includes(r.estatus))return;
    if(r.tipoOp==="Ingreso"&&r.cuentaId===cuentaId&&!r.usaTarjeta)s+=(r.monto||0);
    if(r.tipoOp==="Egreso" &&r.cuentaId===cuentaId&&!r.usaTarjeta)s-=(r.monto||0);
    if(r.tipoOp==="Transferencia"){if(r.cuentaId===cuentaId)s-=(r.monto||0);if(r.cuentaDestinoId===cuentaId)s+=(r.monto||0);}
    if(r.tipoOp==="Pago Tarjeta"&&r.cuentaId===cuentaId)s-=(r.monto||0);
  });
  return s;
}

// Saldo proyectado al cierre de un mes (para saldo inicial de Proyección Presupuestal)
function calcSaldoProyFin(movs,cuentas,pI,pE,sm,sy){
  const withS=calcConsolidado(movs,pI,pE);
  const endDate=`${sy}-${String(sm+1).padStart(2,"0")}-31`;
  const relevant=withS.filter(r=>r.fecha&&r.fecha<=endDate&&r.enProyeccion);
  if(!relevant.length){
    return Object.values(calcCuentaSaldos(cuentas,movs)).reduce((s,v)=>s+v,0);
  }
  return relevant[relevant.length-1].saldoConsolidado;
}

// ─── DRAG ────────────────────────────────────────────────────
function useDrag(setMovs){
  const dR=useRef(null),oR=useRef(null),snR=useRef(null);
  const[aId,setAId]=useState(null),[oViz,setOViz]=useState(null);
  const start=(id,sn)=>{dR.current=id;snR.current=sn;setAId(id);};
  const enter=id=>{oR.current=id;setOViz(id);};
  const commit=useCallback(()=>{
    const f=snR.current?.find(r=>r.id===dR.current),t=snR.current?.find(r=>r.id===oR.current);
    if(f&&t&&f.id!==t.id)setMovs(p=>p.map(r=>r.id===f.id?{...r,orden:t.orden,fecha:t.fecha}:r.id===t.id?{...r,orden:f.orden,fecha:f.fecha}:r));
    dR.current=null;oR.current=null;snR.current=null;setAId(null);setOViz(null);
  },[setMovs]);
  const tm=useCallback(e=>{
    if(!dR.current)return;e.preventDefault();
    const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY)?.closest("[data-movid]");
    if(el){const oid=parseInt(el.dataset.movid);if(oid&&oid!==dR.current){oR.current=oid;setOViz(oid);}}
  },[]);
  return{aId,oViz,start,enter,commit,tm};
}
function useCatDrag(setCats){
  const dR=useRef(null),oR=useRef(null);
  const[aId,setAId]=useState(null),[oViz,setOViz]=useState(null);
  const start=id=>{dR.current=id;setAId(id);};
  const enter=id=>{oR.current=id;setOViz(id);};
  const commit=useCallback(()=>{
    if(dR.current&&oR.current&&dR.current!==oR.current){
      setCats(p=>{const arr=[...p];const fi=arr.findIndex(c=>c.id===dR.current);const ti=arr.findIndex(c=>c.id===oR.current);if(fi!==-1&&ti!==-1){const[el]=arr.splice(fi,1);arr.splice(ti,0,el);}return arr;});
    }
    dR.current=null;oR.current=null;setAId(null);setOViz(null);
  },[setCats]);
  return{aId,oViz,start,enter,commit};
}

// ─── PERIODS ─────────────────────────────────────────────────
function usePeriod(){
  const now=new Date();
  const[mode,setMode]=useState("mes");
  const[sm,setSm]=useState(now.getMonth());
  const[sy,setSy]=useState(now.getFullYear());
  const[fr,setFr]=useState(todayStr());
  const[to,setTo]=useState(todayStr());
  const inP=useCallback(d=>{
    if(!d)return false;
    if(mode==="mes"){const[y,m]=d.split("-").map(Number);return y===sy&&m-1===sm;}
    if(mode==="anio")return d.startsWith(String(sy));
    return d>=fr&&d<=to;
  },[mode,sm,sy,fr,to]);
  const label=()=>mode==="mes"?`${MESES_FULL[sm]} ${sy}`:mode==="anio"?`Año ${sy}`:`${fmtDate(fr)}–${fmtDate(to)}`;
  const prev=()=>{if(mode==="mes"){setSm(m=>{if(m===0){setSy(y=>y-1);return 11;}return m-1;});}if(mode==="anio")setSy(y=>y-1);};
  const next=()=>{if(mode==="mes"){setSm(m=>{if(m===11){setSy(y=>y+1);return 0;}return m+1;});}if(mode==="anio")setSy(y=>y+1);};
  return{mode,setMode,sm,sy,setSm,setSy,fr,setFr,to,setTo,inP,label,prev,next};
}
function usePeriodMes(){
  const now=new Date();
  const[sm,setSm]=useState(now.getMonth());
  const[sy,setSy]=useState(now.getFullYear());
  const inP=useCallback(d=>{if(!d)return false;const[y,m]=d.split("-").map(Number);return y===sy&&m-1===sm;},[sm,sy]);
  const label=()=>`${MESES_FULL[sm]} ${sy}`;
  const prev=()=>setSm(m=>{if(m===0){setSy(y=>y-1);return 11;}return m-1;});
  const next=()=>setSm(m=>{if(m===11){setSy(y=>y+1);return 0;}return m+1;});
  return{sm,sy,inP,label,prev,next};
}

// ─── BUDGET BAR ───────────────────────────────────────────────
function BudgetBar({gasto,presupuesto,color="#C9A84C",esIngreso=false}){
  if(!presupuesto)return null;
  const pct=gasto/presupuesto;
  const over=gasto>presupuesto;
  const c=over?(esIngreso?"#22c55e":"#f87171"):(pct>0.8?(esIngreso?"#22c55e":"#fbbf24"):color);
  let etiqueta;
  if(esIngreso){
    if(over) etiqueta=<span style={{color:"#22c55e",fontWeight:700}}>✓ Meta alcanzada</span>;
    else etiqueta=<span style={{color:"#fbbf24"}}>Falta para meta {fmt(presupuesto-gasto)}</span>;
  } else {
    if(over) etiqueta=<span style={{color:"#f87171"}}>Exceso {fmt(gasto-presupuesto)}</span>;
    else etiqueta=<span style={{color:"#22c55e"}}>Disponible {fmt(presupuesto-gasto)}</span>;
  }
  return(
    <div>
      <div style={{height:5,borderRadius:3,background:"#1e293b",overflow:"hidden",marginTop:5}}>
        <div style={{height:"100%",borderRadius:3,background:c,width:`${Math.min(pct/1.2,1)*100}%`,transition:"width 0.4s"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#475569",marginTop:2}}>
        <span style={{color:c,fontWeight:700}}>{Math.round(pct*100)}%</span>
        {etiqueta}
      </div>
    </div>
  );
}

    const esProg2=["PENDIENTE","PROGRAMADO"].includes(val);

        {!editMovId&&(

            <label style={S.fl}>Tipo</label>

                    const newEst=estatusParaTipo(op).includes(f.estatus)?f.estatus:estatusParaTipo(op)[0];

                  })}>

        {/* TRANSFERENCIA */}
        {isT&&(<>
          <div style={S.infoBx("#a78bfa")}><span>⇄</span><span>Mueve saldo entre cuentas.</span></div>
          <div style={S.fg}><label style={S.fl}>Concepto</label><input style={S.inp} value={formMov.concepto} onChange={e=>set("concepto",e.target.value)} placeholder="Traspaso…"/></div>

          </div>
          <div style={S.fg} ref={cuentaRef}><label style={S.fl}>Cuenta Origen</label>
            <select style={fieldErrors?.cuentaId?S.selErr:S.sel} value={formMov.cuentaId||""} onChange={e=>set("cuentaId",parseInt(e.target.value)||null)}>
              <option value="">— Seleccionar —</option>{cuentas.map(c=><option key={c.id} value={c.id}>{c.nombre} ({fmt(cuentaSaldos[c.id])})</option>)}
            </select>
          </div>
          <div style={S.fg}><label style={S.fl}>Cuenta Destino</label>
            <select style={S.sel} value={formMov.cuentaDestinoId||""} onChange={e=>set("cuentaDestinoId",parseInt(e.target.value)||null)}>
              <option value="">— Seleccionar —</option>{cuentas.filter(c=>c.id!==formMov.cuentaId).map(c=><option key={c.id} value={c.id}>{c.nombre} ({fmt(cuentaSaldos[c.id])})</option>)}

// ─── MODAL PRESUPUESTO ────────────────────────────────────────
function ModalPresupuesto({data,presupuestos,setPresupuestos,sm,sy,onClose}){
  const{catId,subId,nombre,getPres}=data;
  const id=subId||catId;
  const currentVal=getPres(id);
  const[val,setVal]=useState(currentVal?String(currentVal):"");
  const[proyMode,setProyMode]=useState(false);
  const[endSm,setEndSm]=useState(sy===new Date().getFullYear()&&sm===new Date().getMonth()?sm+1:sm);
  const[endSy,setEndSy]=useState(sy+(sm>=11?1:0));

  const guardar=(smFin,syFin)=>{
    const monto=parseFloat(val)||0;
    setPresupuestos(p=>{
      const n={...p};
      let cm=sm,cy=sy;
      while(cy<syFin||(cy===syFin&&cm<=smFin)){
        const k=presKey(id,cm,cy);
        if(monto>0) n[k]=monto; else delete n[k];
        cm++; if(cm>11){cm=0;cy++;}
      }
      return n;
    });
    onClose();
  };

  const prevEndM=()=>{
    if(endSm===0){setEndSm(11);setEndSy(y=>y-1);}else setEndSm(m=>m-1);
  };
  const nextEndM=()=>{
    if(endSm===11){setEndSm(0);setEndSy(y=>y+1);}else setEndSm(m=>m+1);
  };

  return(
    <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={S.mBox}>
        <div style={S.mTit}>🎯 PRESUPUESTO</div>
        <div style={{fontSize:11,color:"#94a3b8",marginBottom:13}}>{nombre} — {MESES_FULL[sm]} {sy}</div>
        <div style={S.fg}><label style={S.fl}>Monto $</label>
          <input style={S.inp} type="number" value={val} onChange={e=>setVal(e.target.value)} placeholder="0.00" autoFocus/>
        </div>
        {/* Opción de proyectar varios meses */}
        <div style={{border:"1px solid #1e293b",borderRadius:11,padding:13,marginBottom:11}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:proyMode?11:0}}>
            <span style={{fontSize:11,fontWeight:700,color:proyMode?"#C9A84C":"#475569"}}>↻ Proyectar varios meses</span>
            <button style={{...S.prioB2(proyMode),width:42,flex:"none",padding:"4px 0",fontSize:10}} onClick={()=>setProyMode(v=>!v)}>{proyMode?"ON":"OFF"}</button>
          </div>
          {proyMode&&(
            <div>
              <div style={{fontSize:10,color:"#475569",marginBottom:9}}>El mismo monto se aplicará desde <strong>{MESES_FULL[sm]} {sy}</strong> hasta:</div>
              <div style={S.perBar}>
                <button style={S.perBtn} onClick={prevEndM}>‹</button>
                <span style={S.perLbl}>{MESES_FULL[endSm]} {endSy}</span>
                <button style={S.perBtn} onClick={nextEndM}>›</button>
              </div>
              <div style={{fontSize:9,color:"#475569",marginTop:4}}>
                Se aplicará a {(()=>{let c=0,cm=sm,cy=sy;while(cy<endSy||(cy===endSy&&cm<=endSm)){c++;cm++;if(cm>11){cm=0;cy++;}}return c;})() } meses
              </div>
            </div>
          )}
        </div>
        <button style={S.saveB} onClick={()=>proyMode?guardar(endSm,endSy):guardar(sm,sy)}>
          {proyMode?"GUARDAR Y PROYECTAR":"GUARDAR"}
        </button>
        {currentVal>0&&(
          <button style={{...S.cancB,color:"#f87171",borderColor:"#f8717144"}} onClick={()=>{
            setPresupuestos(p=>{const n={...p};delete n[presKey(id,sm,sy)];return n;});
            onClose();
          }}>Sin presupuesto este mes</button>
        )}
        <button style={S.cancB} onClick={onClose}>Cancelar</button>
      </div>
    </div>
  );
}

  const subIdsOf=useCallback((catIds,cats)=>{

    const subs=new Set();
    cats.forEach(c=>{if(catIds.has(c.id))c.subs.forEach(s=>subs.add(s.id));});
    return subs;
  },[]);

  // ── filtered con filtro categoría ──

    const subIng=subIdsOf(filterCatIng,catIng);
    const subEg=subIdsOf(filterCatEg,catEg);

    return withSaldos
      .filter(r=>{
        // PENDIENTES: solo visibles cuando filterEst es explícitamente "PENDIENTE"
        if(r.estatus==="PENDIENTE") return filterEst==="PENDIENTE";
        if(filterRetrasados) return retSet.has(r.id);
        return retSet.has(r.id)||period.inP(r.fecha);
      })
      .filter(r=>filterTipo==="TODOS"||r.tipoOp===filterTipo)

      .filter(r=>!search||r.concepto.toLowerCase().includes(search.toLowerCase())||(r.obs||"").toLowerCase().includes(search.toLowerCase())||(r.monto+"").includes(search))

        if(r.tipoOp==="Transferencia"||r.tipoOp==="Pago Tarjeta") return !hasCatFilter;

        if(r.tipoOp==="Egreso"&&hasCatEg)  return filterCatEg.has(r.cat)||(subEg&&subEg.has(r.subcat));
        if(r.tipoOp==="Ingreso"&&!hasCatIng) return true;
        if(r.tipoOp==="Egreso"&&!hasCatEg)   return true;
        return true;
      });
  },[withSaldos,filterRetrasados,retrasados,period.inP,filterTipo,filterEst,search,filterCatIng,filterCatEg,catIng,catEg,subIdsOf]);

  // Totales filtrados — respeta todos los filtros activos, divide Reales y Proyectados

    const retSet=new Set(retrasados.map(r=>r.id));

  },[withSaldos,cuentaSaldos,retrasados,period.inP]);

  // Estadísticas

    const build=(movArr,catArr)=>{
      const byC={};

        byC[r.cat].total+=r.monto;

        byC[r.cat].subs[r.subcat].total+=r.monto;
      });
      return Object.values(byC).sort((a,b)=>b.total-a.total);
    };
    const egArr=build(egMovs,catEg);const ingArr=build(ingMovs,catIng);
    return{egArr,ingArr,totalEg:egArr.reduce((s,c)=>s+c.total,0),totalIng:ingArr.reduce((s,c)=>s+c.total,0)};
  },[movs,catEg,catIng,statPeriod.inP]);

  const evolucionData=useMemo(()=>{
    const arr=[];const now=new Date();
    for(let i=7;i>=0;i--){
      const d=new Date(now.getFullYear(),now.getMonth()-i,1);const mes=d.getMonth();const anio=d.getFullYear();
      const inP2=r=>{if(!r.fecha)return false;const[y,m]=r.fecha.split("-").map(Number);return y===anio&&m-1===mes;};
      const real=movs.filter(r=>["INGRESADO","PAGADO"].includes(r.estatus)&&inP2(r));
      arr.push({name:MESES[mes],ing:real.filter(r=>r.tipoOp==="Ingreso").reduce((s,r)=>s+r.monto,0),eg:real.filter(r=>r.tipoOp==="Egreso").reduce((s,r)=>s+r.monto,0)});
    }
    return arr;
  },[movs]);

  // Presupuestos
  const budgetData=useMemo(()=>{
    const isMov=r=>["INGRESADO","PAGADO"].includes(r.estatus)&&r.fecha&&budgetPeriod.inP(r.fecha);
    const gastosEg={};const gastosIng={};
    movs.filter(isMov).forEach(r=>{
      if(r.tipoOp==="Egreso"){gastosEg[r.cat]=(gastosEg[r.cat]||0)+r.monto;if(r.subcat)gastosEg[r.subcat]=(gastosEg[r.subcat]||0)+r.monto;}
      if(r.tipoOp==="Ingreso"){gastosIng[r.cat]=(gastosIng[r.cat]||0)+r.monto;if(r.subcat)gastosIng[r.subcat]=(gastosIng[r.subcat]||0)+r.monto;}
    });
    const getPres=id=>presupuestos[presKey(id,budgetPeriod.sm,budgetPeriod.sy)]||0;
    return{gastosEg,gastosIng,getPres};
  },[movs,budgetPeriod.sm,budgetPeriod.sy,budgetPeriod.inP,presupuestos]);

  // ── PROYECCIÓN PRESUPUESTAL ──────────────────────────────────
  const proyData=useMemo(()=>{
    const now=new Date();
    const curSm=now.getMonth();const curSy=now.getFullYear();
    // Saldo inicial = proyectado al cierre del mes actual
    const saldoInicial=calcSaldoProyFin(movs,cuentas,prioI,prioE,curSm,curSy);
    const meses=[];
    let saldoAcum=saldoInicial;
    for(let i=0;i<proyMeses;i++){
      let sm2=curSm+1+i;let sy2=curSy;
      while(sm2>11){sm2-=12;sy2++;}
      // Sumar todos los presupuestos de ingresos
      const totalIng=catIng.reduce((s,c)=>{
        if(c.subs.length>0)return s+c.subs.reduce((ss,sub)=>ss+(presupuestos[presKey(sub.id,sm2,sy2)]||0),0);
        return s+(presupuestos[presKey(c.id,sm2,sy2)]||0);
      },0);
      // Sumar todos los presupuestos de egresos
      const totalEg=catEg.reduce((s,c)=>{
        if(c.subs.length>0)return s+c.subs.reduce((ss,sub)=>ss+(presupuestos[presKey(sub.id,sm2,sy2)]||0),0);
        return s+(presupuestos[presKey(c.id,sm2,sy2)]||0);
      },0);
      const resultado=totalIng-totalEg;
      const saldoFin=saldoAcum+resultado;
      // Semáforo
      const semaforo=saldoFin<0?"rojo":(saldoFin<saldoAcum*0.2||resultado<0)?"amarillo":"verde";
      // Detalle por categoría
      const detalleIng=catIng.map(c=>{
        const subs=c.subs.map(s=>({...s,pres:presupuestos[presKey(s.id,sm2,sy2)]||0})).filter(s=>s.pres>0);
        const catPres=c.subs.length>0?subs.reduce((s,x)=>s+x.pres,0):(presupuestos[presKey(c.id,sm2,sy2)]||0);
        return{...c,pres:catPres,subs};
      }).filter(c=>c.pres>0);
      const detalleEg=catEg.map(c=>{
        const subs=c.subs.map(s=>({...s,pres:presupuestos[presKey(s.id,sm2,sy2)]||0})).filter(s=>s.pres>0);
        const catPres=c.subs.length>0?subs.reduce((s,x)=>s+x.pres,0):(presupuestos[presKey(c.id,sm2,sy2)]||0);
        return{...c,pres:catPres,subs};
      }).filter(c=>c.pres>0);
      meses.push({sm:sm2,sy:sy2,label:`${MESES_FULL[sm2]} ${sy2}`,labelCorto:`${MESES[sm2]} ${sy2}`,saldoInicial:saldoAcum,totalIng,totalEg,resultado,saldoFin,semaforo,detalleIng,detalleEg});
      saldoAcum=saldoFin;
    }
    return{meses,saldoInicial};
  },[presupuestos,catIng,catEg,movs,cuentas,prioI,prioE,proyMeses]);

  const nextId=arr=>arr.length?Math.max(...arr.map(x=>x.id))+1:1;
  const nextOrd=()=>movs.length?Math.max(...movs.map(x=>x.orden))+1:1;

  const isEditReal=useMemo(()=>{
    if(!editMovId)return false;
    const r=movs.find(x=>x.id===editMovId);
    return r?["INGRESADO","PAGADO"].includes(r.estatus):false;
  },[editMovId,movs]);

  const openNewMov=useCallback(()=>{setFormMov({...BLANK_MOV});setRecForm({...BLANK_REC,fechaInicio:todayStr()});setEditMovId(null);setSaveError("");setFieldErrors(null);setShowMov(true);},[]);
  const openEditMov=useCallback(r=>{setFormMov({...r,monto:String(r.monto||"")});setRecForm({...BLANK_REC,activo:false,fechaInicio:r.fecha||todayStr()});setEditMovId(r.id);setSaveError("");setFieldErrors(null);setShowMov(true);},[]);
  const openNewCuenta=useCallback(()=>{setFormCuenta({nombre:"",saldoInicial:"",color:CUENTA_COLORS[0]});setEditCuentaId(null);setShowCuenta(true);},[]);
  const openEditCuenta=useCallback(c=>{setFormCuenta({...c});setEditCuentaId(c.id);setShowCuenta(true);},[]);
  const openNewTC=useCallback(()=>{setFormTC({nombre:"",banco:"",limite:"",fechaCorte:"",fechaLimPago:"",saldoDeudorInicial:"",color:"#f472b6"});setEditTCId(null);setShowTC(true);},[]);
  const openEditTC=useCallback(t=>{setFormTC({...t});setEditTCId(t.id);setShowTC(true);},[]);

  const handleSetFormMov=useCallback(updater=>{
    setFormMov(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      if(next.fecha!==prev.fecha)setRecForm(r=>({...r,fechaInicio:next.fecha||todayStr()}));
      return next;
    });
  },[]);

  const saveMov=useCallback(()=>{
    if(!formMov.concepto||!formMov.monto)return;
    const data={...formMov,monto:isEditReal?(movs.find(r=>r.id===editMovId)?.monto||parseFloat(formMov.monto)||0):parseFloat(formMov.monto)||0};
    if(data.tipoOp==="Transferencia")data.estatus="PAGADO";

    const esEfectivo=["PAGADO","INGRESADO"].includes(data.estatus);
    // PENDIENTE: limpiar fecha siempre (filosofía: sin fecha)
    if(data.estatus==="PENDIENTE") data.fecha=null;
    // Limpiar cuenta/tarjeta si es PENDIENTE o PROGRAMADO
    if(["PENDIENTE","PROGRAMADO"].includes(data.estatus)){
      data.cuentaId=null;data.cuentaDestinoId=null;data.tarjetaId=null;data.usaTarjeta=false;
    }

    // ── Validaciones de campos requeridos ──
    const errs={};
    // Fecha: requerida para PROGRAMADO, INGRESADO, PAGADO (no para PENDIENTE)
    if(data.estatus==="PROGRAMADO"&&!data.fecha)errs.fecha=true;
    if(esEfectivo&&!data.fecha)errs.fecha=true;
    // Cuenta/tarjeta: requerida solo para movimientos efectivos
    if(esEfectivo&&data.tipoOp==="Ingreso"&&!data.cuentaId)errs.cuentaId=true;
    if(esEfectivo&&data.tipoOp==="Egreso"&&!data.usaTarjeta&&!data.cuentaId)errs.cuentaId=true;
    if(esEfectivo&&data.tipoOp==="Egreso"&&data.usaTarjeta&&!data.tarjetaId)errs.tarjetaId=true;
    if(esEfectivo&&data.tipoOp==="Pago Tarjeta"&&!data.tarjetaId)errs.tarjetaId=true;
    if(esEfectivo&&data.tipoOp==="Pago Tarjeta"&&!data.cuentaId)errs.cuentaId=true;
    if(esEfectivo&&data.tipoOp==="Transferencia"&&!data.cuentaId)errs.cuentaId=true;

    if(Object.keys(errs).length>0){setFieldErrors(errs);setSaveError("Completa los campos marcados en rojo.");return;}

    // Validar saldo suficiente
    if(esEfectivo&&!isEditReal){
      let cuentaADebitar=null;
      if(data.tipoOp==="Egreso"&&!data.usaTarjeta&&data.cuentaId)cuentaADebitar=data.cuentaId;
      if(data.tipoOp==="Transferencia"&&data.cuentaId)cuentaADebitar=data.cuentaId;
      if(data.tipoOp==="Pago Tarjeta"&&data.cuentaId)cuentaADebitar=data.cuentaId;
      if(cuentaADebitar){
        const sa=calcSaldoCuentaAntesDe(cuentaADebitar,editMovId,movs,cuentas);
        if(sa-data.monto<0){setSaveError(`Saldo insuficiente en "${cuentas.find(c=>c.id===cuentaADebitar)?.nombre}". Disponible: ${fmt(sa)}.`);return;}
      }
    }

    setFieldErrors(null);setSaveError("");
    if(editMovId!==null){
      const orig=movs.find(r=>r.id===editMovId);
      if(orig?.serieId){setSerieConfirm({action:"edit",id:editMovId,serieId:orig.serieId,payload:data});setShowMov(false);return;}
      setMovs(p=>p.map(r=>r.id===editMovId?{...r,...data}:r));
    } else if(recForm.activo){
      const fechas=generarFechas(recForm);const sid="s"+Date.now();let bid=nextId(movs),bord=nextOrd();
      setMovs(p=>[...p,...fechas.map((f,i)=>({...data,id:bid+i,orden:bord+i,fecha:f,serieId:sid}))]);
    } else {
      setMovs(p=>[...p,{...data,id:nextId(movs),orden:nextOrd()}]);
    }
    setShowMov(false);setEditMovId(null);
  },[formMov,editMovId,isEditReal,movs,recForm,cuentas]);

  const saveCuenta=useCallback(()=>{
    if(!formCuenta.nombre)return;
    const data={...formCuenta,saldoInicial:parseFloat(formCuenta.saldoInicial)||0};
    if(editCuentaId!==null)setCuentas(p=>p.map(c=>c.id===editCuentaId?{...c,...data}:c));
    else setCuentas(p=>[...p,{...data,id:nextId(cuentas)}]);
    setShowCuenta(false);setEditCuentaId(null);
  },[formCuenta,editCuentaId,cuentas]);

  const saveTC=useCallback(()=>{
    if(!formTC.nombre)return;
    const data={...formTC,limite:parseFloat(formTC.limite)||0,saldoDeudorInicial:parseFloat(formTC.saldoDeudorInicial)||0,fechaCorte:parseInt(formTC.fechaCorte)||0,fechaLimPago:parseInt(formTC.fechaLimPago)||0};
    if(editTCId!==null)setTarjetas(p=>p.map(t=>t.id===editTCId?{...t,...data}:t));
    else setTarjetas(p=>[...p,{...data,id:nextId(tarjetas)}]);
    setShowTC(false);setEditTCId(null);
  },[formTC,editTCId,tarjetas]);

  const doDelete=id=>{const r=movs.find(x=>x.id===id);if(r?.serieId){setSerieConfirm({action:"delete",id,serieId:r.serieId,payload:null});setConfirmDel(null);}else{setMovs(p=>p.filter(x=>x.id!==id));setConfirmDel(null);}};
  const applySerieConfirm=scope=>{const{action,id,serieId,payload}=serieConfirm;if(action==="edit"){if(scope==="one")setMovs(p=>p.map(r=>r.id===id?{...r,...payload}:r));else setMovs(p=>p.map(r=>r.serieId===serieId?{...r,...payload,fecha:r.fecha,id:r.id,orden:r.orden}:r));}else{if(scope==="one")setMovs(p=>p.filter(r=>r.id!==id));else setMovs(p=>p.filter(r=>r.serieId!==serieId));}setSerieConfirm(null);};
  const toggleSelect=id=>setSelected(s=>{const n=new Set(s);n.has(id)?n.delete(id):n.add(id);return n;});
  const applyMultiEdit=()=>{setMovs(p=>p.map(r=>{if(!selected.has(r.id))return r;const u={...r};if(multiForm.estatus)u.estatus=multiForm.estatus;if(multiForm.prioridad)u.prioridad=parseInt(multiForm.prioridad);if(multiForm.fecha)u.fecha=multiForm.fecha;return u;}));setSelected(new Set());setMultiMode(false);setShowMultiEdit(false);};

  const exportExcel=useCallback((sm_,sy_,mode_)=>{
    const inPE=r=>{if(!r.fecha)return false;if(mode_==="mes"){const[y,m]=r.fecha.split("-").map(Number);return y===sy_&&m-1===sm_;}return r.fecha.startsWith(String(sy_));};
    const rows=movs.filter(r=>r.fecha&&inPE(r)).map(r=>{
      const cats=r.tipoOp==="Ingreso"?catIng:catEg;
      const catNom=cats.find(c=>c.id===r.cat)?.nombre||"";
      const subNom=cats.find(c=>c.id===r.cat)?.subs?.find(s=>s.id===r.subcat)?.nombre||"";
      return{Fecha:fmtDate(r.fecha),Concepto:r.concepto,Tipo:r.tipoOp,Estatus:r.estatus,Categoría:catNom,Subcategoría:subNom,Ingreso:r.tipoOp==="Ingreso"?r.monto:"",Egreso:r.tipoOp==="Egreso"?r.monto:"",Monto:r.monto,Prioridad:PRIO_LBL[r.prioridad]||"",Obs:r.obs||""};
    });
    const ws=XLSX.utils.json_to_sheet(rows);const wb=XLSX.utils.book_new();
    const lbl=mode_==="mes"?`${MESES_FULL[sm_]} ${sy_}`:`Año ${sy_}`;
    XLSX.utils.book_append_sheet(wb,ws,`Mov ${lbl}`);XLSX.writeFile(wb,`NexusFinanzas_${lbl.replace(/ /g,"_")}.xlsx`);
    setShowExportModal(false);
  },[movs,catIng,catEg]);


  const exportJSON=useCallback(()=>{
    const data={movs,cuentas,tarjetas,catIng,catEg,presupuestos,exportedAt:new Date().toISOString(),version:"v7"};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`NexusFinanzas_${new Date().toISOString().split("T")[0]}.json`;
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  },[movs,cuentas,tarjetas,catIng,catEg,presupuestos]);

  const importJSON=useCallback((e)=>{
    const file=e.target.files[0];if(!file)return;
    setJsonImportError("");
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.movs||!data.cuentas)throw new Error("Formato inválido");
        if(data.movs)setMovs(data.movs);
        if(data.cuentas)setCuentas(data.cuentas);
        if(data.tarjetas)setTarjetas(data.tarjetas);
        if(data.catIng)setCatIng(data.catIng);
        if(data.catEg)setCatEg(data.catEg);
        if(data.presupuestos)setPresupuestos(data.presupuestos);
        setShowJsonModal(false);
        setView("dashboard");
      }catch(err){setJsonImportError("Archivo inválido. Usa un JSON exportado desde esta app.");}
    };
    reader.readAsText(file);
    e.target.value="";
  },[]);

  // cat helpers
  const cats_=catMode==="ing"?catIng:catEg;
  const setCats_=catMode==="ing"?setCatIng:setCatEg;
  const catDrag=catMode==="ing"?catIngDrag:catEgDrag;
  const addCat=()=>{if(!newCatName.trim())return;setCats_(p=>[...p,{id:"c"+Date.now(),nombre:newCatName.trim(),subs:[]}]);setNewCatName("");};
  const delCat=id=>setCats_(p=>p.filter(c=>c.id!==id));
  const addSub=catId=>{if(!newSubName.trim())return;setCats_(p=>p.map(c=>c.id===catId?{...c,subs:[...c.subs,{id:"s"+Date.now(),nombre:newSubName.trim()}]}:c));setNewSubName("");setAddingSubTo(null);};
  const delSub=(catId,subId)=>setCats_(p=>p.map(c=>c.id===catId?{...c,subs:c.subs.filter(s=>s.id!==subId)}:c));
  const saveEditCat=catId=>{if(!editingCatName.trim())return;setCats_(p=>p.map(c=>c.id===catId?{...c,nombre:editingCatName.trim()}:c));setEditingCatId(null);setEditingCatName("");};
  const saveEditSub=(catId,subId)=>{if(!editingSubName.trim())return;setCats_(p=>p.map(c=>c.id===catId?{...c,subs:c.subs.map(s=>s.id===subId?{...s,nombre:editingSubName.trim()}:s)}:c));setEditingSubId(null);setEditingSubName("");};

  // Helpers filtro categoría
  const hasCatFilterActive=(filterCatIng!==null&&filterCatIng.size>0)||(filterCatEg!==null&&filterCatEg.size>0);
  const showIngCatFilter=filterTipo==="TODOS"||filterTipo==="Ingreso";
  const showEgCatFilter=filterTipo==="TODOS"||filterTipo==="Egreso";

  const PrioILabel=prioI===3?"Todas":PRIO_LBL[prioI];
  const PrioELabel=prioE===3?"Todas":PRIO_LBL[prioE];
  const inMenuViews=["estadisticas","presupuestos","proyeccion","cuentas","catalogos","configuracion"];

  // Semáforo color
  const semColor=s=>s==="verde"?"#22c55e":s==="amarillo"?"#fbbf24":"#f87171";
  const semBg=s=>s==="verde"?S.semVerde:s==="amarillo"?S.semAmarillo:S.semRojo;

  // ── RENDER ───────────────────────────────────────────────────
  return(
    <>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
      <div style={S.app}>
        <div style={S.hdr}>
          <div><div style={S.logo}>Nexus Partners</div><div style={S.sub}>PROYECCIÓN FINANCIERA PERSONAL</div></div>
          <div style={{textAlign:"right"}}><div style={{color:"#C9A84C",fontWeight:800,fontSize:12}}>{fmt(stats.saldoReal)}</div><div style={{fontSize:8,color:"#334155"}}>saldo real</div></div>
        </div>
        <div style={S.line}/><div style={{height:10}}/>

        {/* ── DASHBOARD ── */}
        {view==="dashboard"&&(
          <div style={S.sec}>
            {retrasados.length>0&&(
              <div style={S.alertCard} onClick={()=>{setView("movimientos");setFilterRetrasados(true);}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}><span>⚠️</span><span style={{fontSize:11,fontWeight:800,color:"#fbbf24"}}>{retrasados.length} movimiento{retrasados.length>1?"s":""} retrasado{retrasados.length>1?"s":""}</span></div>
                <div style={{fontSize:10,color:"#92400e"}}>Toca para ver</div>
              </div>
            )}
            {primerNegativo&&(
              <div style={S.alertRojo}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}><span>🔴</span><span style={{fontSize:11,fontWeight:800,color:"#f87171"}}>Saldo negativo en {period.label()}</span></div>
                <div style={{fontSize:10,color:"#f87171",opacity:.8}}>Primer rojo el <strong>{fmtDate(primerNegativo.fecha)}</strong> → {fmt(primerNegativo.saldoConsolidado)}</div>
              </div>
            )}
            <div style={S.card("rgba(201,168,76,0.25)")}><div style={S.lbl}>Saldo Real</div><div style={S.bigA()}>{fmt(stats.saldoReal)}</div><div style={{fontSize:10,color:"#475569",marginTop:2}}>Suma de cuentas débito</div></div>
            <div style={S.g2}>
              <div style={S.card()}><div style={S.lbl}>Ingresos Reales</div><div style={{fontSize:16,fontWeight:800,color:"#22c55e"}}>{fmt(stats.totalIngresos)}</div></div>
              <div style={S.card()}><div style={S.lbl}>Egresos Reales</div><div style={{fontSize:16,fontWeight:800,color:"#f87171"}}>{fmt(stats.totalEgresos)}</div></div>
            </div>
            <div style={S.card("rgba(167,139,250,0.2)")}>
              <div style={S.lbl}>Proyectado — {period.label()}</div>
              <div style={S.bigA("#a78bfa")}>{fmt(stats.saldoProy_per)}</div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:10}}><span style={{color:"#64748b"}}>+ Ingresos proy.</span><span style={{color:"#22c55e",fontWeight:700}}>{fmt(stats.ingEspPer)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:2,fontSize:10}}><span style={{color:"#64748b"}}>− Egresos proy.</span><span style={{color:"#f87171",fontWeight:700}}>{fmt(stats.egEspPer)}</span></div>
              <div style={S.divider}/>
              <div style={S.lbl}>Proyección Total</div>
              <div style={{fontSize:18,fontWeight:800,color:"#60a5fa"}}>{fmt(stats.saldoProy_total)}</div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:5,fontSize:10}}><span style={{color:"#64748b"}}>+ Total ing. proy.</span><span style={{color:"#22c55e",fontWeight:700}}>{fmt(stats.ingEspTotal)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:2,fontSize:10}}><span style={{color:"#64748b"}}>− Total eg. proy.</span><span style={{color:"#f87171",fontWeight:700}}>{fmt(stats.egEspTotal)}</span></div>
              <div style={{fontSize:9,color:"#475569",marginTop:7}}>Prob.ing: <span style={{color:"#22c55e",fontWeight:700}}>{PrioILabel}</span> · Prior.eg: <span style={{color:"#f87171",fontWeight:700}}>{PrioELabel}</span></div>
            </div>
            <div style={S.sTit}>CUENTAS DÉBITO</div>
            {cuentas.map(c=>(
              <div key={c.id} style={S.cCard(c.color)}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div style={{display:"flex",alignItems:"center",gap:7}}><div style={{width:8,height:8,borderRadius:4,background:c.color}}/><span style={{fontSize:12,fontWeight:700}}>{c.nombre}</span></div>
                <span style={{fontSize:16,fontWeight:800,color:cuentaSaldos[c.id]>=0?c.color:"#f87171"}}>{fmt(cuentaSaldos[c.id])}</span>
              </div></div>
            ))}
            {tarjetas.length>0&&(<><div style={{...S.sTit,marginTop:7}}>TARJETAS DE CRÉDITO</div>
              {tarjetas.map(t=>{const sd=tarjetaSaldos[t.id]||0;return(
                <div key={t.id} style={S.cCard(t.color)}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>

                  <div key={sub.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 0 4px 11px",borderLeft:"2px solid #1e293b",marginBottom:2}}>
                    {editingSubId===sub.id
                      ?<div style={{display:"flex",gap:5,flex:1}}><input style={{...S.inp,flex:1,padding:"3px 7px",fontSize:11}} value={editingSubName} onChange={e=>setEditingSubName(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")saveEditSub(cat.id,sub.id);if(e.key==="Escape")setEditingSubId(null);}} autoFocus/><button style={S.smBtn("#22c55e")} onClick={()=>saveEditSub(cat.id,sub.id)}>✓</button><button style={S.smBtn("#475569")} onClick={()=>setEditingSubId(null)}>✕</button></div>
                      :<><span style={{fontSize:11,color:"#94a3b8",cursor:"pointer",flex:1}} onClick={()=>{setEditingSubId(sub.id);setEditingSubName(sub.nombre);}}>{sub.nombre}</span><button style={S.smBtn("#f87171")} onClick={()=>delSub(cat.id,sub.id)}>✕</button></>
                    }
                  </div>
                ))}
                {addingSubTo===cat.id&&<div style={{display:"flex",gap:5,marginTop:7}}><input style={{...S.inp,flex:1,padding:"6px 9px",fontSize:11}} value={newSubName} onChange={e=>setNewSubName(e.target.value)} placeholder="Nombre subcategoría" onKeyDown={e=>{if(e.key==="Enter")addSub(cat.id);}}/><button style={S.smBtn("#22c55e")} onClick={()=>addSub(cat.id)}>✓</button></div>}
              </div>
            ))}
            <div style={{display:"flex",gap:7,marginTop:7}}>
              <input style={{...S.inp,flex:1,padding:"8px 11px",fontSize:11}} value={newCatName} onChange={e=>setNewCatName(e.target.value)} placeholder="Nueva categoría…" onKeyDown={e=>{if(e.key==="Enter")addCat();}}/>
              <button style={{...S.saveB,width:"auto",padding:"8px 14px",marginTop:0,fontSize:11}} onClick={addCat}>+ Agregar</button>
            </div>
          </div>
        )}

        {/* ── CONFIGURACIÓN ── */}
        {view==="configuracion"&&(
          <div style={S.sec}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:13}}><button style={{...S.acBtn("#475569"),fontSize:11}} onClick={()=>setView("menu")}>← Menú</button><span style={{...S.sTit,margin:0}}>CONFIGURACIÓN</span></div>
            <div style={S.sTit}>EXPORTAR</div>
            <div style={{...S.card(),cursor:"pointer"}} onClick={()=>setShowExportModal(true)}>
              <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{...S.menuIco,background:"rgba(34,197,94,0.12)"}}><span>📥</span></div><div><div style={{fontSize:12,fontWeight:700}}>Exportar a Excel</div><div style={{fontSize:10,color:"#475569"}}>Selecciona el período a exportar</div></div></div>
            </div>
            <div style={S.sTit}>DATOS</div>
            <div style={{...S.card(),cursor:"pointer"}} onClick={()=>{setShowReset(true);setResetPhase(1);setResetInput("");}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{...S.menuIco,background:"rgba(248,113,113,0.12)"}}><span>🗑</span></div><div><div style={{fontSize:12,fontWeight:700,color:"#f87171"}}>Eliminar movimientos</div><div style={{fontSize:10,color:"#475569"}}>Borra todos los movimientos registrados</div></div></div>
            </div>

            <div style={S.sTit}>RESPALDO JSON</div>
            <div style={{...S.card(),cursor:"pointer"}} onClick={exportJSON}>
              <div style={{display:"flex",alignItems:"center",gap:10}}><div style={{...S.menuIco,background:"rgba(201,168,76,0.12)"}}><span>💾</span></div><div><div style={{fontSize:12,fontWeight:700,color:"#C9A84C"}}>Exportar datos (JSON)</div><div style={{fontSize:10,color:"#475569"}}>Descarga un respaldo de todos tus datos</div></div></div>
            </div>
            <div style={{...S.card()}} onClick={()=>{setShowJsonModal(true);setJsonImportError("");}}>
              <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}}><div style={{...S.menuIco,background:"rgba(96,165,250,0.12)"}}><span>📂</span></div><div><div style={{fontSize:12,fontWeight:700,color:"#60a5fa"}}>Importar datos (JSON)</div><div style={{fontSize:10,color:"#475569"}}>Restaura un respaldo previo</div></div></div>
            </div>
            <div style={{...S.infoBx("#475569"),marginTop:7}}><span>ℹ</span><span>El filtro de proyección (prioridades) se configura en la vista de Movimientos con el botón ⚙.</span></div>
          </div>
        )}

        {/* ── MODALES ── */}
        {showMov&&(
          <ModalMov formMov={formMov} setFormMov={handleSetFormMov}
            editMovId={editMovId} isEditReal={isEditReal}
            recForm={recForm} setRecForm={setRecForm}
            cuentas={cuentas} cuentaSaldos={cuentaSaldos}
            tarjetas={tarjetas} tarjetaSaldos={tarjetaSaldos}
            catIng={catIng} catEg={catEg}
            onSave={saveMov} onClose={()=>{setShowMov(false);setEditMovId(null);setSaveError("");setFieldErrors(null);}}
            saveError={saveError} fieldErrors={fieldErrors}/>
        )}

        {showCuenta&&(
          <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setShowCuenta(false);}}>
            <div style={S.mBox}>
              <div style={S.mTit}>{editCuentaId?"✏ EDITAR CUENTA":"+ NUEVA CUENTA"}</div>
              <div style={S.fg}><label style={S.fl}>Nombre</label><input style={S.inp} value={formCuenta.nombre} onChange={e=>setFormCuenta(f=>({...f,nombre:e.target.value}))} placeholder="ej. BBVA Débito"/></div>
              <div style={S.fg}><label style={S.fl}>Saldo inicial $</label><input style={S.inp} type="number" value={formCuenta.saldoInicial} onChange={e=>setFormCuenta(f=>({...f,saldoInicial:e.target.value}))} placeholder="0.00"/></div>
              <div style={S.fg}><label style={S.fl}>Color</label><div style={{display:"flex",gap:9,flexWrap:"wrap",marginTop:3}}>{CUENTA_COLORS.map(c=><div key={c} style={S.dotS(c,formCuenta.color===c)} onClick={()=>setFormCuenta(f=>({...f,color:c}))}/>)}</div></div>
              <button style={S.saveB} onClick={saveCuenta}>GUARDAR CUENTA</button>
              <button style={S.cancB} onClick={()=>setShowCuenta(false)}>Cancelar</button>
            </div>
          </div>
        )}

        {showTC&&(
          <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setShowTC(false);}}>
            <div style={S.mBox}>
              <div style={S.mTit}>{editTCId?"✏ EDITAR TARJETA":"+ NUEVA TARJETA"}</div>
              <div style={{...S.r2,marginBottom:11}}>
                <div><label style={S.fl}>Nombre</label><input style={S.inp} value={formTC.nombre} onChange={e=>setFormTC(f=>({...f,nombre:e.target.value}))} placeholder="Visa Oro"/></div>
                <div><label style={S.fl}>Banco</label><input style={S.inp} value={formTC.banco} onChange={e=>setFormTC(f=>({...f,banco:e.target.value}))} placeholder="BBVA"/></div>
              </div>
              <div style={S.fg}><label style={S.fl}>Límite $</label><input style={S.inp} type="number" value={formTC.limite} onChange={e=>setFormTC(f=>({...f,limite:e.target.value}))}/></div>
              <div style={S.fg}><label style={S.fl}>Saldo deudor actual $</label><input style={S.inp} type="number" value={formTC.saldoDeudorInicial} onChange={e=>setFormTC(f=>({...f,saldoDeudorInicial:e.target.value}))}/></div>
              <div style={{...S.r2,marginBottom:11}}>
                <div><label style={S.fl}>Día corte</label><input style={S.inp} type="number" value={formTC.fechaCorte} onChange={e=>setFormTC(f=>({...f,fechaCorte:e.target.value}))} placeholder="15"/></div>
                <div><label style={S.fl}>Día límite pago</label><input style={S.inp} type="number" value={formTC.fechaLimPago} onChange={e=>setFormTC(f=>({...f,fechaLimPago:e.target.value}))} placeholder="5"/></div>
              </div>
              <div style={S.fg}><label style={S.fl}>Color</label><div style={{display:"flex",gap:9,flexWrap:"wrap",marginTop:3}}>{CUENTA_COLORS.map(c=><div key={c} style={S.dotS(c,formTC.color===c)} onClick={()=>setFormTC(f=>({...f,color:c}))}/>)}</div></div>
              <button style={S.saveB} onClick={saveTC}>GUARDAR TARJETA</button>
              <button style={S.cancB} onClick={()=>setShowTC(false)}>Cancelar</button>
            </div>
          </div>
        )}

        {/* Modal presupuesto */}
        {showPresModal&&presModalData&&(
          <ModalPresupuesto
            data={presModalData}
            presupuestos={presupuestos}
            setPresupuestos={setPresupuestos}
            sm={budgetPeriod.sm}
            sy={budgetPeriod.sy}
            onClose={()=>{setShowPresModal(false);setPresModalData(null);}}
          />
        )}

        {/* Modal filtro categoría */}
        {showCatFilter&&(
          <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setShowCatFilter(false);}}>
            <div style={S.mBox}>
              <div style={S.mTit}>📂 FILTRAR POR CATEGORÍA</div>
              {showIngCatFilter&&(<>
                <div style={{fontSize:10,color:"#22c55e",fontWeight:700,letterSpacing:1.2,textTransform:"uppercase",marginBottom:7}}>↑ Ingresos</div>
                <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                  <button style={S.smBtn(filterCatIng===null?"#22c55e":"#475569")} onClick={()=>setFilterCatIng(null)}>Todas</button>
                  <button style={S.smBtn(filterCatIng?.size===0?"#f87171":"#475569")} onClick={()=>setFilterCatIng(new Set())}>Ninguna</button>
                </div>
                {catIng.map(cat=>{
                  const sel=filterCatIng===null||filterCatIng.has(cat.id);
                  return(
                    <div key={cat.id} style={{marginBottom:5}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:sel?"rgba(34,197,94,0.06)":"#13131f",border:`1px solid ${sel?"#22c55e33":"#1e293b"}`,borderRadius:9,cursor:"pointer"}}
                        onClick={()=>setFilterCatIng(prev=>{
                          if(prev===null){const n=new Set(catIng.map(c=>c.id));n.delete(cat.id);return n;}
                          const n=new Set(prev);n.has(cat.id)?n.delete(cat.id):n.add(cat.id);return n;
                        })}>
                        <div style={{width:14,height:14,borderRadius:3,border:`2px solid ${sel?"#22c55e":"#334155"}`,background:sel?"#22c55e":"transparent",flexShrink:0}}/>
                        <span style={{fontSize:12,fontWeight:600}}>{cat.nombre}</span>
                      </div>
                    </div>
                  );
                })}
              </>)}
              {showEgCatFilter&&(<>
                <div style={{fontSize:10,color:"#f87171",fontWeight:700,letterSpacing:1.2,textTransform:"uppercase",marginBottom:7,marginTop:showIngCatFilter?14:0}}>↓ Egresos</div>
                <div style={{display:"flex",gap:6,marginBottom:10,flexWrap:"wrap"}}>
                  <button style={S.smBtn(filterCatEg===null?"#f87171":"#475569")} onClick={()=>setFilterCatEg(null)}>Todas</button>
                  <button style={S.smBtn(filterCatEg?.size===0?"#f87171":"#475569")} onClick={()=>setFilterCatEg(new Set())}>Ninguna</button>
                </div>
                {catEg.map(cat=>{
                  const sel=filterCatEg===null||filterCatEg.has(cat.id);
                  return(
                    <div key={cat.id} style={{marginBottom:5}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:sel?"rgba(248,113,113,0.06)":"#13131f",border:`1px solid ${sel?"#f8717133":"#1e293b"}`,borderRadius:9,cursor:"pointer"}}
                        onClick={()=>setFilterCatEg(prev=>{
                          if(prev===null){const n=new Set(catEg.map(c=>c.id));n.delete(cat.id);return n;}
                          const n=new Set(prev);n.has(cat.id)?n.delete(cat.id):n.add(cat.id);return n;
                        })}>
                        <div style={{width:14,height:14,borderRadius:3,border:`2px solid ${sel?"#f87171":"#334155"}`,background:sel?"#f87171":"transparent",flexShrink:0}}/>
                        <span style={{fontSize:12,fontWeight:600}}>{cat.nombre}</span>
                      </div>
                    </div>
                  );
                })}
              </>)}
              <button style={{...S.saveB,marginTop:13}} onClick={()=>setShowCatFilter(false)}>Aplicar filtros</button>
              <button style={S.cancB} onClick={()=>{setFilterCatIng(null);setFilterCatEg(null);setShowCatFilter(false);}}>Limpiar todos</button>
            </div>
          </div>
        )}

        {showMultiEdit&&(
          <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setShowMultiEdit(false);}}>
            <div style={S.mBox}>
              <div style={S.mTit}>✏ EDICIÓN MÚLTIPLE — {selected.size} mov.</div>
              <div style={{fontSize:10,color:"#475569",marginBottom:14}}>Deja vacío lo que no quieras cambiar.</div>
              <div style={S.fg}><label style={S.fl}>Estatus</label><select style={S.sel} value={multiForm.estatus} onChange={e=>setMultiForm(f=>({...f,estatus:e.target.value}))}><option value="">— Sin cambio —</option>{ESTATUS_LIST.map(e=><option key={e} value={e}>{e}</option>)}</select></div>
              <div style={S.fg}><label style={S.fl}>Prioridad</label><select style={S.sel} value={multiForm.prioridad} onChange={e=>setMultiForm(f=>({...f,prioridad:e.target.value}))}><option value="">— Sin cambio —</option><option value="1">Alta</option><option value="2">Media</option><option value="3">Baja</option></select></div>
              <div style={S.fg}><label style={S.fl}>Fecha</label><input style={S.inp} type="date" value={multiForm.fecha} onChange={e=>setMultiForm(f=>({...f,fecha:e.target.value}))}/></div>
              <button style={S.saveB} onClick={applyMultiEdit}>APLICAR</button>
              <button style={S.cancB} onClick={()=>setShowMultiEdit(false)}>Cancelar</button>
            </div>
          </div>
        )}

        {confirmDel&&(
          <div style={S.delCon}>
            <div style={S.delBox}>
              <div style={{fontSize:13,fontWeight:700,color:"#f87171",marginBottom:7}}>{confirmDel.type==="multi"?`¿Eliminar ${selected.size} movimientos?`:"¿Eliminar registro?"}</div>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:18}}>Esta acción no se puede deshacer.</div>
              <button style={{...S.saveB,background:"linear-gradient(135deg,#f87171,#b91c1c)"}} onClick={()=>{
                if(confirmDel.type==="multi"){setMovs(p=>p.filter(r=>!selected.has(r.id)));setSelected(new Set());setMultiMode(false);}
                else if(confirmDel.type==="mov")doDelete(confirmDel.id);
                else if(confirmDel.type==="cuenta")setCuentas(p=>p.filter(c=>c.id!==confirmDel.id));
                else if(confirmDel.type==="tc")setTarjetas(p=>p.filter(t=>t.id!==confirmDel.id));
                setConfirmDel(null);
              }}>Sí, eliminar</button>
              <button style={S.cancB} onClick={()=>setConfirmDel(null)}>Cancelar</button>
            </div>
          </div>
        )}

        {serieConfirm&&(
          <div style={S.delCon}>
            <div style={{...S.delBox,border:"1px solid #a78bfa44"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#a78bfa",marginBottom:7}}>↻ Movimiento en serie</div>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:18}}>{serieConfirm.action==="edit"?"¿Editar solo este o toda la serie?":"¿Eliminar solo este o toda la serie?"}</div>
              <button style={{...S.saveB,background:"linear-gradient(135deg,#a78bfa,#7c3aed)",marginBottom:7}} onClick={()=>applySerieConfirm("one")}>Solo este</button>
              <button style={{...S.saveB,background:"linear-gradient(135deg,#f87171,#b91c1c)"}} onClick={()=>applySerieConfirm("all")}>Toda la serie</button>
              <button style={S.cancB} onClick={()=>setSerieConfirm(null)}>Cancelar</button>
            </div>
          </div>
        )}

        {showReset&&(
          <div style={S.delCon}>
            <div style={S.delBox}>
              {resetPhase===1&&<><div style={{fontSize:13,fontWeight:700,color:"#f87171",marginBottom:7}}>⚠ Eliminar movimientos</div><div style={{fontSize:11,color:"#94a3b8",marginBottom:14}}>Cuentas y tarjetas se conservan.</div><button style={{...S.saveB,background:"linear-gradient(135deg,#f87171,#b91c1c)"}} onClick={()=>setResetPhase(2)}>Continuar</button><button style={S.cancB} onClick={()=>{setShowReset(false);setResetPhase(0);}}>Cancelar</button></>}
              {resetPhase===2&&<><div style={{fontSize:13,fontWeight:700,color:"#f87171",marginBottom:7}}>⛔ Confirmación final</div><div style={{fontSize:11,color:"#94a3b8",marginBottom:11}}>Escribe <span style={{color:"#f87171",fontWeight:700}}>CONFIRMAR</span></div><input style={{...S.inp,marginBottom:11,borderColor:"#f8717144"}} value={resetInput} onChange={e=>setResetInput(e.target.value)} placeholder="CONFIRMAR"/><button style={{...S.saveB,background:resetInput==="CONFIRMAR"?"linear-gradient(135deg,#f87171,#b91c1c)":"#1e293b",color:resetInput==="CONFIRMAR"?"#fff":"#475569"}} onClick={()=>{if(resetInput==="CONFIRMAR"){setMovs([]);setShowReset(false);setResetPhase(0);setResetInput("");}}}>Borrar todo</button><button style={S.cancB} onClick={()=>{setShowReset(false);setResetPhase(0);setResetInput("");}}>Cancelar</button></>}
            </div>
          </div>
        )}

        {showExportModal&&(
          <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setShowExportModal(false);}}>
            <div style={S.mBox}>
              <div style={S.mTit}>📥 EXPORTAR A EXCEL</div>
              <div style={S.fg}><label style={S.fl}>Período</label>
                <div style={{display:"flex",gap:7,marginBottom:9}}>
                  <button style={{...S.prioB2(exportPeriod.mode==="mes"),flex:1,padding:"8px 0",fontSize:11}} onClick={()=>setExportPeriod(p=>({...p,mode:"mes"}))}>Mensual</button>
                  <button style={{...S.prioB2(exportPeriod.mode==="anio"),flex:1,padding:"8px 0",fontSize:11}} onClick={()=>setExportPeriod(p=>({...p,mode:"anio"}))}>Anual</button>
                </div>
                {exportPeriod.mode==="mes"&&<div style={S.perBar}><button style={S.perBtn} onClick={()=>setExportPeriod(p=>{const sm=p.sm===0?11:p.sm-1;const sy=p.sm===0?p.sy-1:p.sy;return{...p,sm,sy};})}>‹</button><span style={S.perLbl}>{MESES_FULL[exportPeriod.sm]} {exportPeriod.sy}</span><button style={S.perBtn} onClick={()=>setExportPeriod(p=>{const sm=p.sm===11?0:p.sm+1;const sy=p.sm===11?p.sy+1:p.sy;return{...p,sm,sy};})}>›</button></div>}
                {exportPeriod.mode==="anio"&&<div style={S.perBar}><button style={S.perBtn} onClick={()=>setExportPeriod(p=>({...p,sy:p.sy-1}))}>‹</button><span style={S.perLbl}>{exportPeriod.sy}</span><button style={S.perBtn} onClick={()=>setExportPeriod(p=>({...p,sy:p.sy+1}))}>›</button></div>}
              </div>
              <button style={S.saveB} onClick={()=>exportExcel(exportPeriod.sm,exportPeriod.sy,exportPeriod.mode)}>📥 DESCARGAR EXCEL</button>
              <button style={S.cancB} onClick={()=>setShowExportModal(false)}>Cancelar</button>
            </div>
          </div>
        )}


        {showJsonModal&&(
          <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setShowJsonModal(false);}}>
            <div style={S.mBox}>
              <div style={S.mTit}>📂 IMPORTAR DATOS</div>
              <div style={{...S.infoBx("#fbbf24"),marginBottom:13}}><span>⚠</span><span>Esto reemplazará TODOS los datos actuales. Asegúrate de exportar primero si tienes información importante.</span></div>
              <div style={{background:"#13131f",border:"2px dashed #1e293b",borderRadius:11,padding:"22px 14px",textAlign:"center",marginBottom:11}}>
                <div style={{fontSize:22,marginBottom:7}}>📄</div>
                <div style={{fontSize:11,color:"#94a3b8",marginBottom:11}}>Selecciona el archivo JSON exportado desde Nexus Finanzas</div>
                <label style={{...S.saveB,display:"inline-block",cursor:"pointer",textAlign:"center",marginTop:0}}>
                  SELECCIONAR ARCHIVO
                  <input type="file" accept=".json" style={{display:"none"}} onChange={importJSON}/>
                </label>
              </div>
              {jsonImportError&&<div style={S.errBox}><span>⛔</span><span>{jsonImportError}</span></div>}
              <button style={S.cancB} onClick={()=>setShowJsonModal(false)}>Cancelar</button>
            </div>
          </div>
        )}

        {multiMode&&selected.size>0&&(
          <div style={S.multiBar}>
            <span style={{fontSize:10,color:"#C9A84C",fontWeight:700,flex:1}}>{selected.size} selec.</span>
            <button style={S.acBtn("#C9A84C")} onClick={()=>setShowMultiEdit(true)}>✏ Editar</button>
            <button style={S.acBtn("#f87171")} onClick={()=>setConfirmDel({type:"multi"})}>✕ Eliminar</button>
            <button style={S.acBtn("#475569")} onClick={()=>{setMultiMode(false);setSelected(new Set());}}>Salir</button>
          </div>
        )}

        {view==="movimientos"&&!multiMode&&<button style={S.fab} onClick={openNewMov}>+</button>}
        {view==="cuentas"&&<button style={S.fab} onClick={openNewCuenta}>+</button>}

        <nav style={S.nav}>
          {[{id:"dashboard",icon:"◈",label:"Resumen"},{id:"movimientos",icon:"≡",label:"Movimientos"},{id:"menu",icon:"···",label:"Menú"}].map(n=>(
            <button key={n.id} style={S.navB(view===n.id||(inMenuViews.includes(view)&&n.id==="menu"))} onClick={()=>setView(n.id)}>
              <span style={{fontSize:16}}>{n.icon}</span>{n.label}
            </button>
          ))}
        </nav>
      </div>
    </>
  );
}


ReactDOM.render(React.createElement(App), document.getElementById('root'));

  </script>
  <script>
    // Ocultar loading cuando React haya renderizado
    window.addEventListener('load', function() {
      setTimeout(function(){
        var l = document.getElementById('loading');
        if(l) l.style.display='none';
      }, 800);
    });
  </script>
</body>
</html>
