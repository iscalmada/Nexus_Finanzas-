<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="theme-color" content="#080810"/>
  <title>Nexus Flow</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#080810;color:#e2e8f0;font-family:'DM Sans',sans-serif;overscroll-behavior:none;}
    #root{min-height:100vh;}
    #loading{position:fixed;inset:0;background:#080810;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:24px;transition:opacity .3s ease;}
    #loading.fade-out{opacity:0;}
    #loading .isotipo-wrap{margin-bottom:20px;mix-blend-mode:screen;}
    #loading .ncfp-title{font-size:28px;font-weight:700;letter-spacing:6px;color:#C9A84C;margin-bottom:3px;font-family:'Cinzel',Georgia,serif;text-transform:uppercase;}
    #loading .ncfp-by{font-size:9px;color:#C9A84C88;letter-spacing:3px;margin-bottom:5px;text-transform:uppercase;font-family:'Cinzel',Georgia,serif;}
    #loading .ncfp-sub{font-size:9px;color:#334155;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;}
    #loading .ncfp-dots{display:flex;gap:6px;margin-top:12px;}
    #loading .ncfp-dots span{width:5px;height:5px;border-radius:50%;background:#C9A84C;animation:dotpulse 1.2s ease-in-out infinite;}
    #loading .ncfp-dots span:nth-child(2){animation-delay:.2s;}
    #loading .ncfp-dots span:nth-child(3){animation-delay:.4s;}
    @keyframes dotpulse{0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1.2);}}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.6);}
    select option{background:#13131f;}
    ::-webkit-scrollbar{width:0;height:0;}
    input,select,button,textarea{font-family:'DM Sans',sans-serif;}
  </style>

</head>

function saveLS(k,v){try{localStorage.setItem(PFX+k,JSON.stringify(v));}catch(e){}}

/* migración de escalas codificadas a texto del catálogo (idempotente) */
const AA_IDS=["c68","c160","c203","c264","c320","c349","c520"];
const CAP_MAP={AA:"Muy Alta",A:"Alta",B:"Media",C:"Baja"};
const CER_MAP={AA:"Muy Cercano",A:"Cercano",B:"Medianamente Cercano",C:"No Cercano"};
function migra(cs){return (cs||[]).map(c=>({...c,
  capacidadRef: CAP_MAP[c.capacidadRef]||c.capacidadRef,
  cercania: CER_MAP[c.cercania]||c.cercania }));}

const LOW_WORDS=["de","del","la","las","los","y","e","da","do"];
function titleCase(s){
  if(!s)return s;
  return String(s).toLowerCase().split(/\s+/).filter(Boolean).map((w,i)=>
    (i>0&&LOW_WORDS.includes(w))?w:(w.charAt(0).toUpperCase()+w.slice(1))
  ).join(" ");
}

function exportBackup(contactos,empresas,oportunidades,catalogos,productos){
  try{
    const cs=contactos.map(c=>({Nombre:c.nombreCompleto,Alias:c.alias||"",Actividad:c.actividad||"",
      Empresa:((empresas.find(e=>e.id===c.empresaId)||{}).nombre)||"",Rol:c.rolEmpresa||"",
      Telefono:c.telefono||"",Correo:c.correo||"",Circulo:c.circulo||"",Relacion:c.relacion||"",
      NivelDeCercania:c.cercania||"",NivelEconomico:c.nivelEconomico||"",Potencial:c.potencial||"",CapacidadReferidor:c.capacidadRef||"",
      EtapaPrincipal:c.etapaPrincipal||"",EtapaEspecifica:c.etapaEspecifica||"",TipoPersona:c.tipoPersona||"",
      Giros:(c.giros||[]).join(", "),GiroPrincipal:c.giroPrincipal||"",SolucionesAncla:(c.solucionesAncla||[]).map(id=>(((catalogos&&catalogos.solucion)||[]).find(s=>s.id===id)||{}).nombre||id).join(", "),
      AcercamientoPixan:c.acercamientoPixan?"Sí":"No",EtapaPixan:c.etapaPixan||"",
      TipoAliado:(c.tiposAliado||[]).join(", "),EstatusAliado:c.estatusAliado||"",SolucionesAliado:(c.solucionesAliado||[]).map(id=>(((catalogos&&catalogos.solucion)||[]).find(s=>s.id===id)||{}).nombre||id).join(", "),CondicionesComision:c.esquemaParticipacion||"",AvanceTrato:c.avanceTrato||"",
      UltimoContacto:c.fechaUltimoContacto||"",ResumenAvance:c.resumenAvance||"",Observaciones:c.obs||""}));
    const es=empresas.map(e=>({Nombre:e.nombre,Giro:e.giro||"",Tamano:e.tamano||"",Telefono:e.telefono||"",Correo:e.correo||"",Domicilio:e.domicilio||"",Observaciones:e.obs||""}));
    const os=(oportunidades||[]).map(o=>({Concepto:o.concepto,Contacto:((contactos.find(c=>c.id===(o.contactoPrincipalId||o.contactoId))||{}).nombreCompleto)||"",
      Empresa:((empresas.find(e=>e.id===o.empresaId)||{}).nombre)||"",Solucion:(((catalogos&&catalogos.solucion)||[]).find(s=>s.id===o.solucionId)||{}).nombre||o.solucionNexus||"",
      Producto:((productos||[]).find(p=>p.id===o.productoId)||{}).tipo||"",
      AliadoEstrategico:((contactos.find(c=>c.id===o.aliadoEstrategicoId)||{}).nombreCompleto)||"",
      AliadoComercial:((contactos.find(c=>c.id===o.aliadoComercialId)||{}).nombreCompleto)||"",
      Etapa:o.etapa||"",
      MontoEstimado:Number(o.montoEstimado)||0,ComisionEstimada:Number(o.comisionEstimada)||0,Probabilidad:o.probabilidad||"",
      FechaEstimadaCierre:o.fechaEstimadaCierre||"",Recurrencia:o.recurrencia||"",FechaConcretada:o.fechaConcretada||"",
      Condiciones:o.condiciones||"",Notas:o.notas||""}));
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(cs),"Contactos");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(es),"Empresas");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(os.length?os:[{Concepto:""}]),"Oportunidades");
    XLSX.writeFile(wb,"Nexus_CFC_respaldo.xlsx");
  }catch(e){alert("No se pudo exportar: "+e.message);}
}

/* ─── helpers UI ─── */
function Field({label,children}){return <div style={S.fg}><label style={S.fl}>{label}</label>{children}</div>;}
function CatSelect({cat,value,onChange,placeholder}){
  return <select style={S.sel} value={value||""} onChange={e=>onChange(e.target.value||null)}>
    <option value="">{placeholder||"— Selecciona —"}</option>
    {(cat||[]).map(o=><option key={o.id} value={o.nombre}>{o.nombre}</option>)}
  </select>;
}
function ChipMulti({opts,sel,setSel,color}){
  return <div style={{...S.chips,flexWrap:"wrap",overflowX:"visible"}}>
    {opts.map(o=>{const v=typeof o==="string"?o:o.nombre;const c=typeof color==="function"?color(v):color;
      return <span key={v} style={S.chip(sel.includes(v),c)} onClick={()=>setSel(sel.includes(v)?sel.filter(x=>x!==v):[...sel,v])}>{v}</span>;})}
  </div>;
}

function BuscaSelect({opciones,value,onChange,placeholder,vacioLabel,onAdd,addLabel="contacto"}){
  const[abierto,setAbierto]=useState(false);const[q,setQ]=useState("");
  const sel=opciones.find(o=>o.id===value);
  const filt=opciones.filter(o=>!q||(o.label||"").toLowerCase().includes(q.toLowerCase()));
  return <div style={{position:"relative"}}>
    <div style={{...S.sel,display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer"}} onClick={()=>{setAbierto(a=>!a);setQ("");}}>
      <span style={{color:sel?"#e2e8f0":"#64748b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sel?sel.label:(placeholder||"— Selecciona —")}</span>
      <span style={{color:"#64748b",fontSize:11,flexShrink:0,marginLeft:6}}>{abierto?"▲":"▼"}</span>
    </div>
    {abierto&&<div style={{marginTop:4,border:"1px solid #1e293b",borderRadius:8,background:"#0d0d16",overflow:"hidden"}}>
      <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar…" style={{width:"100%",boxSizing:"border-box",background:"#10101e",border:"none",borderBottom:"1px solid #1e293b",color:"#e2e8f0",fontSize:12,padding:"9px 10px",outline:"none"}}/>
      {onAdd&&<div onClick={()=>{const nombre=q.trim();const r=onAdd(nombre);setAbierto(false);if(r){onChange(r);}}} style={{padding:"10px",fontSize:12,color:"#C9A84C",cursor:"pointer",borderBottom:"1px solid #1e293b",fontWeight:700,textAlign:"center",background:"#15151f"}}>{q.trim()?`+ Crear ${addLabel} «${q.trim()}»`:`+ Nuevo ${addLabel}`}</div>}
      <div style={{maxHeight:210,overflowY:"auto"}}>
        <div style={{padding:"8px 10px",fontSize:12,color:"#64748b",cursor:"pointer",borderBottom:"1px solid #14141f"}} onClick={()=>{onChange(null);setAbierto(false);}}>{vacioLabel||"— Ninguno —"}</div>
        {filt.map(o=><div key={o.id} onClick={()=>{onChange(o.id);setAbierto(false);}} style={{padding:"8px 10px",fontSize:12,cursor:"pointer",borderBottom:"1px solid #14141f",color:o.id===value?"#2dd4bf":"#e2e8f0",fontWeight:o.id===value?700:400}}>{o.label}</div>)}
        {filt.length===0&&<div style={{padding:"10px",fontSize:11,color:"#475569"}}>Sin coincidencias.</div>}
      </div>
    </div>}
  </div>;
}

function cEmpresas(c){return (c&&c.empresas&&c.empresas.length)?c.empresas:((c&&c.empresaId)?[{empresaId:c.empresaId,rol:c.rolEmpresa||""}]:[]);}
function ContactoModal({init,catalogos,empresas,onCreateEmpresa,onSave,onClose}){
  const[f,setF]=useState(()=>({giros:[],solucionesAncla:[],tiposAliado:[],solucionesAliado:[],etiquetas:[],...init}));
  const[nuevaEmp,setNuevaEmp]=useState(null);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const empList=f.empresas||(f.empresaId?[{empresaId:f.empresaId,rol:f.rolEmpresa||""}]:[]);
  const setEmps=(arr)=>setF(p=>({...p,empresas:arr}));
  const addEmpRow=()=>setEmps([...empList,{empresaId:"",rol:""}]);
  const setEmpRow=(i,k,v)=>setEmps(empList.map((x,j)=>j===i?{...x,[k]:v}:x));
  const delEmpRow=(i)=>setEmps(empList.filter((x,j)=>j!==i));
  const espDisp=(catalogos.etapaEspecifica||[]).filter(e=>!f.etapaPrincipal||e.principal===f.etapaPrincipal);
  const toggleGiro=(g)=>setF(p=>{const has=p.giros.includes(g);const giros=has?p.giros.filter(x=>x!==g):[...p.giros,g];
    let gp=p.giroPrincipal; if(has&&gp===g)gp=giros[0]||null; if(!has&&!gp)gp=g; return {...p,giros,giroPrincipal:gp};});
  const toggleSol=(v)=>setF(p=>({...p,solucionesAncla:p.solucionesAncla.includes(v)?p.solucionesAncla.filter(x=>x!==v):[...p.solucionesAncla,v]}));
  const toggleEtiqueta=(id)=>setF(p=>({...p,etiquetas:(p.etiquetas||[]).includes(id)?(p.etiquetas||[]).filter(x=>x!==id):[...(p.etiquetas||[]),id]}));
  const save=()=>{ if(!f.nombre&&!f.nombreCompleto){alert("El nombre es obligatorio");return;}
    const completo=f.nombreCompleto||[f.nombre,f.apellido].filter(Boolean).join(" ");
    const empsRaw=f.empresas||(f.empresaId?[{empresaId:f.empresaId,rol:f.rolEmpresa||""}]:[]);
    const emps=empsRaw.filter(x=>x&&x.empresaId);const prim=emps[0]||{};
    onSave({...f,nombreCompleto:completo,empresas:emps,empresaId:prim.empresaId||null,rolEmpresa:prim.rol||null}); };
  return <div style={S.modal} onClick={onClose}>
    <div style={S.mBox} onClick={e=>e.stopPropagation()}>
      <div style={S.mTit}>{init.id?"Editar contacto":"Nuevo contacto"}</div>

      <div style={S.sTit}>Identidad</div>
      <div style={S.g2}>
        <Field label="Alias"><input style={S.inp} value={f.alias||""} onChange={e=>set("alias",e.target.value||null)}/></Field>
        <Field label="Nombre"><input style={S.inp} value={f.nombre||""} onChange={e=>set("nombre",e.target.value)}/></Field>
      </div>
      <Field label="Apellido(s)"><input style={S.inp} value={f.apellido||""} onChange={e=>set("apellido",e.target.value)}/></Field>

      <div style={S.sTit}>Generales</div>
      <Field label="Tipo de contacto">
        <div style={{...S.chips,flexWrap:"wrap",overflowX:"visible"}}>
          {(catalogos.tipoContacto||[]).map(o=>{const on=(f.tiposContacto||[]).includes(o.nombre);
            return <span key={o.id} style={S.chip(on,"#7dd3fc")} onClick={()=>set("tiposContacto",on?(f.tiposContacto||[]).filter(x=>x!==o.nombre):[...(f.tiposContacto||[]),o.nombre])}>{o.nombre}</span>;})}
        </div>
      </Field>
      <Field label="Actividad principal">
        <input style={S.inp} list="actlist" value={f.actividad||""} onChange={e=>set("actividad",e.target.value||null)} placeholder="Elige una existente o escribe nueva…"/>
        <datalist id="actlist">{(catalogos.actividadPrincipal||[]).map(o=><option key={o.id} value={o.nombre}/>)}</datalist>
      </Field>
      <div style={S.g2}>
        <Field label="Teléfono"><input style={S.inp} value={f.telefono||""} onChange={e=>set("telefono",e.target.value||null)}/></Field>
        <Field label="Correo"><input style={S.inp} value={f.correo||""} onChange={e=>set("correo",e.target.value||null)}/></Field>
      </div>
      <Field label="Domicilio"><input style={S.inp} value={f.domicilio||""} onChange={e=>set("domicilio",e.target.value||null)}/></Field>
      <div style={S.sTit}>Empresas vinculadas</div>
      {empList.length===0&&<div style={{fontSize:11,color:"#475569",marginBottom:8}}>Sin empresas. Agrega una si el contacto pertenece o es dueño de alguna.</div>}
      {empList.map((row,i)=><div key={i} style={{background:"#10101e",border:"1px solid #1e293b",borderRadius:9,padding:"9px 11px",marginBottom:8}}>
        <div style={S.g2}>
          <Field label="Empresa">
            <BuscaSelect opciones={empresas.slice().sort((a,b)=>(a.nombre||"").localeCompare(b.nombre||"")).map(e=>({id:e.id,label:e.nombre}))} value={row.empresaId} onChange={v=>setEmpRow(i,"empresaId",v)} placeholder="— Selecciona —" vacioLabel="— Sin empresa —" onAdd={(nombre)=>{setNuevaEmp({nombre:nombre||null,_row:i});return null;}} addLabel="empresa"/>
          </Field>
          <Field label="Rol"><CatSelect cat={catalogos.rolEmpresa} value={row.rol} onChange={v=>setEmpRow(i,"rol",v)}/></Field>
        </div>
        <button style={{...S.pill(false,"#f87171"),marginTop:6,padding:"4px 10px",fontSize:11}} onClick={()=>delEmpRow(i)}>Quitar empresa</button>
      </div>)}
      <button style={{...S.pill(true,GOLD),marginBottom:4,padding:"7px 12px",fontWeight:700}} onClick={addEmpRow}>+ Agregar empresa</button>

      <div style={S.sTit}>Alianza estratégica / comercial</div>
      <div style={{fontSize:9,color:"#475569",marginTop:-4,marginBottom:8,lineHeight:1.4}}>Marca uno o ambos tipos para registrar a este contacto como aliado (puede ser estratégico y comercial a la vez); así aparecerá en la pestaña Aliados. Sin tipo, no es aliado.</div>
      <Field label="Tipo de aliado">
        <div style={{...S.chips,flexWrap:"wrap",overflowX:"visible"}}>
          {(catalogos.tipoAliado||[]).map(o=>{const on=(f.tiposAliado||[]).includes(o.nombre);
            return <span key={o.id} style={S.chip(on,"#2dd4bf")} onClick={()=>set("tiposAliado",on?(f.tiposAliado||[]).filter(x=>x!==o.nombre):[...(f.tiposAliado||[]),o.nombre])}>{o.nombre}</span>;})}
        </div>
      </Field>
      {(f.tiposAliado&&f.tiposAliado.length>0)&&<>
        <Field label="Estatus de la alianza"><CatSelect cat={catalogos.estatusAliado} value={f.estatusAliado} onChange={v=>set("estatusAliado",v)}/></Field>
        <Field label="Soluciones en las que es aliado">
          <div style={{...S.chips,flexWrap:"wrap",overflowX:"visible"}}>
            {(catalogos.solucion||[]).map(o=>{const on=(f.solucionesAliado||[]).includes(o.id);
              return <span key={o.id} style={S.chip(on,"#2dd4bf")} onClick={()=>set("solucionesAliado",on?(f.solucionesAliado||[]).filter(x=>x!==o.id):[...(f.solucionesAliado||[]),o.id])}>{o.nombre}</span>;})}
          </div>
          {(catalogos.solucion||[]).length===0&&<div style={{fontSize:9,color:"#475569"}}>No hay soluciones en el catálogo todavía.</div>}
        </Field>
        <Field label="Condiciones Económicas de la Alianza"><textarea style={{...S.inp,minHeight:54,resize:"vertical",fontFamily:"inherit"}} value={f.esquemaParticipacion||""} onChange={e=>set("esquemaParticipacion",e.target.value||null)} placeholder="Ej. 20% comisión, honorario fijo, esquema escalonado…"/></Field>
        <Field label="Avance del trato"><textarea style={{...S.inp,minHeight:54,resize:"vertical",fontFamily:"inherit"}} value={f.avanceTrato||""} onChange={e=>set("avanceTrato",e.target.value||null)} placeholder="Avance de la negociación hacia activarlo…"/></Field>
      </>}

      {(catalogos.etiquetas||[]).length>0&&<>
      <div style={S.sTit}>Etiquetas</div>
      <div style={{...S.chips,flexWrap:"wrap",overflowX:"visible"}}>
        {(catalogos.etiquetas||[]).map(e=><span key={e.id} onClick={()=>toggleEtiqueta(e.id)} style={S.chip((f.etiquetas||[]).includes(e.id),"#a78bfa")}>{e.nombre}</span>)}
      </div>
      </>}

      {/* ── Secciones solo si es Prospecto ── */}
      {(f.tiposContacto||[]).includes("Prospecto")
        ? <>
          <div style={S.sTit}>Información relacional</div>
          <div style={S.g2}>
            <Field label="Círculo"><CatSelect cat={catalogos.circulo} value={f.circulo} onChange={v=>set("circulo",v)}/></Field>
            <Field label="Relación"><CatSelect cat={catalogos.relacion} value={f.relacion} onChange={v=>set("relacion",v)}/></Field>
          </div>
          <div style={S.g2}>
            <Field label="Nivel de cercanía"><CatSelect cat={catalogos.cercania} value={f.cercania} onChange={v=>set("cercania",v)}/></Field>
            <Field label="Nivel económico"><CatSelect cat={catalogos.nivelEconomico} value={f.nivelEconomico} onChange={v=>set("nivelEconomico",v)}/></Field>
          </div>
          <div style={S.g2}>
            <Field label="Potencial Nexus"><CatSelect cat={catalogos.potencial} value={f.potencial} onChange={v=>set("potencial",v)}/></Field>
            <Field label="Capacidad referidor"><CatSelect cat={catalogos.capacidadRef} value={f.capacidadRef} onChange={v=>set("capacidadRef",v)}/></Field>
          </div>
          <Field label="Referidor del contacto"><input style={S.inp} value={f.referidor||""} onChange={e=>set("referidor",e.target.value||null)} placeholder="Quién lo refirió…"/></Field>
          <Field label="Nota sobre la relación"><input style={S.inp} value={f.notaRelacion||""} onChange={e=>set("notaRelacion",e.target.value||null)}/></Field>

          <div style={S.sTit}>Perfil estratégico</div>
          <Field label="Tipo de persona"><CatSelect cat={catalogos.tipoPersona} value={f.tipoPersona} onChange={v=>set("tipoPersona",v)}/></Field>
          <Field label="Giros (toca para seleccionar o quitar)">
            <div style={{...S.chips,flexWrap:"wrap",overflowX:"visible"}}>
              {(catalogos.giro||[]).map(o=>{const a=f.giros.includes(o.nombre);const p=f.giroPrincipal===o.nombre;
                return <span key={o.id} onClick={()=>toggleGiro(o.nombre)} style={S.chip(a,p?GOLD:"#3b82f6")}>{p?"★ ":""}{o.nombre}</span>;})}
            </div>
          </Field>
          {f.giros.length>0&&<Field label="Giro principal">
            <select style={S.sel} value={f.giroPrincipal||""} onChange={e=>set("giroPrincipal",e.target.value||null)}>
              {f.giros.map(g=><option key={g} value={g}>{g}</option>)}
            </select>
          </Field>}

          <div style={S.sTit}>Soluciones ancla viables</div>
          <div style={{...S.chips,flexWrap:"wrap",overflowX:"visible"}}>
            {(catalogos.solucion||[]).filter(s=>s.ancla).map(s=><span key={s.id} onClick={()=>toggleSol(s.id)} style={S.chip(f.solucionesAncla.includes(s.id),"#C9A84C")}>{s.nombre}</span>)}
          </div>

          <div style={S.sTit}>Avance Nexus</div>
          <div style={S.g2}>
            <Field label="Etapa principal">
              <CatSelect cat={catalogos.etapaPrincipal} value={f.etapaPrincipal} onChange={v=>{set("etapaPrincipal",v);set("etapaEspecifica",null);}}/>
            </Field>
            <Field label="Etapa específica">
              <select style={S.sel} value={f.etapaEspecifica||""} onChange={e=>set("etapaEspecifica",e.target.value||null)}>
                <option value="">— Selecciona —</option>
                {espDisp.map(o=><option key={o.id} value={o.nombre}>{o.nombre}</option>)}
              </select>
            </Field>
          </div>
          <Field label="Resumen de avance"><textarea style={S.ta} value={f.resumenAvance||""} onChange={e=>set("resumenAvance",e.target.value||null)} placeholder="Tu memoria del avance con esta persona…"/></Field>
          <div style={S.g2}>
            <Field label="Fecha último contacto"><input type="date" style={S.inp} value={f.fechaUltimoContacto||""} onChange={e=>set("fechaUltimoContacto",e.target.value||null)}/></Field>
            <Field label="¿Presentación Nexus?">
              <div style={{display:"flex",gap:6}}>
                <button style={{...S.pill(f.cuentaPresentacion,"#22c55e"),flex:1}} onClick={()=>set("cuentaPresentacion",true)}>Sí</button>
                <button style={{...S.pill(!f.cuentaPresentacion),flex:1}} onClick={()=>set("cuentaPresentacion",false)}>No</button>
              </div>
            </Field>
          </div>

          <div style={S.sTit}>Referencia histórica Pixán</div>
          <div style={S.g2}>
            <Field label="¿Acercamiento previo?">
              <div style={{display:"flex",gap:6}}>
                <button style={{...S.pill(f.acercamientoPixan,"#a78bfa"),flex:1}} onClick={()=>set("acercamientoPixan",true)}>Sí</button>
                <button style={{...S.pill(!f.acercamientoPixan),flex:1}} onClick={()=>set("acercamientoPixan",false)}>No</button>
              </div>
            </Field>
            <Field label="Etapa Pixán">
              <select style={S.sel} value={f.etapaPixan||""} disabled={!f.acercamientoPixan} onChange={e=>set("etapaPixan",e.target.value||null)}>
                <option value="">— Selecciona —</option>
                {(catalogos.pixan||[]).map(o=><option key={o.id} value={o.nombre}>{o.nombre}</option>)}
              </select>
            </Field>
          </div>
        </>
        : <div style={{fontSize:10,color:"#475569",padding:"8px 10px",background:"#0f172a",borderRadius:8,border:"1px solid #1e293b",marginTop:8}}>Las secciones de información relacional, perfil estratégico y avance aparecen cuando el tipo incluye <b style={{color:"#7dd3fc"}}>Prospecto</b>.</div>
      }

      <Field label="Observaciones generales"><textarea style={S.ta} value={f.obs||""} onChange={e=>set("obs",e.target.value||null)}/></Field>

      <button style={S.saveB} onClick={save}>Guardar</button>
      <button style={S.cancB} onClick={onClose}>Cancelar</button>
    </div>
    {nuevaEmp&&<div onClick={e=>e.stopPropagation()}>
      <EmpresaModal init={{nombre:nuevaEmp.nombre}} catalogos={catalogos}
        onSave={(d)=>{const nid=onCreateEmpresa(d);if(nuevaEmp&&nuevaEmp._row!=null)setEmpRow(nuevaEmp._row,"empresaId",nid);else setEmps([...empList,{empresaId:nid,rol:""}]);setNuevaEmp(null);}}
        onClose={()=>setNuevaEmp(null)}/>
    </div>}
  </div>;
}

/* ════════ DETALLE CONTACTO ════════ */
function ContactoDetalle({c,contactos,catalogos,empresas,actividades,oportunidades,onAddAct,onEditAct,onAddOpo,onEditOpo,onEdit,onDelete,onBack}){
  const emp=empresas.find(e=>e.id===c.empresaId);
  const Row=({k,v})=> v?<div style={S.detRow}><span style={S.detK}>{k}</span><span style={S.detV}>{v}</span></div>:null;
  return <div>
    <div style={{...S.sec,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <button style={S.back} onClick={onBack}>‹ Contactos</button>
      <div style={{display:"flex",gap:8}}>
        <button style={S.pill(true,GOLD)} onClick={onEdit}>Editar</button>
      </div>
    </div>
    <div style={S.sec}>
      <div style={{fontSize:20,fontWeight:800,color:"#e2e8f0",marginBottom:4}}>{c.nombreCompleto}</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:4}}>
        {c.etapaPrincipal&&<span style={S.tag(ec(c.etapaPrincipal))}>{c.etapaPrincipal}{c.etapaEspecifica?` · ${c.etapaEspecifica}`:""}</span>}
        {(c.tiposContacto||[c.tipoContacto].filter(Boolean)).map(t=><span key={t} style={S.tag("#7dd3fc")}>{t}</span>)}
        {c.potencial&&<span style={S.tag(POT_COLOR[c.potencial]||"#64748b")}>Potencial {c.potencial}</span>}
      </div>
    </div>

    <div style={S.sec}>
      <div style={S.card()}>
        <div style={S.sTit}>Generales</div>
        <Row k="Actividad" v={c.actividad}/>
        {cEmpresas(c).map((x,i)=>{const e=empresas.find(em=>em.id===x.empresaId);return e?<Row key={i} k={i===0?"Empresa":"Empresa "+(i+1)} v={e.nombre+(x.rol?" · "+x.rol:"")}/>:null;})}
        <Row k="Teléfono" v={c.telefono}/>
        <Row k="Correo" v={c.correo}/>
        <Row k="Domicilio" v={c.domicilio}/>
        {!(c.actividad||emp||c.telefono||c.correo||c.domicilio)&&<div style={{fontSize:11,color:"#475569"}}>Sin datos generales aún.</div>}
      </div>

      <div style={S.card()}>
        <div style={S.sTit}>Relación</div>
        <Row k="Círculo" v={c.circulo}/>
        <Row k="Relación" v={c.relacion}/>
        <Row k="Nivel de cercanía" v={c.cercania}/>
        <Row k="Nivel económico" v={c.nivelEconomico}/>
        <Row k="Referidor" v={c.referidor}/>
        <Row k="Capacidad referidor" v={c.capacidadRef}/>
        {c.notaRelacion&&<div style={{fontSize:12,color:"#94a3b8",marginTop:8,lineHeight:1.5}}>{c.notaRelacion}</div>}
      </div>

      <div style={S.card()}>
        <div style={S.sTit}>Avance Nexus</div>
        <Row k="Etapa principal" v={c.etapaPrincipal}/>
        <Row k="Etapa específica" v={c.etapaEspecifica}/>
        <Row k="Presentación Nexus" v={c.cuentaPresentacion?"Sí":"No"}/>
        <div style={S.detRow}><span style={S.detK}>Último contacto</span><span style={S.detV}>{c.fechaUltimoContacto||"Sin fecha"}</span></div>
        {c.resumenAvance&&<div style={{fontSize:12,color:"#cbd5e1",marginTop:8,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{c.resumenAvance}</div>}
        {!c.resumenAvance&&<div style={{fontSize:11,color:"#475569",marginTop:6}}>Sin resumen de avance.</div>}
      </div>

      {(c.acercamientoPixan||c.etapaPixan)&&<div style={S.card("#a78bfa44")}>
        <div style={S.sTit}>Referencia Pixán</div>
        <Row k="Acercamiento previo" v={c.acercamientoPixan?"Sí":"No"}/>
        <Row k="Etapa Pixán" v={c.etapaPixan}/>
      </div>}

      <div style={S.card()}>
        <div style={S.sTit}>Perfil estratégico</div>
        <Row k="Tipo de persona" v={c.tipoPersona}/>
        {c.giros&&c.giros.length>0&&<div style={{marginTop:8}}>
          <div style={S.detK}>Giros</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:5}}>
            {c.giros.map(g=><span key={g} style={S.tag(c.giroPrincipal===g?GOLD:"#3b82f6")}>{c.giroPrincipal===g?"★ ":""}{g}</span>)}
          </div>
        </div>}
      </div>

      {c.solucionesAncla&&c.solucionesAncla.length>0&&<div style={S.card("#C9A84C44")}>
        <div style={S.sTit}>Soluciones ancla viables</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {c.solucionesAncla.map(v=>{const s=(catalogos.solucion||[]).find(x=>x.id===v);return <span key={v} style={S.tag(GOLD)}>{s?s.nombre:v}</span>;})}
        </div>
      </div>}

      {(c.tiposAliado&&c.tiposAliado.length>0)&&<div style={S.card("#2dd4bf44")}>
        <div style={S.sTit}>Alianza · {c.tiposAliado.join(" + ")}{c.estatusAliado?` — ${c.estatusAliado}`:""}</div>
        {(c.solucionesAliado||[]).length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
          {c.solucionesAliado.map(id=>{const s=(catalogos.solucion||[]).find(x=>x.id===id);return <span key={id} style={S.tag("#2dd4bf")}>{s?s.nombre:id}</span>;})}
        </div>}
        {c.esquemaParticipacion&&<div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}><b style={{color:"#cbd5e1"}}>Condiciones:</b> {c.esquemaParticipacion}</div>}
        {c.avanceTrato&&<div style={{fontSize:12,color:"#94a3b8",lineHeight:1.6,whiteSpace:"pre-wrap"}}><b style={{color:"#cbd5e1"}}>Avance del trato:</b> {c.avanceTrato}</div>}
        {(c.solucionesAliado||[]).length===0&&!c.esquemaParticipacion&&!c.avanceTrato&&<div style={{fontSize:11,color:"#475569"}}>Sin soluciones ni condiciones registradas. Edita para completarlas.</div>}
      </div>}

      {c.obs&&<div style={S.card()}><div style={S.sTit}>Observaciones</div><div style={{fontSize:12,color:"#94a3b8",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{c.obs}</div></div>}

      <div style={S.card()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
          <div style={{fontSize:9,color:"#475569",letterSpacing:2,textTransform:"uppercase",fontWeight:700}}>Oportunidades</div>
          <button style={S.pill(true,"#fbbf24")} onClick={()=>onAddOpo(c.id)}>+ Detonar</button>
        </div>
        {(oportunidades||[]).filter(o=>o.contactoPrincipalId===c.id||o.contactoOperativoId===c.id||o.contactoId===c.id).map(o=><OpoCard key={o.id} o={o} contactos={contactos} empresas={empresas} catalogos={catalogos} onTap={(x)=>onEditOpo(x)}/>)}
        {(oportunidades||[]).filter(o=>o.contactoPrincipalId===c.id||o.contactoOperativoId===c.id||o.contactoId===c.id).length===0&&<div style={{fontSize:11,color:"#475569"}}>Sin oportunidades aún.</div>}
      </div>

      <div style={S.card()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
          <div style={{fontSize:9,color:"#475569",letterSpacing:2,textTransform:"uppercase",fontWeight:700}}>Actividades</div>
          <button style={S.pill(true,GOLD)} onClick={()=>onAddAct(c.id)}>+ Registrar</button>
        </div>
        <ActividadesList acts={(actividades||[]).filter(a=>a.contactoId===c.id)} contactos={[c]} showContacto={false} onTap={(a)=>onEditAct(a)}/>
      </div>

      <button style={{...S.cancB,color:"#f87171",borderColor:"#f8717144"}} onClick={onDelete}>Eliminar contacto</button>
    </div>
  </div>;
}

/* ════════ LISTA CONTACTOS ════════ */
function Contactos({initialSel,contactos,catalogos,setCatalogos,empresas,setEmpresas,setContactos,actividades,openAct,oportunidades,openOpo,aliadosOnly,onBack}){
  const[q,setQ]=useState("");
  const[fEtapa,setFEtapa]=useState([]);
  const[fEsp,setFEsp]=useState([]);
  const[fGiro,setFGiro]=useState([]);
  const[fSol,setFSol]=useState([]);
  const[fEtiq,setFEtiq]=useState([]);
  const[fPot,setFPot]=useState([]);
  const[fCer,setFCer]=useState([]);
  const[fEco,setFEco]=useState([]);

  tipoAliado:"Tipo de aliado",estatusAliado:"Estatus de aliado",

function Catalogos({catalogos,setCatalogos,contactos,setContactos,onProductos,onBack}){

          setCatalogos(p=>({...p,etapaEspecifica:p.etapaEspecifica.map(o=>o.id===editEsp.id?{...o,nombre,principal:editEsp.principal||null,descripcion:editEsp.descripcion||""}:o)}));
          if(setContactos)setContactos(prev=>prev.map(c=>c.etapaEspecifica===oldName?{...c,etapaEspecifica:nombre,etapaPrincipal:editEsp.principal||c.etapaPrincipal}:c));
        }else{const nid="eta"+Date.now();setCatalogos(p=>({...p,etapaEspecifica:[...p.etapaEspecifica,{id:nid,nombre,principal:editEsp.principal||null,descripcion:editEsp.descripcion||""}]}));}

            </div>

    const remove=(id)=>{setCatalogos(p=>({...p,[open]:p[open].filter(o=>o.id!==id)}));if(open==="etiquetas"&&setContactos)setContactos(prev=>prev.map(c=>(c.etiquetas&&c.etiquetas.includes(id))?{...c,etiquetas:c.etiquetas.filter(x=>x!==id)}:c));};
    const move=(idx,dir)=>{const j=idx+dir;if(j<0||j>=items.length)return;
      setCatalogos(p=>{const arr=[...p[open]];const t=arr[idx];arr[idx]=arr[j];arr[j]=t;return {...p,[open]:arr};});};
    return <div>
      <div style={{...S.sec,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button style={S.back} onClick={()=>setOpen(null)}>‹ Catálogos</button>

        </div>
      </div>
    </div>;
  }
  return <div>
    {onBack&&<div style={S.sec}><button style={S.back} onClick={onBack}>‹ Configuración</button></div>}

  </div>;

  </div>;

/* ════════ OBJETIVOS (metas mensuales y proyección) ════════ */
const MESNOM=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
function mesesDesde(ini,n){const[y,m]=ini.split("-").map(Number);const a=[];let yy=y,mm=m;for(let i=0;i<n;i++){a.push(yy+"-"+String(mm).padStart(2,"0"));mm++;if(mm>12){mm=1;yy++;}}return a;}
function etiquetaMes(k){const[y,m]=k.split("-").map(Number);return MESNOM[m-1]+" "+String(y).slice(2);}
function Objetivos({productos,setProductos,catalogos,setCatalogos,contactos,oportunidades,onProductos}){
  const hoy=new Date();
  const[ini,setIni]=useState(()=>hoy.getFullYear()+"-"+String(hoy.getMonth()+1).padStart(2,"0"));
  const[nMeses,setNMeses]=useState(6);
  const[modo,setModo]=useState("matriz");
  const[ver,setVer]=useState(null);
  const[metaContactos,setMetaContactos]=useState(()=>loadLS("metaProspContactos",0));
  const[mesRep,setMesRep]=useState(()=>hoy.getFullYear()+"-"+String(hoy.getMonth()+1).padStart(2,"0"));
  const meses=mesesDesde(ini,nMeses);
  const setMeta=(pid,mes,val)=>setProductos(prev=>prev.map(p=>{
    if(p.id!==pid)return p;
    const metas={...(p.metas||{})};
    if(val===""||val===null)delete metas[mes];else metas[mes]=val;
    return {...p,metas};
  }));
  const cierreProd=(p,mes)=>(Number((p.metas||{})[mes])||0)*comResultProd(p);
  const ingresoProd=(p,mes)=>{const com=comResultProd(p),metas=p.metas||{};if(p.recurrente){let u=0;for(const k in metas){if(k<=mes)u+=Number(metas[k])||0;}return u*com;}return (Number(metas[mes])||0)*com;};
  const sols=(catalogos.solucion||[]).map(s=>({s,prods:productos.filter(p=>p.solucionId===s.id)})).filter(g=>g.prods.length>0);
  const sumProds=(prods,mes,fn)=>prods.reduce((a,p)=>a+fn(p,mes),0);
  const WCOL=120,WMES=68;
  const cellNum={width:WMES,flexShrink:0,fontSize:10,textAlign:"right",padding:"6px 6px 6px 0",color:"#94a3b8"};
  const cellHd={width:WMES,flexShrink:0,fontSize:9,fontWeight:800,color:"#64748b",textAlign:"right",padding:"6px 6px 6px 0"};
  return <div>
    <div style={S.hdr}><div><div style={S.logo}>Objetivos</div><div style={S.sub}>Metas mensuales · proyección de ingreso Nexus</div></div></div>
    <div style={S.line}/>

      <button style={{...S.pill(modo==="matriz",GOLD),flex:1,fontSize:11,padding:"8px 4px"}} onClick={()=>setModo("matriz")}>Matriz</button>
      <button style={{...S.pill(modo==="reporte","#2dd4bf"),flex:1,fontSize:11,padding:"8px 4px"}} onClick={()=>setModo("reporte")}>Reporte</button>
      <button style={{...S.pill(modo==="productos","#a78bfa"),flex:1,fontSize:11,padding:"8px 4px"}} onClick={()=>setModo("productos")}>Productos</button>
      <button style={{...S.pill(modo==="prospeccion","#2dd4bf"),flex:1,fontSize:10,padding:"8px 4px"}} onClick={()=>setModo("prospeccion")}>Prospección</button>
    </div></div>
    {modo==="prospeccion"&&(()=>{
      const NOPROS=["Oportunidad Concretada","Oportunidad Rechazada"];
      const candProceso=contactos.filter(c=>c.etapaEspecifica==="Candidato en Proceso");
      const enContacto=contactos.filter(c=>c.etapaPrincipal==="Contacto");
      const prospBySol={};
      (oportunidades||[]).forEach(o=>{if(NOPROS.indexOf(o.etapa)>-1)return;const sid=o.solucionId;const cid=o.contactoPrincipalId||o.contactoId;if(!sid||!cid)return;(prospBySol[sid]=prospBySol[sid]||{})[cid]=1;});
      const solList=(catalogos.solucion||[]);
      const cById=(id)=>contactos.find(c=>c.id===id);
      const prospContactosSol=(sid)=>Object.keys(prospBySol[sid]||{}).map(cById).filter(Boolean);
      const totalProsp=solList.reduce((a,s)=>a+Object.keys(prospBySol[s.id]||{}).length,0);
      const totalMeta=solList.reduce((a,s)=>a+(Number(s.metaProspeccion)||0),0);
      const setMetaProsp=(sid,val)=>setCatalogos(p=>({...p,solucion:p.solucion.map(s=>s.id===sid?{...s,metaProspeccion:val===""?null:(Number(val)||0)}:s)}));
      const barra=(val,meta,color)=>{const pct=meta>0?Math.min(100,Math.round(val/meta*100)):0;return <div style={{height:6,background:"#1e293b",borderRadius:4,overflow:"hidden",marginTop:6}}><div style={{height:"100%",width:pct+"%",background:color}}/></div>;};
      const Lista=({titulo,items})=><div style={{...S.card(),marginTop:10}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><div style={{fontSize:13,fontWeight:800,color:GOLD}}>{titulo} ({items.length})</div><button style={S.pill(false,"#64748b")} onClick={()=>setVer(null)}>Cerrar</button></div>
          {items.length===0?<div style={{fontSize:11,color:"#475569"}}>Sin contactos.</div>:items.map(c=><div key={c.id} style={{padding:"7px 0",borderTop:"1px solid #14141f"}}><div style={{fontSize:12,fontWeight:700}}>{c.nombreCompleto}</div><div style={{fontSize:10,color:"#64748b",marginTop:2}}>{c.etapaEspecifica||c.etapaPrincipal||"—"}{c.fechaUltimoContacto?" · últ. "+c.fechaUltimoContacto:""}</div></div>)}
        </div>;
      return <div style={S.sec}>
        <div style={{...S.card(),cursor:"pointer",borderColor:"#a78bfa44"}} onClick={()=>setVer({t:"cand"})}>
          <div style={{fontSize:9,color:"#64748b",textTransform:"uppercase",letterSpacing:1}}>Candidatos en Proceso</div>
          <div style={{fontSize:26,fontWeight:800,fontFamily:"'Cinzel',serif",color:"#a78bfa",lineHeight:1.1}}>{candProceso.length}</div>
          <div style={{fontSize:10,color:"#475569"}}>En la mira para lograr contacto · toca para ver</div>
        </div>
        <div style={{...S.card(),marginTop:10,borderColor:GOLD+"33"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",gap:10}}>
            <div><div style={{fontSize:9,color:"#64748b",textTransform:"uppercase",letterSpacing:1}}>Contactos (trabajando)</div>
              <div onClick={()=>setVer({t:"cont"})} style={{fontSize:26,fontWeight:800,fontFamily:"'Cinzel',serif",color:GOLD,cursor:"pointer",lineHeight:1.1}}>{enContacto.length}<span style={{fontSize:13,color:"#64748b"}}> / {Number(metaContactos)||0}</span></div></div>
            <div style={{width:96}}><div style={{fontSize:9,color:"#64748b",marginBottom:3}}>Meta global</div><input type="number" style={{...S.inp,fontSize:13,padding:"6px 8px"}} value={metaContactos||""} onChange={e=>{const v=e.target.value===""?0:(Number(e.target.value)||0);setMetaContactos(v);saveLS("metaProspContactos",v);}}/></div>
          </div>
          {barra(enContacto.length,Number(metaContactos)||0,GOLD)}
        </div>
        <div style={{...S.sTit,marginTop:16}}>Prospectos por solución</div>
        <div style={{fontSize:10,color:"#64748b",marginBottom:8}}>Contactos con oportunidad activa (excluye Concretada/Rechazada). Toca el número para ver quiénes.</div>
        {solList.length===0&&<div style={{fontSize:11,color:"#475569"}}>No hay soluciones en el catálogo.</div>}
        {solList.map(s=>{const val=Object.keys(prospBySol[s.id]||{}).length;const meta=Number(s.metaProspeccion)||0;return (
          <div key={s.id} style={{...S.card(),marginBottom:8,padding:"10px 12px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
              <div style={{fontSize:12,fontWeight:700,flex:1,minWidth:0}}>{s.nombre}</div>
              <div onClick={()=>setVer({t:"sol",sid:s.id,nom:s.nombre})} style={{fontSize:19,fontWeight:800,fontFamily:"'Cinzel',serif",color:"#2dd4bf",cursor:"pointer",minWidth:24,textAlign:"right"}}>{val}</div>
              <div style={{width:66}}><input type="number" placeholder="meta" style={{...S.inp,fontSize:12,padding:"5px 7px"}} value={s.metaProspeccion!=null?s.metaProspeccion:""} onChange={e=>setMetaProsp(s.id,e.target.value)}/></div>
            </div>
            {meta>0&&barra(val,meta,"#2dd4bf")}
          </div>);})}
        {solList.length>0&&<div style={{...S.card(),marginTop:2,borderColor:GOLD+"44",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:13,fontWeight:800}}>Total prospectos</div>
          <div style={{fontSize:19,fontWeight:800,fontFamily:"'Cinzel',serif",color:GOLD}}>{totalProsp}<span style={{fontSize:12,color:"#64748b"}}> / {totalMeta}</span></div>
        </div>}
        {ver&&ver.t==="cand"&&<Lista titulo="Candidatos en Proceso" items={candProceso}/>}
        {ver&&ver.t==="cont"&&<Lista titulo="Contactos (trabajando)" items={enContacto}/>}
        {ver&&ver.t==="sol"&&<Lista titulo={"Prospectos · "+ver.nom} items={prospContactosSol(ver.sid)}/>}
      </div>;
    })()}
    {modo==="matriz"&&<div style={S.sec}>
      <div style={S.g2}>
        <div><div style={S.fl}>Mes inicial</div><input type="month" style={S.inp} value={ini} onChange={e=>setIni(e.target.value||ini)}/></div>
        <div><div style={S.fl}>Meses a proyectar</div>
          <div style={{display:"flex",gap:5}}>{[3,6,12].map(n=><button key={n} style={{...S.pill(nMeses===n,GOLD),flex:1}} onClick={()=>setNMeses(n)}>{n}</button>)}</div>
        </div>
      </div>
      <div style={{fontSize:9,color:"#475569",marginTop:8,lineHeight:1.4}}>Captura la meta en <b>unidades</b> (admite decimales) por producto y mes. La comisión y el acumulado se calculan solos. Editar una celda guarda directo en el producto.</div>
    </div>}
    {modo==="matriz"&&(productos.length===0
      ? <div style={S.sec}><div style={{...S.card(),textAlign:"center",color:"#475569",fontSize:12,padding:"24px 12px"}}>No hay productos todavía. Créalos en <span style={{color:"#2dd4bf",fontWeight:700,cursor:"pointer"}} onClick={onProductos}>Catálogos → Productos</span> y aquí defines sus metas.</div></div>
      : <div style={S.sec}>
        <div style={{...S.card(),padding:0,overflowX:"auto"}}>
          <div style={{minWidth:WCOL+meses.length*WMES}}>
            <div style={{display:"flex",borderBottom:"1px solid #1e293b",padding:"0 0 0 10px",position:"sticky",top:0}}>
              <div style={{width:WCOL,flexShrink:0,fontSize:9,fontWeight:800,color:"#64748b",padding:"8px 0"}}>PRODUCTO</div>
              {meses.map(m=><div key={m} style={{...cellHd,paddingTop:8,paddingBottom:8,color:"#cbd5e1"}}>{etiquetaMes(m)}</div>)}
            </div>
            {sols.map(g=><div key={g.s.id}>
              <div style={{padding:"7px 10px",background:"#0d1420",borderBottom:"1px solid #1e293b",fontSize:11,fontWeight:800,color:"#2dd4bf"}}>{g.s.nombre}</div>
              {g.prods.map(p=><div key={p.id} style={{display:"flex",alignItems:"center",padding:"0 0 0 10px",borderBottom:"1px solid #14141f"}}>
                <div style={{width:WCOL,flexShrink:0,padding:"6px 6px 6px 0"}}>
                  <div style={{fontSize:11,fontWeight:600,lineHeight:1.2}}>{p.tipo}</div>
                  <div style={{fontSize:8,color:"#64748b"}}>{money(comResultProd(p))}{p.recurrente?" · recur.":" · único"}</div>
                </div>
                {meses.map(m=><div key={m} style={{width:WMES,flexShrink:0,padding:"4px 4px 4px 0"}}>
                  <input type="text" inputMode="decimal" value={(p.metas||{})[m]??""} onChange={e=>setMeta(p.id,m,e.target.value)} placeholder="0" style={{width:"100%",background:"#10101e",border:"1px solid #1e293b",borderRadius:6,color:"#e2e8f0",fontSize:11,textAlign:"center",padding:"5px 6px"}}/>
                </div>)}
              </div>)}
              <div style={{display:"flex",padding:"0 0 0 10px",background:"#0a0a14"}}>
                <div style={{width:WCOL,flexShrink:0,fontSize:9,fontWeight:700,color:"#64748b",padding:"5px 0"}}>Cierres $</div>
                {meses.map(m=><div key={m} style={cellNum}>{money(sumProds(g.prods,m,cierreProd))}</div>)}
              </div>
              <div style={{display:"flex",padding:"0 0 0 10px",background:"#0a0a14",borderBottom:"1px solid #1e293b"}}>
                <div style={{width:WCOL,flexShrink:0,fontSize:9,fontWeight:800,color:"#2dd4bf",padding:"5px 0"}}>Ingreso proy.</div>
                {meses.map(m=><div key={m} style={{...cellNum,color:"#2dd4bf",fontWeight:700}}>{money(sumProds(g.prods,m,ingresoProd))}</div>)}
              </div>
            </div>)}
            <div style={{display:"flex",padding:"0 0 0 10px",background:"#1a1505",borderTop:"2px solid "+GOLD}}>
              <div style={{width:WCOL,flexShrink:0,fontSize:10,fontWeight:800,color:GOLD,padding:"8px 0"}}>TOTAL ingreso</div>
              {meses.map(m=><div key={m} style={{...cellNum,color:GOLD,fontWeight:800,fontSize:11,paddingTop:8,paddingBottom:8}}>{money(sumProds(productos,m,ingresoProd))}</div>)}
            </div>
          </div>
        </div>
        <div style={{fontSize:9,color:"#475569",marginTop:10,lineHeight:1.5,padding:"0 2px"}}>El <b style={{color:"#2dd4bf"}}>Ingreso proy.</b> de cada solución es el acumulado vivo: los productos recurrentes se apilan mes a mes; los únicos solo en su mes. Ese total por solución alimentará el presupuesto de ingresos Nexus del CFP cuando hagamos la integración.</div>
      </div>)}
    {modo==="reporte"&&(()=>{
      const shiftMes=(mk,d)=>{let a=mk.split("-").map(Number),y=a[0],m=a[1];m+=d;while(m<1){m+=12;y--;}while(m>12){m-=12;y++;}return y+"-"+String(m).padStart(2,"0");};
      const grupos=sols.map(g=>{const items=g.prods.map(p=>({p,meta:Number((p.metas||{})[mesRep])||0,ing:ingresoProd(p,mesRep)})).filter(x=>x.meta>0||x.ing>0);const sub=items.reduce((a,x)=>a+x.ing,0);return {s:g.s,items,sub};}).filter(g=>g.items.length>0);
      const total=grupos.reduce((a,g)=>a+g.sub,0);
      return <div style={S.sec}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#10101e",border:"1px solid #1e293b",borderRadius:11,padding:"8px 10px",marginBottom:12}}>
          <button onClick={()=>setMesRep(shiftMes(mesRep,-1))} style={{background:"transparent",border:"none",color:GOLD,fontSize:20,cursor:"pointer",padding:"0 12px"}}>‹</button>
          <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#64748b",letterSpacing:1}}>OBJETIVOS DEL MES</div><div style={{fontSize:15,fontWeight:800,color:"#e2e8f0",textTransform:"capitalize"}}>{etiquetaMes(mesRep)}</div></div>
          <button onClick={()=>setMesRep(shiftMes(mesRep,1))} style={{background:"transparent",border:"none",color:GOLD,fontSize:20,cursor:"pointer",padding:"0 12px"}}>›</button>
        </div>
        <div style={{background:"#1a1505",border:"1px solid "+GOLD+"55",borderRadius:12,padding:"12px 14px",marginBottom:12}}>
          <div style={{fontSize:9,color:GOLD,letterSpacing:1,fontWeight:700}}>INGRESO NEXUS PROYECTADO</div>
          <div style={{fontSize:26,fontWeight:800,color:GOLD,fontFamily:"'Cinzel',serif",lineHeight:1.1}}>{money(total)}</div>
        </div>
        {grupos.length===0
          ? <div style={{...S.card(),textAlign:"center",color:"#475569",fontSize:12,padding:"24px 12px"}}>Sin objetivos para este mes.</div>
          : grupos.map(g=><div key={g.s.id} style={{...S.card(),marginBottom:10,padding:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 12px",borderBottom:"1px solid #1e293b"}}>
                <span style={{fontSize:12,fontWeight:800,color:"#2dd4bf"}}>{g.s.nombre}</span>
                <span style={{fontSize:13,fontWeight:800,color:GOLD}}>{money(g.sub)}</span>
              </div>
              {g.items.map(it=><div key={it.p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,padding:"8px 12px",borderBottom:"1px solid #14141f"}}>
                <div style={{minWidth:0,flex:1}}>
                  <div style={{fontSize:12,color:"#e2e8f0",fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{it.p.tipo}</div>
                  <div style={{fontSize:9,color:"#64748b"}}>{it.meta>0?it.meta+" u. meta":(it.p.recurrente?"acumulado":"—")} · {money(comResultProd(it.p))}/u · {it.p.recurrente?"recurrente":"único"}</div>
                </div>
                <div style={{fontSize:13,fontWeight:700,color:"#2dd4bf",whiteSpace:"nowrap"}}>{money(it.ing)}</div>
              </div>)}
            </div>)}
        <div style={{fontSize:9,color:"#475569",marginTop:4,lineHeight:1.5}}>Incluye productos con meta del mes y recurrentes con acumulado vivo. El total coincide con el Ingreso Nexus Proyectado que alimenta el presupuesto del CFP.</div>
      </div>;
    })()}
    {modo==="productos"&&(()=>{
      const shiftMes=(mk,d)=>{let a=mk.split("-").map(Number),y=a[0],m=a[1];m+=d;while(m<1){m+=12;y--;}while(m>12){m-=12;y++;}return y+"-"+String(m).padStart(2,"0");};
      const grupos=sols.map(g=>{const items=g.prods.map(p=>({p,meta:Number((p.metas||{})[mesRep])||0})).filter(x=>x.meta>0);return {s:g.s,items};}).filter(g=>g.items.length>0);
      return <div style={S.sec}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#10101e",border:"1px solid #1e293b",borderRadius:11,padding:"8px 10px",marginBottom:12}}>
          <button onClick={()=>setMesRep(shiftMes(mesRep,-1))} style={{background:"transparent",border:"none",color:GOLD,fontSize:20,cursor:"pointer",padding:"0 12px"}}>‹</button>
          <div style={{textAlign:"center"}}><div style={{fontSize:9,color:"#64748b",letterSpacing:1}}>QUÉ VENDER ESTE MES</div><div style={{fontSize:15,fontWeight:800,color:"#e2e8f0",textTransform:"capitalize"}}>{etiquetaMes(mesRep)}</div></div>
          <button onClick={()=>setMesRep(shiftMes(mesRep,1))} style={{background:"transparent",border:"none",color:GOLD,fontSize:20,cursor:"pointer",padding:"0 12px"}}>›</button>
        </div>
        {grupos.length===0
          ? <div style={{...S.card(),textAlign:"center",color:"#475569",fontSize:12,padding:"24px 12px"}}>Sin productos con meta este mes.</div>
          : grupos.map(g=><div key={g.s.id} style={{...S.card(),marginBottom:10,padding:0}}>
              <div style={{padding:"9px 12px",borderBottom:"1px solid #1e293b",fontSize:12,fontWeight:800,color:"#2dd4bf"}}>{g.s.nombre}</div>
              {g.items.map(it=><div key={it.p.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,padding:"8px 12px",borderBottom:"1px solid #14141f"}}>
                <div style={{minWidth:0,flex:1}}>
                  <div style={{fontSize:12,color:"#e2e8f0",fontWeight:600,whiteSpace:"pre-wrap"}}>{it.p.tipo}</div>
                  <div style={{fontSize:10,color:"#94a3b8"}}>{[it.p.categoria,(it.p.montoNegocio?money(it.p.montoNegocio):null)].filter(Boolean).join(" · ")||"—"}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:16,fontWeight:800,color:"#a78bfa"}}>{it.meta}</div><div style={{fontSize:8,color:"#64748b"}}>cantidad</div></div>
              </div>)}
            </div>)}
        <div style={{fontSize:9,color:"#475569",marginTop:4,lineHeight:1.5}}>Síntesis de venta del mes: producto, categoría, monto de producción y unidades meta. Sin comisiones ni proyección de ingreso.</div>
      </div>;
    })()}
  </div>;
}

/* ════════ CONFIGURACIÓN ════════ */
function BienesInmuebles({bienes,setBienes,catalogos,contactos,onBack}){
  const EST=["Disponible","En proceso","Vinculado","Cerrado","No disponible"];
  const TIPO=["Venta directa","Coinversión"];
  const EST_COL={"Disponible":"#22c55e","En proceso":"#fbbf24","Vinculado":"#60a5fa","Cerrado":"#94a3b8","No disponible":"#64748b"};
  const money=n=>"$"+Math.round(n||0).toLocaleString("es-MX");
  const aliadosOpts=contactos.filter(c=>(c.tiposAliado||[]).length>0).map(c=>({id:c.id,label:c.nombreCompleto})).sort((a,b)=>(a.label||"").localeCompare(b.label||""));
  const nomAliado=(id)=>{const c=contactos.find(x=>x.id===id);return c?c.nombreCompleto:"";};
  const calcCom=(f)=>((parseFloat(f.valorPropiedad)||0)*(parseFloat(f.comProp)||0)/100)+((parseFloat(f.valorInversion)||0)*(parseFloat(f.comInv)||0)/100);
  const[modal,setModal]=useState(null);
  const[q,setQ]=useState("");
  const[fEst,setFEst]=useState("");
  const[fTipo,setFTipo]=useState("");
  const set=(k,v)=>setModal(m=>({...m,[k]:v}));
  const abrir=(b)=>setModal(b?{...b}:{denominacion:"",estatus:"Disponible",tipo:"Coinversión",descripcion:"",condiciones:"",aliadoEstId:"",aliadoComId:"",valorPropiedad:"",comProp:"",valorInversion:"",comInv:"",montoComision:"",comAuto:true,ubicacion:"",superficie:"",obs:""});
  const guardar=()=>{
    if(!modal.denominacion){alert("Indica la denominación");return;}
    const auto=calcCom(modal);
    const data={...modal,montoComision:modal.comAuto!==false?auto:(parseFloat(modal.montoComision)||0)};
    setBienes(prev=>{ if(data.id)return prev.map(x=>x.id===data.id?data:x); return [...prev,{...data,id:"bi"+Date.now()}]; });
    setModal(null);
  };
  const borrar=(id)=>{ if(window.confirm("¿Eliminar este inmueble?")){setBienes(prev=>prev.filter(x=>x.id!==id));setModal(null);} };
  const lista=bienes.filter(b=>{
    if(fEst&&b.estatus!==fEst)return false;
    if(fTipo&&b.tipo!==fTipo)return false;
    if(q){const s=(b.denominacion+" "+(b.descripcion||"")+" "+(b.ubicacion||"")).toLowerCase();if(s.indexOf(q.toLowerCase())<0)return false;}
    return true;
  });
  const totalPipeline=bienes.filter(b=>b.estatus!=="Cerrado"&&b.estatus!=="No disponible").reduce((s,b)=>s+(b.montoComision||0),0);
  return <div>
    <div style={{...S.sec,display:"flex",justifyContent:"space-between",alignItems:"center"}}><button style={S.back} onClick={onBack}>‹ Configuración</button></div>
    <div style={S.sec}>
      <div style={{fontSize:17,fontWeight:800,marginBottom:2}}>🏠 Bienes Inmuebles</div>
      <div style={{fontSize:10,color:"#64748b",marginBottom:12}}>Propiedades para venta directa o coinversión.</div>
      <div style={{...S.card(),borderColor:GOLD+"55",marginBottom:12}}>
        <div style={{fontSize:9,color:"#64748b",textTransform:"uppercase",letterSpacing:1}}>Comisión proyectada (disponibles · en proceso · vinculados)</div>
        <div style={{fontSize:22,fontWeight:800,fontFamily:"'Cinzel',serif",color:GOLD}}>{money(totalPipeline)}</div>
      </div>
      <input style={{...S.inp,marginBottom:8}} placeholder="Buscar por denominación, descripción o ubicación…" value={q} onChange={e=>setQ(e.target.value)}/>
      <div style={{display:"flex",gap:6,marginBottom:8,flexWrap:"wrap"}}>
        <select style={{...S.sel,flex:1,minWidth:130}} value={fEst} onChange={e=>setFEst(e.target.value)}><option value="">Estatus: Todos</option>{EST.map(o=><option key={o} value={o}>{o}</option>)}</select>
        <select style={{...S.sel,flex:1,minWidth:130}} value={fTipo} onChange={e=>setFTipo(e.target.value)}><option value="">Tipo: Todos</option>{TIPO.map(o=><option key={o} value={o}>{o}</option>)}</select>
      </div>
      {lista.length===0&&<div style={{fontSize:11,color:"#475569",padding:"16px 0",textAlign:"center"}}>{bienes.length?"Sin inmuebles con ese filtro.":"Sin inmuebles registrados."}</div>}
      {lista.map(b=><div key={b.id} style={{...S.card(),marginBottom:8,cursor:"pointer"}} onClick={()=>abrir(b)}>
        <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start"}}>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:13,fontWeight:800,color:"#e2e8f0"}}>{b.denominacion}</div>
            <div style={{fontSize:10,color:"#64748b",marginTop:1}}>{b.tipo}{b.ubicacion?" · "+b.ubicacion:""}{b.superficie?" · "+b.superficie:""}</div>
          </div>
          <span style={S.tag(EST_COL[b.estatus]||"#64748b")}>{b.estatus}</span>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginTop:6,gap:8}}>
          <div style={{fontSize:9,color:"#475569",minWidth:0,flex:1}}>{b.aliadoEstId?("Estr.: "+nomAliado(b.aliadoEstId)):""}{b.aliadoComId?(" · Com.: "+nomAliado(b.aliadoComId)):""}</div>
          <div style={{textAlign:"right",flexShrink:0}}><div style={{fontSize:8,color:"#64748b"}}>Comisión proy.</div><div style={{fontSize:14,fontWeight:800,color:GOLD}}>{money(b.montoComision)}</div></div>
        </div>
      </div>)}

function Configuracion({data,onRestore,onExcel,go}){
  const fileRef=useRef(null);

    const payload={app:"Nexus CFC",tipo:"respaldo-total",version:1,fecha:new Date().toISOString(),data};
    const blob=new Blob([JSON.stringify(payload)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download="Nexus_CFC_respaldo_"+new Date().toISOString().slice(0,10)+".json";
    document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    try{saveLS("lastFileBackup",new Date().toISOString());}catch(e){}
  };
  const onFile=(e)=>{
    const file=e.target.files&&e.target.files[0];if(!file){return;}

const proyFecha=(a)=>{if(a.modoTarea!=="proyecto"||!(a.subtareas||[]).length)return a.fecha||"";const pend=(a.subtareas||[]).filter(s=>s.estatus!=="Cerrada");const ds=pend.map(s=>s.fecha).filter(Boolean).sort();return ds[0]||(a.subtareas||[]).map(s=>s.fecha).filter(Boolean).sort()[0]||"";};
const proyEstatus=(a)=>{if(a.modoTarea==="proyecto"&&(a.subtareas||[]).length){const sts=(a.subtareas||[]).map(s=>s.estatus||"Programada");if(sts.every(s=>s==="Cerrada"))return "Cerrada";if(sts.some(s=>s==="En Proceso"||s==="Cerrada"))return "En Proceso";return "Programada";}if(a.modoTarea==="checklist"&&(a.items||[]).length){const done=(a.items||[]).filter(i=>i.done).length;if(done===(a.items||[]).length)return "Cerrada";if(done>0)return "En Proceso";return "Programada";}return a.estatus||"Programada";};
const proyPrioridad=(a)=>{if(a.modoTarea!=="proyecto"||(!(a.subtareas||[]).length))return a.prioridad||"Media";const rank={"Muy Alta":0,"Alta":1,"Media":2,"Baja":3};let best=3;(a.subtareas||[]).forEach(s=>{const r=rank[s.prioridad||"Media"];if(r<best)best=r;});return Object.keys(rank).find(k=>rank[k]===best)||"Media";};

function ActividadModal({init,contactos,empresas,catalogos,oportunidades,fixedContacto,onUpdateContacto,onUpdateOportunidad,onSave,onDelete,onClose,onCreateContacto,onCreateEmpresa}){
  const[nuevoCto,setNuevoCto]=useState(null);
  const[esCopia,setEsCopia]=useState(false);
  const[showAvance,setShowAvance]=useState(false);
  const[f,setF]=useState(()=>({estatus:"Programada",fecha:hoyISO(),prioridad:"Media",enfoque:"Comercial",modoTarea:"unica",...init}));
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const esInterno=f.enfoque==="Interno";
  const cid=!esInterno?(f.contactoId||fixedContacto):null;
  const cont=cid?contactos.find(c=>c.id===cid):null;
  const opsCont=!esInterno?(oportunidades||[]).filter(o=>o.contactoPrincipalId===cid||o.contactoOperativoId===cid||o.contactoId===cid):[];
  const save=()=>{
    const modo=f.modoTarea||"unica";
    if(!esInterno){
      const cid=f.contactoId||fixedContacto;
      if(!cid){alert("Selecciona un contacto");return;}
      if(!f.fecha){alert("Indica la fecha");return;}
      if(!f.tipoAccion){alert("Indica el tipo de acción");return;}
      onSave({...f,contactoId:cid,asunto:null});
    } else {
      if(modo==="proyecto"){
        if(!(f.subtareas||[]).length){alert("Agrega al menos una subtarea al proyecto");return;}
        const pend=(f.subtareas||[]).filter(s=>s.estatus!=="Cerrada");

        </div>)}
      </div>}
    </div>}
    <button style={S.saveB} onClick={save}>Guardar</button>
    {!esInterno&&init&&init.id&&!esCopia&&(f.estatus==="Programada"||f.estatus==="En Proceso")&&<button style={{...S.cancB,color:"#fb923c",borderColor:"#fb923c55"}} onClick={cerrarSinRespuesta}>Cerrar sin respuesta</button>}

    <button style={S.cancB} onClick={onClose}>Cancelar</button>
  </div></div>;
}

function ActividadesList({acts,contactos,oportunidades,empresas,showContacto,onTap,asc,selectable,selected,onToggleSel,hoy,noSort,onSinRespuesta,onPatchAct}){

  let hoyIdx=-1;if(hoy){for(let i=0;i<sorted.length;i++){const fx=proyFecha(sorted[i])||sorted[i].fecha||"";if(asc?(fx>=hoy):(fx<=hoy)){hoyIdx=i;break;}}}
  if(sorted.length===0)return <div style={{fontSize:11,color:"#475569",padding:"4px 0"}}>Sin actividades registradas.</div>;
  return <div>{sorted.map((a,i)=>{const c=contactos.find(x=>x.id===a.contactoId);const efEst=proyEstatus(a);const col=EST_COLOR[efEst]||"#64748b";const op=a.oportunidadId&&(oportunidades||[]).find(o=>o.id===a.oportunidadId);const isSel=selectable&&selected&&selected.indexOf(a.id)>-1;const empN=(c&&empresas&&cEmpresas(c)[0])?((empresas.find(e=>e.id===cEmpresas(c)[0].empresaId)||{}).nombre||""):"";const _hoy=hoyISO();const _pend=(efEst==="Programada"||efEst==="En Proceso");const efFech=proyFecha(a)||a.fecha||"";const _rez=(_pend&&efFech&&efFech<_hoy)?Math.max(0,Math.round((Date.parse(_hoy)-Date.parse(efFech))/86400000)):0;const _rezC=_rez>=7?"#ef4444":_rez>=3?"#fb923c":_rez>=1?"#fbbf24":null;const esInterno=a.enfoque==="Interno";const modo=a.modoTarea||"unica";const tituloCard=esInterno?(a.asunto||a.tipoAccion||"Actividad interna"):(showContacto&&c?c.nombreCompleto:(a.tipoAccion||"Actividad"));

        </div>
        {[...(a.subtareas||[])].sort((x,y)=>{
          const xCerr=x.estatus==="Cerrada",yCerr=y.estatus==="Cerrada";
          if(xCerr!==yCerr)return xCerr?1:-1;
          const fd=(x.fecha||"9999").localeCompare(y.fecha||"9999");
          if(fd!==0)return fd;
          return (PRIOR_RANK[x.prioridad||"Media"]??2)-(PRIOR_RANK[y.prioridad||"Media"]??2);
        }).map((st,idx)=>{
          const origIdx=(a.subtareas||[]).findIndex(s=>s.id===st.id);
          const isSel=(selSub[a.id]||new Set()).has(st.id);
          return <div key={st.id} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"6px 8px",marginBottom:4,background:isSel?"#1e1b4b":"#0f172a",borderRadius:7,border:`1px solid ${isSel?"#a78bfa":(EST_COLOR[st.estatus||"Programada"]||"#64748b")}33`}}>
            <input type="checkbox" checked={isSel} onChange={()=>toggleSubSel(a.id,st.id)} style={{width:15,height:15,flexShrink:0,accentColor:"#a78bfa",marginTop:2,cursor:"pointer"}}/>
            <div style={{flex:1,minWidth:0,cursor:"pointer"}} onClick={()=>{if(!onPatchAct)return;const nst=(a.subtareas||[]).map((x,j)=>j===origIdx?{...x,estatus:MODO_NEXT_EST[x.estatus||"Programada"]}:x);const sts=nst.map(s=>s.estatus||"Programada");const compEst=sts.every(s=>s==="Cerrada")?"Cerrada":sts.some(s=>s==="En Proceso"||s==="Cerrada")?"En Proceso":"Programada";const pend=nst.filter(s=>s.estatus!=="Cerrada");const ds=pend.map(s=>s.fecha).filter(Boolean).sort();const compFecha=ds[0]||nst.map(s=>s.fecha).filter(Boolean).sort()[0]||"";onPatchAct(a.id,{subtareas:nst,estatus:compEst,fecha:compFecha});}}>
              <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginBottom:2}}>
                <span style={{...S.tag(EST_COLOR[st.estatus||"Programada"]||"#64748b"),fontSize:8}}>{st.estatus||"Programada"}</span>
                {st.prioridad&&st.prioridad!=="Media"&&<span style={{...S.tag(PRIOR_COLOR[st.prioridad]||"#64748b"),fontSize:7}}>{st.prioridad}</span>}
                {st.fecha&&<span style={{fontSize:9,color:"#64748b"}}>{st.fecha.split("-").reverse().join("/")}</span>}
                <span style={{fontSize:9,color:"#475569"}}>tap→cicla</span>
              </div>
              <div style={{fontSize:12,fontWeight:700,color:st.estatus==="Cerrada"?"#475569":"#e2e8f0",textDecoration:st.estatus==="Cerrada"?"line-through":"none",lineHeight:1.3}}>{st.titulo||"Subtarea sin nombre"}</div>
              {st.descripcion&&<div style={{fontSize:10,color:"#64748b",marginTop:2,lineHeight:1.4}}>{st.descripcion}</div>}
            </div>
          </div>;
        })}
        {batchSub&&batchSub.actId===a.id&&<div style={{background:"#0f172a",border:"1px solid #a78bfa44",borderRadius:9,padding:"10px 12px",marginTop:8}}>
          <div style={{fontSize:11,fontWeight:700,color:"#a78bfa",marginBottom:8}}>Editar {selSubCount(a.id)} subtarea{selSubCount(a.id)===1?"":"s"}</div>
          <div style={S.g2}>
            <div><div style={{fontSize:10,color:"#64748b",marginBottom:4}}>Fecha</div><input type="date" style={{...S.inp,fontSize:11}} value={batchSub.fecha} onChange={e=>setBatchSub(p=>({...p,fecha:e.target.value}))}/></div>
            <div><div style={{fontSize:10,color:"#64748b",marginBottom:4}}>Estatus</div><select style={{...S.sel,fontSize:11}} value={batchSub.estatus} onChange={e=>setBatchSub(p=>({...p,estatus:e.target.value}))}>
              <option value="">— Sin cambio —</option>
              {["Programada","En Proceso","Cerrada"].map(s=><option key={s} value={s}>{s}</option>)}
            </select></div>
          </div>
          <div style={{marginTop:8}}>
            <div style={{fontSize:10,color:"#64748b",marginBottom:4}}>Prioridad</div>
            <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
              {[["","Sin cambio","#64748b"],["Muy Alta","Muy Alta","#ef4444"],["Alta","Alta","#fb923c"],["Media","Media","#fbbf24"],["Baja","Baja","#22c55e"]].map(([v,l,c])=>(
                <button key={v} style={{...S.pill(batchSub.prioridad===v,c),padding:"4px 8px",fontSize:10}} onClick={()=>setBatchSub(p=>({...p,prioridad:v}))}>{l}</button>
              ))}
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <button style={{...S.pill(false,"#64748b"),flex:1,padding:"8px 0",fontSize:11}} onClick={()=>setBatchSub(null)}>Cancelar</button>
            <button style={{...S.pill(true,"#a78bfa"),flex:1,padding:"8px 0",fontWeight:700,fontSize:11}} onClick={()=>{
              if(!onPatchAct)return;
              const ids=selSub[a.id]||new Set();
              const nst=(a.subtareas||[]).map(s=>ids.has(s.id)?{...s,...(batchSub.fecha&&{fecha:batchSub.fecha}),...(batchSub.estatus&&{estatus:batchSub.estatus}),...(batchSub.prioridad&&{prioridad:batchSub.prioridad})}:s);
              const sts=nst.map(s=>s.estatus||"Programada");
              const compEst=sts.every(s=>s==="Cerrada")?"Cerrada":sts.some(s=>s==="En Proceso"||s==="Cerrada")?"En Proceso":"Programada";
              const pend=nst.filter(s=>s.estatus!=="Cerrada");const ds=pend.map(s=>s.fecha).filter(Boolean).sort();
              const compFecha=ds[0]||nst.map(s=>s.fecha).filter(Boolean).sort()[0]||"";
              onPatchAct(a.id,{subtareas:nst,estatus:compEst,fecha:compFecha});
              setBatchSub(null);setSelSub(p=>({...p,[a.id]:new Set()}));
            }}>Aplicar</button>
          </div>
        </div>}
      </div>}
      {!esInterno&&showContacto&&((c&&c.etapaEspecifica)||(op&&op.etapa))&&<div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:4}}>{c&&c.etapaEspecifica&&<span style={{fontSize:8,fontWeight:700,color:"#a78bfa",background:"#a78bfa1a",border:"1px solid #a78bfa44",borderRadius:5,padding:"1px 6px"}}>{c.etapaEspecifica}</span>}{op&&op.etapa&&<span style={{fontSize:8,fontWeight:700,color:oc(op.etapa),background:oc(op.etapa)+"1a",border:`1px solid ${oc(op.etapa)}44`,borderRadius:5,padding:"1px 6px"}}>🎯 {(op.etapa||"").replace("Oportunidad ","")}</span>}</div>}
      {(a.intencion||a.intencionResultado)&&<div style={{fontSize:11,color:"#94a3b8",marginTop:4,lineHeight:1.4}}>{a.intencion||a.intencionResultado}</div>}
      {a.accionProceso&&<div style={{fontSize:11,color:"#60a5fa",marginTop:3,lineHeight:1.4}}>▸ {a.accionProceso}</div>}
      {a.resultado&&<div style={{fontSize:11,color:"#22c55e",marginTop:3,lineHeight:1.4}}>→ {a.resultado}</div>}
      {!esInterno&&onSinRespuesta&&_pend&&<div style={{textAlign:"right",marginTop:6}}><button onClick={(ev)=>{ev.stopPropagation();onSinRespuesta(a);}} style={{background:"transparent",border:"1px solid #fb923c55",borderRadius:8,color:"#fb923c",fontSize:10,fontWeight:700,padding:"4px 10px",cursor:"pointer"}}>Sin respuesta</button></div>}
    </div>;})}</div>;
}

function Agenda({actividades,contactos,catalogos,oportunidades,empresas,openAct,onEditActs,onCopyActs,onSinRespuesta}){
  const[filtros,setFiltros]=useState([]);
  const toggleFiltro=(t)=>setFiltros(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t]);
  const[modo,setModo]=useState("lista");
  const[desde,setDesde]=useState("");
  const[hasta,setHasta]=useState("");
  const[showFil,setShowFil]=useState(false);

  const[fTipos,setFTipos]=useState([]);
  const[fEtC,setFEtC]=useState("");
  const[fEtO,setFEtO]=useState("");
  const[q,setQ]=useState("");
  const[fEmpresa,setFEmpresa]=useState("");
  const[fPrioridad,setFPrioridad]=useState([]);
  const[ordCampo,setOrdCampo]=useState("fechaPrio");
  const[ordDir,setOrdDir]=useState("asc");
  const[fRezago,setFRezago]=useState(false);
  const[selMode,setSelMode]=useState(false);
  const[sel,setSel]=useState([]);
  const[fEnfoque,setFEnfoque]=useState("");
  const[batch,setBatch]=useState(null);
  const toggleSel=(id)=>setSel(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const fmtF=(f)=>f?f.split("-").reverse().join("/"):"—";
  const cn=(id)=>(contactos.find(c=>c.id===id)||{}).nombreCompleto||"—";
  const ctById=(id)=>contactos.find(c=>c.id===id);
  const opById=(id)=>(oportunidades||[]).find(o=>o.id===id);
  const toggleTipo=(t)=>setFTipos(p=>p.includes(t)?p.filter(x=>x!==t):[...p,t]);
  const ql=q.trim().toLowerCase();
  const base=actividades.filter(a=>{
    const efEst=proyEstatus(a); const efFech=proyFecha(a)||a.fecha||"";
    if(filtros.length&&!filtros.includes(efEst))return false;
    if(desde&&efFech<desde)return false;
    if(hasta&&efFech>hasta)return false;
    if(fContacto&&a.contactoId!==fContacto)return false;
    if(fEmpresa){const c=ctById(a.contactoId);if(!c||!cEmpresas(c).some(x=>x.empresaId===fEmpresa))return false;}
    if(fPrioridad.length&&fPrioridad.indexOf(a.prioridad)<0)return false;
    if(fRezago){const _h=hoyISO();if(!((a.estatus==="Programada"||a.estatus==="En Proceso")&&a.fecha&&a.fecha<_h))return false;}
    if(fTipos.length&&!fTipos.includes(a.tipoAccion))return false;
    if(fEtC){const c=ctById(a.contactoId);if(!c||c.etapaEspecifica!==fEtC)return false;}
    if(fEtO){const o=opById(a.oportunidadId);if(!o||o.etapa!==fEtO)return false;}
    if(fEnfoque&&(a.enfoque||"Comercial")!==fEnfoque)return false;
    if(ql){const c=ctById(a.contactoId);const hay=[a.tipoAccion,a.intencion,a.intencionResultado,a.accionProceso,a.resultado,a.asunto,c&&c.nombreCompleto].filter(Boolean).join(" ").toLowerCase();if(!hay.includes(ql))return false;}
    return true;
  });
  const ordenadas=base.slice().sort((a,b)=>{
    const fa=proyFecha(a)||a.fecha||"", fb=proyFecha(b)||b.fecha||"";
    let r;
    if(ordCampo==="prioridad"){const pa=PRIOR_RANK[a.prioridad]==null?9:PRIOR_RANK[a.prioridad],pb=PRIOR_RANK[b.prioridad]==null?9:PRIOR_RANK[b.prioridad];r=pa-pb;if(r===0)r=(fa+(a.hora||"")).localeCompare(fb+(b.hora||""));}
    else if(ordCampo==="fecha"){r=fa.localeCompare(fb);if(r===0)r=(a.hora||"").localeCompare(b.hora||"");}
    else {r=fa.localeCompare(fb);if(r===0){const pa=PRIOR_RANK[a.prioridad]==null?9:PRIOR_RANK[a.prioridad],pb=PRIOR_RANK[b.prioridad]==null?9:PRIOR_RANK[b.prioridad];r=pa-pb;}if(r===0)r=(a.hora||"").localeCompare(b.hora||"");}
    return ordDir==="asc"?r:-r;
  });
  const repHoyIdx=(()=>{const h=hoyISO();const ascF=((ordCampo==="fecha"||ordCampo==="fechaPrio")&&ordDir==="asc");for(let i=0;i<ordenadas.length;i++){const fx=ordenadas[i].fecha||"";if(ascF?(fx>=h):(fx<=h))return i;}return -1;})();
  const nFil=(fContacto?1:0)+(fEmpresa?1:0)+(fPrioridad.length?1:0)+(fTipos.length?1:0)+(fEtC?1:0)+(fEtO?1:0)+((desde||hasta)?1:0)+(fRezago?1:0)+(selMode?1:0)+(fEnfoque?1:0)+(filtros.length?1:0);
  const limpiar=()=>{setFContacto("");setFEmpresa("");setFPrioridad([]);setFTipos([]);setFEtC("");setFEtO("");setDesde("");setHasta("");setQ("");setFRezago(false);setSelMode(false);setSel([]);setFEnfoque("");setFiltros([]);};
  return <div>
    <div style={S.hdr}><div><div style={S.logo}>Agenda</div><div style={S.sub}>{base.length} de {actividades.length} actividades</div></div></div>
    <div style={S.line}/>
    {/* ── BARRA STICKY COMPACTA ── */}
    <div style={{position:"sticky",top:0,zIndex:20,background:"#0c0c16",borderBottom:"1px solid #1e293b",padding:"8px 12px 8px"}}>

        <button style={{...S.pill(modo==="rptCom",GOLD),flex:1,padding:"6px 0",fontWeight:700,fontSize:12}} onClick={()=>setModo("rptCom")}>🤝 Comercial</button>

        {["Programada","En Proceso","Cerrada"].map(t=><span key={t} style={{...S.chip(filtros.includes(t),EST_COLOR[t]||GOLD),fontSize:10,padding:"3px 8px"}} onClick={()=>toggleFiltro(t)}>{t}</span>)}
        {filtros.length>0&&<span style={{...S.chip(false,"#64748b"),fontSize:10,padding:"3px 8px",opacity:.8}} onClick={()=>setFiltros([])}>✕</span>}
      </div>
      {/* Fila 3: búsqueda + filtros */}
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <input style={{...S.inp,flex:1,padding:"7px 10px",fontSize:12}} placeholder="🔍 Buscar…" value={q} onChange={e=>setQ(e.target.value)}/>
        <button style={{...S.pill(showFil||nFil>0,"#2dd4bf"),padding:"0 12px",fontWeight:700,whiteSpace:"nowrap",fontSize:12}} onClick={()=>setShowFil(v=>!v)}>⚙{nFil>0?` ${nFil}`:""} {showFil?"▲":"▾"}</button>
      </div>
    </div>
    {/* ── PANEL DE FILTROS ── */}
    <div style={{...S.sec,paddingTop:4}}>
      {showFil&&<div style={{...S.card(),marginTop:6,padding:"10px 12px"}}>

        <div style={{display:"flex",gap:5,marginBottom:8}}>
          {[["","Todos","#64748b"],["Comercial","🤝 Com","#60a5fa"],["Interno","⚙ Int","#a78bfa"]].map(([v,l,c])=>(
            <button key={v} style={{...S.pill(fEnfoque===v,c),flex:1,padding:"5px 0",fontWeight:700,fontSize:11}} onClick={()=>setFEnfoque(v)}>{l}</button>

            : <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:11,color:"#94a3b8",fontWeight:700}}>{sel.length} sel.</span>
                <button style={{...S.pill(false,"#60a5fa"),padding:"4px 8px",fontSize:11}} onClick={()=>setSel(ordenadas.map(a=>a.id))}>Todas</button>
                <button style={{...S.pill(false,"#64748b"),padding:"4px 8px",fontSize:11}} onClick={()=>setSel([])}>Ninguna</button>
                <button style={{...S.pill(false,GOLD),padding:"4px 8px",fontWeight:700,fontSize:11,opacity:sel.length?1:.4}} onClick={()=>{if(sel.length)setBatch({fecha:"",estatus:"",tipoAccion:"",prioridad:""});}}>Editar</button>
                <button style={{...S.pill(false,"#f87171"),padding:"4px 8px",fontSize:11}} onClick={()=>{setSelMode(false);setSel([]);}}>Salir</button>
              </div>}
        </div>
        {/* 3 Rezago */}
        <button style={{...S.pill(fRezago,"#ef4444"),padding:"5px 12px",width:"100%",fontWeight:700,fontSize:11,marginBottom:8}} onClick={()=>setFRezago(v=>!v)}>⚠ Solo rezagados{fRezago?" ✓":""}</button>
        {/* 4 Orden */}

          </div>
        </div>
        {/* 5 Prioridad */}
        <div style={{borderTop:"1px solid #1e293b",paddingTop:8,marginBottom:8}}>
          <div style={{fontSize:10,color:"#64748b",fontWeight:700,marginBottom:5}}>PRIORIDAD</div>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{PRIOR.map(p=><span key={p} style={{...S.chip(fPrioridad.includes(p),PRIOR_COLOR[p]),fontSize:10}} onClick={()=>setFPrioridad(prev=>prev.includes(p)?prev.filter(x=>x!==p):[...prev,p])}>{p}</span>)}</div>
        </div>

        <div style={{borderTop:"1px solid #1e293b",paddingTop:8,marginBottom:8}}>

        </div>
        {/* 7 Empresa */}
        <div style={{borderTop:"1px solid #1e293b",paddingTop:8,marginBottom:8}}>

        </div>

    <div id="ag-top" style={{...S.sec,paddingTop:4}}>
      {modo==="lista"&&<ActividadesList acts={ordenadas} contactos={contactos} oportunidades={oportunidades} empresas={empresas} showContacto={true} asc={(ordCampo==="fecha"||ordCampo==="fechaPrio")&&ordDir==="asc"} noSort={true} hoy={hoyISO()} selectable={selMode} selected={sel} onToggleSel={toggleSel} onSinRespuesta={onSinRespuesta} onPatchAct={(id,patch)=>onEditActs([id],patch)} onTap={(a)=>openAct(a,a.contactoId)}/>}

              {selMode&&<span style={{width:14,height:14,flexShrink:0,marginRight:6,borderRadius:"50%",border:isSel?"none":"1.5px solid #475569",background:isSel?GOLD:"transparent",color:"#0c0c16",fontSize:9,fontWeight:900,display:"flex",alignItems:"center",justifyContent:"center"}}>{isSel?"✓":""}</span>}
              <div style={{width:58,flexShrink:0,color:"#94a3b8",fontSize:10}}>{efFech?efFech.split("-").reverse().join("/"):"—"}</div>
              <div style={{flex:1,minWidth:0,fontWeight:600,paddingRight:4,wordBreak:"break-word",fontSize:11}}>{accion}</div>
              <div style={{flex:1,minWidth:0,color:"#94a3b8",paddingRight:4,wordBreak:"break-word",fontSize:10,lineHeight:1.3}}>{desc}</div>
              <div style={{width:60,flexShrink:0,textAlign:"right"}}>{a.prioridad&&<span style={{...S.tag(PRIOR_COLOR[a.prioridad]||"#64748b"),fontSize:7,display:"block",marginBottom:2}}>{a.prioridad}</span>}<span style={{...S.tag(col),fontSize:8}}>{efEst}</span></div>
            </div>;

    {batch&&<div onClick={()=>setBatch(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:200}}>

        <div style={{fontSize:14,fontWeight:800,color:GOLD,marginBottom:4}}>Editar {sel.length} actividad{sel.length===1?"":"es"}</div>

        <Field label="Tipo de acción"><select style={S.sel} value={batch.tipoAccion} onChange={e=>setBatch({...batch,tipoAccion:e.target.value})}><option value="">— Sin cambio —</option>{(catalogos.tipoAccion||[]).map(t=><option key={t.id} value={t.nombre}>{t.nombre}</option>)}</select></Field>
        <Field label="Prioridad"><select style={S.sel} value={batch.prioridad||""} onChange={e=>setBatch({...batch,prioridad:e.target.value})}><option value="">— Sin cambio —</option>{PRIOR.map(p=><option key={p} value={p}>{p}</option>)}</select></Field>
        <div style={{display:"flex",gap:8,marginTop:14}}>
          <button style={{...S.pill(false,"#64748b"),flex:1,padding:"10px 0"}} onClick={()=>setBatch(null)}>Cancelar</button>
          <button style={{...S.pill(true,GOLD),flex:1,padding:"10px 0",fontWeight:700}} onClick={()=>{const p={};if(batch.fecha)p.fecha=batch.fecha;if(batch.estatus)p.estatus=batch.estatus;if(batch.tipoAccion)p.tipoAccion=batch.tipoAccion;if(batch.prioridad)p.prioridad=batch.prioridad;if(Object.keys(p).length)onEditActs(sel,p);setBatch(null);setSelMode(false);setSel([]);}}>Aplicar</button>
        </div>
      </div>
    </div>}
    <div id="ag-bottom" style={{height:1}}/>
    <div style={{position:"fixed",right:14,bottom:150,display:"flex",flexDirection:"column",gap:7,zIndex:97}}>
      <button onClick={()=>{const el=document.getElementById("ag-top");if(el)el.scrollIntoView({behavior:"smooth",block:"start"});}} style={{width:40,height:40,borderRadius:"50%",background:"rgba(16,16,30,.95)",border:"1px solid #2dd4bf66",color:"#2dd4bf",fontSize:18,cursor:"pointer",boxShadow:"0 2px 10px rgba(0,0,0,.6)"}}>↑</button>
      <button onClick={()=>{const el=document.getElementById("ag-hoy");if(el)el.scrollIntoView({behavior:"smooth",block:"center"});}} style={{width:40,height:40,borderRadius:"50%",background:"rgba(16,16,30,.95)",border:"1px solid #C9A84C88",color:GOLD,fontSize:10,fontWeight:800,cursor:"pointer",boxShadow:"0 2px 10px rgba(0,0,0,.6)"}}>Hoy</button>
