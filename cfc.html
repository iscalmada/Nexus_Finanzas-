/* ════════ OPORTUNIDADES ════════ */
const OPO_COLOR={"Oportunidad Identificada":"#60a5fa","Oportunidad en Preparación":"#a78bfa","Propuesta Presentada":"#fbbf24","Oportunidad Aceptada":"#2dd4bf","Oportunidad Concretada":"#22c55e","Oportunidad Rechazada":"#64748b"};
const oc=(n)=>OPO_COLOR[n]||"#64748b";
const RECUR=["Única","Mensual","Anual"];
const PROB=["Alta","Media","Baja"];
const PRIOR=["Muy Alta","Alta","Media","Baja"];
const PRIOR_COLOR={"Muy Alta":"#ef4444","Alta":"#fb923c","Media":"#fbbf24","Baja":"#64748b"};
const PRIOR_RANK={"Muy Alta":0,"Alta":1,"Media":2,"Baja":3};
const PROB_COLOR={Alta:"#22c55e",Media:"#fbbf24",Baja:"#f87171"};
const ABIERTA=(o)=>o.etapa!=="Oportunidad Concretada"&&o.etapa!=="Oportunidad Rechazada";
const money=(n)=>"$"+(Number(n)||0).toLocaleString("es-MX");

function OportunidadModal({init,contactos,empresas,catalogos,productos,fixedContacto,onSave,onDelete,onClose,onCreateContacto,onCreateEmpresa}){
  const[nuevoCto,setNuevoCto]=useState(null);
  const[nuevaEmp,setNuevaEmp]=useState(null);
  const eo=catalogos.etapaOportunidad||[];
  const[f,setF]=useState(()=>{const b={recurrencia:"Única",etapa:(eo[0]?eo[0].nombre:""),...init};if(b.contactoId&&!b.contactoPrincipalId)b.contactoPrincipalId=b.contactoId;return b;});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const solName=(id)=>((catalogos.solucion||[]).find(s=>s.id===id)||{}).nombre||"";
  const aliadosDe=(sid,tipo)=>contactos.filter(c=>(c.tiposAliado||[]).includes(tipo)&&(c.solucionesAliado||[]).includes(sid));
  const pickSolucion=(sid)=>setF(p=>{
    const est=aliadosDe(sid,"Estratégico"), com=aliadosDe(sid,"Comercial");
    const n={...p,solucionId:sid||null,solucionNexus:sid?solName(sid):null};
    if(p.productoId&&!(productos||[]).some(x=>x.id===p.productoId&&x.solucionId===sid))n.productoId=null;
    if(n.aliadoEstrategicoId&&!est.some(c=>c.id===n.aliadoEstrategicoId))n.aliadoEstrategicoId=null;
    if(!n.aliadoEstrategicoId&&est.length===1)n.aliadoEstrategicoId=est[0].id;
    if(n.aliadoComercialId&&!com.some(c=>c.id===n.aliadoComercialId))n.aliadoComercialId=null;
    if(!n.aliadoComercialId&&com.length===1)n.aliadoComercialId=com[0].id;
    return n;
  });
  const pickProducto=(pid)=>setF(p=>{const pr=(productos||[]).find(x=>x.id===pid);const n={...p,productoId:pid||null};if(pr){n.montoEstimado=pr.montoNegocio??"";n.comisionEstimada=comResultProd(pr);}return n;});
  const csort=contactos.slice().sort((a,b)=>(a.nombreCompleto||"").localeCompare(b.nombreCompleto||""));
  const principal=contactos.find(c=>c.id===f.contactoPrincipalId);
  useEffect(()=>{ if(principal&&principal.empresaId&&!f.empresaId)set("empresaId",principal.empresaId); },[f.contactoPrincipalId]);
  const save=()=>{
    if(!f.concepto){alert("Indica un concepto");return;}
    if(!f.contactoPrincipalId){alert("Selecciona el contacto principal");return;}
    const data={...f};
    if(data.etapa==="Oportunidad Concretada"&&!data.fechaConcretada)data.fechaConcretada=hoyISO();
    if(!data.movIdsVinculados)data.movIdsVinculados=[];
    onSave(data);onClose();
  };
  return <div style={S.modal} onClick={onClose}><div style={S.mBox} onClick={e=>e.stopPropagation()}>
    <div style={S.mTit}>{init&&init.id?"Editar oportunidad":"Nueva oportunidad"}</div>
    <Field label="Concepto"><input style={S.inp} value={f.concepto||""} onChange={e=>set("concepto",e.target.value)} placeholder="Ej. Fianza de cumplimiento…"/></Field>
    <Field label="Contacto principal">
      <BuscaSelect opciones={csort.map(c=>({id:c.id,label:c.nombreCompleto}))} value={f.contactoPrincipalId} onChange={v=>set("contactoPrincipalId",v)} placeholder="— Selecciona contacto —" vacioLabel="— Sin contacto —" onAdd={(nombre)=>{setNuevoCto({field:"contactoPrincipalId",nombre:nombre||null});}}/>
    </Field>
    <Field label="Contacto operativo (opcional)">
      <BuscaSelect opciones={csort.map(c=>({id:c.id,label:c.nombreCompleto}))} value={f.contactoOperativoId} onChange={v=>set("contactoOperativoId",v)} placeholder="— Ninguno —" vacioLabel="— Ninguno —" onAdd={(nombre)=>{setNuevoCto({field:"contactoOperativoId",nombre:nombre||null});}}/>
    </Field>
    <Field label="Empresa (opcional)">
      <BuscaSelect opciones={empresas.slice().sort((a,b)=>(a.nombre||"").localeCompare(b.nombre||"")).map(e=>({id:e.id,label:e.nombre}))} value={f.empresaId} onChange={v=>set("empresaId",v)} placeholder="— Sin empresa —" vacioLabel="— Sin empresa —" onAdd={(nombre)=>{setNuevaEmp({nombre:nombre||null});}} addLabel="empresa"/>
      {nuevoCto&&<div onClick={e=>e.stopPropagation()}><ContactoModal init={nuevoCto} catalogos={catalogos} empresas={empresas} onCreateEmpresa={onCreateEmpresa} onSave={(d)=>{const id=onCreateContacto(d);set(nuevoCto.field,id);setNuevoCto(null);}} onClose={()=>setNuevoCto(null)}/></div>}
      {nuevaEmp&&<div onClick={e=>e.stopPropagation()}><EmpresaModal init={nuevaEmp} catalogos={catalogos} onSave={(d)=>{const nid=onCreateEmpresa(d);set("empresaId",nid);setNuevaEmp(null);}} onClose={()=>setNuevaEmp(null)}/></div>}
    </Field>
    <Field label="Solución Nexus">
      <select style={S.sel} value={f.solucionId||""} onChange={e=>pickSolucion(e.target.value||null)}>
        <option value="">— Selecciona —</option>
        {(catalogos.solucion||[]).map(o=><option key={o.id} value={o.id}>{o.nombre}</option>)}
      </select>
    </Field>
    {f.solucionId&&(()=>{
      const sid=f.solucionId;
      const prods=(productos||[]).filter(p=>p.solucionId===sid);
      const est=aliadosDe(sid,"Estratégico"), com=aliadosDe(sid,"Comercial");
      return <>
        <Field label="Producto (de la solución)">
          <select style={S.sel} value={f.productoId||""} onChange={e=>pickProducto(e.target.value||null)}>
            <option value="">— Sin producto / captura manual —</option>
            {prods.map(p=><option key={p.id} value={p.id}>{p.tipo}{p.categoria?" · "+p.categoria:""} — {money(comResultProd(p))}</option>)}
          </select>
          {f.productoId&&<div style={{fontSize:9,color:"#2dd4bf",marginTop:3}}>Monto y comisión se tomaron del producto; ajústalos abajo si hace falta.</div>}
          {prods.length===0&&<div style={{fontSize:9,color:"#475569",marginTop:3}}>Sin productos para esta solución. Créalos en Catálogos → Productos.</div>}
        </Field>
        <div style={S.g2}>
          <Field label="Aliado estratégico">
            <select style={S.sel} value={f.aliadoEstrategicoId||""} onChange={e=>set("aliadoEstrategicoId",e.target.value||null)}>
              <option value="">— Ninguno —</option>
              {est.map(c=><option key={c.id} value={c.id}>{c.nombreCompleto}</option>)}
            </select>
          </Field>
          <Field label="Aliado comercial">
            <select style={S.sel} value={f.aliadoComercialId||""} onChange={e=>set("aliadoComercialId",e.target.value||null)}>
              <option value="">— Ninguno —</option>
              {com.map(c=><option key={c.id} value={c.id}>{c.nombreCompleto}</option>)}
            </select>
          </Field>
        </div>
        {est.length===0&&com.length===0&&<div style={{fontSize:9,color:"#475569",margin:"-4px 0 8px"}}>Ningún aliado asignado a esta solución (asígnalos en la pestaña Aliados).</div>}
      </>;
    })()}
    <Field label="Etapa"><CatSelect cat={catalogos.etapaOportunidad} value={f.etapa} onChange={v=>set("etapa",v)} placeholder="—"/></Field>
    <div style={S.g2}>
      <Field label="Monto estimado"><input type="number" inputMode="numeric" style={S.inp} value={f.montoEstimado||""} onChange={e=>set("montoEstimado",e.target.value)} placeholder="0"/></Field>
      <Field label="Comisión estimada"><input type="number" inputMode="numeric" style={S.inp} value={f.comisionEstimada||""} onChange={e=>set("comisionEstimada",e.target.value)} placeholder="0"/></Field>
    </div>
    <Field label="Probabilidad de cierre">
      <div style={{display:"flex",gap:6}}>
        {PROB.map(p=><button key={p} style={{...S.pill(f.probabilidad===p,PROB_COLOR[p]),flex:1}} onClick={()=>set("probabilidad",f.probabilidad===p?null:p)}>{p}</button>)}
      </div>
    </Field>
    <div style={S.g2}>
      <Field label="Fecha estimada cierre"><input type="date" style={S.inp} value={f.fechaEstimadaCierre||""} onChange={e=>set("fechaEstimadaCierre",e.target.value||null)}/></Field>
      <Field label="Recurrencia">
        <select style={S.sel} value={f.recurrencia||"Única"} onChange={e=>set("recurrencia",e.target.value)}>{RECUR.map(r=><option key={r} value={r}>{r}</option>)}</select>
      </Field>
    </div>
    <Field label="Condiciones"><textarea style={S.ta} value={f.condiciones||""} onChange={e=>set("condiciones",e.target.value||null)}/></Field>
    <Field label="Notas"><textarea style={S.ta} value={f.notas||""} onChange={e=>set("notas",e.target.value||null)}/></Field>
    <button style={S.saveB} onClick={save}>Guardar</button>
    {init&&init.id&&<button style={{...S.cancB,color:"#f87171",borderColor:"#f8717144"}} onClick={()=>{if(window.confirm("¿Eliminar esta oportunidad?")){onDelete(init.id);onClose();}}}>Eliminar oportunidad</button>}
    <button style={S.cancB} onClick={onClose}>Cancelar</button>
  </div></div>;
}

function OpoCard({o,contactos,empresas,catalogos,onTap}){
  const c=contactos.find(x=>x.id===(o.contactoPrincipalId||o.contactoId));

  const e=empresas.find(x=>x.id===o.empresaId);const col=oc(o.etapa);
  const monto=o.comisionEstimada||o.montoEstimado;
  return <div onClick={()=>onTap&&onTap(o)} style={S.cCard(col)}>
    <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start"}}>
      <div style={{fontSize:14,fontWeight:700}}>{o.concepto}</div>
      {monto?<div style={{fontSize:13,fontWeight:800,color:GOLD,whiteSpace:"nowrap"}}>{money(monto)}</div>:null}
    </div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>
      <span style={S.tag(col)}>{(o.etapa||"").replace("Oportunidad ","")}</span>
      {o.recurrencia&&<span style={S.tag("#a78bfa")}>{o.recurrencia}</span>}
      {o.probabilidad&&<span style={S.tag(PROB_COLOR[o.probabilidad])}>{o.probabilidad}</span>}
      {c&&<span style={S.tag("#94a3b8")}>{c.nombreCompleto}</span>}
      {op&&<span style={S.tag("#64748b")}>op: {op.nombreCompleto}</span>}
      {e&&<span style={S.tag("#3b82f6")}>{e.nombre}</span>}
      {(()=>{const nm=(((catalogos&&catalogos.solucion)||[]).find(s=>s.id===o.solucionId)||{}).nombre||o.solucionNexus;return nm?<span style={S.tag(GOLD)}>{nm.length>22?nm.slice(0,22)+"…":nm}</span>:null;})()}
      {o.aliadoEstrategicoId&&(()=>{const ae=contactos.find(x=>x.id===o.aliadoEstrategicoId);return ae?<span style={S.tag("#2dd4bf")}>🤝 {ae.nombreCompleto}</span>:null;})()}
    </div>
  </div>;
}

function Oportunidades({oportunidades,contactos,empresas,aliados,catalogos,openOpo}){
  const[fEt,setFEt]=useState("");
  const[showFil,setShowFil]=useState(false);
  const[fSol,setFSol]=useState([]);
  const[fContacto,setFContacto]=useState("");
  const[fEmpresa,setFEmpresa]=useState("");
  const[fAliado,setFAliado]=useState("");
  const[fProb,setFProb]=useState([]);
  const[fRecur,setFRecur]=useState([]);
  const[cDesde,setCDesde]=useState("");
  const[cHasta,setCHasta]=useState("");
  const[q,setQ]=useState("");
  const solName=(id)=>(((catalogos&&catalogos.solucion)||[]).find(s=>s.id===id)||{}).nombre||"";
  const cn=(id)=>(contactos.find(c=>c.id===id)||{}).nombreCompleto||"";
  const en=(id)=>(empresas.find(e=>e.id===id)||{}).nombre||"";
  const toggleSol=(id)=>setFSol(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const toggleProb=(v)=>setFProb(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v]);
  const toggleRecur=(v)=>setFRecur(p=>p.includes(v)?p.filter(x=>x!==v):[...p,v]);
  const ql=q.trim().toLowerCase();
  const list=oportunidades.filter(o=>{
    if(fEt&&o.etapa!==fEt)return false;
    if(fSol.length&&!fSol.includes(o.solucionId))return false;
    if(fContacto&&(o.contactoPrincipalId||o.contactoId)!==fContacto&&o.contactoOperativoId!==fContacto)return false;
    if(fEmpresa&&o.empresaId!==fEmpresa)return false;
    if(fAliado&&o.aliadoEstrategicoId!==fAliado&&o.aliadoComercialId!==fAliado)return false;
    if(fProb.length&&!fProb.includes(o.probabilidad))return false;
    if(fRecur.length&&!fRecur.includes(o.recurrencia||"Única"))return false;
    if(cDesde&&(o.fechaEstimadaCierre||"")<cDesde)return false;
    if(cHasta&&(o.fechaEstimadaCierre||"")>cHasta)return false;
    if(ql){const hay=[o.concepto,cn(o.contactoPrincipalId||o.contactoId),cn(o.contactoOperativoId),en(o.empresaId),solName(o.solucionId)].filter(Boolean).join(" ").toLowerCase();if(!hay.includes(ql))return false;}
    return true;
  }).sort((a,b)=>(b.id||"").localeCompare(a.id||""));
  const nFil=(fEt?1:0)+(fSol.length?1:0)+(fContacto?1:0)+(fEmpresa?1:0)+(fAliado?1:0)+(fProb.length?1:0)+(fRecur.length?1:0)+((cDesde||cHasta)?1:0);
  const limpiar=()=>{setFEt("");setFSol([]);setFContacto("");setFEmpresa("");setFAliado("");setFProb([]);setFRecur([]);setCDesde("");setCHasta("");setQ("");};
  const abiertas=oportunidades.filter(ABIERTA);
  const totalAb=abiertas.reduce((s,o)=>s+(Number(o.montoEstimado)||0),0);
  const totalCom=abiertas.reduce((s,o)=>s+(Number(o.comisionEstimada)||0),0);
  const aliadoOpts=(aliados||[]).map(a=>({id:a.id,label:a.nombreCompleto}));
  return <div>
    <div style={S.hdr}><div><div style={S.logo}>Oportunidades</div><div style={S.sub}>{oportunidades.length} en total · {abiertas.length} abiertas</div></div></div>
    <div style={S.line}/>
    <div style={S.sec}>
      <div style={S.g2}>
        <div style={S.card()}><div style={S.lbl}>Monto abierto</div><div style={S.big()}>{money(totalAb)}</div></div>
        <div style={S.card()}><div style={S.lbl}>Comisión abierta</div><div style={S.big("#22c55e")}>{money(totalCom)}</div></div>
      </div>
      <div style={{display:"flex",gap:6,marginTop:4,alignItems:"center"}}>
        <input style={{...S.inp,flex:1}} placeholder="🔍 Buscar concepto, contacto, empresa…" value={q} onChange={e=>setQ(e.target.value)}/>
        <button style={{...S.pill(showFil||nFil>0,"#2dd4bf"),padding:"0 14px",fontWeight:700,whiteSpace:"nowrap"}} onClick={()=>setShowFil(v=>!v)}>⚙{nFil>0?` (${nFil})`:""} {showFil?"▲":"▾"}</button>
        <span style={{fontSize:9,color:"#475569",whiteSpace:"nowrap"}}>Act: {list.length}</span>
      </div>
      {showFil&&<div style={{...S.card(),marginTop:10}}>
        <div style={S.fl}>Etapa</div>
        <div style={{...S.chips,flexWrap:"wrap",overflowX:"visible"}}>
          <span style={S.chip(!fEt)} onClick={()=>setFEt("")}>Todas</span>
          {(catalogos.etapaOportunidad||[]).map(o=><span key={o.id} style={S.chip(fEt===o.nombre,oc(o.nombre))} onClick={()=>setFEt(fEt===o.nombre?"":o.nombre)}>{o.nombre.replace("Oportunidad ","")}</span>)}
        </div>
        <div style={{...S.fl,marginTop:10}}>Probabilidad</div>
        <div style={{...S.chips,flexWrap:"wrap",overflowX:"visible"}}>
          {PROB.map(p=><span key={p} style={S.chip(fProb.includes(p),PROB_COLOR[p])} onClick={()=>toggleProb(p)}>{p}</span>)}
        </div>
        <div style={{...S.fl,marginTop:10}}>Recurrencia</div>
        <div style={{...S.chips,flexWrap:"wrap",overflowX:"visible"}}>
          {RECUR.map(r=><span key={r} style={S.chip(fRecur.includes(r),"#a78bfa")} onClick={()=>toggleRecur(r)}>{r}</span>)}
        </div>
        <div style={{...S.fl,marginTop:10}}>Solución</div>
        <div style={{...S.chips,flexWrap:"wrap",overflowX:"visible"}}>{(catalogos.solucion||[]).map(s=><span key={s.id} style={S.chip(fSol.includes(s.id),GOLD)} onClick={()=>toggleSol(s.id)}>{s.nombre}</span>)}</div>
        <div style={{...S.fl,marginTop:10}}>Contacto</div>
        <BuscaSelect opciones={contactos.slice().sort((a,b)=>(a.nombreCompleto||"").localeCompare(b.nombreCompleto||"")).map(c=>({id:c.id,label:c.nombreCompleto}))} value={fContacto} onChange={v=>setFContacto(v)} placeholder="— Cualquiera —" vacioLabel="— Cualquiera —"/>
        <div style={{...S.fl,marginTop:10}}>Empresa</div>
        <BuscaSelect opciones={empresas.slice().sort((a,b)=>(a.nombre||"").localeCompare(b.nombre||"")).map(e=>({id:e.id,label:e.nombre}))} value={fEmpresa} onChange={v=>setFEmpresa(v)} placeholder="— Cualquiera —" vacioLabel="— Cualquiera —"/>
        <div style={{...S.fl,marginTop:10}}>Aliado</div>
        <BuscaSelect opciones={aliadoOpts} value={fAliado} onChange={v=>setFAliado(v)} placeholder="— Cualquiera —" vacioLabel="— Cualquiera —"/>
        <div style={S.g2}>
          <div><div style={{...S.fl,marginTop:10}}>Cierre estimado desde</div><input type="date" style={S.inp} value={cDesde} onChange={e=>{setCDesde(e.target.value);if(e.target.value&&!cHasta)setCHasta(e.target.value);}}/></div>
          <div><div style={{...S.fl,marginTop:10}}>Cierre estimado hasta</div><input type="date" style={S.inp} value={cHasta} onChange={e=>setCHasta(e.target.value)}/></div>
        </div>
        {nFil>0&&<div style={{textAlign:"right",marginTop:10}}><button style={S.pill(false,"#f87171")} onClick={limpiar}>Limpiar filtros</button></div>}
      </div>}
    </div>
    <div style={{...S.sec,paddingTop:4}}>
      {list.map(o=><OpoCard key={o.id} o={o} contactos={contactos} empresas={empresas} catalogos={catalogos} onTap={(x)=>openOpo(x,x.contactoId)}/>)}
      {list.length===0&&<div style={{textAlign:"center",color:"#475569",fontSize:12,padding:"30px 0"}}>Sin oportunidades.</div>}
    </div>
    <button style={S.fab} onClick={()=>openOpo({},null)}>+</button>
  </div>;
}

/* ════════ APP ════════ */
function App(){
  const[view,setView]=useState("inicio");
  const[contactos,setContactos]=useState(()=>{
    let cs=migra(loadLS("contactos",null)||SEED.contactos);
    if(!localStorage.getItem(PFX+"migAnclaCto")){ const _M={"Est Fiscal":"sol2","Fianzas":"sol6","Less Salt":"sol20","Regulacion PLD":"sol8","Gestion Financiamiento":"sol7","Seguro Flotillas":"sol4","Consultoria Seguridad":"sol15","Seguro Vida":"sol3"}; cs=cs.map(c=>({...c,solucionesAncla:(c.solucionesAncla||[]).map(v=>_M[v]||v)})); try{localStorage.setItem(PFX+"migAnclaCto","1");}catch(e){} }
    if(!localStorage.getItem(PFX+"migAA")){
      cs=cs.map(c=>AA_IDS.includes(c.id)?{...c,capacidadRef:"Muy Alta"}:c);
      try{localStorage.setItem(PFX+"migAA","1");}catch(e){}
    }
    if(!localStorage.getItem(PFX+"migPix")){
      cs=cs.map(c=>(c.etapaPixan&&c.etapaPixan!=="Sin Historia")?{...c,acercamientoPixan:true}:c);
      try{localStorage.setItem(PFX+"migPix","1");}catch(e){}
    }
    if(!localStorage.getItem(PFX+"migTipo")){
      cs=cs.map(c=>c.tipoContacto?c:{...c,tipoContacto:"Prospecto"});
      try{localStorage.setItem(PFX+"migTipo","1");}catch(e){}
    }
    if(!localStorage.getItem(PFX+"migTiposContacto")){
      cs=cs.map(c=>c.tiposContacto?c:{...c,tiposContacto:c.tipoContacto?[c.tipoContacto]:[]});
      try{localStorage.setItem(PFX+"migTiposContacto","1");}catch(e){}
    }
    if(!localStorage.getItem(PFX+"migCaps")){
      cs=cs.map(c=>({...c,nombre:titleCase(c.nombre),apellido:titleCase(c.apellido),nombreCompleto:titleCase(c.nombreCompleto)}));
      try{localStorage.setItem(PFX+"migCaps","1");}catch(e){}
    }
    if(!localStorage.getItem(PFX+"migAliadoTipo")){
      cs=cs.map(c=>{ if(c.tipoAliado&&!c.tiposAliado){const{tipoAliado,...rest}=c;return {...rest,tiposAliado:[tipoAliado]};} return c; });
      try{localStorage.setItem(PFX+"migAliadoTipo","1");}catch(e){}
    }
    return cs;
  });
  const[empresas,setEmpresas]=useState(()=>loadLS("empresas",null)||SEED.empresas);
  const[actividades,setActividades]=useState(()=>loadLS("actividades",null)||[]);
  const[catalogos,setCatalogos]=useState(()=>{
    const base=loadLS("catalogos",null)||SEED.catalogos;
    if(!base.actividadPrincipal){
      const src=loadLS("contactos",null)||SEED.contactos;
      const acts=[...new Set((src||[]).map(c=>c.actividad).filter(Boolean))];
      base.actividadPrincipal=acts.map((a,i)=>({id:"act"+i,nombre:a}));
    }
    if(!(base.capacidadRef||[]).some(o=>o.nombre==="Muy Alta")){
      base.capacidadRef=[{id:"capMA",nombre:"Muy Alta"},...(base.capacidadRef||[])];
    }
    if(!base.etiquetas){ base.etiquetas=[]; }
    if(!localStorage.getItem(PFX+"migAnclaCat")){ const _A=["sol2","sol6","sol20","sol8","sol7","sol4","sol15","sol3"]; if(Array.isArray(base.solucion))base.solucion=base.solucion.map(s=>_A.indexOf(s.id)>=0?{...s,ancla:true}:s); try{localStorage.setItem(PFX+"migAnclaCat","1");}catch(e){} }
    if(!base.accionesInt||base.accionesInt.length===0){
      base.accionesInt=(SEED.catalogos.accionesInt)||[{id:"ai1",nombre:"Capacitación"},{id:"ai2",nombre:"Revisión de Portal"},{id:"ai3",nombre:"Elaboración de Material"},{id:"ai4",nombre:"Preparación de Propuesta"},{id:"ai5",nombre:"Investigación"},{id:"ai6",nombre:"Planificación Estratégica"},{id:"ai7",nombre:"Gestión Administrativa"}];
    }
    if(!base.tipoContacto){
      base.tipoContacto=["Prospecto","Enlace operativo","Referidor","Otro"].map((n,i)=>({id:"tc"+i,nombre:n}));
    }
    if(!base.tipoAliado){
      base.tipoAliado=["Estratégico","Comercial"].map((n,i)=>({id:"tal"+i,nombre:n}));
    }
    const ESTATUS_ALIADO_V10=["Por invitar","Invitado","En negociación","Activo","Inactivo"];
    const estatusViejoV9=["Activo","En evaluación","Inactivo"];
    if(!base.estatusAliado||(Array.isArray(base.estatusAliado)&&base.estatusAliado.length===estatusViejoV9.length&&base.estatusAliado.every((x,i)=>x&&x.nombre===estatusViejoV9[i]))){
      base.estatusAliado=ESTATUS_ALIADO_V10.map((n,i)=>({id:"eal"+i,nombre:n}));
    }
    return base;
  });
  const[oportunidades,setOportunidades]=useState(()=>{
    let ops=loadLS("oportunidades",null)||[];
    if(!localStorage.getItem(PFX+"migSolId")){
      const sols=(catalogos.solucion||[]);
      ops=ops.map(o=>{
        if(o.solucionId) return o;
        if(o.solucionNexus){const s=sols.find(x=>x.nombre===o.solucionNexus);if(s)return{...o,solucionId:s.id};}
        return o;
      });
      try{localStorage.setItem(PFX+"migSolId","1");}catch(e){}
    }
    return ops;
  });
  const[productos,setProductos]=useState(()=>loadLS("productos",null)||[]);
  const[bienes,setBienes]=useState(()=>loadLS("bienes",null)||[]);
  const[openContacto,setOpenContacto]=useState(null);
  const[actModal,setActModal]=useState(null);
  const[opoModal,setOpoModal]=useState(null);

  useEffect(()=>saveLS("contactos",contactos),[contactos]);
  useEffect(()=>saveLS("empresas",empresas),[empresas]);
  useEffect(()=>saveLS("actividades",actividades),[actividades]);
  useEffect(()=>saveLS("oportunidades",oportunidades),[oportunidades]);
  useEffect(()=>saveLS("productos",productos),[productos]);
  useEffect(()=>saveLS("bienes",bienes),[bienes]);
  useEffect(()=>saveLS("catalogos",catalogos),[catalogos]);
  useEffect(()=>{
    const snap=()=>{try{const data={contactos,empresas,actividades,oportunidades,catalogos,productos,bienes,metaProspContactos:loadLS("metaProspContactos",0)};saveLS("autobackup",{fecha:new Date().toISOString(),data});}catch(e){}};
    const onHide=()=>{if(document.visibilityState==="hidden")snap();};
    document.addEventListener("visibilitychange",onHide);
    window.addEventListener("pagehide",snap);
    return ()=>{document.removeEventListener("visibilitychange",onHide);window.removeEventListener("pagehide",snap);};
  },[contactos,empresas,actividades,oportunidades,catalogos,productos,bienes]);
  useEffect(()=>{const l=document.getElementById("loading");if(l){l.classList.add("fade-out");setTimeout(()=>l.remove(),350);}},[]);

  const openAct=(init,fixed)=>setActModal({init,fixed:fixed||null});
  const saveAct=(data)=>{
    setActividades(prev=>{
      if(data.id)return prev.map(a=>a.id===data.id?data:a);
      const nid="a"+(Math.max(0,...prev.map(a=>parseInt((a.id||"a0").slice(1))||0))+1);
      return [...prev,{...data,id:nid}];
    });
    if(data.contactoId&&data.fecha){
      setContactos(prev=>prev.map(c=>(c.id===data.contactoId&&(!c.fechaUltimoContacto||data.fecha>c.fechaUltimoContacto))?{...c,fechaUltimoContacto:data.fecha}:c));
    }
  };

  const delAct=(id)=>setActividades(prev=>prev.filter(a=>a.id!==id));
  const onEditActs=(ids,patch)=>setActividades(prev=>prev.map(a=>ids.indexOf(a.id)>-1?{...a,...patch}:a));
  const onCopyActs=(ids)=>setActividades(prev=>{let mx=Math.max(0,...prev.map(a=>parseInt((a.id||"a0").slice(1))||0));const cps=prev.filter(a=>ids.indexOf(a.id)>-1).map(a=>{mx+=1;const{id,...r}=a;return {...r,id:"a"+mx};});return [...prev,...cps];});
  const sinRespuesta=(a)=>{setActividades(prev=>prev.map(x=>x.id===a.id?{...x,estatus:"Cerrada",resultado:x.resultado||"Sin respuesta"}:x));if(window.confirm("Cerrada sin respuesta. ¿Agendar la siguiente acción para este contacto?")){openAct({contactoId:a.contactoId,oportunidadId:a.oportunidadId||null,tipoAccion:a.tipoAccion||"",servicioSolucion:a.servicioSolucion||null,prioridad:a.prioridad||"Media",estatus:"Programada",fecha:""},a.contactoId);}};
  const openOpo=(init,fixed)=>setOpoModal({init,fixed:fixed||null});
  const saveOpo=(data)=>{setOportunidades(prev=>{
    if(data.id)return prev.map(o=>o.id===data.id?data:o);
    const nid="o"+(Math.max(0,...prev.map(o=>parseInt((o.id||"o0").slice(1))||0))+1);
    return [...prev,{...data,id:nid}];
  });};
  const delOpo=(id)=>{setOportunidades(prev=>prev.filter(o=>o.id!==id));setActividades(prev=>prev.map(a=>a.oportunidadId===id?{...a,oportunidadId:null}:a));};

  const go=(k)=>{setOpenContacto(null);setView(k);};
  const restoreTotal=(d)=>{
    if(Array.isArray(d.contactos))setContactos(d.contactos);
    if(Array.isArray(d.empresas))setEmpresas(d.empresas);
    if(Array.isArray(d.actividades))setActividades(d.actividades);
    if(Array.isArray(d.oportunidades))setOportunidades(d.oportunidades);
    if(d.catalogos&&typeof d.catalogos==="object")setCatalogos(d.catalogos);
    if(Array.isArray(d.productos))setProductos(d.productos);
    if(Array.isArray(d.bienes))setBienes(d.bienes);
    if(typeof d.metaProspContactos!=="undefined"){try{saveLS("metaProspContactos",d.metaProspContactos);}catch(e){}}
    setView("configuracion");
  };
  const NAV=[["inicio","Inicio","🏠"],["contactos","Contactos","👥"],["empresas","Empresas","🏢"],["oportunidades","Oport.","🎯"],["agenda","Agenda","🗓"],["objetivos","Metas","📊"],["configuracion","Config.","⚙"]];
  return <div style={S.app}>
    {view==="inicio"&&<Inicio contactos={contactos} empresas={empresas} actividades={actividades} oportunidades={oportunidades} openAct={openAct} openOpo={openOpo} setView={go} catalogos={catalogos} productos={productos}/>}
    {view==="contactos"&&<Contactos key={openContacto||"list"} initialSel={openContacto} contactos={contactos} catalogos={catalogos} setCatalogos={setCatalogos} empresas={empresas} setEmpresas={setEmpresas} setContactos={setContactos} actividades={actividades} openAct={openAct} oportunidades={oportunidades} openOpo={openOpo}/>}
    {view==="empresas"&&<Empresas empresas={empresas} setEmpresas={setEmpresas} contactos={contactos} catalogos={catalogos} goContacto={(id)=>{setOpenContacto(id);setView("contactos");}}/>}
    {view==="aliados"&&<Contactos key="aliados-list" aliadosOnly onBack={()=>go("configuracion")} contactos={contactos} catalogos={catalogos} setCatalogos={setCatalogos} empresas={empresas} setEmpresas={setEmpresas} setContactos={setContactos} actividades={actividades} openAct={openAct} oportunidades={oportunidades} openOpo={openOpo}/>}
    {view==="oportunidades"&&<Oportunidades oportunidades={oportunidades} contactos={contactos} empresas={empresas} aliados={contactos.filter(c=>c.tiposAliado&&c.tiposAliado.length>0)} catalogos={catalogos} openOpo={openOpo}/>}
    {view==="agenda"&&<Agenda actividades={actividades} contactos={contactos} catalogos={catalogos} oportunidades={oportunidades} empresas={empresas} openAct={openAct} onEditActs={onEditActs} onCopyActs={onCopyActs} onSinRespuesta={sinRespuesta}/>}
    {view==="catalogos"&&<Catalogos catalogos={catalogos} setCatalogos={setCatalogos} contactos={contactos} setContactos={setContactos} onProductos={()=>go("productos")} onBack={()=>go("configuracion")}/>}
    {view==="productos"&&<Productos productos={productos} setProductos={setProductos} catalogos={catalogos} onBack={()=>go("configuracion")}/>}
    {view==="bienes"&&<BienesInmuebles bienes={bienes} setBienes={setBienes} catalogos={catalogos} contactos={contactos} onBack={()=>go("configuracion")}/>}
    {view==="objetivos"&&<Objetivos productos={productos} setProductos={setProductos} catalogos={catalogos} setCatalogos={setCatalogos} contactos={contactos} oportunidades={oportunidades} onProductos={()=>go("productos")}/>}
    {view==="configuracion"&&<Configuracion data={{contactos,empresas,actividades,oportunidades,catalogos,productos,bienes,metaProspContactos:loadLS("metaProspContactos",0)}} onRestore={restoreTotal} onExcel={()=>exportBackup(contactos,empresas,oportunidades,catalogos,productos)} go={go}/>}
    <div style={S.nav}>
      {NAV.map(([k,lab,ico])=>{const act=view===k||(k==="configuracion"&&(view==="catalogos"||view==="productos"||view==="aliados"||view==="bienes"));return <button key={k} style={S.navB(act)} onClick={()=>go(k)}>
        <span style={S.navIco}>{ico}</span><span>{lab}</span></button>;})}
    </div>
    {actModal&&<ActividadModal init={actModal.init} fixedContacto={actModal.fixed} contactos={contactos} empresas={empresas} catalogos={catalogos} oportunidades={oportunidades} onUpdateContacto={(id,patch)=>setContactos(prev=>prev.map(c=>c.id===id?{...c,...patch}:c))} onUpdateOportunidad={(id,patch)=>setOportunidades(prev=>prev.map(o=>o.id===id?{...o,...patch}:o))} onSave={saveAct} onDelete={delAct} onCreateContacto={(d)=>{const id="c"+Date.now();setContactos(prev=>[...prev,{...d,id}]);return id;}} onCreateEmpresa={(d)=>{const id="e"+Date.now();setEmpresas(prev=>[...prev,{...d,id}]);return id;}} onClose={()=>setActModal(null)}/>}
    {opoModal&&<OportunidadModal init={opoModal.init} fixedContacto={opoModal.fixed} contactos={contactos} empresas={empresas} catalogos={catalogos} productos={productos} onSave={saveOpo} onDelete={delOpo} onCreateContacto={(d)=>{const id="c"+Date.now();setContactos(prev=>[...prev,{...d,id}]);return id;}} onCreateEmpresa={(d)=>{const id="e"+Date.now();setEmpresas(prev=>[...prev,{...d,id}]);return id;}} onClose={()=>setOpoModal(null)}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
