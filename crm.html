    body{background:#080810;color:#e2e8f0;font-family:'DM Sans',sans-serif;overscroll-behavior:none;}
    #root{min-height:100vh;}
    #loading{position:fixed;inset:0;background:#080810;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:24px;transition:opacity .3s ease;}
    #loading.fade-out{opacity:0;}
    #loading .ncfp-title{font-size:28px;font-weight:700;letter-spacing:6px;color:#C9A84C;margin-bottom:3px;font-family:'Cinzel',Georgia,serif;text-transform:uppercase;}

    #loading .ncfp-sub{font-size:9px;color:#334155;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;}
    #loading .ncfp-dots{display:flex;gap:6px;margin-top:12px;}
    #loading .ncfp-dots span{width:5px;height:5px;border-radius:50%;background:#C9A84C;animation:dotpulse 1.2s ease-in-out infinite;}
    #loading .ncfp-dots span:nth-child(2){animation-delay:.2s;}
    #loading .ncfp-dots span:nth-child(3){animation-delay:.4s;}
    @keyframes dotpulse{0%,80%,100%{opacity:.2;transform:scale(.8);}40%{opacity:1;transform:scale(1.2);}}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.6);}
    select option{background:#13131f;}
    ::-webkit-scrollbar{width:0;height:0;}
    input,select,button,textarea{font-family:'DM Sans',sans-serif;}

  const toggleGiro=(g)=>setF(p=>{const has=p.giros.includes(g);const giros=has?p.giros.filter(x=>x!==g):[...p.giros,g];
    let gp=p.giroPrincipal; if(has&&gp===g)gp=giros[0]||null; if(!has&&!gp)gp=g; return {...p,giros,giroPrincipal:gp};});
  const toggleSol=(v)=>setF(p=>({...p,solucionesAncla:p.solucionesAncla.includes(v)?p.solucionesAncla.filter(x=>x!==v):[...p.solucionesAncla,v]}));
  const save=()=>{ if(!f.nombre&&!f.nombreCompleto){alert("El nombre es obligatorio");return;}
    const completo=f.nombreCompleto||[f.nombre,f.apellido].filter(Boolean).join(" ");
    onSave({...f,nombreCompleto:completo}); };
  return <div style={S.modal} onClick={onClose}>
    <div style={S.mBox} onClick={e=>e.stopPropagation()}>
      <div style={S.mTit}>{init.id?"Editar contacto":"Nuevo contacto"}</div>

      <div style={S.sTit}>Identidad</div>
      <div style={S.g2}>
        <Field label="Alias"><input style={S.inp} value={f.alias||""} onChange={e=>set("alias",e.target.value||null)}/></Field>
        <Field label="Nombre"><input style={S.inp} value={f.nombre||""} onChange={e=>set("nombre",e.target.value)}/></Field>
      </div>
      <Field label="Apellido(s)"><input style={S.inp} value={f.apellido||""} onChange={e=>set("apellido",e.target.value)}/></Field>

      <div style={S.sTit}>Generales</div>
      <Field label="Tipo de contacto"><CatSelect cat={catalogos.tipoContacto} value={f.tipoContacto} onChange={v=>set("tipoContacto",v)}/></Field>
      <Field label="Actividad principal">
        <input style={S.inp} list="actlist" value={f.actividad||""} onChange={e=>set("actividad",e.target.value||null)} placeholder="Elige una existente o escribe nueva…"/>
        <datalist id="actlist">{(catalogos.actividadPrincipal||[]).map(o=><option key={o.id} value={o.nombre}/>)}</datalist>
      </Field>
      <div style={S.g2}>
        <Field label="Teléfono"><input style={S.inp} value={f.telefono||""} onChange={e=>set("telefono",e.target.value||null)}/></Field>
        <Field label="Correo"><input style={S.inp} value={f.correo||""} onChange={e=>set("correo",e.target.value||null)}/></Field>
      </div>
      <Field label="Domicilio"><input style={S.inp} value={f.domicilio||""} onChange={e=>set("domicilio",e.target.value||null)}/></Field>
      <div style={S.g2}>
        <Field label="Empresa vinculada">
          <div style={{display:"flex",gap:6}}>
            <select style={{...S.sel,flex:1}} value={f.empresaId||""} onChange={e=>set("empresaId",e.target.value||null)}>
              <option value="">— Sin empresa —</option>
              {empresas.slice().sort((a,b)=>(a.nombre||"").localeCompare(b.nombre||"")).map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}
            </select>
            <button style={{...S.pill(true,"#3b82f6"),fontSize:14,padding:"0 12px"}} onClick={()=>setNuevaEmp({})} title="Nueva empresa">＋</button>
          </div>
        </Field>
        <Field label="Rol en la empresa"><CatSelect cat={catalogos.rolEmpresa} value={f.rolEmpresa} onChange={v=>set("rolEmpresa",v)}/></Field>
      </div>

      <div style={S.sTit}>Información relacional</div>
      <div style={S.g2}>
        <Field label="Círculo"><CatSelect cat={catalogos.circulo} value={f.circulo} onChange={v=>set("circulo",v)}/></Field>
        <Field label="Relación"><CatSelect cat={catalogos.relacion} value={f.relacion} onChange={v=>set("relacion",v)}/></Field>
      </div>
      <div style={S.g2}>
        <Field label="Nivel de cercanía"><CatSelect cat={catalogos.cercania} value={f.cercania} onChange={v=>set("cercania",v)}/></Field>
        <Field label="Nivel económico"><CatSelect cat={catalogos.nivelEconomico} value={f.nivelEconomico} onChange={v=>set("nivelEconomico",v)}/></Field>
      </div>
      <div style={S.g2}>
        <Field label="Potencial Nexus"><CatSelect cat={catalogos.potencial} value={f.potencial} onChange={v=>set("potencial",v)}/></Field>
        <Field label="Capacidad referidor"><CatSelect cat={catalogos.capacidadRef} value={f.capacidadRef} onChange={v=>set("capacidadRef",v)}/></Field>
      </div>
      <Field label="Referidor del contacto"><input style={S.inp} value={f.referidor||""} onChange={e=>set("referidor",e.target.value||null)} placeholder="Quién lo refirió…"/></Field>
      <Field label="Nota sobre la relación"><input style={S.inp} value={f.notaRelacion||""} onChange={e=>set("notaRelacion",e.target.value||null)}/></Field>

      <div style={S.sTit}>Avance Nexus</div>
      <div style={S.g2}>
        <Field label="Etapa principal">
          <CatSelect cat={catalogos.etapaPrincipal} value={f.etapaPrincipal} onChange={v=>{set("etapaPrincipal",v);set("etapaEspecifica",null);}}/>
        </Field>
        <Field label="Etapa específica">
          <select style={S.sel} value={f.etapaEspecifica||""} onChange={e=>set("etapaEspecifica",e.target.value||null)}>
            <option value="">— Selecciona —</option>
            {espDisp.map(o=><option key={o.id} value={o.nombre}>{o.nombre}</option>)}
          </select>
        </Field>
      </div>
      <Field label="Resumen de avance"><textarea style={S.ta} value={f.resumenAvance||""} onChange={e=>set("resumenAvance",e.target.value||null)} placeholder="Tu memoria del avance con esta persona…"/></Field>
      <div style={S.g2}>
        <Field label="Fecha último contacto"><input type="date" style={S.inp} value={f.fechaUltimoContacto||""} onChange={e=>set("fechaUltimoContacto",e.target.value||null)}/></Field>
        <Field label="¿Presentación Nexus?">
          <div style={{display:"flex",gap:6}}>
            <button style={{...S.pill(f.cuentaPresentacion,"#22c55e"),flex:1}} onClick={()=>set("cuentaPresentacion",true)}>Sí</button>
            <button style={{...S.pill(!f.cuentaPresentacion),flex:1}} onClick={()=>set("cuentaPresentacion",false)}>No</button>
          </div>
        </Field>
      </div>

      <div style={S.sTit}>Referencia histórica Pixán</div>
      <div style={S.g2}>
        <Field label="¿Acercamiento previo?">
          <div style={{display:"flex",gap:6}}>
            <button style={{...S.pill(f.acercamientoPixan,"#a78bfa"),flex:1}} onClick={()=>set("acercamientoPixan",true)}>Sí</button>
            <button style={{...S.pill(!f.acercamientoPixan),flex:1}} onClick={()=>set("acercamientoPixan",false)}>No</button>
          </div>
        </Field>
        <Field label="Etapa Pixán">
          <select style={S.sel} value={f.etapaPixan||""} disabled={!f.acercamientoPixan} onChange={e=>set("etapaPixan",e.target.value||null)}>
            <option value="">— Selecciona —</option>
            {(catalogos.pixan||[]).map(o=><option key={o.id} value={o.nombre}>{o.nombre}</option>)}
          </select>
        </Field>
      </div>

      <div style={S.sTit}>Perfil estratégico</div>
      <Field label="Tipo de persona"><CatSelect cat={catalogos.tipoPersona} value={f.tipoPersona} onChange={v=>set("tipoPersona",v)}/></Field>
      <Field label="Giros (toca para seleccionar o quitar)">
        <div style={{...S.chips,flexWrap:"wrap",overflowX:"visible"}}>
          {(catalogos.giro||[]).map(o=>{const a=f.giros.includes(o.nombre);const p=f.giroPrincipal===o.nombre;
            return <span key={o.id} onClick={()=>toggleGiro(o.nombre)} style={S.chip(a,p?GOLD:"#3b82f6")}>{p?"★ ":""}{o.nombre}</span>;})}
        </div>
      </Field>
      {f.giros.length>0&&<Field label="Giro principal">
        <select style={S.sel} value={f.giroPrincipal||""} onChange={e=>set("giroPrincipal",e.target.value||null)}>
          {f.giros.map(g=><option key={g} value={g}>{g}</option>)}
        </select>
      </Field>}

      <div style={S.sTit}>Soluciones ancla viables</div>
      <div style={{...S.chips,flexWrap:"wrap",overflowX:"visible"}}>
        {SOL_ANCLA.map(s=><span key={s.v} onClick={()=>toggleSol(s.v)} style={S.chip(f.solucionesAncla.includes(s.v),"#C9A84C")}>{s.l}</span>)}
      </div>

      <Field label="Observaciones generales"><textarea style={S.ta} value={f.obs||""} onChange={e=>set("obs",e.target.value||null)}/></Field>

      <button style={S.saveB} onClick={save}>Guardar</button>
      <button style={S.cancB} onClick={onClose}>Cancelar</button>
    </div>
    {nuevaEmp&&<div onClick={e=>e.stopPropagation()}>
      <EmpresaModal init={nuevaEmp} catalogos={catalogos}
        onSave={(d)=>{const nid=onCreateEmpresa(d);set("empresaId",nid);setNuevaEmp(null);}}
        onClose={()=>setNuevaEmp(null)}/>
    </div>}
  </div>;
}

/* ════════ DETALLE CONTACTO ════════ */
function ContactoDetalle({c,contactos,catalogos,empresas,actividades,oportunidades,onAddAct,onEditAct,onAddOpo,onEditOpo,onEdit,onDelete,onBack}){
  const emp=empresas.find(e=>e.id===c.empresaId);
  const Row=({k,v})=> v?<div style={S.detRow}><span style={S.detK}>{k}</span><span style={S.detV}>{v}</span></div>:null;
  return <div>
    <div style={{...S.sec,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <button style={S.back} onClick={onBack}>‹ Contactos</button>
      <div style={{display:"flex",gap:8}}>
        <button style={S.pill(true,GOLD)} onClick={onEdit}>Editar</button>
      </div>
    </div>
    <div style={S.sec}>
      <div style={{fontSize:20,fontWeight:800,color:"#e2e8f0",marginBottom:4}}>{c.nombreCompleto}</div>
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:4}}>
        {c.etapaPrincipal&&<span style={S.tag(ec(c.etapaPrincipal))}>{c.etapaPrincipal}{c.etapaEspecifica?` · ${c.etapaEspecifica}`:""}</span>}
        {c.tipoContacto&&<span style={S.tag("#7dd3fc")}>{c.tipoContacto}</span>}
        {c.potencial&&<span style={S.tag(POT_COLOR[c.potencial]||"#64748b")}>Potencial {c.potencial}</span>}
      </div>
    </div>

    <div style={S.sec}>
      <div style={S.card()}>
        <div style={S.sTit}>Generales</div>
        <Row k="Actividad" v={c.actividad}/>
        <Row k="Empresa" v={emp?emp.nombre:null}/>
        <Row k="Rol" v={c.rolEmpresa}/>
        <Row k="Teléfono" v={c.telefono}/>
        <Row k="Correo" v={c.correo}/>
        <Row k="Domicilio" v={c.domicilio}/>
        {!(c.actividad||emp||c.telefono||c.correo||c.domicilio)&&<div style={{fontSize:11,color:"#475569"}}>Sin datos generales aún.</div>}
      </div>

      <div style={S.card()}>
        <div style={S.sTit}>Relación</div>
        <Row k="Círculo" v={c.circulo}/>
        <Row k="Relación" v={c.relacion}/>
        <Row k="Nivel de cercanía" v={c.cercania}/>
        <Row k="Nivel económico" v={c.nivelEconomico}/>
        <Row k="Referidor" v={c.referidor}/>
        <Row k="Capacidad referidor" v={c.capacidadRef}/>
        {c.notaRelacion&&<div style={{fontSize:12,color:"#94a3b8",marginTop:8,lineHeight:1.5}}>{c.notaRelacion}</div>}
      </div>

      <div style={S.card()}>
        <div style={S.sTit}>Avance Nexus</div>
        <Row k="Etapa principal" v={c.etapaPrincipal}/>
        <Row k="Etapa específica" v={c.etapaEspecifica}/>
        <Row k="Presentación Nexus" v={c.cuentaPresentacion?"Sí":"No"}/>
        <div style={S.detRow}><span style={S.detK}>Último contacto</span><span style={S.detV}>{c.fechaUltimoContacto||"Sin fecha"}</span></div>
        {c.resumenAvance&&<div style={{fontSize:12,color:"#cbd5e1",marginTop:8,lineHeight:1.6,whiteSpace:"pre-wrap"}}>{c.resumenAvance}</div>}
        {!c.resumenAvance&&<div style={{fontSize:11,color:"#475569",marginTop:6}}>Sin resumen de avance.</div>}
      </div>

      {(c.acercamientoPixan||c.etapaPixan)&&<div style={S.card("#a78bfa44")}>
        <div style={S.sTit}>Referencia Pixán</div>
        <Row k="Acercamiento previo" v={c.acercamientoPixan?"Sí":"No"}/>
        <Row k="Etapa Pixán" v={c.etapaPixan}/>
      </div>}

      <div style={S.card()}>
        <div style={S.sTit}>Perfil estratégico</div>
        <Row k="Tipo de persona" v={c.tipoPersona}/>
        {c.giros&&c.giros.length>0&&<div style={{marginTop:8}}>
          <div style={S.detK}>Giros</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:5}}>
            {c.giros.map(g=><span key={g} style={S.tag(c.giroPrincipal===g?GOLD:"#3b82f6")}>{c.giroPrincipal===g?"★ ":""}{g}</span>)}
          </div>
        </div>}
      </div>

      {c.solucionesAncla&&c.solucionesAncla.length>0&&<div style={S.card("#C9A84C44")}>
        <div style={S.sTit}>Soluciones ancla viables</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
          {c.solucionesAncla.map(v=>{const s=SOL_ANCLA.find(x=>x.v===v);return <span key={v} style={S.tag(GOLD)}>{s?s.l:v}</span>;})}
        </div>
      </div>}

      {c.obs&&<div style={S.card()}><div style={S.sTit}>Observaciones</div><div style={{fontSize:12,color:"#94a3b8",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{c.obs}</div></div>}

      <div style={S.card()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
          <div style={{fontSize:9,color:"#475569",letterSpacing:2,textTransform:"uppercase",fontWeight:700}}>Oportunidades</div>
          <button style={S.pill(true,"#fbbf24")} onClick={()=>onAddOpo(c.id)}>+ Detonar</button>
        </div>
        {(oportunidades||[]).filter(o=>o.contactoPrincipalId===c.id||o.contactoOperativoId===c.id||o.contactoId===c.id).map(o=><OpoCard key={o.id} o={o} contactos={contactos} empresas={empresas} onTap={(x)=>onEditOpo(x)}/>)}
        {(oportunidades||[]).filter(o=>o.contactoPrincipalId===c.id||o.contactoOperativoId===c.id||o.contactoId===c.id).length===0&&<div style={{fontSize:11,color:"#475569"}}>Sin oportunidades aún.</div>}
      </div>

      <div style={S.card()}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
          <div style={{fontSize:9,color:"#475569",letterSpacing:2,textTransform:"uppercase",fontWeight:700}}>Actividades</div>
          <button style={S.pill(true,GOLD)} onClick={()=>onAddAct(c.id)}>+ Registrar</button>
        </div>
        <ActividadesList acts={(actividades||[]).filter(a=>a.contactoId===c.id)} contactos={[c]} showContacto={false} onTap={(a)=>onEditAct(a)}/>
      </div>

      <button style={{...S.cancB,color:"#f87171",borderColor:"#f8717144"}} onClick={onDelete}>Eliminar contacto</button>
    </div>
  </div>;
}

/* ════════ LISTA CONTACTOS ════════ */
function Contactos({initialSel,contactos,catalogos,setCatalogos,empresas,setEmpresas,setContactos,actividades,openAct,oportunidades,openOpo}){
  const[q,setQ]=useState("");
  const[fEtapa,setFEtapa]=useState([]);
  const[fEsp,setFEsp]=useState([]);
  const[fGiro,setFGiro]=useState([]);
  const[fSol,setFSol]=useState([]);
  const[fPot,setFPot]=useState([]);
  const[fCer,setFCer]=useState([]);
  const[fEco,setFEco]=useState([]);
  const[fTipo,setFTipo]=useState([]);
  const[fPres,setFPres]=useState("");
  const[fPix,setFPix]=useState("");
  const[panel,setPanel]=useState(false);
  const[sel,setSel]=useState(initialSel||null);
  const[modal,setModal]=useState(null);
  const createEmpresa=(d)=>{const nid="e"+(Math.max(0,...empresas.map(e=>parseInt((e.id||"e0").slice(1))||0))+1);setEmpresas(prev=>[...prev,{...d,id:nid}]);return nid;};
  useEffect(()=>{ if(fEsp.length&&fEtapa.length) setFEsp(prev=>prev.filter(n=>(catalogos.etapaEspecifica||[]).some(e=>e.nombre===n&&fEtapa.includes(e.principal)))); },[fEtapa]);

  const list=useMemo(()=>contactos.filter(c=>{
    if(q&&!(c.nombreCompleto||"").toLowerCase().includes(q.toLowerCase()))return false;
    if(fEtapa.length&&!fEtapa.includes(c.etapaPrincipal))return false;
    if(fEsp.length&&!fEsp.includes(c.etapaEspecifica))return false;
    if(fGiro.length&&!(c.giros||[]).some(g=>fGiro.includes(g)))return false;
    if(fSol.length&&!(c.solucionesAncla||[]).some(s=>fSol.includes(s)))return false;
    if(fPot.length&&!fPot.includes(c.potencial))return false;
    if(fCer.length&&!fCer.includes(c.cercania))return false;
    if(fEco.length&&!fEco.includes(c.nivelEconomico))return false;
    if(fTipo.length&&!fTipo.includes(c.tipoContacto))return false;
    if(fPres&&(c.cuentaPresentacion?"si":"no")!==fPres)return false;
    if(fPix&&(c.acercamientoPixan?"si":"no")!==fPix)return false;
    return true;
  }).sort((a,b)=>(a.nombreCompleto||"").localeCompare(b.nombreCompleto||"")),[contactos,q,fEtapa,fEsp,fGiro,fSol,fPot,fCer,fEco,fTipo,fPres,fPix]);
  const activos=[...fEtapa,...fEsp,...fGiro,...fSol,...fPot,...fCer,...fEco,...fTipo].length+(fPres?1:0)+(fPix?1:0);
  const limpiar=()=>{setFEtapa([]);setFEsp([]);setFGiro([]);setFSol([]);setFPot([]);setFCer([]);setFEco([]);setFTipo([]);setFPres("");setFPix("");};
  const espOpts=fEtapa.length?(catalogos.etapaEspecifica||[]).filter(e=>fEtapa.includes(e.principal)):(catalogos.etapaEspecifica||[]);

  const save=(data)=>{
    if(data.actividad){const ex=(catalogos.actividadPrincipal||[]).some(o=>(o.nombre||"").toLowerCase()===data.actividad.toLowerCase());
      if(!ex&&setCatalogos)setCatalogos(p=>({...p,actividadPrincipal:[...(p.actividadPrincipal||[]),{id:"act"+Date.now(),nombre:data.actividad}]}));}
    setContactos(prev=>{
      if(data.id)return prev.map(c=>c.id===data.id?data:c);
      const nid="c"+(Math.max(0,...prev.map(c=>parseInt((c.id||"c0").slice(1))||0))+1);
      return [...prev,{...data,id:nid}];
    });
    setModal(null);
  };
  const del=(id)=>{ if(window.confirm("¿Eliminar este contacto?")){setContactos(prev=>prev.filter(c=>c.id!==id));setSel(null);} };

  if(sel){
    const c=contactos.find(x=>x.id===sel);
    if(!c){setSel(null);return null;}
    return <>
      <ContactoDetalle c={c} contactos={contactos} catalogos={catalogos} empresas={empresas} actividades={actividades} oportunidades={oportunidades}
        onAddAct={(cid)=>openAct({contactoId:cid,estatus:"Programada",fecha:hoyISO()},cid)}
        onEditAct={(a)=>openAct(a,a.contactoId)}
        onAddOpo={(cid)=>openOpo({contactoPrincipalId:cid},cid)}
        onEditOpo={(o)=>openOpo(o,o.contactoPrincipalId||o.contactoId)}
        onEdit={()=>setModal(c)} onDelete={()=>del(c.id)} onBack={()=>setSel(null)}/>
      {modal&&<ContactoModal init={modal} catalogos={catalogos} empresas={empresas} onCreateEmpresa={createEmpresa} onSave={save} onClose={()=>setModal(null)}/>}
    </>;
  }

  return <div>
    <div style={S.hdr}><div><div style={S.logo}>Contactos</div><div style={S.sub}>{list.length} de {contactos.length}</div></div></div>
    <div style={S.line}/>
    <div style={S.sec}>
      <input style={S.srch} placeholder="Buscar por nombre…" value={q} onChange={e=>setQ(e.target.value)}/>
      <div style={{display:"flex",gap:8,marginTop:10,alignItems:"center"}}>
        <button style={{...S.pill(panel||activos>0,GOLD),flex:1,padding:"9px 0",fontWeight:700}} onClick={()=>setPanel(p=>!p)}>⚙ Filtros{activos>0?` (${activos})`:""}</button>
        {activos>0&&<button style={S.pill(false,"#f87171")} onClick={limpiar}>Limpiar</button>}
      </div>
      {panel&&<div style={{...S.card(),marginTop:10}}>
        <div style={S.fl}>Tipo de contacto</div>
        <ChipMulti opts={catalogos.tipoContacto||[]} sel={fTipo} setSel={setFTipo} color="#7dd3fc"/>
        <div style={S.fl}>Etapa principal</div>
        <ChipMulti opts={catalogos.etapaPrincipal||[]} sel={fEtapa} setSel={setFEtapa} color={ec}/>
        <div style={S.fl}>Etapa específica{fEtapa.length?" (de las principales elegidas)":""}</div>
        <ChipMulti opts={espOpts} sel={fEsp} setSel={setFEsp} color="#94a3b8"/>
        <div style={S.fl}>Potencial Nexus</div>
        <ChipMulti opts={catalogos.potencial||[]} sel={fPot} setSel={setFPot} color={(v)=>POT_COLOR[v]||"#475569"}/>
        <div style={S.fl}>Solución ancla</div>
        <div style={{...S.chips,flexWrap:"wrap",overflowX:"visible"}}>
          {SOL_ANCLA.map(s=><span key={s.v} style={S.chip(fSol.includes(s.v),GOLD)} onClick={()=>setFSol(fSol.includes(s.v)?fSol.filter(x=>x!==s.v):[...fSol,s.v])}>{s.l}</span>)}
        </div>
        <div style={S.fl}>Giro</div>
        <ChipMulti opts={catalogos.giro||[]} sel={fGiro} setSel={setFGiro} color="#3b82f6"/>
        <div style={S.fl}>Nivel de cercanía</div>
        <ChipMulti opts={catalogos.cercania||[]} sel={fCer} setSel={setFCer} color="#a78bfa"/>
        <div style={S.fl}>Nivel económico</div>
        <ChipMulti opts={catalogos.nivelEconomico||[]} sel={fEco} setSel={setFEco} color="#22c55e"/>
        <div style={{...S.g2,marginTop:6}}>
          <div><div style={S.fl}>Presentación Nexus</div>
            <div style={{display:"flex",gap:5}}>
              <button style={{...S.pill(!fPres),flex:1}} onClick={()=>setFPres("")}>Todos</button>

function Empresas({empresas,setEmpresas,contactos,catalogos,goContacto}){
  const[sel,setSel]=useState(null);const[modal,setModal]=useState(null);const[q,setQ]=useState("");
  const save=(d)=>{setEmpresas(prev=>{if(d.id)return prev.map(e=>e.id===d.id?d:e);const nid="e"+(Math.max(0,...prev.map(e=>parseInt((e.id||"e0").slice(1))||0))+1);return[...prev,{...d,id:nid}];});setModal(null);};
  const del=(e)=>{const n=contactos.filter(c=>c.empresaId===e.id).length;
    if(n>0){alert(`Esta empresa tiene ${n} contacto(s) vinculado(s). Desvincúlalos o reasígnalos primero (desde cada contacto, en "Empresa vinculada").`);return;}
    if(window.confirm("¿Eliminar esta empresa? Esta acción no se puede deshacer."))
      {setEmpresas(prev=>prev.filter(x=>x.id!==e.id));setSel(null);}};
  const list=empresas.filter(e=>!q||(e.nombre||"").toLowerCase().includes(q.toLowerCase())).sort((a,b)=>(a.nombre||"").localeCompare(b.nombre||""));
  if(sel){
    const e=empresas.find(x=>x.id===sel);if(!e){setSel(null);return null;}
    const vinc=contactos.filter(c=>c.empresaId===e.id);
    const Row=({k,v})=>v?<div style={S.detRow}><span style={S.detK}>{k}</span><span style={S.detV}>{v}</span></div>:null;
    return <div>
      <div style={{...S.sec,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button style={S.back} onClick={()=>setSel(null)}>‹ Empresas</button>
        <button style={S.pill(true,GOLD)} onClick={()=>setModal(e)}>Editar</button>
      </div>
      <div style={S.sec}>
        <div style={{fontSize:20,fontWeight:800,marginBottom:6}}>{e.nombre}</div>
        <div style={S.card()}>
          <Row k="Giro" v={e.giro}/><Row k="Tamaño" v={e.tamano}/><Row k="Teléfono" v={e.telefono}/>
          <Row k="Correo" v={e.correo}/><Row k="Domicilio" v={e.domicilio}/>
          {e.obs&&<div style={{fontSize:12,color:"#94a3b8",marginTop:8,lineHeight:1.5}}>{e.obs}</div>}
        </div>
        <div style={S.card()}>
          <div style={S.sTit}>Contactos vinculados ({vinc.length})</div>
          {vinc.map(c=><div key={c.id} onClick={()=>goContacto(c.id)} style={{...S.detRow,cursor:"pointer"}}>
            <span style={{fontWeight:600}}>{c.nombreCompleto}</span><span style={{...S.detK}}>{c.rolEmpresa||""}</span></div>)}
          {vinc.length===0&&<div style={{fontSize:11,color:"#475569"}}>Aún sin contactos vinculados.</div>}
        </div>
        <button style={{...S.cancB,color:"#f87171",borderColor:"#f8717144"}} onClick={()=>del(e)}>Eliminar empresa</button>
      </div>
      {modal&&<EmpresaModal init={modal} catalogos={catalogos} onSave={save} onClose={()=>setModal(null)}/>}
    </div>;
  }
  return <div>
    <div style={S.hdr}><div><div style={S.logo}>Empresas</div><div style={S.sub}>{empresas.length} registradas</div></div></div>
    <div style={S.line}/>
    <div style={S.sec}><input style={S.srch} placeholder="Buscar empresa…" value={q} onChange={e=>setQ(e.target.value)}/></div>
    <div style={{...S.sec,paddingTop:8}}>
      {list.map(e=>{const n=contactos.filter(c=>c.empresaId===e.id).length;return(
        <div key={e.id} style={S.cCard("#3b82f6")} onClick={()=>setSel(e.id)}>
          <div style={{fontSize:14,fontWeight:700}}>{e.nombre}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>
            {e.giro&&<span style={S.tag("#3b82f6")}>{e.giro}</span>}
            {e.tamano&&<span style={S.tag("#64748b")}>{e.tamano}</span>}
            <span style={S.tag("#a78bfa")}>{n} contacto{n!==1?"s":""}</span>
          </div>
        </div>);})}
      {list.length===0&&<div style={{textAlign:"center",color:"#475569",fontSize:12,padding:"30px 0"}}>Sin empresas.</div>}
    </div>
    <button style={S.fab} onClick={()=>setModal({})}>+</button>
    {modal&&<EmpresaModal init={modal} catalogos={catalogos} onSave={save} onClose={()=>setModal(null)}/>}
  </div>;
}

const CAT_LABEL={circulo:"Círculo",relacion:"Relación",cercania:"Nivel de cercanía",nivelEconomico:"Nivel económico",
  potencial:"Potencial Nexus",tipoPersona:"Tipo de persona",giro:"Giro de ocupación",etapaPrincipal:"Etapa principal de contacto",
  etapaEspecifica:"Etapa específica de contacto",areaEstrategica:"Área estratégica",solucion:"Solución de intervención",
  tipoAccion:"Tipo de acción",estatusAccion:"Estatus de acción",etapaOportunidad:"Etapa de oportunidad",
  pixan:"Etapa Pixán (histórico)",tamanoEmpresa:"Tamaño de empresa",rolEmpresa:"Rol en empresa",capacidadRef:"Capacidad referidor",actividadPrincipal:"Actividad principal",tipoContacto:"Tipo de contacto"};
function Catalogos({catalogos,setCatalogos}){
  const[open,setOpen]=useState(null);const[nuevo,setNuevo]=useState("");
  if(open){
    const items=catalogos[open]||[];
    const add=()=>{if(!nuevo.trim())return;const nid=open.slice(0,3)+Date.now();
      setCatalogos(p=>({...p,[open]:[...p[open],{id:nid,nombre:nuevo.trim()}]}));setNuevo("");};
    const rename=(id,v)=>setCatalogos(p=>({...p,[open]:p[open].map(o=>o.id===id?{...o,nombre:v}:o)}));
    const remove=(id)=>setCatalogos(p=>({...p,[open]:p[open].filter(o=>o.id!==id)}));
    const move=(idx,dir)=>{const j=idx+dir;if(j<0||j>=items.length)return;
      setCatalogos(p=>{const arr=[...p[open]];const t=arr[idx];arr[idx]=arr[j];arr[j]=t;return {...p,[open]:arr};});};
    return <div>
      <div style={{...S.sec,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <button style={S.back} onClick={()=>setOpen(null)}>‹ Catálogos</button>
      </div>
      <div style={S.sec}>
        <div style={{fontSize:17,fontWeight:800,marginBottom:10}}>{CAT_LABEL[open]||open}</div>
        {items.map((o,idx)=><div key={o.id} style={{display:"flex",gap:6,marginBottom:7,alignItems:"center"}}>
          <div style={{display:"flex",flexDirection:"column",gap:2}}>
            <button style={{...S.pill(false,"#64748b"),padding:"0 7px",fontSize:11,opacity:idx===0?0.3:1}} disabled={idx===0} onClick={()=>move(idx,-1)}>↑</button>
            <button style={{...S.pill(false,"#64748b"),padding:"0 7px",fontSize:11,opacity:idx===items.length-1?0.3:1}} disabled={idx===items.length-1} onClick={()=>move(idx,1)}>↓</button>
          </div>
          <input style={{...S.inp,fontSize:13}} value={o.nombre} onChange={e=>rename(o.id,e.target.value)}/>
          {o.principal&&<span style={S.tag("#64748b")}>{o.principal}</span>}
          <button style={S.pill(false,"#f87171")} onClick={()=>remove(o.id)}>✕</button>
        </div>)}
        <div style={{display:"flex",gap:8,marginTop:12}}>
          <input style={S.inp} placeholder="Nuevo elemento…" value={nuevo} onChange={e=>setNuevo(e.target.value)}/>
          <button style={S.pill(true,GOLD)} onClick={add}>Agregar</button>
        </div>
      </div>
    </div>;
  }
  return <div>
    <div style={S.hdr}><div><div style={S.logo}>Catálogos</div><div style={S.sub}>Editables</div></div></div>
    <div style={S.line}/>
    <div style={{...S.sec,paddingTop:10}}>
      {Object.keys(catalogos).map(k=><div key={k} style={{...S.cCard(GOLD),display:"flex",justifyContent:"space-between",alignItems:"center"}} onClick={()=>setOpen(k)}>
        <span style={{fontSize:13,fontWeight:700}}>{CAT_LABEL[k]||k}</span>
        <span style={S.tag("#64748b")}>{(catalogos[k]||[]).length}</span>
      </div>)}
    </div>
  </div>;
}

/* ════════ ACTIVIDADES ════════ */
const EST_COLOR={Programada:"#fbbf24","En Proceso":"#60a5fa",Cerrada:"#22c55e"};
const hoyISO=()=>new Date().toISOString().slice(0,10);

function ActividadModal({init,contactos,catalogos,oportunidades,fixedContacto,onSave,onDelete,onClose}){
  const[f,setF]=useState(()=>({estatus:"Programada",fecha:hoyISO(),...init}));
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const cid=f.contactoId||fixedContacto;
  const cont=contactos.find(c=>c.id===cid);
  const opsCont=(oportunidades||[]).filter(o=>o.contactoPrincipalId===cid||o.contactoOperativoId===cid||o.contactoId===cid);
  const save=()=>{
    const cid=f.contactoId||fixedContacto;
    if(!cid){alert("Selecciona un contacto");return;}
    if(!f.fecha){alert("Indica la fecha");return;}
    if(!f.tipoAccion){alert("Indica el tipo de acción");return;}
    onSave({...f,contactoId:cid});
    if(f.estatus==="Cerrada"&&window.confirm("Actividad cerrada. ¿Agendar la siguiente acción para este contacto?")){
      setF({contactoId:cid,oportunidadId:f.oportunidadId||null,estatus:"Programada",fecha:"",tipoAccion:"",servicioSolucion:null,intencion:"",resultado:""});
      return;
    }
    onClose();
  };
  return <div style={S.modal} onClick={onClose}><div style={S.mBox} onClick={e=>e.stopPropagation()}>
    <div style={S.mTit}>{init&&init.id?"Editar actividad":"Nueva actividad"}</div>
    {fixedContacto
      ? <div style={{fontSize:11,color:"#64748b",marginBottom:12,padding:"9px 11px",background:"#13131f",borderRadius:8}}>Contacto: <b style={{color:"#e2e8f0"}}>{cont?cont.nombreCompleto:"—"}</b>{cont&&cont.etapaPrincipal?` · ${cont.etapaPrincipal}`:""}</div>
      : <Field label="Contacto">
          <select style={S.sel} value={f.contactoId||""} onChange={e=>set("contactoId",e.target.value||null)}>
            <option value="">— Selecciona —</option>
            {contactos.slice().sort((a,b)=>(a.nombreCompleto||"").localeCompare(b.nombreCompleto||"")).map(c=><option key={c.id} value={c.id}>{c.nombreCompleto}</option>)}
          </select>
        </Field>}
    <div style={S.g2}>
      <Field label="Fecha"><input type="date" style={S.inp} value={f.fecha||""} onChange={e=>set("fecha",e.target.value)}/></Field>
      <Field label="Estatus">
        <select style={S.sel} value={f.estatus||"Programada"} onChange={e=>set("estatus",e.target.value)}>
          {(catalogos.estatusAccion||[]).map(o=><option key={o.id} value={o.nombre}>{o.nombre}</option>)}
        </select>
      </Field>
    </div>
    <Field label="Tipo de acción"><CatSelect cat={catalogos.tipoAccion} value={f.tipoAccion} onChange={v=>set("tipoAccion",v)}/></Field>
    <Field label="Servicio / solución en seguimiento"><CatSelect cat={catalogos.solucion} value={f.servicioSolucion} onChange={v=>set("servicioSolucion",v)} placeholder="— Opcional —"/></Field>
    {opsCont.length>0&&<Field label="Oportunidad ligada (opcional)">
      <select style={S.sel} value={f.oportunidadId||""} onChange={e=>set("oportunidadId",e.target.value||null)}>
        <option value="">— Seguimiento de contacto —</option>
        {opsCont.map(o=><option key={o.id} value={o.id}>{o.concepto}</option>)}
      </select>
    </Field>}
    <Field label="Intención (al programar)"><textarea style={S.ta} value={f.intencion||f.intencionResultado||""} onChange={e=>set("intencion",e.target.value||null)} placeholder="Qué se busca lograr…"/></Field>
    {(f.estatus==="Cerrada"||f.resultado)&&<Field label="Resultado (al concluir)"><textarea style={S.ta} value={f.resultado||""} onChange={e=>set("resultado",e.target.value||null)} placeholder="Qué resultó…"/></Field>}
    {/* Oportunidad: campo preparado, se activará con el módulo de Oportunidades */}
    <button style={S.saveB} onClick={save}>Guardar</button>
    {init&&init.id&&<button style={{...S.cancB,color:"#f87171",borderColor:"#f8717144"}} onClick={()=>{if(window.confirm("¿Eliminar esta actividad?")){onDelete(init.id);onClose();}}}>Eliminar actividad</button>}
    <button style={S.cancB} onClick={onClose}>Cancelar</button>
  </div></div>;
}

function ActividadesList({acts,contactos,showContacto,onTap,asc}){
  const sorted=acts.slice().sort((a,b)=>asc?(a.fecha||"").localeCompare(b.fecha||""):(b.fecha||"").localeCompare(a.fecha||""));
  if(sorted.length===0)return <div style={{fontSize:11,color:"#475569",padding:"4px 0"}}>Sin actividades registradas.</div>;
  return <div>{sorted.map(a=>{const c=contactos.find(x=>x.id===a.contactoId);const col=EST_COLOR[a.estatus]||"#64748b";
    return <div key={a.id} onClick={()=>onTap&&onTap(a)} style={{background:"#10101e",border:`1px solid ${col}33`,borderLeft:`3px solid ${col}`,borderRadius:9,padding:"9px 11px",marginBottom:6,cursor:"pointer"}}>
      <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start"}}>
        <div style={{fontSize:12,fontWeight:700}}>{a.tipoAccion||"Actividad"}</div>
        <span style={S.tag(col)}>{a.estatus}</span>
      </div>
      <div style={{fontSize:10,color:"#64748b",marginTop:3}}>{a.fecha||"sin fecha"}{showContacto&&c?` · ${c.nombreCompleto}`:""}{a.servicioSolucion?` · ${a.servicioSolucion}`:""}{a.oportunidadId?" · 🎯":""}</div>
      {(a.intencion||a.intencionResultado)&&<div style={{fontSize:11,color:"#94a3b8",marginTop:4,lineHeight:1.4}}>{a.intencion||a.intencionResultado}</div>}
      {a.resultado&&<div style={{fontSize:11,color:"#22c55e",marginTop:3,lineHeight:1.4}}>→ {a.resultado}</div>}
    </div>;})}</div>;
}

function Agenda({actividades,contactos,catalogos,openAct}){
  const[filtro,setFiltro]=useState("Programada");
  const list=actividades.filter(a=>filtro==="Todas"?true:a.estatus===filtro);
  const ordenadas=filtro==="Programada"
    ? list.slice().sort((a,b)=>(a.fecha||"").localeCompare(b.fecha||""))
    : list.slice().sort((a,b)=>(b.fecha||"").localeCompare(a.fecha||""));
  return <div>
    <div style={S.hdr}><div><div style={S.logo}>Agenda</div><div style={S.sub}>{actividades.length} actividades</div></div></div>
    <div style={S.line}/>
    <div style={S.sec}>
      <div style={{...S.chips,flexWrap:"wrap",overflowX:"visible"}}>
        {["Programada","En Proceso","Cerrada","Todas"].map(t=><span key={t} style={S.chip(filtro===t,EST_COLOR[t]||GOLD)} onClick={()=>setFiltro(t)}>{t}</span>)}
      </div>
    </div>
    <div style={{...S.sec,paddingTop:4}}>
      <ActividadesList acts={ordenadas} contactos={contactos} showContacto={true} asc={filtro==="Programada"} onTap={(a)=>openAct(a,a.contactoId)}/>
    </div>
    <button style={S.fab} onClick={()=>openAct({estatus:"Programada",fecha:hoyISO()},null)}>+</button>
  </div>;
}

/* ════════ OPORTUNIDADES ════════ */
const OPO_COLOR={"Oportunidad Identificada":"#60a5fa","Oportunidad en Preparación":"#a78bfa","Propuesta Presentada":"#fbbf24","Oportunidad Aceptada":"#2dd4bf","Oportunidad Concretada":"#22c55e","Oportunidad Rechazada":"#64748b"};
const oc=(n)=>OPO_COLOR[n]||"#64748b";
const RECUR=["Única","Mensual","Anual"];
const PROB=["Alta","Media","Baja"];
const PROB_COLOR={Alta:"#22c55e",Media:"#fbbf24",Baja:"#f87171"};
const ABIERTA=(o)=>o.etapa!=="Oportunidad Concretada"&&o.etapa!=="Oportunidad Rechazada";
const money=(n)=>"$"+(Number(n)||0).toLocaleString("es-MX");

function OportunidadModal({init,contactos,empresas,catalogos,fixedContacto,onSave,onDelete,onClose}){
  const eo=catalogos.etapaOportunidad||[];
  const[f,setF]=useState(()=>{const b={recurrencia:"Única",etapa:(eo[0]?eo[0].nombre:""),...init};if(b.contactoId&&!b.contactoPrincipalId)b.contactoPrincipalId=b.contactoId;return b;});
  const set=(k,v)=>setF(p=>({...p,[k]:v}));
  const csort=contactos.slice().sort((a,b)=>(a.nombreCompleto||"").localeCompare(b.nombreCompleto||""));
  const principal=contactos.find(c=>c.id===f.contactoPrincipalId);
  useEffect(()=>{ if(principal&&principal.empresaId&&!f.empresaId)set("empresaId",principal.empresaId); },[f.contactoPrincipalId]);
  const save=()=>{
    if(!f.concepto){alert("Indica un concepto");return;}
    if(!f.contactoPrincipalId){alert("Selecciona el contacto principal");return;}
    const data={...f};
    if(data.etapa==="Oportunidad Concretada"&&!data.fechaConcretada)data.fechaConcretada=hoyISO();
    if(!data.movIdsVinculados)data.movIdsVinculados=[];
    onSave(data);onClose();
  };
  return <div style={S.modal} onClick={onClose}><div style={S.mBox} onClick={e=>e.stopPropagation()}>
    <div style={S.mTit}>{init&&init.id?"Editar oportunidad":"Nueva oportunidad"}</div>
    <Field label="Concepto"><input style={S.inp} value={f.concepto||""} onChange={e=>set("concepto",e.target.value)} placeholder="Ej. Fianza de cumplimiento…"/></Field>
    <Field label="Contacto principal">
      <select style={S.sel} value={f.contactoPrincipalId||""} onChange={e=>set("contactoPrincipalId",e.target.value||null)}>
        <option value="">— Selecciona —</option>
        {csort.map(c=><option key={c.id} value={c.id}>{c.nombreCompleto}</option>)}
      </select>
    </Field>
    <Field label="Contacto operativo (opcional)">
      <select style={S.sel} value={f.contactoOperativoId||""} onChange={e=>set("contactoOperativoId",e.target.value||null)}>
        <option value="">— Ninguno —</option>
        {csort.map(c=><option key={c.id} value={c.id}>{c.nombreCompleto}</option>)}
      </select>
    </Field>
    <Field label="Empresa (opcional)">
      <select style={S.sel} value={f.empresaId||""} onChange={e=>set("empresaId",e.target.value||null)}>
        <option value="">— Sin empresa —</option>
        {empresas.slice().sort((a,b)=>(a.nombre||"").localeCompare(b.nombre||"")).map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}
      </select>
    </Field>
    <Field label="Solución Nexus"><CatSelect cat={catalogos.solucion} value={f.solucionNexus} onChange={v=>set("solucionNexus",v)}/></Field>
    <Field label="Etapa"><CatSelect cat={catalogos.etapaOportunidad} value={f.etapa} onChange={v=>set("etapa",v)} placeholder="—"/></Field>
    <div style={S.g2}>
      <Field label="Monto estimado"><input type="number" inputMode="numeric" style={S.inp} value={f.montoEstimado||""} onChange={e=>set("montoEstimado",e.target.value)} placeholder="0"/></Field>
      <Field label="Comisión estimada"><input type="number" inputMode="numeric" style={S.inp} value={f.comisionEstimada||""} onChange={e=>set("comisionEstimada",e.target.value)} placeholder="0"/></Field>
    </div>
    <Field label="Probabilidad de cierre">
      <div style={{display:"flex",gap:6}}>
        {PROB.map(p=><button key={p} style={{...S.pill(f.probabilidad===p,PROB_COLOR[p]),flex:1}} onClick={()=>set("probabilidad",f.probabilidad===p?null:p)}>{p}</button>)}
      </div>
    </Field>
    <div style={S.g2}>
      <Field label="Fecha estimada cierre"><input type="date" style={S.inp} value={f.fechaEstimadaCierre||""} onChange={e=>set("fechaEstimadaCierre",e.target.value||null)}/></Field>
      <Field label="Recurrencia">
        <select style={S.sel} value={f.recurrencia||"Única"} onChange={e=>set("recurrencia",e.target.value)}>{RECUR.map(r=><option key={r} value={r}>{r}</option>)}</select>
      </Field>
    </div>
    <Field label="Condiciones"><textarea style={S.ta} value={f.condiciones||""} onChange={e=>set("condiciones",e.target.value||null)}/></Field>
    <Field label="Notas"><textarea style={S.ta} value={f.notas||""} onChange={e=>set("notas",e.target.value||null)}/></Field>
    <button style={S.saveB} onClick={save}>Guardar</button>
    {init&&init.id&&<button style={{...S.cancB,color:"#f87171",borderColor:"#f8717144"}} onClick={()=>{if(window.confirm("¿Eliminar esta oportunidad?")){onDelete(init.id);onClose();}}}>Eliminar oportunidad</button>}
    <button style={S.cancB} onClick={onClose}>Cancelar</button>
  </div></div>;
}

function OpoCard({o,contactos,empresas,onTap}){
  const c=contactos.find(x=>x.id===(o.contactoPrincipalId||o.contactoId));
  const op=contactos.find(x=>x.id===o.contactoOperativoId);
  const e=empresas.find(x=>x.id===o.empresaId);const col=oc(o.etapa);
  const monto=o.comisionEstimada||o.montoEstimado;
  return <div onClick={()=>onTap&&onTap(o)} style={S.cCard(col)}>
    <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start"}}>
      <div style={{fontSize:14,fontWeight:700}}>{o.concepto}</div>
      {monto?<div style={{fontSize:13,fontWeight:800,color:GOLD,whiteSpace:"nowrap"}}>{money(monto)}</div>:null}
    </div>
    <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:6}}>
      <span style={S.tag(col)}>{(o.etapa||"").replace("Oportunidad ","")}</span>
      {o.probabilidad&&<span style={S.tag(PROB_COLOR[o.probabilidad])}>{o.probabilidad}</span>}
      {c&&<span style={S.tag("#94a3b8")}>{c.nombreCompleto}</span>}
      {op&&<span style={S.tag("#64748b")}>op: {op.nombreCompleto}</span>}
      {e&&<span style={S.tag("#3b82f6")}>{e.nombre}</span>}
      {o.solucionNexus&&<span style={S.tag(GOLD)}>{o.solucionNexus.length>22?o.solucionNexus.slice(0,22)+"…":o.solucionNexus}</span>}
    </div>
  </div>;
}

function Oportunidades({oportunidades,contactos,empresas,catalogos,openOpo}){
  const[fEt,setFEt]=useState("");
  const list=oportunidades.filter(o=>!fEt||o.etapa===fEt).sort((a,b)=>(b.id||"").localeCompare(a.id||""));
  const abiertas=oportunidades.filter(ABIERTA);
  const totalAb=abiertas.reduce((s,o)=>s+(Number(o.montoEstimado)||0),0);
  const totalCom=abiertas.reduce((s,o)=>s+(Number(o.comisionEstimada)||0),0);
  return <div>
    <div style={S.hdr}><div><div style={S.logo}>Oportunidades</div><div style={S.sub}>{oportunidades.length} en total · {abiertas.length} abiertas</div></div></div>
    <div style={S.line}/>
    <div style={S.sec}>
      <div style={S.g2}>
        <div style={S.card()}><div style={S.lbl}>Monto abierto</div><div style={S.big()}>{money(totalAb)}</div></div>
        <div style={S.card()}><div style={S.lbl}>Comisión abierta</div><div style={S.big("#22c55e")}>{money(totalCom)}</div></div>
      </div>
      <div style={{...S.chips,flexWrap:"wrap",overflowX:"visible"}}>
        <span style={S.chip(!fEt)} onClick={()=>setFEt("")}>Todas</span>
        {(catalogos.etapaOportunidad||[]).map(o=><span key={o.id} style={S.chip(fEt===o.nombre,oc(o.nombre))} onClick={()=>setFEt(fEt===o.nombre?"":o.nombre)}>{o.nombre.replace("Oportunidad ","")}</span>)}
      </div>
    </div>
    <div style={{...S.sec,paddingTop:4}}>
      {list.map(o=><OpoCard key={o.id} o={o} contactos={contactos} empresas={empresas} onTap={(x)=>openOpo(x,x.contactoId)}/>)}
      {list.length===0&&<div style={{textAlign:"center",color:"#475569",fontSize:12,padding:"30px 0"}}>Sin oportunidades.</div>}
    </div>
    <button style={S.fab} onClick={()=>openOpo({},null)}>+</button>
  </div>;
}

/* ════════ APP ════════ */
function App(){
  const[view,setView]=useState("inicio");
  const[contactos,setContactos]=useState(()=>{
    let cs=migra(loadLS("contactos",null)||SEED.contactos);
    if(!localStorage.getItem(PFX+"migAA")){
      cs=cs.map(c=>AA_IDS.includes(c.id)?{...c,capacidadRef:"Muy Alta"}:c);
      try{localStorage.setItem(PFX+"migAA","1");}catch(e){}
    }
    if(!localStorage.getItem(PFX+"migPix")){
      cs=cs.map(c=>(c.etapaPixan&&c.etapaPixan!=="Sin Historia")?{...c,acercamientoPixan:true}:c);
      try{localStorage.setItem(PFX+"migPix","1");}catch(e){}
    }
    if(!localStorage.getItem(PFX+"migTipo")){
      cs=cs.map(c=>c.tipoContacto?c:{...c,tipoContacto:"Prospecto"});
      try{localStorage.setItem(PFX+"migTipo","1");}catch(e){}
    }
    return cs;
  });
  const[empresas,setEmpresas]=useState(()=>loadLS("empresas",null)||SEED.empresas);
  const[actividades,setActividades]=useState(()=>loadLS("actividades",null)||[]);
  const[catalogos,setCatalogos]=useState(()=>{
    const base=loadLS("catalogos",null)||SEED.catalogos;
    if(!base.actividadPrincipal){
      const src=loadLS("contactos",null)||SEED.contactos;
      const acts=[...new Set((src||[]).map(c=>c.actividad).filter(Boolean))];
      base.actividadPrincipal=acts.map((a,i)=>({id:"act"+i,nombre:a}));
    }
    if(!(base.capacidadRef||[]).some(o=>o.nombre==="Muy Alta")){
      base.capacidadRef=[{id:"capMA",nombre:"Muy Alta"},...(base.capacidadRef||[])];
    }
    if(!base.tipoContacto){
      base.tipoContacto=["Prospecto","Enlace operativo","Referidor","Otro"].map((n,i)=>({id:"tc"+i,nombre:n}));
    }
    return base;
  });
  const[oportunidades,setOportunidades]=useState(()=>loadLS("oportunidades",null)||[]);
  const[openContacto,setOpenContacto]=useState(null);
  const[actModal,setActModal]=useState(null);
  const[opoModal,setOpoModal]=useState(null);

  useEffect(()=>saveLS("contactos",contactos),[contactos]);
  useEffect(()=>saveLS("empresas",empresas),[empresas]);
  useEffect(()=>saveLS("actividades",actividades),[actividades]);
  useEffect(()=>saveLS("oportunidades",oportunidades),[oportunidades]);
  useEffect(()=>saveLS("catalogos",catalogos),[catalogos]);
  useEffect(()=>{const l=document.getElementById("loading");if(l){l.classList.add("fade-out");setTimeout(()=>l.remove(),350);}},[]);

  const openAct=(init,fixed)=>setActModal({init,fixed:fixed||null});
  const saveAct=(data)=>{
    setActividades(prev=>{
      if(data.id)return prev.map(a=>a.id===data.id?data:a);
      const nid="a"+(Math.max(0,...prev.map(a=>parseInt((a.id||"a0").slice(1))||0))+1);
      return [...prev,{...data,id:nid}];
    });
    if(data.contactoId&&data.fecha){
      setContactos(prev=>prev.map(c=>(c.id===data.contactoId&&(!c.fechaUltimoContacto||data.fecha>c.fechaUltimoContacto))?{...c,fechaUltimoContacto:data.fecha}:c));
    }
  };

  const delAct=(id)=>setActividades(prev=>prev.filter(a=>a.id!==id));
  const openOpo=(init,fixed)=>setOpoModal({init,fixed:fixed||null});
  const saveOpo=(data)=>{setOportunidades(prev=>{
    if(data.id)return prev.map(o=>o.id===data.id?data:o);
    const nid="o"+(Math.max(0,...prev.map(o=>parseInt((o.id||"o0").slice(1))||0))+1);
    return [...prev,{...data,id:nid}];
  });};
  const delOpo=(id)=>{setOportunidades(prev=>prev.filter(o=>o.id!==id));setActividades(prev=>prev.map(a=>a.oportunidadId===id?{...a,oportunidadId:null}:a));};

  const go=(k)=>{setOpenContacto(null);setView(k);};
  const NAV=[["inicio","Inicio","⌂"],["contactos","Contactos","👥"],["empresas","Empresas","🏢"],["oportunidades","Oport.","🎯"],["agenda","Agenda","🗓"],["catalogos","Catál.","☰"]];
  return <div style={S.app}>
    {view==="inicio"&&<Inicio contactos={contactos} empresas={empresas} actividades={actividades} oportunidades={oportunidades} openAct={openAct} openOpo={openOpo} setView={go}/>}
    {view==="contactos"&&<Contactos key={openContacto||"list"} initialSel={openContacto} contactos={contactos} catalogos={catalogos} setCatalogos={setCatalogos} empresas={empresas} setEmpresas={setEmpresas} setContactos={setContactos} actividades={actividades} openAct={openAct} oportunidades={oportunidades} openOpo={openOpo}/>}
    {view==="empresas"&&<Empresas empresas={empresas} setEmpresas={setEmpresas} contactos={contactos} catalogos={catalogos} goContacto={(id)=>{setOpenContacto(id);setView("contactos");}}/>}
    {view==="oportunidades"&&<Oportunidades oportunidades={oportunidades} contactos={contactos} empresas={empresas} catalogos={catalogos} openOpo={openOpo}/>}
    {view==="agenda"&&<Agenda actividades={actividades} contactos={contactos} catalogos={catalogos} openAct={openAct}/>}
    {view==="catalogos"&&<Catalogos catalogos={catalogos} setCatalogos={setCatalogos}/>}
    <div style={S.nav}>
      {NAV.map(([k,lab,ico])=><button key={k} style={S.navB(view===k)} onClick={()=>go(k)}>
        <span style={S.navIco}>{ico}</span><span>{lab}</span></button>)}
    </div>
    {actModal&&<ActividadModal init={actModal.init} fixedContacto={actModal.fixed} contactos={contactos} catalogos={catalogos} oportunidades={oportunidades} onSave={saveAct} onDelete={delAct} onClose={()=>setActModal(null)}/>}
    {opoModal&&<OportunidadModal init={opoModal.init} fixedContacto={opoModal.fixed} contactos={contactos} empresas={empresas} catalogos={catalogos} onSave={saveOpo} onDelete={delOpo} onClose={()=>setOpoModal(null)}/>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
