<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="theme-color" content="#080810"/>
  <title>Nexus CFP</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#080810;color:#e2e8f0;font-family:'DM Sans',sans-serif;overscroll-behavior:none;}
    #root{min-height:100vh;}
    #loading{position:fixed;inset:0;background:#080810;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;padding:24px;transition:opacity 0.3s ease;}
    #loading.fade-out{opacity:0;}
    #loading .isotipo-wrap{margin-bottom:20px;mix-blend-mode:screen;}
    #loading .ncfp-title{font-size:28px;font-weight:700;letter-spacing:6px;color:#C9A84C;margin-bottom:3px;font-family:'Cinzel',Georgia,serif;text-transform:uppercase;}
    #loading .ncfp-by{font-size:9px;color:#C9A84C88;letter-spacing:3px;margin-bottom:5px;text-transform:uppercase;font-family:'Cinzel',Georgia,serif;}
    #loading .ncfp-sub{font-size:9px;color:#334155;letter-spacing:2px;text-transform:uppercase;margin-bottom:24px;}
    #loading .ncfp-bienvenido{font-size:12px;color:#64748b;margin-bottom:3px;letter-spacing:1px;}
    #loading .ncfp-nombre{font-size:18px;font-weight:600;color:#e2e8f0;margin-bottom:20px;font-family:'Cinzel',Georgia,serif;}
    #loading .ncfp-dots{display:flex;gap:6px;margin-top:12px;}
    #loading .ncfp-dots span{width:5px;height:5px;border-radius:50%;background:#C9A84C;animation:dotpulse 1.2s ease-in-out infinite;}
    #loading .ncfp-dots span:nth-child(2){animation-delay:0.2s;}
    #loading .ncfp-dots span:nth-child(3){animation-delay:0.4s;}
    @keyframes dotpulse{0%,80%,100%{opacity:0.2;transform:scale(0.8);}40%{opacity:1;transform:scale(1.2);}}
    @keyframes spin{to{transform:rotate(360deg);}}
    input[type=date]::-webkit-calendar-picker-indicator{filter:invert(0.6);}
    select option{background:#13131f;}
    ::-webkit-scrollbar{width:0;height:0;}
    input,select,button{font-family:'DM Sans',sans-serif;}
  </style>

function generarFechas(rec){
  const fechas=[];let cur=rec.fechaInicio;
  for(let i=0;i<500;i++){
    if(rec.finTipo==="fecha"&&cur>rec.finFecha)break;
    if(rec.recurrencia==="Diaria"){fechas.push(cur);cur=addD(cur,1);}
    else if(rec.recurrencia==="Semanal"){
      const dow=rec.diasSemana.length?rec.diasSemana:[new Date(cur+"T12:00:00").getDay()];
      let d=cur;for(let w=0;w<7;w++){if(dow.includes(new Date(d+"T12:00:00").getDay()))fechas.push(d);d=addD(d,1);}
      cur=addD(cur,7);
    }
    else if(rec.recurrencia==="Quincenal"){fechas.push(cur);cur=addD(cur,15);}
    else if(rec.recurrencia==="Mensual")  {fechas.push(cur);cur=addM_(cur,1);}
    else if(rec.recurrencia==="Bimestral"){fechas.push(cur);cur=addM_(cur,2);}
    else if(rec.recurrencia==="Anual")    {fechas.push(cur);cur=addY_(cur,1);}
    if(fechas.length>=(rec.finTipo==="repeticiones"?rec.finReps:500))break;
  }
  return fechas.slice(0,rec.finTipo==="repeticiones"?rec.finReps:undefined);
}

// ─── SALDOS ──────────────────────────────────────────────────
function calcConsolidado(movs,pI,pE,cuentasRef,incluirProy,excludedIds){
  // incluirProy: si true, PROYECTADO opera igual que PROGRAMADO en el consolidado
  // excludedIds: Set de IDs excluidos del saldo (modo simulación)
  const excl=excludedIds instanceof Set?excludedIds:new Set();
  const sorted=[...movs].filter(r=>r.fecha).sort((a,b)=>a.fecha!==b.fecha?a.fecha.localeCompare(b.fecha):a.orden-b.orden);
  let s=(cuentasRef||[]).filter(c=>c.esReferencia).reduce((acc,c)=>acc+(c.saldoInicial||0),0);
  return sorted.map(r=>{
    const real=["INGRESADO","PAGADO"].includes(r.estatus);
    const prog=r.estatus==="PROGRAMADO";
    const proy=r.estatus==="PROYECTADO"&&(incluirProy!==false); // por default incluye proyectado
    let cuenta=false;
    if(real&&!(r.tipoOp==="Egreso"&&r.usaTarjeta)&&r.tipoOp!=="Traspaso")cuenta=true;
    if(prog||proy){
      if(r.tipoOp==="Ingreso"&&r.prioridad<=(pI||3))cuenta=true;
      // Para egresos: pE 1-4 filtra por prioridad, pE=5 incluye todos
      if(r.tipoOp==="Egreso"&&!r.usaTarjeta&&((pE||5)>=5||r.prioridad<=(pE||5)))cuenta=true;
      if(r.tipoOp==="Pago Tarjeta")cuenta=true;
    }
    // Simulación: excluir del cálculo aunque cumpla las reglas
    const simExcluido=excl.has(r.id);
    if(simExcluido) cuenta=false;
    if(cuenta){
      if(r.tipoOp==="Ingreso") s+=r.monto||0;
      else if(r.tipoOp==="Egreso"&&!r.usaTarjeta) s-=r.monto||0;
      else if(r.tipoOp==="Pago Tarjeta") s-=r.monto||0;
    }
    return{...r,saldoConsolidado:s,enProyeccion:cuenta,esProy:proy&&!prog,simExcluido};
  });
}
function calcCuentaSaldos(cuentas,movs){
  const s={};cuentas.forEach(c=>{s[c.id]=c.saldoInicial||0;});
  [...movs].filter(r=>r.fecha).sort((a,b)=>a.fecha!==b.fecha?a.fecha.localeCompare(b.fecha):a.orden-b.orden).forEach(r=>{
    if(!["INGRESADO","PAGADO"].includes(r.estatus))return;
    if(r.tipoOp==="Ingreso"&&r.cuentaId&&!r.usaTarjeta)s[r.cuentaId]=(s[r.cuentaId]||0)+(r.monto||0);
    if(r.tipoOp==="Egreso" &&r.cuentaId&&!r.usaTarjeta)s[r.cuentaId]=(s[r.cuentaId]||0)-(r.monto||0);
    if(r.tipoOp==="Traspaso"||r.tipoOp==="Transferencia"){if(r.cuentaId)s[r.cuentaId]=(s[r.cuentaId]||0)-(r.monto||0);if(r.cuentaDestinoId)s[r.cuentaDestinoId]=(s[r.cuentaDestinoId]||0)+(r.monto||0);}
    if(r.tipoOp==="Pago Tarjeta"&&r.cuentaId)s[r.cuentaId]=(s[r.cuentaId]||0)-(r.monto||0);
  });
  return s;
}
function calcTarjetaSaldos(tarjetas,movs){
  const s={};tarjetas.forEach(t=>{s[t.id]=t.saldoDeudorInicial||0;});
  [...movs].filter(r=>r.fecha).sort((a,b)=>a.fecha!==b.fecha?a.fecha.localeCompare(b.fecha):a.orden-b.orden).forEach(r=>{
    if(!["INGRESADO","PAGADO"].includes(r.estatus))return;
    if(r.tipoOp==="Egreso"&&r.usaTarjeta&&r.tarjetaId)s[r.tarjetaId]=(s[r.tarjetaId]||0)+(r.monto||0);
    if(r.tipoOp==="Pago Tarjeta"&&r.tarjetaId)s[r.tarjetaId]=(s[r.tarjetaId]||0)-(r.monto||0);
  });
  return s;
}
function calcSaldoCuentaAntesDe(cuentaId,movId,movs,cuentas){
  let s=cuentas.find(c=>c.id===cuentaId)?.saldoInicial||0;
  [...movs].filter(r=>r.fecha&&r.id!==movId).sort((a,b)=>a.fecha.localeCompare(b.fecha)).forEach(r=>{
    if(!["INGRESADO","PAGADO"].includes(r.estatus))return;
    if(r.tipoOp==="Ingreso"&&r.cuentaId===cuentaId&&!r.usaTarjeta)s+=(r.monto||0);
    if(r.tipoOp==="Egreso" &&r.cuentaId===cuentaId&&!r.usaTarjeta)s-=(r.monto||0);
    if(r.tipoOp==="Traspaso"||r.tipoOp==="Transferencia"){if(r.cuentaId===cuentaId)s-=(r.monto||0);if(r.cuentaDestinoId===cuentaId)s+=(r.monto||0);}
    if(r.tipoOp==="Pago Tarjeta"&&r.cuentaId===cuentaId)s-=(r.monto||0);
  });
  return s;
}

// Saldo proyectado al cierre de un mes (para saldo inicial de Proyección Presupuestal)
function calcSaldoProyFin(movs,cuentas,pI,pE,sm,sy){
  const withS=calcConsolidado(movs,pI,pE,cuentas);
  const endDate=`${sy}-${String(sm+1).padStart(2,"0")}-31`;
  const relevant=withS.filter(r=>r.fecha&&r.fecha<=endDate&&r.enProyeccion);
  if(!relevant.length){
    const saldos=calcCuentaSaldos(cuentas,movs);
    return cuentas.filter(c=>!c.esReferencia).reduce((s,c)=>s+(saldos[c.id]||0),0);
  }
  return relevant[relevant.length-1].saldoConsolidado;
}

// ─── DRAG ────────────────────────────────────────────────────
function useDrag(setMovs){
  const dR=useRef(null),oR=useRef(null),snR=useRef(null);
  const[aId,setAId]=useState(null),[oViz,setOViz]=useState(null);
  const start=(id,sn)=>{dR.current=id;snR.current=sn;setAId(id);};
  const enter=id=>{oR.current=id;setOViz(id);};
  const commit=useCallback(()=>{
    const dragId=dR.current, overId=oR.current, snap=snR.current;
    if(dragId&&overId&&dragId!==overId&&snap){
      const fi=snap.findIndex(r=>r.id===dragId);
      const ti=snap.findIndex(r=>r.id===overId);
      if(fi!==-1&&ti!==-1){
        // Reordenar el array snap moviendo el elemento arrastrado a la posición destino
        const arr=[...snap];
        const targetFecha = arr[ti].fecha; // fecha del elemento destino
        const [moved]=arr.splice(fi,1);
        arr.splice(ti,0,moved);
        // Reasignar órdenes secuenciales; si el destino tiene fecha distinta, adoptarla
        const ordenMap={};
        const fechaMap={};
        arr.forEach((r,i)=>{
          ordenMap[r.id]=i+1;
          // Solo actualizar fecha del elemento arrastrado si la fecha destino es distinta
          if(r.id===dragId && targetFecha && targetFecha!==r.fecha){
            fechaMap[r.id]=targetFecha;
          }
        });
        setMovs(p=>p.map(r=>{
          const updates={};
          if(ordenMap[r.id]!==undefined) updates.orden=ordenMap[r.id];
          if(fechaMap[r.id]) updates.fecha=fechaMap[r.id];
          return Object.keys(updates).length?{...r,...updates}:r;
        }));
      }
    }
    dR.current=null;oR.current=null;snR.current=null;setAId(null);setOViz(null);
  },[setMovs]);
  const tm=useCallback(e=>{
    if(!dR.current)return;e.preventDefault();
    const el=document.elementFromPoint(e.touches[0].clientX,e.touches[0].clientY)?.closest("[data-movid]");
    if(el){const oid=parseInt(el.dataset.movid);if(oid&&oid!==dR.current){oR.current=oid;setOViz(oid);}}
  },[]);
  return{aId,oViz,start,enter,commit,tm};
}
function useCatDrag(setCats){
  const dR=useRef(null),oR=useRef(null);
  const[aId,setAId]=useState(null),[oViz,setOViz]=useState(null);
  const start=id=>{dR.current=id;setAId(id);};
  const enter=id=>{oR.current=id;setOViz(id);};
  const commit=useCallback(()=>{
    if(dR.current&&oR.current&&dR.current!==oR.current){
      setCats(p=>{const arr=[...p];const fi=arr.findIndex(c=>c.id===dR.current);const ti=arr.findIndex(c=>c.id===oR.current);if(fi!==-1&&ti!==-1){const[el]=arr.splice(fi,1);arr.splice(ti,0,el);}return arr;});
    }
    dR.current=null;oR.current=null;setAId(null);setOViz(null);
  },[setCats]);
  return{aId,oViz,start,enter,commit};
}

function usePeriod(){
  const now=new Date();
  const[mode,setMode]=useState("mes");
  const[sm,setSm]=useState(now.getMonth());
  const[sy,setSy]=useState(now.getFullYear());
  const[fr,setFr]=useState(todayStr());
  const[to,setTo]=useState(todayStr());
  const inP=useCallback(d=>{
    if(!d)return false;
    if(mode==="mes"){const[y,m]=d.split("-").map(Number);return y===sy&&m-1===sm;}
    if(mode==="anio")return d.startsWith(String(sy));
    return d>=fr&&d<=to;
  },[mode,sm,sy,fr,to]);
  const label=()=>mode==="mes"?`${MESES_FULL[sm]} ${sy}`:mode==="anio"?`Año ${sy}`:`${fmtDate(fr)}–${fmtDate(to)}`;
  const prev=()=>{if(mode==="mes"){setSm(m=>{if(m===0){setSy(y=>y-1);return 11;}return m-1;});}if(mode==="anio")setSy(y=>y-1);};
  const next=()=>{if(mode==="mes"){setSm(m=>{if(m===11){setSy(y=>y+1);return 0;}return m+1;});}if(mode==="anio")setSy(y=>y+1);};
  return{mode,setMode,sm,sy,setSm,setSy,fr,setFr,to,setTo,inP,label,prev,next};
}
function usePeriodMes(){
  const now=new Date();
  const[sm,setSm]=useState(now.getMonth());
  const[sy,setSy]=useState(now.getFullYear());
  const inP=useCallback(d=>{if(!d)return false;const[y,m]=d.split("-").map(Number);return y===sy&&m-1===sm;},[sm,sy]);
  const label=()=>`${MESES_FULL[sm]} ${sy}`;
  const prev=()=>setSm(m=>{if(m===0){setSy(y=>y-1);return 11;}return m-1;});
  const next=()=>setSm(m=>{if(m===11){setSy(y=>y+1);return 0;}return m+1;});
  return{sm,sy,inP,label,prev,next};
}

// ─── BUDGET BAR ───────────────────────────────────────────────
function BudgetBar({gasto,presupuesto,color="#C9A84C",esIngreso=false}){
  if(!presupuesto)return null;
  const pct=gasto/presupuesto;
  const over=gasto>presupuesto;
  const c=over?(esIngreso?"#22c55e":"#f87171"):(pct>0.8?(esIngreso?"#22c55e":"#fbbf24"):color);
  let etiqueta;
  if(esIngreso){
    if(over) etiqueta=<span style={{color:"#22c55e",fontWeight:700}}>✓ Meta alcanzada</span>;
    else etiqueta=<span style={{color:"#fbbf24"}}>Falta para meta {fmt(presupuesto-gasto)}</span>;
  } else {
    if(over) etiqueta=<span style={{color:"#f87171"}}>Exceso {fmt(gasto-presupuesto)}</span>;
    else etiqueta=<span style={{color:"#22c55e"}}>Disponible {fmt(presupuesto-gasto)}</span>;
  }
  return(
    <div>
      <div style={{height:5,borderRadius:3,background:"#1e293b",overflow:"hidden",marginTop:5}}>
        <div style={{height:"100%",borderRadius:3,background:c,width:`${Math.min(pct/1.2,1)*100}%`,transition:"width 0.4s"}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#475569",marginTop:2}}>
        <span style={{color:c,fontWeight:700}}>{Math.round(pct*100)}%</span>
        {etiqueta}
      </div>
    </div>
  );
}

              {fieldErrors?.fecha&&<div style={{fontSize:9,color:"#f87171",marginTop:2}}>⚠ Se requiere fecha</div>}
            </div>
          )}
          <div style={S.fg}><label style={S.fl}>Monto $</label>
            {isEditReal?<><input style={S.inpDis} value={fmt(formMov.monto)} readOnly/><div style={{fontSize:9,color:"#fbbf24",marginTop:3}}>⚠ Para cambiar el monto, elimina y crea de nuevo.</div></>
             :<input style={S.inp} type="number" value={formMov.monto} onChange={e=>set("monto",e.target.value)} placeholder="0.00"/>}
          </div>
          <div style={S.fg}><label style={S.fl}>Concepto</label><input style={S.inp} value={formMov.concepto} onChange={e=>set("concepto",e.target.value)} placeholder="Descripción…"/></div>
          <div style={{...S.r2,marginBottom:11}}>
            <div><label style={S.fl}>Categoría</label>
              <select style={S.sel} value={formMov.cat} onChange={e=>{
                const newCat=e.target.value;
                const newPrio=formMov.tipoOp==="Egreso"&&getPrioDefEg?getPrioDefEg(newCat,""):formMov.prioridad;
                const newCapa=formMov.tipoOp==="Egreso"&&getCapaDefEg?getCapaDefEg(newCat,""):formMov.capa;
                setFormMov(f=>({...f,cat:newCat,subcat:"",prioridad:newPrio,capa:newCapa}));
              }}>
                <option value="">— —</option>{cats.map(c=><option key={c.id} value={c.id}>{c.nombre}</option>)}
              </select>
            </div>
            <div><label style={S.fl}>Subcategoría</label>
              <select style={S.sel} value={formMov.subcat} onChange={e=>{
                const newSub=e.target.value;
                const newPrio=formMov.tipoOp==="Egreso"&&getPrioDefEg?getPrioDefEg(formMov.cat,newSub):formMov.prioridad;
                const newCapa=formMov.tipoOp==="Egreso"&&getCapaDefEg?getCapaDefEg(formMov.cat,newSub):formMov.capa;
                setFormMov(f=>({...f,subcat:newSub,prioridad:newPrio,capa:newCapa}));
              }}>
                <option value="">— —</option>{subcats.map(s=><option key={s.id} value={s.id}>{s.nombre}</option>)}
              </select>
            </div>
          </div>
          {!isProg&&(<>
            {formMov.tipoOp==="Egreso"&&(
              <div style={S.fg} ref={cuentaRef}>
                <label style={S.fl}>Cargo a</label>
                <div style={{display:"flex",gap:7,marginBottom:9}}>
                  <button style={S.prioB2(!formMov.usaTarjeta,"#60a5fa")} onClick={()=>setFormMov(f=>({...f,usaTarjeta:false,tarjetaId:null}))}>🏦 Cuenta Débito</button>
                  <button style={S.prioB2(formMov.usaTarjeta,"#f472b6")} onClick={()=>setFormMov(f=>({...f,usaTarjeta:true,cuentaId:null}))}>💳 Tarjeta TC</button>
                </div>
                {!formMov.usaTarjeta&&<select style={fieldErrors?.cuentaId?S.selErr:S.sel} value={formMov.cuentaId||""} onChange={e=>set("cuentaId",parseInt(e.target.value)||null)}><option value="">— Seleccionar —</option>{cuentas.filter(c=>!c.esReferencia).map(c=><option key={c.id} value={c.id}>{c.nombre} · {fmt(cuentaSaldos[c.id])}</option>)}</select>}
                {formMov.usaTarjeta&&<select style={fieldErrors?.tarjetaId?S.selErr:S.sel} value={formMov.tarjetaId||""} onChange={e=>set("tarjetaId",parseInt(e.target.value)||null)}><option value="">— Seleccionar —</option>{tarjetas.map(t=><option key={t.id} value={t.id}>{t.nombre} · Disp:{fmt((t.limite||0)-tarjetaSaldos[t.id])}</option>)}</select>}
                {(fieldErrors?.cuentaId||fieldErrors?.tarjetaId)&&<div style={{fontSize:9,color:"#f87171",marginTop:3}}>⚠ Selecciona cuenta o tarjeta</div>}
              </div>
            )}
            {formMov.tipoOp==="Ingreso"&&(
              <div style={S.fg} ref={cuentaRef}><label style={S.fl}>Depositar en</label>
                <select style={fieldErrors?.cuentaId?S.selErr:S.sel} value={formMov.cuentaId||""} onChange={e=>set("cuentaId",parseInt(e.target.value)||null)}>
                  <option value="">— Seleccionar —</option>{cuentas.filter(c=>!c.esReferencia).map(c=><option key={c.id} value={c.id}>{c.nombre} · {fmt(cuentaSaldos[c.id])}</option>)}
                </select>
                {fieldErrors?.cuentaId&&<div style={{fontSize:9,color:"#f87171",marginTop:3}}>⚠ Selecciona cuenta de depósito</div>}
              </div>
            )}
          </>)}
          {isProg&&<div style={S.infoBx("#a78bfa")}><span>⚡</span><span>Programado — cuenta se asigna al confirmar como ejecutado.</span></div>}
          <div style={S.fg}>
            <label style={S.fl}>{formMov.tipoOp==="Ingreso"?"Probabilidad":"Prioridad"}</label>
            {formMov.tipoOp==="Ingreso"
              ?<div style={S.prioR}>{[[1,"Alta","#22c55e"],[2,"Media","#fbbf24"],[3,"Baja","#94a3b8"]].map(([v,l,c])=><button key={v} style={S.prioB2(formMov.prioridad===v,c)} onClick={()=>set("prioridad",v)}>{l}</button>)}</div>
              :<div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
                {[[1,PRIO_EG_LBL[1],"#22c55e"],[2,PRIO_EG_LBL[2],"#60a5fa"],[3,PRIO_EG_LBL[3],"#fbbf24"],[4,PRIO_EG_LBL[4],"#f87171"]].map(([v,l,c])=>(
                  <button key={v} style={{...S.prioB2(formMov.prioridad===v,c),flex:1,minWidth:60,padding:"7px 4px",fontSize:9}} onClick={()=>set("prioridad",v)}>{l}</button>
                ))}
              </div>
            }
          </div>
          {formMov.tipoOp==="Egreso"&&capas&&<div style={S.fg}><label style={S.fl}>Capa (proyección)</label><select style={S.sel} value={formMov.capa||""} onChange={e=>set("capa",e.target.value)}><option value="">— Sin capa —</option>{capas.map(cp=><option key={cp.id} value={cp.id}>{cp.nombre}</option>)}</select></div>}
          <div style={S.fg}><label style={S.fl}>Observaciones</label><textarea style={{...S.inp,minHeight:60,resize:"vertical",lineHeight:1.5}} value={formMov.obs} onChange={e=>set("obs",e.target.value)}/></div>
          {/* Vinculación a Cartera — filtrada por tipo de movimiento */}
          {(formMov.tipoOp==="Egreso"||formMov.tipoOp==="Ingreso")&&(
            <div style={S.fg}>
              <label style={S.fl}>Vincular a (opcional)</label>
              {formMov.tipoOp==="Egreso"&&(
                <select style={S.sel} value={formMov.vinculoTipo&&formMov.vinculoId?"acreedores:"+formMov.vinculoId:""}
                  onChange={e=>{
                    if(!e.target.value){set("vinculoTipo",null);set("vinculoId",null);}
                    else{const[t,i]=e.target.value.split(":");set("vinculoTipo",t);set("vinculoId",parseInt(i));}
                  }}>
                  <option value="">— Sin vincular —</option>
                  {acreedores.map(x=><option key={x.id} value={"acreedores:"+x.id}>{x.nombre||x.concepto}</option>)}
                </select>
              )}
              {formMov.tipoOp==="Ingreso"&&(<>
                {/* Paso 1: elegir tipo de vinculación */}
                <div style={{display:"flex",gap:6,marginBottom:7}}>
                  {[["deudores","🟢 Deudor"],["ingresosExt","⭐ Ing. Ext."],["oportunidades","🚀 Oportunidad"]].map(([t,l])=>(
                    <button key={t} style={{...S.prioB2(formMov.vinculoTipo===t,"#C9A84C"),flex:1,padding:"7px 4px",fontSize:9}}
                      onClick={()=>{set("vinculoTipo",formMov.vinculoTipo===t?null:t);set("vinculoId",null);}}>
                      {l}
                    </button>
                  ))}
                </div>
                {/* Paso 2: mostrar lista según tipo elegido */}
                {formMov.vinculoTipo==="deudores"&&(
                  <select style={S.sel} value={formMov.vinculoId||""} onChange={e=>set("vinculoId",parseInt(e.target.value)||null)}>
                    <option value="">— Seleccionar deudor —</option>
                    {deudores.map(x=><option key={x.id} value={x.id}>{x.nombre||x.concepto}</option>)}
                  </select>
                )}
                {formMov.vinculoTipo==="ingresosExt"&&(
                  <select style={S.sel} value={formMov.vinculoId||""} onChange={e=>set("vinculoId",parseInt(e.target.value)||null)}>
                    <option value="">— Seleccionar Ing. Ext. —</option>
                    {ingresosExt.map(x=><option key={x.id} value={x.id}>{x.concepto}</option>)}
                  </select>
                )}
                {formMov.vinculoTipo==="oportunidades"&&(
                  <select style={S.sel} value={formMov.vinculoId||""} onChange={e=>set("vinculoId",e.target.value||null)}>
                    <option value="">— Seleccionar Oportunidad —</option>
                    {crmOpos().filter(o=>o.etapa!=="Oportunidad Rechazada").map(x=>(
                      <option key={x.id} value={x.id}>{crmOpoLabel(x)+" ["+(x.etapa||"").replace("Oportunidad ","")+"]"}</option>
                    ))}
                  </select>
                )}
              </>)}
              <div style={{fontSize:9,color:"#475569",marginTop:3}}>
                {formMov.tipoOp==="Egreso"?"Vincula este pago a un acreedor para registrar el abono.":"Vincula este ingreso a un deudor o ingreso extraordinario para registrar el cobro."}
              </div>
              {(()=>{
                if(!formMov.vinculoTipo||!formMov.vinculoId||!movs) return null;
                const rv=formMov.vinculoTipo==="acreedores"?acreedores.find(x=>x.id===formMov.vinculoId):
                          formMov.vinculoTipo==="deudores"?deudores.find(x=>x.id===formMov.vinculoId):
                          formMov.vinculoTipo==="ingresosExt"?ingresosExt.find(x=>x.id===formMov.vinculoId):null;
                if(!rv||!saldoPendienteFn||!saldoIngExtFn) return null;
                const movsCalc=editMovId?movs.filter(m=>m.id!==editMovId):movs;
                const mm=parseFloat(formMov.monto)||0;
                if(mm<=0) return null;

                if(formMov.vinculoTipo==="acreedores"&&formMov.tipoAbono){
                  // interes_convencional: sin validación de monto
                  if(formMov.tipoAbono==="interes_convencional") return null;
                  const vinc=(rv.movIdsVinculados||[]);
                  const ejec=movsCalc.filter(m=>vinc.includes(m.id)&&["PAGADO","INGRESADO"].includes(m.estatus));
                  const abonadoCap=ejec.filter(m=>m.tipoAbono==="capital"||(!m.tipoAbono&&m.tipoAbono!=="interes_acumulado"&&m.tipoAbono!=="interes_convencional"&&m.tipoAbono!=="interes")).reduce((s,m)=>s+m.monto,0);
                  const abonadoIntAcum=ejec.filter(m=>m.tipoAbono==="interes_acumulado"||m.tipoAbono==="interes").reduce((s,m)=>s+m.monto,0);
                  if(formMov.tipoAbono==="capital"){
                    const pendCap=Math.max(0,(rv.montoCapital||rv.montoActual||0)-abonadoCap);
                    if(mm>pendCap+0.01) return(
                      <div style={{...S.errBox,marginTop:6}}><span>⛔</span>
                        <span>El monto ({fmt(mm)}) excede el capital pendiente ({fmt(pendCap)}). Ajusta el monto.</span>
                      </div>
                    );
                  } else if(formMov.tipoAbono==="interes_acumulado"){
                    const pendIntAcum=Math.max(0,(rv.montoInteres||0)-abonadoIntAcum);
                    if((rv.montoInteres||0)>0&&mm>pendIntAcum+0.01) return(
                      <div style={{...S.errBox,marginTop:6}}><span>⛔</span>
                        <span>El monto ({fmt(mm)}) excede el interés acumulado pendiente ({fmt(pendIntAcum)}). Ajusta el monto.</span>
                      </div>
                    );
                  }
                  return null;
                }
                // Oportunidades
                if(formMov.vinculoTipo==="oportunidades"){
                  const movsOpoCalc=movsCalc.filter(m=>(rv.movIdsVinculados||[]).includes(m.id)&&["PAGADO","INGRESADO"].includes(m.estatus));
                  const yaIngOpo=movsOpoCalc.reduce((s,m)=>s+m.monto,0);
                  const pendOpo=Math.max(0,(rv.montoEstimado||0)-yaIngOpo);
                  const etOpo=getEtapa(rv.etapaId,etapasAvance);
                  const esConcretada=rv.etapaId==="ea5";
                  return(
                    <div style={{marginTop:5}}>
                      {!esConcretada&&<div style={{...S.infoBx("#fbbf24"),marginBottom:4}}><span>⚠</span><span>Esta oportunidad no esta Concretada ({etOpo.nombre}). Al guardar como INGRESADO se te pedira concretarla.</span></div>}
                      <div style={{display:"flex",gap:6}}>
                        <div style={{flex:1,background:"rgba(201,168,76,0.08)",border:"1px solid #C9A84C33",borderRadius:7,padding:"5px 8px",textAlign:"center"}}>
                          <div style={{fontSize:7,color:"#C9A84C",fontWeight:700}}>Estimado total</div>
                          <div style={{fontSize:11,fontWeight:800,color:"#C9A84C"}}>{fmt(rv.montoEstimado||0)}</div>
                        </div>
                        <div style={{flex:1,background:"rgba(34,197,94,0.08)",border:"1px solid #22c55e33",borderRadius:7,padding:"5px 8px",textAlign:"center"}}>
                          <div style={{fontSize:7,color:"#22c55e",fontWeight:700}}>Ya ingresado</div>
                          <div style={{fontSize:11,fontWeight:800,color:"#22c55e"}}>{fmt(yaIngOpo)}</div>
                        </div>
                        <div style={{flex:1,background:mm>pendOpo?"rgba(248,113,113,0.08)":"rgba(251,191,36,0.08)",border:"1px solid "+(mm>pendOpo?"#f8717133":"#fbbf2433"),borderRadius:7,padding:"5px 8px",textAlign:"center"}}>
                          <div style={{fontSize:7,color:mm>pendOpo?"#f87171":"#fbbf24",fontWeight:700}}>Pendiente</div>
                          <div style={{fontSize:11,fontWeight:800,color:mm>pendOpo?"#f87171":"#fbbf24"}}>{fmt(pendOpo)}</div>
                        </div>
                      </div>
                      {mm>pendOpo+0.01&&<div style={{...S.errBox,marginTop:5}}><span>⛔</span><span>El monto ({fmt(mm)}) excede el pendiente ({fmt(pendOpo)}). Ajusta el monto.</span></div>}
                    </div>
                  );
                }
                // Deudores / ingresosExt
                const sd=formMov.vinculoTipo==="ingresosExt"?saldoIngExtFn(rv,movsCalc).pendiente:saldoPendienteFn(rv,movsCalc);
                if(mm<=sd) return null;
                return(
                  <div style={{...S.errBox,marginTop:6}}><span>⛔</span>
                    <span>El monto ({fmt(mm)}) excede el saldo pendiente ({fmt(sd)}). Ajusta el monto o vincula a otro registro.</span>
                  </div>
                );
              })()}
              {/* Selector de tipo de abono al vincular a acreedor */}
              {formMov.tipoOp==="Egreso"&&formMov.vinculoTipo==="acreedores"&&formMov.vinculoId&&(
                <div style={{marginTop:9}}>
                  <label style={S.fl}>¿Este pago es a…?</label>
                  {(()=>{
                    const rv=acreedores.find(x=>x.id===formMov.vinculoId);
                    const tieneIntAcum=(rv?.montoInteres||0)>0;
                    const movsCalc2=editMovId?movs.filter(m=>m.id!==editMovId):movs;
                    const vinc2=(rv?.movIdsVinculados||[]);
                    const ejec2=movsCalc2.filter(m=>vinc2.includes(m.id)&&["PAGADO","INGRESADO"].includes(m.estatus));
                    const pendCap=rv?Math.max(0,(rv.montoCapital||rv.montoActual||0)-ejec2.filter(m=>m.tipoAbono==="capital"||(!m.tipoAbono&&m.tipoAbono!=="interes_acumulado"&&m.tipoAbono!=="interes_convencional"&&m.tipoAbono!=="interes")).reduce((s,m)=>s+m.monto,0)):0;
                    const pendIntAcum=rv?Math.max(0,(rv.montoInteres||0)-ejec2.filter(m=>m.tipoAbono==="interes_acumulado"||m.tipoAbono==="interes").reduce((s,m)=>s+m.monto,0)):0;
                    return(<>
                      <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:5}}>
                        <button style={{...S.prioB2(formMov.tipoAbono==="capital","#22c55e"),flex:1,minWidth:80,padding:"8px 4px",fontSize:9}}
                          onClick={()=>set("tipoAbono","capital")}>💰 Capital</button>
                        {tieneIntAcum&&<button style={{...S.prioB2(formMov.tipoAbono==="interes_acumulado","#f87171"),flex:1,minWidth:80,padding:"8px 4px",fontSize:9}}
                          onClick={()=>set("tipoAbono","interes_acumulado")}>📌 Int. Acumulado</button>}
                        <button style={{...S.prioB2(formMov.tipoAbono==="interes_convencional","#fbbf24"),flex:1,minWidth:80,padding:"8px 4px",fontSize:9}}
                          onClick={()=>set("tipoAbono","interes_convencional")}>💸 Int. Convencional</button>
                      </div>
                      {/* Descripción del tipo seleccionado */}
                      {formMov.tipoAbono==="capital"&&(
                        <div style={{...S.infoBx("#22c55e"),marginBottom:5}}><span>💰</span>
                          <span>Reduce el capital pendiente. Saldo disponible: <strong>{fmt(pendCap)}</strong></span>
                        </div>
                      )}
                      {formMov.tipoAbono==="interes_acumulado"&&(
                        <div style={{...S.infoBx("#f87171"),marginBottom:5}}><span>📌</span>
                          <span>Reduce interés ya capitalizado. Saldo disponible: <strong>{fmt(pendIntAcum)}</strong></span>
                        </div>
                      )}
                      {formMov.tipoAbono==="interes_convencional"&&(
                        <div style={{...S.infoBx("#fbbf24"),marginBottom:5}}><span>💸</span>
                          <span>Pago de interés periódico. No reduce el saldo de la deuda. Sin límite de monto.</span>
                        </div>
                      )}
                      {/* Mini-resumen de saldos si hay desglose */}
                      {tieneIntAcum&&(
                        <div style={{display:"flex",gap:5,marginTop:4}}>
                          <div style={{flex:1,background:"rgba(34,197,94,0.08)",border:"1px solid #22c55e33",borderRadius:7,padding:"5px 7px",textAlign:"center"}}>
                            <div style={{fontSize:7,color:"#22c55e",fontWeight:700,marginBottom:1}}>Capital pend.</div>
                            <div style={{fontSize:11,fontWeight:800,color:"#22c55e"}}>{fmt(pendCap)}</div>
                          </div>
                          <div style={{flex:1,background:"rgba(248,113,113,0.08)",border:"1px solid #f8717133",borderRadius:7,padding:"5px 7px",textAlign:"center"}}>
                            <div style={{fontSize:7,color:"#f87171",fontWeight:700,marginBottom:1}}>Int. Acum. pend.</div>
                            <div style={{fontSize:11,fontWeight:800,color:"#f87171"}}>{fmt(pendIntAcum)}</div>
                          </div>
                        </div>
                      )}
                      {!formMov.tipoAbono&&<div style={{fontSize:9,color:"#fbbf24",marginTop:3}}>⚠ Selecciona el tipo para registrar correctamente</div>}
                    </>);
                  })()}
                </div>
              )}
            </div>
          )}
          {!editMovId&&(
            <div style={{border:"1px solid #1e293b",borderRadius:11,padding:13,marginBottom:11}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:recForm.activo?11:0}}>
                <span style={{fontSize:11,fontWeight:700,color:recForm.activo?"#C9A84C":"#475569"}}>↻ Repetitivo</span>
                <button style={{...S.prioB2(recForm.activo),width:42,flex:"none",padding:"4px 0",fontSize:10}} onClick={()=>setRecForm(f=>({...f,activo:!f.activo}))}>{recForm.activo?"ON":"OFF"}</button>
              </div>
              {recForm.activo&&(<>
                <div style={S.fg}><label style={S.fl}>Recurrencia</label>
                  <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:4}}>{REC_OPTS.map(r=><button key={r} style={{...S.prioB2(recForm.recurrencia===r),flex:"none",padding:"5px 9px",fontSize:9}} onClick={()=>setRecForm(f=>({...f,recurrencia:r}))}>{r}</button>)}</div>
                </div>
                {recForm.recurrencia==="Semanal"&&(
                  <div style={S.fg}><label style={S.fl}>Días</label>
                    <div style={{display:"flex",gap:3}}>{DIAS_SEM.map((d,i)=><button key={i} style={{...S.prioB2(recForm.diasSemana.includes(i)),flex:1,padding:"4px 0",fontSize:8}} onClick={()=>setRecForm(f=>({...f,diasSemana:f.diasSemana.includes(i)?f.diasSemana.filter(x=>x!==i):[...f.diasSemana,i]}))}>{d}</button>)}</div>
                  </div>
                )}
                <div style={{...S.r2,marginBottom:9}}><div><label style={S.fl}>Fecha inicio</label><input style={S.inp} type="date" value={recForm.fechaInicio} onChange={e=>setRecForm(f=>({...f,fechaInicio:e.target.value}))}/></div></div>
                <div style={S.fg}><label style={S.fl}>Termina por</label>
                  <div style={{display:"flex",gap:7,marginBottom:7}}>
                    <button style={{...S.prioB2(recForm.finTipo==="repeticiones"),flex:1,padding:"6px 0",fontSize:10}} onClick={()=>setRecForm(f=>({...f,finTipo:"repeticiones"}))}>Nº veces</button>
                    <button style={{...S.prioB2(recForm.finTipo==="fecha"),flex:1,padding:"6px 0",fontSize:10}} onClick={()=>setRecForm(f=>({...f,finTipo:"fecha"}))}>Fecha límite</button>
                  </div>
                  {recForm.finTipo==="repeticiones"&&<input style={S.inp} type="number" min="1" max="60" value={recForm.finReps} onChange={e=>setRecForm(f=>({...f,finReps:parseInt(e.target.value)||1}))}/>}
                  {recForm.finTipo==="fecha"&&<input style={S.inp} type="date" value={recForm.finFecha} onChange={e=>setRecForm(f=>({...f,finFecha:e.target.value}))}/>}
                </div>
                <div style={{fontSize:9,color:"#475569"}}>Se generarán {recForm.finTipo==="repeticiones"?recForm.finReps:"varios"} movimientos.</div>
              </>)}
            </div>
          )}
        </>)}
        {saveError&&<div style={S.errBox}><span>⛔</span><span>{saveError}</span></div>}
        <button style={S.saveB} onClick={onSave}>{recForm.activo?"GENERAR SERIE":"GUARDAR"}</button>
        <button style={S.cancB} onClick={onClose}>Cancelar</button>
      </div>
    </div>
  );
});

// ─── MODAL PRESUPUESTO ────────────────────────────────────────
function ModalPresupuesto({data,presupuestos,setPresupuestos,sm,sy,onClose}){
  const{catId,subId,nombre,getPres}=data;
  const id=subId||catId;
  const currentVal=getPres(id);
  const[val,setVal]=useState(currentVal?String(currentVal):"");
  const[proyMode,setProyMode]=useState(false);
  // startSm/startSy solo se usan en modo proyección; en modo simple siempre se guarda en sm/sy
  const[startSm,setStartSm]=useState(sm);
  const[startSy,setStartSy]=useState(sy);
  const[endSm,setEndSm]=useState(sm===11?0:sm+1);
  const[endSy,setEndSy]=useState(sm===11?sy+1:sy);
  const prevStartM=()=>{if(startSm===0){setStartSm(11);setStartSy(y=>y-1);}else setStartSm(m=>m-1);};
  const nextStartM=()=>{if(startSm===11){setStartSm(0);setStartSy(y=>y+1);}else setStartSm(m=>m+1);};
  const prevEndM=()=>{if(endSm===0){setEndSm(11);setEndSy(y=>y-1);}else setEndSm(m=>m-1);};
  const nextEndM=()=>{if(endSm===11){setEndSm(0);setEndSy(y=>y+1);}else setEndSm(m=>m+1);};

  // Sin proyMode: guarda SIEMPRE en sm/sy (el período activo visible)
  // Con proyMode: guarda desde startSm/startSy hasta endSm/endSy
  const guardar=()=>{
    const monto=parseFloat(val)||0;
    const smIni=proyMode?startSm:sm;
    const syIni=proyMode?startSy:sy;
    const smFin=proyMode?endSm:sm;
    const syFin=proyMode?endSy:sy;
    setPresupuestos(p=>{
      const n={...p};
      let cm=smIni,cy=syIni;
      while(cy<syFin||(cy===syFin&&cm<=smFin)){
        const k=presKey(id,cm,cy);
        if(monto>0) n[k]=monto; else delete n[k];
        cm++; if(cm>11){cm=0;cy++;}
      }
      return n;
    });
    onClose();
  };

  const countMeses=(()=>{
    let c=0,cm=startSm,cy=startSy;
    while(cy<endSy||(cy===endSy&&cm<=endSm)){c++;cm++;if(cm>11){cm=0;cy++;}}
    return c;
  })();

  if(catId==="nexus") return (
    <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={S.mBox}>
        <div style={S.mTit}>🎯 PRESUPUESTO</div>
        <div style={{fontSize:11,color:"#94a3b8",marginBottom:13}}>{nombre} — {MESES_FULL[sm]} {sy}</div>
        <div style={{background:"rgba(201,168,76,0.08)",border:"1px solid #C9A84C33",borderRadius:11,padding:"12px 14px",marginBottom:13}}>
          <div style={{fontSize:9,color:"#C9A84C",fontWeight:700,letterSpacing:1}}>INGRESO PROYECTADO · CFC</div>
          <div style={{fontSize:22,fontWeight:800,color:"#C9A84C",fontFamily:"'Cinzel',serif",marginTop:4}}>{fmt(currentVal)}</div>
          <div style={{fontSize:10,color:"#475569",marginTop:8}}>Se calcula automáticamente desde los Objetivos del CFC (metas × comisión de la solución). No es editable aquí.</div>
        </div>
        <button style={S.cancB} onClick={onClose}>Cerrar</button>
      </div>
    </div>
  );

  return(
    <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={S.mBox}>
        <div style={S.mTit}>🎯 PRESUPUESTO</div>
        <div style={{fontSize:11,color:"#94a3b8",marginBottom:13}}>{nombre} — {MESES_FULL[sm]} {sy}</div>
        <div style={S.fg}><label style={S.fl}>Monto $</label>
          <input style={S.inp} type="number" value={val} onChange={e=>setVal(e.target.value)} placeholder="0.00" autoFocus/>
        </div>
        <div style={{border:"1px solid #1e293b",borderRadius:11,padding:13,marginBottom:11}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:proyMode?11:0}}>
            <span style={{fontSize:11,fontWeight:700,color:proyMode?"#C9A84C":"#475569"}}>↻ Proyectar varios meses</span>
            <button style={{...S.prioB2(proyMode),width:42,flex:"none",padding:"4px 0",fontSize:10}} onClick={()=>setProyMode(v=>!v)}>{proyMode?"ON":"OFF"}</button>
          </div>
          {proyMode&&(
            <div>
              <div style={{marginBottom:9}}>
                <div style={{fontSize:10,color:"#475569",marginBottom:5}}>Desde:</div>
                <div style={S.perBar}>
                  <button style={S.perBtn} onClick={prevStartM}>‹</button>
                  <span style={S.perLbl}>{MESES_FULL[startSm]} {startSy}</span>
                  <button style={S.perBtn} onClick={nextStartM}>›</button>
                </div>
              </div>
              <div style={{marginBottom:6}}>
                <div style={{fontSize:10,color:"#475569",marginBottom:5}}>Hasta:</div>
                <div style={S.perBar}>
                  <button style={S.perBtn} onClick={prevEndM}>‹</button>
                  <span style={S.perLbl}>{MESES_FULL[endSm]} {endSy}</span>
                  <button style={S.perBtn} onClick={nextEndM}>›</button>
                </div>
              </div>
              <div style={{fontSize:9,color:"#475569",marginTop:4}}>
                Se aplicará a <strong style={{color:"#C9A84C"}}>{countMeses} {countMeses===1?"mes":"meses"}</strong>
              </div>
            </div>
          )}
        </div>
        <button style={S.saveB} onClick={guardar}>
          {proyMode?"GUARDAR Y PROYECTAR":"GUARDAR"}
        </button>
        {presupuestos[presKey(id,sm,sy)]>0&&(
          <button style={{...S.cancB,color:"#f87171",borderColor:"#f8717144"}} onClick={()=>{
            setPresupuestos(p=>{const n={...p};delete n[presKey(id,sm,sy)];return n;});
            onClose();
          }}>Quitar presupuesto de {MESES_FULL[sm]}</button>
        )}
        <button style={S.cancB} onClick={onClose}>Cancelar</button>
      </div>
    </div>
  );
}

              <div style={{width:8,height:8,borderRadius:4,background:sc}}/>

            <div style={{fontSize:9,color:"#64748b"}}>Resultado del mes</div>

        </div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:12}}>
          {[["Saldo Ini.","#C9A84C",mes.saldoInicial],["+ Ingresos","#22c55e",mes.totalIng],["− Egresos","#f87171",mes.totalEg]].map(([l,c,v])=>(
            <div key={l} style={{background:`${c}11`,border:`1px solid ${c}33`,borderRadius:9,padding:"8px 6px",textAlign:"center"}}>
              <div style={{fontSize:8,color:c,marginBottom:3,fontWeight:700}}>{l}</div>
              <div style={{fontSize:11,fontWeight:800,color:c}}>{fmtShort(v)}</div>
            </div>
          ))}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:`${sc}11`,border:`1px solid ${sc}33`,borderRadius:9,padding:"9px 13px"}}>
          <span style={{fontSize:10,color:"#94a3b8",fontWeight:700}}>Saldo Final Acumulado</span>
          <span style={{fontSize:16,fontWeight:800,color:mes.saldoFin>=0?sc:"#f87171"}}>{fmt(mes.saldoFin)}</span>
        </div>
      </div>
      {/* Detalle categorías */}
      {(mes.detalleIng.length>0||mes.detalleEg.length>0)&&(
        <div style={{background:"#0d0d1a",border:"1px solid #1e293b",borderRadius:11,padding:"12px 14px",marginBottom:9}}>
          {mes.detalleIng.length>0&&(<>
            <div style={{fontSize:9,color:"#22c55e",fontWeight:700,letterSpacing:1.2,textTransform:"uppercase",marginBottom:7}}>↑ Ingresos presupuestados</div>
            {mes.detalleIng.map(c=>{
              const op=!!ingExp[c.id];const hasSubs=c.subs.length>0;
              return(
              <div key={c.id} style={{marginBottom:5}}>
                <div onClick={()=>hasSubs&&setIngExp(e=>({...e,[c.id]:!e[c.id]}))} style={{display:"flex",justifyContent:"space-between",alignItems:"center",cursor:hasSubs?"pointer":"default"}}>
                  <span style={{fontSize:11,color:"#94a3b8"}}>{hasSubs&&<span style={{fontSize:8,color:"#475569",marginRight:4}}>{op?"\u25B2":"\u25BC"}</span>}{c.nombre}</span>
                  <span style={{fontSize:11,fontWeight:700,color:"#22c55e"}}>{fmt(c.pres)}</span>
                </div>
                {op&&c.subs.map(s=>(
                  <div key={s.id} style={{display:"flex",justifyContent:"space-between",padding:"2px 0 2px 10px",borderLeft:"2px solid #22c55e33"}}>
                    <span style={{fontSize:10,color:"#64748b"}}>{s.nombre}</span>
                    <span style={{fontSize:10,fontWeight:700,color:"#22c55e"}}>{fmt(s.pres)}</span>
                  </div>
                ))}
              </div>
              );
            })}
          </>)}
          {mes.capasEg&&mes.capasEg.length>0&&(<>
            <div style={{fontSize:9,color:"#f87171",fontWeight:700,letterSpacing:1.2,textTransform:"uppercase",marginBottom:7,marginTop:mes.detalleIng.length?10:0}}>↓ Egresos por capa</div>
            {mes.capasEg.map(cp=>{
              const op=!!capExp[cp.capaId];
              const neg=cp.saldoTras<0;
              return(
              <div key={cp.capaId} style={{marginBottom:6,border:"1px solid "+(neg?"#f8717155":"#1e293b"),borderRadius:9,overflow:"hidden"}}>
                <div onClick={()=>setCapExp(e=>({...e,[cp.capaId]:!e[cp.capaId]}))} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px",background:neg?"#f871710f":"#13131f",cursor:"pointer"}}>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:9,color:"#475569"}}>{op?"\u25B2":"\u25BC"}</span>
                    <span style={{fontSize:11,fontWeight:700,color:"#e2e8f0"}}>{cp.nombre}</span>
                  </div>
                  <span style={{fontSize:11,fontWeight:700,color:"#f87171"}}>{fmt(cp.subtotal)}</span>

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"4px 10px",background:neg?"#f871711a":"#0d0d1a",borderTop:"1px solid "+(neg?"#f8717133":"#1e293b66")}}>

                  <span style={{fontSize:11,fontWeight:800,color:neg?"#f87171":"#C9A84C"}}>{neg?"\u2212":""}{fmt(Math.abs(cp.saldoTras))}</span>
                </div>
                {op&&<div style={{padding:"6px 10px",background:"#0d0d1a"}}>
                  {cp.cats.map(c=>(
                    <div key={c.id} style={{marginBottom:4}}>
                      <div style={{display:"flex",justifyContent:"space-between"}}>
                        <span style={{fontSize:10,color:"#94a3b8"}}>{c.nombre}</span>
                        <span style={{fontSize:10,fontWeight:700,color:"#f87171"}}>{fmt(c.pres)}</span>
                      </div>
                      {c.subs.map(s=>(
                        <div key={s.id} style={{display:"flex",justifyContent:"space-between",padding:"1px 0 1px 10px",borderLeft:"2px solid #f8717133"}}>
                          <span style={{fontSize:9,color:"#64748b"}}>{s.nombre}</span>
                          <span style={{fontSize:9,fontWeight:700,color:"#f87171"}}>{fmt(s.pres)}</span>
                        </div>
                      ))}
                    </div>
                  ))}
                </div>}
              </div>
            );})}
          </>)}
        </div>
      )}
      <div style={{display:"flex",gap:9}}>
        <button style={{flex:1,padding:"9px 0",borderRadius:9,border:"1px solid #1e293b",background:"#13131f",color:idx===0?"#334155":"#e2e8f0",fontSize:11,cursor:idx===0?"default":"pointer"}} onClick={()=>setIdx(i=>Math.max(0,i-1))} disabled={idx===0}>‹ Anterior</button>
        <button style={{flex:1,padding:"9px 0",borderRadius:9,border:"1px solid #1e293b",background:"#13131f",color:idx===total-1?"#334155":"#e2e8f0",fontSize:11,cursor:idx===total-1?"default":"pointer"}} onClick={()=>setIdx(i=>Math.min(total-1,i+1))} disabled={idx===total-1}>Siguiente ›</button>
      </div>
    </div>
  );
}

/* ════════ CATÁLOGOS DEL SISTEMA ════════ */
function CatCRUD({title,items,setItems,usage,usageField,usageLabel,color}){
  const[nuevo,setNuevo]=useState("");
  const add=()=>{if(!nuevo.trim()||items.includes(nuevo.trim()))return;setItems([...items,nuevo.trim()]);setNuevo("");};
  const rename=(i,v)=>{const n=[...items];n[i]=v;setItems(n);};
  const remove=(i)=>{const val=items[i];const cnt=(usage||[]).filter(x=>x[usageField]===val).length;if(cnt>0){alert(`No se puede eliminar: ${cnt} ${usageLabel||"registro"}${cnt!==1?"s":""} usa${cnt!==1?"n":""} "${val}"`);return;}setItems(items.filter((_,j)=>j!==i));};
  return <div style={{background:"#10101e",border:`1px solid ${color||GOLD}33`,borderRadius:11,padding:"11px 13px",marginBottom:10}}>
    <div style={{fontSize:12,fontWeight:800,color:color||GOLD,marginBottom:8}}>{title}</div>
    {items.map((v,i)=><div key={i} style={{display:"flex",gap:6,alignItems:"center",marginBottom:6}}>
      <input style={{...S.inp,flex:1,fontSize:12}} value={v} onChange={e=>rename(i,e.target.value)}/>
      <button style={{flexShrink:0,background:"#f8717111",border:"1px solid #f87171",color:"#f87171",borderRadius:8,padding:"4px 9px",fontSize:11,cursor:"pointer"}} onClick={()=>remove(i)}>✕</button>
    </div>)}
    <div style={{display:"flex",gap:6,marginTop:6}}>
      <input style={{...S.inp,flex:1,fontSize:12}} placeholder="Nuevo valor…" value={nuevo} onChange={e=>setNuevo(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()}/>
      <button style={{flexShrink:0,background:GOLD,border:"none",borderRadius:9,color:"#08080f",fontWeight:800,fontSize:12,padding:"6px 12px",cursor:"pointer"}} onClick={add}>+ Agregar</button>
    </div>
  </div>;
}

function App(){
  const[view,setView]=useState("dashboard");
  const[crmTick,setCrmTick]=useState(0); // refresco del reflejo CFC
  const[verRef,setVerRef]=useState(null); // detalle de oportunidad reflejada
  const[menuSec,setMenuSec]=useState("analisis"); // sección activa del menú (Análisis/Config)
  // ── localStorage helpers ──
  function loadLS(key, fallback) {
    try {
      const v = localStorage.getItem('nexus_' + key);
      return v ? JSON.parse(v) : fallback;
    } catch(e) { return fallback; }
  }
  function saveLS(key, val) {
    try { localStorage.setItem('nexus_' + key, JSON.stringify(val)); } catch(e) {}
  }

  const[oportunidades,setOportunidades]=useState(()=>loadLS('oportunidades', []));
  const[etapasAvance,setEtapasAvance]=useState(()=>loadLS('etapasAvance', INIT_ETAPAS_AVANCE));
  const[solucionesNexus,setSolucionesNexus]=useState(()=>loadLS('solucionesNexus', INIT_SOLUCIONES_NEXUS));
  const[aliadosEst,setAliadosEst]=useState(()=>loadLS('aliadosEst', INIT_ALIADOS_EST));
  const[aliadosCom,setAliadosCom]=useState(()=>loadLS('aliadosCom', INIT_ALIADOS_COM));
  const[movs,setMovs]=useState(()=>{
    const data=loadLS('movs', INIT_MOVS);
    // Migrar "Transferencia" → "Traspaso" en movimientos históricos
    const migr=data.map(m=>m.tipoOp==="Transferencia"?{...m,tipoOp:"Traspaso"}:m);
    // Blindar ids: únicos y numéricos (un id inválido o duplicado impide borrar/editar ese movimiento)
    const seen=new Set(); let maxId=0;
    migr.forEach(m=>{const n=Number(m.id);if(Number.isFinite(n))maxId=Math.max(maxId,n);});
    return migr.map(m=>{
      const n=Number(m.id);
      let id=Number.isFinite(n)?n:(++maxId);
      if(seen.has(id))id=++maxId;
      seen.add(id);
      return id===m.id?m:{...m,id};
    });
  });
  const[cuentas,setCuentas]=useState(()=>loadLS('cuentas', INIT_CUENTAS));
  const[tarjetas,setTarjetas]=useState(()=>loadLS('tarjetas', INIT_TARJETAS));
  const[catIng,setCatIng]=useState(()=>loadLS('catIng', INIT_CAT_ING));
  const[catEg,setCatEg]=useState(()=>loadLS('catEg', INIT_CAT_EG));
  const[capas,setCapas]=useState(()=>loadLS('capas', INIT_CAPAS));
  const[presupuestos,setPresupuestos]=useState(()=>loadLS('presupuestos', INIT_PRESUPUESTOS));
  const[acreedores,setAcreedores]=useState(()=>loadLS('acreedores', []));
  const[deudores,setDeudores]=useState(()=>loadLS('deudores', []));
  const[ingresosExt,setIngresosExt]=useState(()=>loadLS('ingresosExt', []));


  // ── Auto-guardado en localStorage ──
  const[metaFondo,setMetaFondo]=useState(()=>loadLS('metaFondo',0));
  const[nombreUsuario,setNombreUsuario]=useState(()=>loadLS('nombreUsuario',''));
  const[pinApp,setPinApp]=useState(()=>loadLS('pinApp',''));
  const[pinActivo,setPinActivo]=useState(()=>loadLS('pinActivo',false));
  const[tiempoBloqueo,setTiempoBloqueo]=useState(()=>loadLS('tiempoBloqueo',5)); // minutos: default 5
  const pinLastActiveRef=React.useRef(Date.now());
  const[gastoFamiliarEsencial,setGastoFamiliarEsencial]=useState(()=>loadLS('gastoFamiliarEsencial',0));
  const[factorFEF,setFactorFEF]=useState(()=>loadLS('factorFEF',2.5));
  const[prioFEF_ing,setPrioFEF_ing]=useState(2);

  const saldoPendiente = useCallback((registro,movs)=>{
    const vinc=(registro.movIdsVinculados||[]);
    const ejecutados=movs.filter(m=>vinc.includes(m.id)&&["PAGADO","INGRESADO"].includes(m.estatus));
    // Solo capital e interés acumulado reducen el saldo ("interes_convencional" no)
    const abonadoCapital=ejecutados.filter(m=>m.tipoAbono==="capital"||(!m.tipoAbono&&m.tipoAbono!=="interes_acumulado"&&m.tipoAbono!=="interes_convencional")).reduce((s,m)=>s+m.monto,0);
    const abonadoIntAcum=ejecutados.filter(m=>m.tipoAbono==="interes_acumulado"||m.tipoAbono==="interes").reduce((s,m)=>s+m.monto,0);
    const tieneDesglose=(registro.montoCapital||0)>0||(registro.montoInteres||0)>0;
    if(tieneDesglose){
      const pendCapital=Math.max(0,(registro.montoCapital||0)-abonadoCapital);
      const pendIntAcum=Math.max(0,(registro.montoInteres||0)-abonadoIntAcum);
      return pendCapital+pendIntAcum;
    }
    return Math.max(0,(registro.montoActual||0)-abonadoCapital);
  },[]);

  // Saldo pendiente desglosado capital/interés acumulado

  const saldoPendienteDesglose = useCallback((registro,movs)=>{

    // Retrocompatibilidad: "interes" antiguo equivale a "interes_acumulado"
    const abonadoIntAcum=ejecutados.filter(m=>m.tipoAbono==="interes_acumulado"||m.tipoAbono==="interes").reduce((s,m)=>s+m.monto,0);
    const abonadoIntConv=ejecutados.filter(m=>m.tipoAbono==="interes_convencional").reduce((s,m)=>s+m.monto,0);
    const pendCapital=Math.max(0,(registro.montoCapital||registro.montoActual||0)-abonadoCapital);
    const pendIntAcum=Math.max(0,(registro.montoInteres||0)-abonadoIntAcum);

              if(d==="") return;

  // ── RENDER PRINCIPAL ───────────────────────────────────────────────────
  return(
    <>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
      <div style={S.app}>
        <div style={S.hdr}>
          <div>
            {view==="dashboard"
              ? <>
                  <div style={S.logo}>Nexus CFP</div>
                  <div style={{fontSize:8,color:"#C9A84C",letterSpacing:1,marginBottom:1}}>by Nexus Partners</div>
                  <div style={S.sub}>CONTROL FINANCIERO PERSONAL</div>
                </>
              : <>
                  <div style={S.logo}>{view==="menu"?(menuSec==="analisis"?"Análisis":"Configuración"):({movimientos:"Movimientos",cartera:"Cartera",oportunidades:"Oportunidades",estadisticas:"Estadísticas",presupuestos:"Presupuestos",proyeccion:"Proyección",cuentas:"Cuentas",catalogos:"Categorías",catalogosSistema:"Catálogos del Sistema",configuracion:"Configuración"}[view]||"Nexus CFP")}</div>
                  <div style={S.sub}>Nexus CFP</div>
                </>
            }
          </div>
          {view==="dashboard"&&<div style={{textAlign:"right"}}><div style={{color:"#C9A84C",fontWeight:800,fontSize:12}}>{fmt(stats.saldoReal)}</div><div style={{fontSize:8,color:"#334155"}}>saldo real</div></div>}
        </div>
        <div style={S.line}/><div style={{height:10}}/>

        {/* ── DASHBOARD ── */}
        {view==="dashboard"&&(
          <div style={S.sec}>
            {retrasados.length>0&&(
              <div style={S.alertCard} onClick={()=>{setView("movimientos");setFilterRetrasados(true);}}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}><span>⚠️</span><span style={{fontSize:11,fontWeight:800,color:"#fbbf24"}}>{retrasados.length} movimiento{retrasados.length>1?"s":""} retrasado{retrasados.length>1?"s":""}</span></div>
                <div style={{fontSize:10,color:"#92400e"}}>Toca para ver</div>
              </div>
            )}
            {(()=>{
              const concretadasSinMov=crmOpos().filter(o=>o.etapa==="Oportunidad Concretada"&&!movs.some(m=>m.vinculoTipo==="oportunidades"&&m.vinculoId===o.id&&m.estatus==="INGRESADO"));
              if(concretadasSinMov.length===0) return null;
              return(
                <div style={{...S.alertCard,background:"rgba(201,168,76,0.06)",border:"1px solid rgba(201,168,76,0.3)"}}
                  onClick={()=>{setView("oportunidades");setOpoTab("concretadas");}}>
                  <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}>
                    <span>🚀</span>
                    <span style={{fontSize:11,fontWeight:800,color:"#C9A84C"}}>{concretadasSinMov.length} oportunidad{concretadasSinMov.length>1?"es":""} concretada{concretadasSinMov.length>1?"s":""} sin movimiento vinculado</span>
                  </div>
                  <div style={{fontSize:10,color:"#92400e"}}>Toca para dar de alta el ingreso correspondiente</div>
                </div>
              );
            })()}
            {primerNegativo&&(
              <div style={S.alertRojo}>
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:3}}><span>🔴</span><span style={{fontSize:11,fontWeight:800,color:"#f87171"}}>Saldo negativo en {period.label()}</span></div>
                <div style={{fontSize:10,color:"#f87171",opacity:.8}}>Primer rojo el <strong>{fmtDate(primerNegativo.fecha)}</strong> → {fmt(primerNegativo.saldoConsolidado)}</div>
              </div>
            )}
            {/* ── Fondo de Estabilidad Financiera ── */}
            {(()=>{
              // Ingresos: filtrados por probabilidad seleccionada (Alta+Media default)
              // Horizonte: hoy hasta horizonteFEF
              const hoyStr=todayStr();
              const ingProg=movs.filter(r=>["PROGRAMADO","PROYECTADO"].includes(r.estatus)&&r.tipoOp==="Ingreso"&&(parseInt(r.prioridad)||1)<=prioFEF_ing&&r.fecha&&r.fecha>=hoyStr&&r.fecha<=horizonteFEF).reduce((s,r)=>s+r.monto,0);
              // Egresos NO Esenciales: siempre prioridad > 1
              const egNoEsenciales=movs.filter(r=>["PROGRAMADO","PROYECTADO"].includes(r.estatus)&&r.tipoOp==="Egreso"&&!r.usaTarjeta&&(parseInt(r.prioridad)||3)>1&&r.fecha&&r.fecha>=hoyStr&&r.fecha<=horizonteFEF);
              const egNoEsencialesTotal=egNoEsenciales.reduce((s,r)=>s+r.monto,0);
              const fef=stats.saldoReal+ingProg-egNoEsencialesTotal;
              const metaFEF=gastoFamiliarEsencial>0?gastoFamiliarEsencial*factorFEF:0;
              const mesesFEF=gastoFamiliarEsencial>0?(fef/gastoFamiliarEsencial).toFixed(1):null;
              const pctFEF=metaFEF>0?Math.min(120,(fef/metaFEF)*100):0;
              const semFEF=pctFEF>=100?"#22c55e":pctFEF>=80?"#22c55e":pctFEF>=50?"#fbbf24":"#f87171";
              const nivelIngLabel=prioFEF_ing===1?"Alta":prioFEF_ing===2?"Alta+Media":"Todas";
              const egPorNivel=[
                {label:"Importantes",color:"#60a5fa",items:egNoEsenciales.filter(r=>(parseInt(r.prioridad)||3)===2)},
                {label:"Discrecionales",color:"#fbbf24",items:egNoEsenciales.filter(r=>(parseInt(r.prioridad)||3)===3)},
                {label:"Extraordinarios",color:"#f87171",items:egNoEsenciales.filter(r=>(parseInt(r.prioridad)||3)===4)},
              ].filter(g=>g.items.length>0);
              return(
                <div style={{...S.card("rgba(201,168,76,0.2)"),marginBottom:10,padding:0,overflow:"hidden"}}>
                  {/* ── Cabecera toggle ── */}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",cursor:"pointer",borderBottom:showFEF?"1px solid rgba(201,168,76,0.15)":"none"}}
                    onClick={toggleFEF}>
                    <div style={{fontSize:10,fontWeight:800,color:"#C9A84C"}}>🏦 Fondo de Estabilidad Financiera</div>
                    <div style={{display:"flex",alignItems:"center",gap:8}}>
                      {mesesFEF&&<div style={{fontSize:9,color:semFEF,fontWeight:700,background:semFEF+"18",padding:"2px 8px",borderRadius:8}}>{mesesFEF} meses</div>}
                      <span style={{fontSize:11,color:"#475569"}}>{showFEF?"▲":"▾"}</span>
                    </div>
                  </div>
                  {/* ── Contenido colapsable ── */}
                  {showFEF&&<div style={{padding:"10px 14px"}}>
                  <div style={{background:"#13131f",borderRadius:9,padding:"8px 11px",marginBottom:7}}>
                    {[
                      ["Saldo Real",stats.saldoReal,"#C9A84C"],
                      ["+ Ing. Prog. ("+nivelIngLabel+")",ingProg,"#22c55e"],
                    ].map(([l,v,c])=>(
                      <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"3px 0",borderBottom:"1px solid #1e293b22"}}>
                        <span style={{fontSize:9,color:"#64748b"}}>{l}</span>
                        <span style={{fontSize:10,fontWeight:700,color:c}}>+{fmt(v)}</span>

              // Calcular egresos ejecutados del período por prioridad

              const totalEg=egsEjec.reduce((s,r)=>s+r.monto,0);
              const porPrio=[1,2,3,4].map(p=>({
                p,
                label:PRIO_EG_LBL[p],
                color:PRIO_EG_COLOR[p],
                total:egsEjec.filter(r=>(parseInt(r.prioridad)||3)===p).reduce((s,r)=>s+r.monto,0),
                count:egsEjec.filter(r=>(parseInt(r.prioridad)||3)===p).length,
              })).filter(x=>x.total>0);
              // Tendencia mensual: últimos 8 meses
              const hoy=new Date();
              const mesesTend=Array.from({length:8},(_,i)=>{
                const d=new Date(hoy.getFullYear(),hoy.getMonth()-7+i,1);

                return{...m,total:egsM.reduce((s,r)=>s+r.monto,0),...Object.fromEntries([1,2,3,4].map(p=>[p,egsM.filter(r=>(parseInt(r.prioridad)||3)===p).reduce((s,r)=>s+r.monto,0)]))};
              }).filter(m=>m.total>0);
              const maxTend=Math.max(...tendData.map(m=>m.total),1);
              if(egsEjec.length===0) return <div style={{textAlign:"center",padding:"36px 0",color:"#334155",fontSize:12}}>Sin egresos ejecutados en este período</div>;
              return(<>
                {/* Resumen total */}
                <div style={{textAlign:"center",marginBottom:11}}>
                  <span style={{fontSize:10,color:"#475569"}}>Total egresos ejecutados</span><br/>

                    const dat=porPrio.find(x=>x.p===p)||{total:0,count:0,color:PRIO_EG_COLOR[p],label:PRIO_EG_LBL[p]};
                    const pct=totalEg>0?Math.round(dat.total/totalEg*100):0;
                    return(
                      <div key={p} style={{background:`${dat.color}11`,border:`1px solid ${dat.color}33`,borderRadius:11,padding:"10px 12px"}}>

                          <span style={{fontSize:10,fontWeight:700,color:dat.color}}>{dat.label}</span>
                          <span style={{fontSize:9,background:`${dat.color}22`,color:dat.color,padding:"2px 7px",borderRadius:8,fontWeight:700}}>{pct}%</span>
                        </div>
                        <div style={{fontSize:15,fontWeight:800,color:"#e2e8f0",marginBottom:3}}>{fmt(dat.total)}</div>
                        <div style={{height:4,borderRadius:2,background:"#1e293b",overflow:"hidden",marginBottom:3}}>
                          <div style={{height:"100%",borderRadius:2,background:dat.color,width:`${pct}%`,transition:"width 0.4s"}}/>
                        </div>
                        <div style={{fontSize:9,color:"#475569"}}>{dat.count} movimiento{dat.count!==1?"s":""}</div>
                      </div>
                    );
                  })}

                {/* Tendencia mensual barras apiladas */}
                {tendData.length>1&&(<>
                  <div style={{fontSize:9,color:"#475569",fontWeight:700,letterSpacing:1,marginBottom:8}}>TENDENCIA MENSUAL</div>

                    {[1,2,3,4].map(p=>(
                      <div key={p} style={{display:"flex",alignItems:"center",gap:4}}>
                        <div style={{width:8,height:8,borderRadius:2,background:PRIO_EG_COLOR[p]}}/>
                        <span style={{fontSize:8,color:"#64748b"}}>{PRIO_EG_LBL[p]}</span>
                      </div>
                    ))}
                  </div>
                  <div style={{background:"#10101e",border:"1px solid #1e293b",borderRadius:11,padding:"11px 13px",marginBottom:7}}>
                    {tendData.map((m,i)=>{
                      const pct=m.total/maxTend*100;
                      return(
                        <div key={i} style={{marginBottom:9}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                            <span style={{fontSize:10,color:"#94a3b8",fontWeight:600}}>{m.label}</span>
                            <span style={{fontSize:9,color:"#f87171",fontWeight:700}}>{fmt(m.total)}</span>
                          </div>
                          {/* Barra apilada */}

                            {[1,2,3,4].map(p=>{

                              return w>0?<div key={p} style={{height:"100%",background:PRIO_EG_COLOR[p],width:`${w}%`,title:PRIO_EG_LBL[p]}}/>:null;

                              <span key={p} style={{fontSize:8,color:PRIO_EG_COLOR[p]}}>{PRIO_EG_LBL[p].substring(0,4)}: {fmtShort(m[p])}</span>
                            ))}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </>)}
              </>);
            })()}
            <div style={{height:18}}/>
          </div>

        {/* ── PRESUPUESTOS ── */}

            </div>
            <div style={S.perBar}>

              const hasSubs=cat.subs.length>0;

                      <div style={{display:"flex",alignItems:"center",gap:9}}>
                        {!hasSubs?(
                          <button style={{...S.smBtn("#C9A84C"),fontSize:9}} onClick={e=>{e.stopPropagation();setPresModalData({catId:cat.id,subId:null,nombre:cat.nombre,getPres:budgetData.getPres});setShowPresModal(true);}}>
                            {pres?fmt(pres):"+ Pres."}
                          </button>
                        ):(
                          <span style={{fontSize:9,color:"#C9A84C",fontWeight:700}}>{pres?fmt(pres):"Sin pres."}</span>
                        )}
                        <span style={{fontSize:13,fontWeight:800,color:over?"#f87171":"#e2e8f0"}}>{fmt(gasto)}</span>
                        <span style={{fontSize:10,color:"#475569"}}>{isOpen?"▲":"▼"}</span>

                    {pres>0&&<BudgetBar gasto={gasto} presupuesto={pres} color={color} esIngreso={budgetTab==="ing"}/>}

                          <div key={sub.id} style={{padding:"8px 0",borderBottom:"1px solid #1e293b22"}}>

          const empName=(id)=>(emps.find(e=>e.id===id)||{}).nombre||"";

          const comCon=concret.reduce((s,o)=>s+(Number(o.comisionEstimada)||Number(o.montoEstimado)||0),0);

                  <div style={{flex:1,background:"#10101e",border:"1px solid #22c55e33",borderRadius:9,padding:"7px 11px"}}><div style={{fontSize:8,color:"#475569"}}>Producción Proyectada</div><div style={{fontSize:15,fontWeight:800,color:"#22c55e"}}>{fmt(prodAb)}</div></div>
                  <div style={{flex:1,background:"#10101e",border:"1px solid #C9A84C33",borderRadius:9,padding:"7px 11px"}}><div style={{fontSize:8,color:"#475569"}}>Participación Proyectada</div><div style={{fontSize:15,fontWeight:800,color:"#C9A84C"}}>{fmt(comAb)}</div></div>
                </div>
                <div style={{display:"flex",gap:5,alignItems:"center",marginBottom:8,marginTop:6}}>
                  <input style={{...S.srch,margin:0,flex:1}} value={opoQ} onChange={e=>setOpoQ(e.target.value)} placeholder="🔍 Buscar oportunidad…"/>

                </div>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  <button style={S.chip(!opoFiltroEtapa)} onClick={()=>setOpoFiltroEtapa(null)}>Todas</button>
                  {etps.map(e=><button key={e.id} style={S.chip(opoFiltroEtapa===e.nombre,etColor(e.nombre))} onClick={()=>setOpoFiltroEtapa(opoFiltroEtapa===e.nombre?null:e.nombre)}>{(e.nombre||"").replace("Oportunidad ","")}</button>)}
                </div>
              </div>
              {lista.map(o=>{ const monto=o.comisionEstimada||o.montoEstimado; return (
                <div key={o.id} style={{...cardS,cursor:"pointer",borderColor:etColor(o.etapa)+"55"}} onClick={()=>setVerRef(o)}>
                  <div style={{display:"flex",justifyContent:"space-between",gap:8,alignItems:"flex-start"}}>
                    <div style={{fontSize:14,fontWeight:700,color:"#e2e8f0"}}>{o.concepto}</div>
                    {monto?<div style={{fontSize:13,fontWeight:800,color:"#C9A84C",whiteSpace:"nowrap"}}>{fmt(monto)}</div>:null}
                  </div>
                  <div style={{display:"flex",gap:5,flexWrap:"wrap",marginTop:7}}>
                    <span style={tag(etColor(o.etapa))}>{(o.etapa||"").replace("Oportunidad ","")}</span>
                    {o.probabilidad&&<span style={tag(o.probabilidad==="Alta"?"#22c55e":o.probabilidad==="Media"?"#fbbf24":"#f87171")}>◎ {o.probabilidad}</span>}
                    {o.recurrencia&&<span style={tag("#a78bfa")}>↺ {o.recurrencia}</span>}
                    {o.solucionId&&<span style={tag("#C9A84C")}>◈ {solName(o.solucionId)}</span>}
                    {(o.contactoPrincipalId||o.contactoId)&&<span style={tag("#94a3b8")}>{contName(o.contactoPrincipalId||o.contactoId)}</span>}
                    {o.empresaId&&<span style={tag("#3b82f6")}>{empName(o.empresaId)}</span>}
                  </div>
                </div>
              );})}
              {lista.length===0&&<div style={{textAlign:"center",color:"#475569",fontSize:12,padding:"30px 0"}}>No hay oportunidades en el CFC.</div>}
              <div style={{fontSize:10,color:"#475569",textAlign:"center",marginTop:6}}>Las oportunidades se crean y editan en el CFC.</div>
              {verRef&&(()=>{
                const o=opos.find(x=>x.id===verRef.id)||verRef;
                const row=(l,v)=>v?<div style={{display:"flex",justifyContent:"space-between",gap:10,padding:"7px 0",borderBottom:"1px solid #14141f"}}><span style={{fontSize:11,color:"#64748b"}}>{l}</span><span style={{fontSize:12,color:"#e2e8f0",textAlign:"right"}}>{v}</span></div>:null;
                return (
                  <div style={{position:"fixed",inset:0,background:"rgba(8,8,16,0.7)",zIndex:400,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setVerRef(null)}>
                    <div style={{width:"100%",maxWidth:480,background:"#0b0b16",borderTop:"2px solid #C9A84C",borderRadius:"16px 16px 0 0",padding:"18px 18px 28px",maxHeight:"82vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                        <div style={{fontSize:16,fontWeight:800,color:"#e2e8f0"}}>{o.concepto}</div>
                        <button onClick={()=>setVerRef(null)} style={{background:"transparent",border:"none",color:"#64748b",fontSize:20,cursor:"pointer"}}>✕</button>
                      </div>
                      <span style={tag(etColor(o.etapa))}>{(o.etapa||"").replace("Oportunidad ","")}</span>
                      <div style={{marginTop:12}}>
                        {row("Solución",solName(o.solucionId))}
                        {row("Contacto",contName(o.contactoPrincipalId||o.contactoId))}
                        {row("Empresa",empName(o.empresaId))}
                        {row("Monto estimado",o.montoEstimado?fmt(o.montoEstimado):null)}
                        {row("Comisión estimada",o.comisionEstimada?fmt(o.comisionEstimada):null)}
                        {row("Cierre estimado",o.fechaEstimadaCierre?fmtDate(o.fechaEstimadaCierre):null)}
                        {row("Concretada",o.fechaConcretada?fmtDate(o.fechaConcretada):null)}
                      </div>
                      {(()=>{
                        const vinc=movs.filter(m=>m.vinculoTipo==="oportunidades"&&m.vinculoId===o.id);
                        const ingresado=vinc.filter(m=>m.estatus==="INGRESADO").reduce((s,m)=>s+(Number(m.monto)||0),0);
                        const programado=vinc.filter(m=>["PROGRAMADO","PROYECTADO"].includes(m.estatus)).reduce((s,m)=>s+(Number(m.monto)||0),0);
                        const estim=Number(o.comisionEstimada)||Number(o.montoEstimado)||0;
                        const pend=Math.max(0,estim-ingresado);
                        return (
                          <div style={{marginTop:16}}>
                            <div style={{fontSize:10,color:"#64748b",letterSpacing:1,textTransform:"uppercase",fontWeight:700,marginBottom:8}}>Movimientos vinculados</div>
                            <div style={{display:"flex",gap:6,marginBottom:10}}>
                              <div style={{flex:1,background:"rgba(34,197,94,0.08)",border:"1px solid #22c55e33",borderRadius:8,padding:"6px 4px",textAlign:"center"}}><div style={{fontSize:7,color:"#22c55e",fontWeight:700}}>INGRESADO</div><div style={{fontSize:12,fontWeight:800,color:"#22c55e"}}>{fmt(ingresado)}</div></div>
                              <div style={{flex:1,background:"rgba(96,165,250,0.08)",border:"1px solid #60a5fa33",borderRadius:8,padding:"6px 4px",textAlign:"center"}}><div style={{fontSize:7,color:"#60a5fa",fontWeight:700}}>PROGRAMADO</div><div style={{fontSize:12,fontWeight:800,color:"#60a5fa"}}>{fmt(programado)}</div></div>
                              <div style={{flex:1,background:"rgba(201,168,76,0.08)",border:"1px solid #C9A84C33",borderRadius:8,padding:"6px 4px",textAlign:"center"}}><div style={{fontSize:7,color:"#C9A84C",fontWeight:700}}>PENDIENTE</div><div style={{fontSize:12,fontWeight:800,color:"#C9A84C"}}>{fmt(pend)}</div></div>
                            </div>
                            {vinc.length===0
                              ? <div style={{fontSize:10,color:"#475569",padding:"4px 0"}}>Sin movimientos vinculados. Para vincular un ingreso, créalo o edítalo y selecciona esta oportunidad en "Vínculo".</div>
                              : vinc.map(m=>(
                                  <div key={m.id} onClick={()=>{setVerRef(null);setViewMov(m);}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",gap:8,padding:"8px 10px",background:"#0d0d1a",border:"1px solid #1e293b",borderRadius:9,marginBottom:6,cursor:"pointer"}}>
                                    <div style={{minWidth:0,flex:1}}>
                                      <div style={{fontSize:12,color:"#e2e8f0",fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{m.concepto||"(sin concepto)"}</div>
                                      <div style={{fontSize:9,color:"#64748b"}}>{m.fecha?fmtDate(m.fecha):"sin fecha"} · {m.estatus}</div>
                                    </div>
                                    <div style={{fontSize:13,fontWeight:800,color:"#C9A84C",whiteSpace:"nowrap"}}>{fmt(m.monto)}</div>
                                  </div>
                                ))}
                            {vinc.length>0&&<div style={{fontSize:9,color:"#475569",marginTop:2}}>Toca un movimiento para ver o editarlo.</div>}
                          </div>
                        );
                      })()}
                      <div style={{fontSize:10,color:"#475569",textAlign:"center",marginTop:16}}>Reflejo del CFC · solo lectura</div>
                    </div>
                  </div>
                );
              })()}
            </div>
          );
        })()}


        {/* ── MENÚ ── */}
        {view==="menu"&&(
          <div style={S.sec}>
            {menuSec==="analisis"&&(<div style={{marginBottom:16}}>
              {[
                {ico:"📊",label:"Estadísticas",sub:"Gastos, ingresos y evolución",target:"estadisticas",color:"#a78bfa"},
                {ico:"🎯",label:"Presupuestos",sub:"Control de gasto por categoría",target:"presupuestos",color:"#22c55e"},
                {ico:"📈",label:"Proyección Presupuestal",sub:"Panorama financiero mes a mes",target:"proyeccion",color:"#60a5fa"},
              ].map(it=>(
                <div key={it.target} style={S.menuRow} onClick={()=>setView(it.target)}>
                  <div style={{...S.menuIco,background:`${it.color}18`}}><span>{it.ico}</span></div>
                  <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{it.label}</div><div style={{fontSize:10,color:"#475569"}}>{it.sub}</div></div>
                  <span style={{color:"#334155",fontSize:14}}>›</span>
                </div>
              ))}
            </div>)}
            {menuSec==="config"&&(<div style={{marginBottom:16}}>
              {[
                {ico:"🏦",label:"Cuentas",sub:"Débito, efectivo y tarjetas",target:"cuentas",color:"#60a5fa"},
                {ico:"📂",label:"Categorías",sub:"Categorías de ingresos y egresos",target:"catalogos",color:"#C9A84C"},
                {ico:"🗂",label:"Catálogos del Sistema",sub:"Orígenes, prioridades y tipos",target:"catalogosSistema",color:"#a78bfa"},
                {ico:"⚙",label:"Configuración",sub:"Exportar y eliminar datos",target:"configuracion",color:"#f87171"},
              ].map(it=>(
                <div key={it.target} style={S.menuRow} onClick={()=>setView(it.target)}>
                  <div style={{...S.menuIco,background:`${it.color}18`}}><span>{it.ico}</span></div>
                  <div style={{flex:1}}><div style={{fontSize:13,fontWeight:700}}>{it.label}</div><div style={{fontSize:10,color:"#475569"}}>{it.sub}</div></div>
                  <span style={{color:"#334155",fontSize:14}}>›</span>
                </div>
              ))}
            </div>)}
            <div style={{...S.card(),marginTop:4}}>
              <div style={S.sTit}>RESUMEN RÁPIDO</div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:10}}><span style={{color:"#64748b"}}>Saldo Real</span><span style={{fontWeight:700,color:"#C9A84C"}}>{fmt(stats.saldoReal)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:4,fontSize:10}}><span style={{color:"#64748b"}}>Ingresos reales</span><span style={{fontWeight:700,color:"#22c55e"}}>{fmt(stats.totalIngresos)}</span></div>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:10}}><span style={{color:"#64748b"}}>Egresos reales</span><span style={{fontWeight:700,color:"#f87171"}}>{fmt(stats.totalEgresos)}</span></div>
            </div>
          </div>
        )}


        {/* ── CATÁLOGOS DEL SISTEMA ── */}
        {view==="catalogosSistema"&&<SysCatView
          catOrigenAcr={catOrigenAcr} setCatOrigenAcr={setCatOrigenAcr}
          catOrigenDeu={catOrigenDeu} setCatOrigenDeu={setCatOrigenDeu}
          catPrioPago={catPrioPago} setCatPrioPago={setCatPrioPago}
          catProbRecup={catProbRecup} setCatProbRecup={setCatProbRecup}
          catTipoIngExt={catTipoIngExt} setCatTipoIngExt={setCatTipoIngExt}
          acreedores={acreedores} deudores={deudores} ingresosExt={ingresosExt}
          onBack={()=>setView("menu")}/>}

        {/* ── CARTERA ── */}
        {view==="cartera"&&(
          <div style={S.sec}>
            {/* Tabs + filtros sticky */}
            <div style={{position:"sticky",top:0,zIndex:20,background:"#0c0c16",borderBottom:"1px solid #1e293b",marginLeft:-14,marginRight:-14,paddingLeft:14,paddingRight:14,marginBottom:10,paddingBottom:8}}>
              <div style={{display:"flex",borderBottom:"1px solid #1e293b22",marginBottom:8}}>
                {[["acreedores","🔴 Acreedores"],["deudores","🟢 Deudores"],["ingresosExt","⭐ Ing. Ext."]].map(([k,l])=>(
                  <button key={k} style={{flex:1,padding:"10px 4px",fontSize:9,fontWeight:700,cursor:"pointer",border:"none",background:"none",
                    color:carteraTab===k?"#C9A84C":"#334155",borderBottom:carteraTab===k?"2px solid #C9A84C":"2px solid transparent"}}
                    onClick={()=>{setCarteraTab(k);setCarteraOrigen("Todos");}}>{l}</button>
                ))}
              </div>
