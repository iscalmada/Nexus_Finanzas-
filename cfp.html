              <div style={{display:"flex",gap:5,flexWrap:"wrap",marginBottom:carteraTab==="acreedores"?6:0}}>
                {(carteraTab==="acreedores"?["Todos",...catOrigenAcr]:carteraTab==="deudores"?["Todos",...catOrigenDeu]:["Todos",...catTipoIngExt]).map(o=>{
                  const arr=carteraTab==="acreedores"?acreedores:carteraTab==="deudores"?deudores:ingresosExt;
                  const cnt=o==="Todos"?arr.length:arr.filter(x=>x.origen===o).length;
                  return <button key={o} style={{...S.prioB2(carteraOrigen===o,carteraTab==="acreedores"?"#f87171":carteraTab==="deudores"?"#22c55e":"#fbbf24"),flex:"none",padding:"4px 9px",fontSize:9}} onClick={()=>setCarteraOrigen(o)}>{o}{cnt>0&&<span style={{opacity:0.7}}> ({cnt})</span>}</button>;
                })}
              </div>
              {/* Prioridad de pago — solo Acreedores */}
              {carteraTab==="acreedores"&&<div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                <span style={{fontSize:8,color:"#475569",textTransform:"uppercase",letterSpacing:1,marginRight:2}}>Pago</span>
                {["Todos",...catPrioPago].map(n=><button key={n} style={{...S.prioB2(carteraNivel===n,n==="Todos"?"#64748b":NIV_COL[n]||"#64748b"),flex:"none",padding:"4px 9px",fontSize:9}} onClick={()=>setCarteraNivel(n)}>{n}</button>)}
              </div>}
            </div>

            {/* ── ACREEDORES ── */}
            {carteraTab==="acreedores"&&(()=>{
              const origenes=["Todos",...ORIG_ACREEDOR];
              const acrFiltrados=(carteraOrigen==="Todos"?acreedores:acreedores.filter(x=>x.origen===carteraOrigen)).filter(x=>carteraNivel==="Todos"||(x.nivel||"Media")===carteraNivel);
              const total=acrFiltrados.reduce((s,x)=>s+saldoPendiente(x,movs),0);
              return(<>
                {/* Selector origen y prioridad ya en sticky arriba */}
                {(()=>{
                  const totalInicial=acrFiltrados.reduce((s,x)=>s+(x.montoActual||0),0);
                  const totalTodos=acreedores.reduce((s,x)=>s+saldoPendiente(x,movs),0);
                  return(
                    <div style={{...S.card("rgba(248,113,113,0.2)"),marginBottom:11}}>
                      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:9,marginBottom:5}}>
                        <div>
                          <div style={S.lbl}>Deuda inicial {carteraOrigen!=="Todos"&&<span style={{color:"#f87171"}}>· {carteraOrigen}</span>}</div>
                          <div style={{fontSize:16,fontWeight:800,color:"#f8717188"}}>{fmt(totalInicial)}</div>
                        </div>
                        <div>
                          <div style={S.lbl}>Saldo pendiente {carteraOrigen!=="Todos"&&<span style={{color:"#f87171"}}>· {carteraOrigen}</span>}</div>
                          <div style={{fontSize:16,fontWeight:800,color:"#f87171"}}>{fmt(total)}</div>
                        </div>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#475569"}}>
                        <span>{acrFiltrados.length} acreedor{acrFiltrados.length!==1?"es":""} · Pagado: {fmt(totalInicial-total)}</span>

                      </div>
                    </div>

                {acrFiltrados.length===0&&<div style={{textAlign:"center",padding:"36px 0",color:"#334155",fontSize:12}}>{carteraOrigen==="Todos"?"Sin acreedores registrados":"Sin acreedores de "+carteraOrigen}</div>}
                {acrFiltrados.map(x=>{
                  const sp=saldoPendiente(x,movs);
                  const prog=programado(x,movs);
                  const pct=x.montoActual>0?Math.max(0,Math.min(100,100-(sp/x.montoActual*100))):0;
                  const isActA=acreedoresDrag.aId===x.id,isOvA=acreedoresDrag.oViz===x.id;
                  return(
                    <div key={x.id}
                      draggable onDragStart={()=>acreedoresDrag.start(x.id)}
                      onDragOver={e=>{e.preventDefault();acreedoresDrag.enter(x.id);}}
                      onDrop={acreedoresDrag.commit}
                      style={{...S.card(),borderLeft:"3px solid #f87171",cursor:"pointer",marginBottom:8,
                        background:isActA?"#1e2a1e":isOvA?"#1a2030":"#10101e",transition:"background 0.15s"}}
                      onClick={()=>{setViewCartera({...x,tipo:"acreedores"});setCarteraDetalleModo("ejecutados");}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:5}}>
                        <div style={{flex:1}}>
                          <div style={{fontSize:8,color:"#f87171",fontWeight:700,letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>{x.origen}{x.nivel&&<span style={{marginLeft:6,padding:"1px 6px",borderRadius:6,background:NIV_COL[x.nivel]+"22",color:NIV_COL[x.nivel]}}>{x.nivel}</span>}</div>
                          <div style={{fontSize:13,fontWeight:800,color:"#e2e8f0"}}>{x.nombre||x.concepto}</div>
                          {x.nombre&&<div style={{fontSize:10,color:"#64748b"}}>{x.concepto}</div>}
                        </div>
                        <div style={{textAlign:"right"}}>
                          <div style={{fontSize:9,color:"#64748b"}}>Saldo pendiente</div>
                          <div style={{fontSize:16,fontWeight:800,color:sp>0?"#f87171":"#22c55e"}}>{fmt(sp)}</div>
                        </div>
                      </div>
                      <div style={{height:4,borderRadius:2,background:"#1e293b",overflow:"hidden",marginBottom:4}}>
                        <div style={{height:"100%",borderRadius:2,background:"#22c55e",width:`${pct}%`,transition:"width 0.4s"}}/>
                      </div>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#475569"}}>
                        <span>Inicial: {fmt(x.montoActual)}</span>
                        {prog>0&&<span style={{color:"#a78bfa"}}>Prog: {fmt(prog)}</span>}
                        <span style={{color:"#22c55e"}}>{Math.round(pct)}% liquidado</span>
                      </div>
                    </div>
                  );
                })}
                <button style={{...S.saveB,marginTop:7}} onClick={()=>openCarteraForm("acreedores")}>+ Nuevo Acreedor</button>
              </>);
            })()}

            {/* ── DEUDORES ── */}
            {carteraTab==="deudores"&&(()=>{
              const origenes=["Todos",...ORIG_DEUDOR];
              const deuFiltrados=(carteraOrigen==="Todos"?deudores:deudores.filter(x=>x.origen===carteraOrigen)).filter(x=>carteraNivel==="Todos"||(x.nivel||"Media")===carteraNivel);
              const total=deuFiltrados.reduce((s,x)=>s+saldoPendiente(x,movs),0);
              return(<>
                {/* Selector origen ya en sticky */}
                {(()=>{

            <div style={{...S.delBox,border:"1px solid #a78bfa44"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#a78bfa",marginBottom:7}}>↻ Movimiento en serie</div>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:18}}>{serieConfirm.action==="edit"?"¿Editar solo este o toda la serie?":"¿Eliminar solo este o toda la serie?"}</div>
              <button style={{...S.saveB,background:"linear-gradient(135deg,#a78bfa,#7c3aed)",marginBottom:7}} onClick={()=>applySerieConfirm("one")}>Solo este</button>
              <button style={{...S.saveB,background:"linear-gradient(135deg,#f87171,#b91c1c)"}} onClick={()=>applySerieConfirm("all")}>Toda la serie</button>
              <button style={S.cancB} onClick={()=>setSerieConfirm(null)}>Cancelar</button>
            </div>
          </div>
        )}

        {showReset&&(
          <div style={S.delCon}>
            <div style={S.delBox}>
              {resetPhase===1&&<><div style={{fontSize:13,fontWeight:700,color:"#f87171",marginBottom:7}}>⚠ Eliminar movimientos</div><div style={{fontSize:11,color:"#94a3b8",marginBottom:14}}>Cuentas y tarjetas se conservan.</div><button style={{...S.saveB,background:"linear-gradient(135deg,#f87171,#b91c1c)"}} onClick={()=>setResetPhase(2)}>Continuar</button><button style={S.cancB} onClick={()=>{setShowReset(false);setResetPhase(0);}}>Cancelar</button></>}
              {resetPhase===2&&<><div style={{fontSize:13,fontWeight:700,color:"#f87171",marginBottom:7}}>⛔ Confirmación final</div><div style={{fontSize:11,color:"#94a3b8",marginBottom:11}}>Escribe <span style={{color:"#f87171",fontWeight:700}}>CONFIRMAR</span></div><input style={{...S.inp,marginBottom:11,borderColor:"#f8717144"}} value={resetInput} onChange={e=>setResetInput(e.target.value)} placeholder="CONFIRMAR"/><button style={{...S.saveB,background:resetInput==="CONFIRMAR"?"linear-gradient(135deg,#f87171,#b91c1c)":"#1e293b",color:resetInput==="CONFIRMAR"?"#fff":"#475569"}} onClick={()=>{if(resetInput==="CONFIRMAR"){setMovs([]);setShowReset(false);setResetPhase(0);setResetInput("");}}}>Borrar todo</button><button style={S.cancB} onClick={()=>{setShowReset(false);setResetPhase(0);setResetInput("");}}>Cancelar</button></>}
            </div>
          </div>
        )}

        {showResetPresupuestos&&(
          <div style={S.delCon}>
            <div style={S.delBox}>
              <div style={{fontSize:13,fontWeight:700,color:"#fbbf24",marginBottom:7}}>⚠ Limpiar presupuestos</div>
              <div style={{fontSize:11,color:"#94a3b8",marginBottom:6,lineHeight:1.6}}>
                Se eliminarán <strong style={{color:"#fbbf24"}}>todos los montos de presupuesto</strong> definidos en todas las categorías y meses.
              </div>
              <div style={{fontSize:10,color:"#475569",marginBottom:14}}>
                Tus movimientos, cuentas y demás datos no se verán afectados.
              </div>
              <button style={{...S.saveB,background:"linear-gradient(135deg,#fbbf24,#b45309)",color:"#080810"}} onClick={()=>{
                setPresupuestos({});
                setShowResetPresupuestos(false);
              }}>Sí, limpiar presupuestos</button>
              <button style={S.cancB} onClick={()=>setShowResetPresupuestos(false)}>Cancelar</button>
            </div>
          </div>
        )}

        {showRepararVinculos&&(()=>{
          // Detectar vínculos rotos: movimientos con vinculoTipo/vinculoId que no están en movIdsVinculados del registro
          const rotos=[];
          movs.forEach(m=>{
            if(!m.vinculoTipo||!m.vinculoId) return;
            let arr=null;
            if(m.vinculoTipo==="acreedores") arr=acreedores;
            else if(m.vinculoTipo==="deudores") arr=deudores;
            else if(m.vinculoTipo==="ingresosExt") arr=ingresosExt;
            if(!arr) return;
            const reg=arr.find(x=>x.id===m.vinculoId);
            if(reg&&!(reg.movIdsVinculados||[]).includes(m.id)){
              rotos.push({movId:m.id,concepto:m.concepto,fecha:m.fecha,tipo:m.vinculoTipo,regId:m.vinculoId,regNombre:reg.nombre||reg.concepto||"#"+reg.id});
            }
          });
          const reparar=()=>{
            if(rotos.length===0) return;
            const rota_acr=rotos.filter(r=>r.tipo==="acreedores");
            const rota_deu=rotos.filter(r=>r.tipo==="deudores");
            const rota_ing=rotos.filter(r=>r.tipo==="ingresosExt");
            const aplicar=(setter,lista)=>{
              if(lista.length===0) return;
              setter(p=>p.map(x=>{
                const ids=lista.filter(r=>r.regId===x.id).map(r=>r.movId);
                if(ids.length===0) return x;
                const yaVinc=x.movIdsVinculados||[];
                const nuevos=ids.filter(id=>!yaVinc.includes(id));
                return nuevos.length>0?{...x,movIdsVinculados:[...yaVinc,...nuevos]}:x;
              }));
            };
            aplicar(setAcreedores,rota_acr);
            aplicar(setDeudores,rota_deu);
            aplicar(setIngresosExt,rota_ing);
            setRepararResult(rotos.length);
          };
          return(
            <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget){setShowRepararVinculos(false);setRepararResult(null);}}}>
              <div style={S.mBox}>
                <div style={S.mTit}>🔗 REPARAR VÍNCULOS</div>
                {repararResult===null?(
                  <>
                    <div style={{fontSize:11,color:"#94a3b8",marginBottom:13,lineHeight:1.7}}>
                      Esta herramienta escanea todos los movimientos que tienen un vínculo asignado (Acreedor, Deudor o Ingreso Extraordinario) y verifica que estén correctamente registrados en el registro correspondiente.
                    </div>
                    {rotos.length===0?(
                      <div style={{...S.infoBx("#22c55e"),marginBottom:13}}>
                        <span>✓</span><span>No se detectaron vínculos rotos. Todo está correcto.</span>
                      </div>
                    ):(
                      <>
                        <div style={{background:"rgba(251,191,36,0.1)",border:"1px solid #fbbf2433",borderRadius:10,padding:"10px 12px",marginBottom:11}}>
                          <div style={{fontSize:11,fontWeight:700,color:"#fbbf24",marginBottom:7}}>⚠ {rotos.length} vínculo{rotos.length!==1?"s":""} roto{rotos.length!==1?"s":""} detectado{rotos.length!==1?"s":""}</div>
                          <div style={{maxHeight:180,overflowY:"auto"}}>
                            {rotos.map((r,i)=>(
                              <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #1e293b",fontSize:10}}>
                                <div>
                                  <div style={{color:"#e2e8f0",fontWeight:600}}>{r.concepto}</div>
                                  <div style={{color:"#475569"}}>{r.fecha} · {r.tipo==="acreedores"?"Acreedor":r.tipo==="deudores"?"Deudor":"Ing. Ext."}: {r.regNombre}</div>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                        <button style={{...S.saveB,background:"linear-gradient(135deg,#60a5fa,#2563eb)"}} onClick={reparar}>
                          Reparar {rotos.length} vínculo{rotos.length!==1?"s":""}
                        </button>
                      </>
                    )}
                    <button style={S.cancB} onClick={()=>{setShowRepararVinculos(false);setRepararResult(null);}}>Cerrar</button>
                  </>
                ):(
                  <>
                    <div style={{...S.infoBx("#22c55e"),marginBottom:13}}>
                      <span>✓</span><span><strong>{repararResult} vínculo{repararResult!==1?"s":""}</strong> reparado{repararResult!==1?"s":""} correctamente.</span>
                    </div>
                    <button style={S.saveB} onClick={()=>{setShowRepararVinculos(false);setRepararResult(null);}}>Listo</button>
                  </>
                )}
              </div>
            </div>
          );
        })()}

        {showExportModal&&(
          <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setShowExportModal(false);}}>
            <div style={S.mBox}>
              <div style={S.mTit}>📥 EXPORTAR A EXCEL</div>
              <div style={S.fg}><label style={S.fl}>Período</label>
                <div style={{display:"flex",gap:7,marginBottom:9}}>
                  <button style={{...S.prioB2(exportPeriod.mode==="mes"),flex:1,padding:"8px 0",fontSize:11}} onClick={()=>setExportPeriod(p=>({...p,mode:"mes"}))}>Mensual</button>
                  <button style={{...S.prioB2(exportPeriod.mode==="anio"),flex:1,padding:"8px 0",fontSize:11}} onClick={()=>setExportPeriod(p=>({...p,mode:"anio"}))}>Anual</button>
                </div>
                {exportPeriod.mode==="mes"&&<div style={S.perBar}><button style={S.perBtn} onClick={()=>setExportPeriod(p=>{const sm=p.sm===0?11:p.sm-1;const sy=p.sm===0?p.sy-1:p.sy;return{...p,sm,sy};})}>‹</button><span style={S.perLbl}>{MESES_FULL[exportPeriod.sm]} {exportPeriod.sy}</span><button style={S.perBtn} onClick={()=>setExportPeriod(p=>{const sm=p.sm===11?0:p.sm+1;const sy=p.sm===11?p.sy+1:p.sy;return{...p,sm,sy};})}>›</button></div>}
                {exportPeriod.mode==="anio"&&<div style={S.perBar}><button style={S.perBtn} onClick={()=>setExportPeriod(p=>({...p,sy:p.sy-1}))}>‹</button><span style={S.perLbl}>{exportPeriod.sy}</span><button style={S.perBtn} onClick={()=>setExportPeriod(p=>({...p,sy:p.sy+1}))}>›</button></div>}
              </div>
              <button style={S.saveB} onClick={()=>exportExcel(exportPeriod.sm,exportPeriod.sy,exportPeriod.mode)}>📥 DESCARGAR EXCEL</button>
              <button style={S.cancB} onClick={()=>setShowExportModal(false)}>Cancelar</button>
            </div>
          </div>
        )}


        {/* ── MODAL CONFIGURACIÓN PIN ── */}
        {showPinConfig&&(()=>{
          const hashPin2=p=>p.split('').reduce((a,c)=>((a<<5)-a)+c.charCodeAt(0)|0,0).toString(36);
          const handleConfigBtn=(d)=>{
            if(pinConfigTemp.length>=6) return;
            const nuevo=pinConfigTemp+d;
            setPinConfigTemp(nuevo);
            if(nuevo.length>=4){
              if(pinConfigStep===1){
                // Guardar el PIN temporalmente y pedir confirmación
                setTimeout(()=>{setPinConfigStep(2);setPinConfigTemp('');},300);
                // Guardar en ref temporal
                window._pinTmp=nuevo;
              } else {
                // Confirmar
                if(nuevo===window._pinTmp){
                  setPinApp(hashPin2(nuevo));
                  setPinActivo(true);
                  setShowPinConfig(false);setPinConfigStep(1);setPinConfigTemp('');
                  window._pinTmp=null;
                  alert("PIN activado correctamente");
                } else {
                  setPinConfigTemp('');
                  alert("Los PINs no coinciden. Intenta de nuevo.");
                  setPinConfigStep(1);
                }
              }
            }
          };
          const digitos=Array.from({length:6}).map((_,i)=>i<pinConfigTemp.length?"●":"○");
          return(
            <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget){setShowPinConfig(false);setPinConfigStep(1);setPinConfigTemp('');}}}>
              <div style={S.mBox}>
                <div style={S.mTit}>{pinConfigStep===1?"🔒 CREAR PIN":"🔒 CONFIRMAR PIN"}</div>
                <div style={{fontSize:11,color:"#64748b",marginBottom:20,textAlign:"center"}}>
                  {pinConfigStep===1?"Ingresa tu nuevo PIN (4-6 dígitos)":"Ingresa el PIN nuevamente para confirmar"}
                </div>
                <div style={{display:"flex",justifyContent:"center",gap:10,marginBottom:24}}>
                  {Array.from({length:Math.max(pinConfigTemp.length,4)}).map((_,i)=>(
                    <div key={i} style={{width:14,height:14,borderRadius:"50%",
                      background:i<pinConfigTemp.length?"#C9A84C":"transparent",
                      border:"2px solid "+(i<pinConfigTemp.length?"#C9A84C":"#334155"),transition:"all 0.15s"}}/>
                  ))}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:11}}>
                  {[1,2,3,4,5,6,7,8,9,"",0,"x"].map((d,i)=>(
                    <button key={i} onClick={()=>{
                      if(d==="") return;
                      if(d==="x") setPinConfigTemp(p=>p.slice(0,-1));
                      else handleConfigBtn(String(d));
                    }} style={{height:56,borderRadius:12,border:"1px solid "+(d==="x"?"#f8717133":"#1e293b"),
                      background:d===""?"transparent":"#13131f",
                      color:d==="x"?"#f87171":"#e2e8f0",fontSize:d==="x"?16:20,fontWeight:600,
                      cursor:d===""?"default":"pointer"}}>
                      {d==="x"?"⌫":d}
                    </button>
                  ))}
                </div>
                <button style={S.cancB} onClick={()=>{setShowPinConfig(false);setPinConfigStep(1);setPinConfigTemp('');window._pinTmp=null;}}>Cancelar</button>
              </div>
            </div>
          );
        })()}
        {showJsonModal&&(
          <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setShowJsonModal(false);}}>
            <div style={S.mBox}>
              <div style={S.mTit}>📂 IMPORTAR DATOS</div>
              <div style={{...S.infoBx("#fbbf24"),marginBottom:13}}><span>⚠</span><span>Esto reemplazará TODOS los datos actuales. Asegúrate de exportar primero si tienes información importante.</span></div>
              <div style={{background:"#13131f",border:"2px dashed #1e293b",borderRadius:11,padding:"22px 14px",textAlign:"center",marginBottom:11}}>
                <div style={{fontSize:22,marginBottom:7}}>📄</div>
                <div style={{fontSize:11,color:"#94a3b8",marginBottom:11}}>Selecciona el archivo JSON exportado desde Nexus CFP</div>
                <label style={{...S.saveB,display:"inline-block",cursor:"pointer",textAlign:"center",marginTop:0}}>
                  SELECCIONAR ARCHIVO
                  <input type="file" accept=".json" style={{display:"none"}} onChange={importJSON}/>
                </label>
              </div>
              {jsonImportError&&<div style={S.errBox}><span>⛔</span><span>{jsonImportError}</span></div>}
              <button style={S.cancB} onClick={()=>setShowJsonModal(false)}>Cancelar</button>
            </div>
          </div>
        )}


        {viewMov&&(()=>{
          const row=viewMov;
          const cats=row.tipoOp==="Ingreso"?catIng:catEg;
          const catNom=cats.find(c=>c.id===row.cat)?.nombre||"";
          const subNom=cats.find(c=>c.id===row.cat)?.subs?.find(s=>s.id===row.subcat)?.nombre||"";
          const cNom2=cuentas.find(c=>c.id===row.cuentaId)?.nombre||"";
          const cDest2=cuentas.find(c=>c.id===row.cuentaDestinoId)?.nombre||"";
          const tcNom2=tarjetas.find(t=>t.id===row.tarjetaId)?.nombre||"";
          const isEgMov=row.tipoOp==="Egreso";
          const prioColor=isEgMov?(PRIO_EG_COLOR[row.prioridad]||"#94a3b8"):(row.prioridad===1?"#22c55e":row.prioridad===2?"#fbbf24":"#94a3b8");
          const prioLabelMov=isEgMov?(PRIO_EG_LBL[row.prioridad]||""):(PRIO_LBL[row.prioridad]||"");
          return(
            <div style={S.modal} onClick={e=>{if(e.target===e.currentTarget)setViewMov(null);}}>
              <div style={S.mBox}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
                  <div style={S.mTit}>👁 DETALLE</div>
                  <button style={{background:"none",border:"none",color:"#475569",fontSize:18,cursor:"pointer"}} onClick={()=>setViewMov(null)}>✕</button>
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:13}}>
                  <div style={{flex:1,marginRight:10}}>
                    <div style={{fontSize:15,fontWeight:800,color:"#e2e8f0",lineHeight:1.3,marginBottom:5}}>{row.concepto}</div>
                    <span style={S.badge(row.estatus)}>{row.estatus}</span>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:9,color:"#64748b",marginBottom:2}}>{row.tipoOp}</div>
                    <div style={{fontSize:22,fontWeight:800,color:OP_COLORS[row.tipoOp]||"#94a3b8"}}>{row.tipoOp==="Ingreso"?"+":row.tipoOp==="Egreso"?"−":""}{fmt(row.monto)}</div>
                  </div>
                </div>
                <div style={{background:"#13131f",borderRadius:11,padding:"11px 13px",marginBottom:11}}>
                  {[
                    ["Fecha", row.fecha?fmtDate(row.fecha):"Sin fecha"],
                    ["Categoría", [catNom,subNom].filter(Boolean).join(" › ")||"—"],
                    row.tipoOp!=="Traspaso"&&row.tipoOp!=="Pago Tarjeta"?["Prioridad/Prob.", PRIO_LBL[row.prioridad]||"—"]:null,
                    cNom2?["Cuenta", cDest2?`${cNom2} → ${cDest2}`:cNom2]:null,
                    tcNom2?["Tarjeta", tcNom2]:null,
                    row.obs?["Observaciones", row.obs]:null,
                    row.serieId?["Serie", "Movimiento repetitivo"]:null,
                  ].filter(Boolean).map(([lbl,val])=>(
                    <div key={lbl} style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",padding:"5px 0",borderBottom:"1px solid #1e293b"}}>
                      <span style={{fontSize:10,color:"#64748b",flexShrink:0,marginRight:10}}>{lbl}</span>
                      <span style={{fontSize:11,color:"#e2e8f0",fontWeight:600,textAlign:"right",wordBreak:"break-word",maxWidth:"60%"}}>{val}</span>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",gap:8,marginTop:4}}>
                  <button style={{...S.saveB,flex:1,marginTop:0,background:"rgba(201,168,76,0.15)",color:"#C9A84C",border:"1px solid #C9A84C44"}} onClick={()=>{setViewMov(null);openEditMov(row);}}>✏ Editar</button>
                  <button style={{...S.saveB,flex:1,marginTop:0,background:"rgba(96,165,250,0.15)",color:"#60a5fa",border:"1px solid #60a5fa44"}} onClick={()=>copyMov(row)}>⧉ Copiar</button>
                </div>
                <button style={S.cancB} onClick={()=>setViewMov(null)}>Cerrar</button>
              </div>
            </div>
          );
        })()}

        {multiMode&&selected.size>0&&(
          <div style={S.multiBar}>
            <span style={{fontSize:10,color:"#C9A84C",fontWeight:700,flex:1}}>{selected.size} selec.</span>
            <button style={S.acBtn("#C9A84C")} onClick={()=>setShowMultiEdit(true)}>✏ Editar</button>
            <button style={S.acBtn("#f87171")} onClick={()=>setConfirmDel({type:"multi"})}>✕ Eliminar</button>
            <button style={S.acBtn("#475569")} onClick={()=>{setMultiMode(false);setSelected(new Set());}}>Salir</button>
          </div>
        )}

        {view==="movimientos"&&!multiMode&&<button style={S.fab} onClick={openNewMov}>+</button>}
        {view==="cuentas"&&<button style={S.fab} onClick={openNewCuenta}>+</button>}

        <nav style={S.nav}>
          {[
            {id:"dashboard",icon:"🏠",label:"Inicio",act:view==="dashboard"},
            {id:"movimientos",icon:"💸",label:"Movim.",act:view==="movimientos"},
            {id:"oportunidades",icon:"🚀",label:"Oport.",act:view==="oportunidades"},
            {id:"cartera",icon:"🤝",label:"Cartera",act:view==="cartera"},
            {id:"menu",sec:"analisis",icon:"📊",label:"Análisis",act:(view==="menu"&&menuSec==="analisis")||["estadisticas","presupuestos","proyeccion"].includes(view)},
            {id:"menu",sec:"config",icon:"⚙",label:"Config",act:(view==="menu"&&menuSec==="config")||["cuentas","catalogos","configuracion"].includes(view)},
          ].map(n=>(
            <button key={n.label} style={S.navB(n.act)} onClick={()=>{setView(n.id);if(n.sec)setMenuSec(n.sec);}}>
              <span style={{fontSize:15}}>{n.icon}</span>{n.label}
            </button>
          ))}
        </nav>
      </div>
    </>
  );
}


ReactDOM.render(React.createElement(App), document.getElementById('root'));

  </script>
  <script>
    // Mostrar nombre en pantalla de carga si está guardado
    (function(){
      try{
        var nombre=localStorage.getItem('nombreUsuario');
        if(nombre&&nombre!=='""'&&nombre!==""){
          var n=JSON.parse(nombre);
          if(n){
            document.getElementById('loading-bienvenido').style.display='block';
            document.getElementById('loading-nombre').style.display='block';
            document.getElementById('loading-nombre').textContent=n;
          }
        }
      }catch(e){}
    })();
    // Capturar errores de Babel/React y mostrarlos
    window.addEventListener('error', function(e) {
      var l = document.getElementById('loading');
      if(l) {
        var msg = e.message || 'Error desconocido';
        var src = e.filename ? e.filename.split('/').pop() : '';
        l.innerHTML = '<div style="color:#f87171;padding:20px;font-size:11px;font-family:monospace;max-width:400px;text-align:left">' +
          '<div style="font-size:14px;font-weight:800;color:#C9A84C;margin-bottom:10px">Error de carga</div>' +
          '<div style="color:#f87171;margin-bottom:6px">' + msg + '</div>' +
          (src?'<div style="color:#475569;margin-bottom:10px">Archivo: '+src+'</div>':'') +
          '<div style="color:#64748b;font-size:10px">Verifica conexión a internet y recarga la página.<br>Si el error persiste, abre en Chrome con WiFi activo.</div>' +
          '<button onclick="location.reload()" style="margin-top:12px;padding:8px 16px;background:#C9A84C;color:#000;border:none;border-radius:8px;cursor:pointer;font-weight:700">Reintentar</button>' +
          '</div>';
      }
    });
    // Ocultar loading cuando React haya renderizado
    window.addEventListener('load', function() {
      setTimeout(function(){
        var l = document.getElementById('loading');
        if(l){l.classList.add('fade-out');setTimeout(function(){l.style.display='none';},320);}
      }, 4000);
    });
  </script>
</body>
